<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div id="pw-gate" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0F0F0F;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Barlow',system-ui,sans-serif">
  <div style="text-align:center;max-width:320px;padding:24px;width:100%">
    <div style="font-size:24px;font-weight:700;color:#F0F0F0;letter-spacing:2px;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif">PCRM</div>
    <div id="pw-subtitle" style="font-size:12px;color:#888;margin-bottom:24px">Sign in to continue</div>
    <input id="pw-email" type="email" placeholder="Email..." autocomplete="off" style="width:100%;padding:10px 14px;background:#1A1A1A;border:1px solid #333;border-radius:5px;color:#F0F0F0;font-size:14px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:10px;box-sizing:border-box"/>
    <input id="pw-input" type="password" placeholder="Password..." autocomplete="off" style="width:100%;padding:10px 14px;background:#1A1A1A;border:1px solid #333;border-radius:5px;color:#F0F0F0;font-size:14px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:12px;box-sizing:border-box"/>
    <button id="pw-btn" style="width:100%;padding:10px;background:#E8E8E8;border:none;border-radius:5px;color:#0F0F0F;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.8px;cursor:pointer;text-transform:uppercase">Sign In</button>
    <div id="pw-err" style="color:#FF6B6B;font-size:11px;margin-top:10px;display:none"></div>
    <div id="pw-ok" style="color:#0BE881;font-size:11px;margin-top:10px;display:none"></div>
    <button id="pw-forgot" style="background:none;border:none;color:#555;font-size:11px;margin-top:14px;cursor:pointer;font-family:'Barlow',sans-serif">Forgot password?</button>
    <div id="pw-fallback-hint" style="font-size:9px;color:#333;margin-top:16px;display:none">Using local password (Supabase not configured)</div>
  </div>
</div>
<script>
(function(){
  /* ── Auth gate (STEP 28C) ─────────────────────────────────────────────── */
  /* Uses Supabase Auth when configured. Falls back to legacy local password  */
  /* when SUPABASE_URL is still the placeholder value.                        */

  var LEGACY_HASH="8f6360fafdc48eb199caf501f237dcf2e4e1d01a6ff4b64db222645617814a97";

  function showErr(msg){
    var e=document.getElementById("pw-err");
    e.textContent=msg;e.style.display="block";
    document.getElementById("pw-ok").style.display="none";
  }
  function showOk(msg){
    var o=document.getElementById("pw-ok");
    o.textContent=msg;o.style.display="block";
    document.getElementById("pw-err").style.display="none";
  }
  function hideGate(){
    document.getElementById("pw-gate").style.display="none";
  }
  function setBtnLoading(loading){
    var btn=document.getElementById("pw-btn");
    btn.disabled=loading;btn.textContent=loading?"...":"Sign In";
  }

  var supaConfigured=!!(window.supabaseClient);

  if(!supaConfigured){
    /* ── Legacy local-password mode ─────────────────────────────────────── */
    document.getElementById("pw-subtitle").textContent="Enter password to continue";
    document.getElementById("pw-email").style.display="none";
    document.getElementById("pw-btn").textContent="Enter";
    document.getElementById("pw-forgot").style.display="none";
    document.getElementById("pw-fallback-hint").style.display="block";

    var custom=localStorage.getItem("pcrm_custom_pw");
    var HASH=custom||LEGACY_HASH;
    if(localStorage.getItem("pcrm_auth")==="1"&&Date.now()-parseInt(localStorage.getItem("pcrm_auth_time")||"0")<86400000){
      hideGate();
    }

    async function sha256(msg){var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");}
    async function legacyCheck(){
      var inp=document.getElementById("pw-input").value;
      var hash=await sha256(inp);
      if(hash===HASH){
        hideGate();
        localStorage.setItem("pcrm_auth","1");
        localStorage.setItem("pcrm_auth_time",String(Date.now()));
      }else{showErr("Incorrect password");}
    }
    document.getElementById("pw-btn").onclick=legacyCheck;
    document.getElementById("pw-input").onkeydown=function(e){if(e.key==="Enter")legacyCheck();};
    return;
  }

  /* ── Supabase Auth mode ──────────────────────────────────────────────── */
  window.supabaseClient.auth.getSession().then(function(res){
    var session=res&&res.data&&res.data.session;
    if(session){
      hideGate();
      if(window.pcrmSupabase){window.pcrmSupabase.migrateFromLocalStorage().catch(function(){});}
    }
  }).catch(function(){});

  window.supabaseClient.auth.onAuthStateChange(function(event,session){
    if(event==="SIGNED_IN"&&session){
      hideGate();
      if(window.pcrmSupabase){window.pcrmSupabase.migrateFromLocalStorage().catch(function(){});}
    }
    if(event==="SIGNED_OUT"){
      document.getElementById("pw-gate").style.display="flex";
    }
    if(event==="PASSWORD_RECOVERY"){
      document.getElementById("pw-subtitle").textContent="Set a new password";
      document.getElementById("pw-email").style.display="none";
      document.getElementById("pw-input").placeholder="New password...";
      document.getElementById("pw-btn").textContent="Update Password";
      document.getElementById("pw-forgot").style.display="none";
      document.getElementById("pw-btn").onclick=async function(){
        var newPw=document.getElementById("pw-input").value;
        if(!newPw||newPw.length<6){showErr("Password must be at least 6 characters");return;}
        setBtnLoading(true);
        var res=await window.supabaseClient.auth.updateUser({password:newPw});
        setBtnLoading(false);
        if(res.error){showErr(res.error.message);}
        else{showOk("Password updated — signing you in...");setTimeout(hideGate,1500);}
      };
    }
  });

  async function supabaseSignIn(){
    var email=document.getElementById("pw-email").value.trim();
    var password=document.getElementById("pw-input").value;
    if(!email){showErr("Enter your email address");return;}
    if(!password){showErr("Enter your password");return;}
    setBtnLoading(true);
    var res=await window.supabaseClient.auth.signInWithPassword({email:email,password:password});
    setBtnLoading(false);
    if(res.error){
      showErr(res.error.message==="Invalid login credentials"?"Incorrect email or password":res.error.message);
    }else{
      hideGate();
      localStorage.setItem("pcrm_auth","1");
      localStorage.setItem("pcrm_auth_time",String(Date.now()));
      if(window.pcrmSupabase){window.pcrmSupabase.migrateFromLocalStorage().catch(function(){});}
    }
  }

  document.getElementById("pw-btn").onclick=supabaseSignIn;
  document.getElementById("pw-input").onkeydown=function(e){if(e.key==="Enter")supabaseSignIn();};
  document.getElementById("pw-email").onkeydown=function(e){if(e.key==="Enter")document.getElementById("pw-input").focus();};

  document.getElementById("pw-forgot").onclick=async function(){
    var email=document.getElementById("pw-email").value.trim();
    if(!email){showErr("Enter your email address first");return;}
    setBtnLoading(true);
    var res=await window.supabaseClient.auth.resetPasswordForEmail(email,{
      redirectTo:window.location.origin+window.location.pathname
    });
    setBtnLoading(false);
    if(res.error){showErr(res.error.message);}
    else{showOk("Password reset email sent — check your inbox");}
  };
})();
</script>
<div id="root"></div>
<script>
(function(){
  try{
    var useState=React.useState,useEffect=React.useEffect,useCallback=React.useCallback,useMemo=React.useMemo,Fragment=React.Fragment,useRef=React.useRef;
    /* PASS 1: Components (~200KB) */
    var src1=window.__pcrmCore+"\n"+window.__pcrmPanels+"\n"+window.__pcrmAI+"\n"+window.__pcrmFeatures;
    eval(Babel.transform(src1,{presets:["react"]}).code);
    /* PASS 2: Tabs + App (without DealRoom — kept under Babel's 500KB pretty-print threshold) */
    var inj="var ScoreBadge=window.__C.ScoreBadge,PipeBadge=window.__C.PipeBadge,PipeBar=window.__C.PipeBar,Sparkline=window.__C.Sparkline,Tag=window.__C.Tag,PomodoroTimer=window.__C.PomodoroTimer,ReminderBanner=window.__C.ReminderBanner,ReminderCard=window.__C.ReminderCard,MilestonePanel=window.__C.MilestonePanel,PipelineHistory=window.__C.PipelineHistory,ContactsEditor=window.__C.ContactsEditor,BlockerPanel=window.__C.BlockerPanel,DealRoom=window.__C.DealRoom,CompanyPanel=window.__C.CompanyPanel,LeadForm=window.__C.LeadForm,ExportPanel=window.__C.ExportPanel,GlobalMicPanel=window.__C.GlobalMicPanel,ReplyClassifier=window.__C.ReplyClassifier,SmartNextAction=window.__C.SmartNextAction,MeetingPrepCard=window.__C.MeetingPrepCard,ContactQueue=window.__C.ContactQueue,EODSummary=window.__C.EODSummary,DailyBriefing=window.__C.DailyBriefing,ReActivationPanel=window.__C.ReActivationPanel,HotLeadPanel=window.__C.HotLeadPanel,NextStepWidget=window.__C.NextStepWidget,SubActionsWidget=window.__C.SubActionsWidget,ActionPanel=window.__C.ActionPanel,BurgerIcon=window.__C.BurgerIcon,EditIcon=window.__C.EditIcon,DealMindMap=window.__C.DealMindMap,ExecutionGraph=window.__C.ExecutionGraph,SignatureBuilder=window.__C.SignatureBuilder,buildSignatureHtml=window.__C.buildSignatureHtml,SystemHealthPanel=window.__C.SystemHealthPanel,IntentSignalBanner=window.__C.IntentSignalBanner,ContactProfilePanel=window.__C.ContactProfilePanel;";
    var src2=inj+"\n"+window.__pcrmTabLeads+"\n"+window.__pcrmTabOutreach+"\n"+window.__pcrmTabOther+"\n"+window.__pcrmApp;
    eval(Babel.transform(src2,{presets:["react"]}).code);
    /* PASS 3: DealRoomTab standalone (only referenced via JSX in app.js, runs synchronously before React's first render) */
    eval(Babel.transform(window.__pcrmTabDealroom,{presets:["react"]}).code);
  } catch(e){
    document.getElementById("root").innerHTML = "<pre style=\"color:#FF6B6B;padding:20px\">Error: " + e.message + "</pre>";
    console.error(e);
  }
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
