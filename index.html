BTN.icon,color:C.danger}} title=\"Delete\">\u2715</button>\n                          </div>\n                        </td>\n                      </tr>\n                    </Fragment>\n                  );\n                })}\n              </tbody>\n            </table>\n          </div>\n        )}\n      </div>\n\n      {/* Company panel */}\n      {openLead&&(\n        <div style={{borderTop:\"1px solid \"+C.line,flexShrink:0,height:480,overflow:\"hidden\"}} className=\"panel-slide\">\n        <CompanyPanel\n          lead={openLead}\n          reminders={reminders}\n          icp={icp}\n          apiKey={apiKey}\n          onClose={function(){onOpenLead(null);}}\n          onUpdate={onUpdateLead}\n          onUpdateLead={onUpdateLead}\n          onAddLogEntry={onAddLogEntry}\n          onAddReminder={onAddReminder}\n          onPipeAdv={onPipeAdv}\n          onBlockerAdd={onBlockerAdd}\n          onBlockerResolve={onBlockerResolve}\n          onBlockerRemove={onBlockerRemove}\n        \n          onOpenPrepCard={onOpenPrepCard}\n          onNoteLogged={onNoteLogged}\n          fetchLeadCalendarEvents={fetchLeadCalendarEvents}\n          gToken={gToken}/>\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* \u2500\u2500 MATRIX TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction ClosedPanel({closedLeads,icp}){\n  const cur=(icp&&icp.currency)||\"\u20ac\";\n  const totalAnnual=closedLeads.reduce(function(a,l){return a+(l.dealValue||0);},0);\n  const totalQ=Math.round(totalAnnual/4);\n  const now=new Date();\n  const qNames=[\"Q1 Jan-Mar\",\"Q2 Apr-Jun\",\"Q3 Jul-Sep\",\"Q4 Oct-Dec\"];\n  const currentQ=Math.floor(now.getMonth()/3);\n  const qRevenue=[0,0,0,0];\n  closedLeads.forEach(function(l){\n    var q=Math.floor(new Date(l.closedAt||l.createdAt).getMonth()/3);\n    qRevenue[q]+=(l.dealValue||0);\n  });\n  return <div>\n    <div style={{background:\"rgba(198,255,0,0.06)\",border:\"1px solid rgba(198,255,0,0.25)\",borderRadius:C.radiusSm,padding:\"10px 12px\",marginBottom:4}}>\n      <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:6}}>\n        <span style={{fontSize:9,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:1,textTransform:\"uppercase\"}}>Closed Won</span>\n        <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:16,color:C.acc,fontWeight:400}}>{closedLeads.length}</span>\n      </div>\n      {totalAnnual>0&&<div style={{marginBottom:6}}>\n        <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:18,color:C.acc,lineHeight:1}}>{cur}{totalAnnual.toLocaleString()}</div>\n        <div style={{color:C.muted,fontSize:9,marginTop:2}}>{cur}{totalQ.toLocaleString()} per quarter avg</div>\n      </div>}\n      {closedLeads.map(function(l){return(\n        <div key={l.id} style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginTop:4,paddingTop:4,borderTop:\"1px solid rgba(198,255,0,0.12)\"}}>\n          <span style={{color:C.dim,fontSize:11,overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\",maxWidth:100}}>\u2713 {l.company}</span>\n          <span style={{fontFamily:\"'DM Mono',monospace\",color:C.acc,fontSize:10}}>{l.dealValue?(cur+Math.round(l.dealValue/1000)+\"k/yr\"):\"\u2014\"}</span>\n        </div>\n      );})}\n      {closedLeads.length===0&&<div style={{color:C.muted,fontSize:11,fontStyle:\"italic\"}}>No closed deals yet</div>}\n    </div>\n    <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:C.radiusSm,padding:\"8px 10px\",marginBottom:4}}>\n      <div style={{...LBL,marginBottom:5}}>Revenue by quarter</div>\n      {qRevenue.map(function(rev,qi){const isCur=qi===currentQ;return(\n        <div key={qi} style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:3,padding:\"3px 6px\",borderRadius:3,background:isCur?\"rgba(198,255,0,0.06)\":\"transparent\",border:isCur?\"1px solid rgba(198,255,0,0.2)\":\"1px solid transparent\"}}>\n          <span style={{fontSize:9,color:isCur?C.acc:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700}}>{qNames[qi]}{isCur?\" \u25c0\":\"\"}</span>\n          <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:10,color:rev>0?C.acc:C.muted}}>{rev>0?(cur+rev.toLocaleString()):\"\u2014\"}</span>\n        </div>\n      );})}\n    </div>\n  </div>;\n}\n\nfunction MatrixTab({leads,reminders,icp}){\n  const [hoverId,setHoverId]=useState(null);\n  const [colorBy,setColorBy]=useState(\"score\");\n  const W=560,H=380,PAD=44;\n  const closedLeads=leads.filter(function(l){return pipeStage(l)===4;});\n    const plotted=useMemo(function(){\n    const now=new Date(),cutoff=new Date(now.getTime()+30*24*3600000);\n    const PIPE_EASE_BONUS  = [-1,0,8,15,22,28,35];\n    const PIPE_VALUE_BONUS = [-1,0,0, 0, 8,15,22];\n    const activeLeads=leads.filter(function(l){return pipeStage(l)!==4;});\n    return activeLeads.map(function(l){\n      const a=calcAxes(l.scores||{}),ps=pipeStage(l);\n      const easeBonus  = ps>=0 ? (PIPE_EASE_BONUS[ps+1]||0)  : 0;\n      const valueBonus = ps>=0 ? (PIPE_VALUE_BONUS[ps+1]||0) : 0;\n      const ease  = Math.min(98, a.ease  + easeBonus);\n      const value = Math.min(98, a.value + valueBonus);\n      const hasDue=(reminders||[]).some(function(r){return !r.done&&r.linkedLeadId===l.id&&new Date(r.dueAt)<=cutoff;});\n      return Object.assign({},l,{ease:ease,value:value,ps:ps,\n        dotClr:isBlocked(l)?C.danger:(colorBy===\"pipeline\"?pipeClr(ps):scoreClr(l.totalScore)),\n        ringClr:isBlocked(l)?C.danger:(colorBy===\"score\"?pipeClr(ps):scoreClr(l.totalScore)),\n        px:PAD+(ease/100)*(W-PAD*2),py:H-PAD-(value/100)*(H-PAD*2),\n        blocked:isBlocked(l),hasDueRem:hasDue});\n    });\n  },[leads,colorBy,reminders]);\n  const QUADS=[{x1:W/2,y1:PAD,x2:W-PAD,y2:H/2,lbl:\"QUICK WINS\",clr:C.acc},{x1:PAD,y1:PAD,x2:W/2,y2:H/2,lbl:\"STRATEGIC\",clr:C.info},{x1:PAD,y1:H/2,x2:W/2,y2:H-PAD,lbl:\"DEPRIORITIZE\",clr:C.muted},{x1:W/2,y1:H/2,x2:W-PAD,y2:H-PAD,lbl:\"LOW-HANGING\",clr:C.warn}];\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"1fr 200px\",gap:12,padding:\"20px 24px\",height:\"100%\",boxSizing:\"border-box\",overflow:\"hidden\"}}>\n      <div style={{...card(null,true),overflow:\"hidden\",display:\"flex\",flexDirection:\"column\",minHeight:0,height:\"100%\"}}>\n        <div style={{padding:\"12px 18px\",borderBottom:\"1px solid \"+C.line,display:\"flex\",alignItems:\"center\",gap:10,flexShrink:0}}>\n          <span style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>Opportunity Matrix</span>\n          <span style={{color:C.muted,fontSize:11}}>Ease of Reach \u00d7 Strategic Value</span>\n          <div style={{flex:1}}/>\n          <div style={{display:\"flex\",background:C.surf2,border:\"1px solid \"+C.line,borderRadius:C.radiusSm,overflow:\"hidden\"}}>\n            {[[\"score\",\"By Score\"],[\"pipeline\",\"By Stage\"]].map(function(o){return(\n              <button key={o[0]} onClick={function(){setColorBy(o[0]);}} style={{background:colorBy===o[0]?C.acc+\"1A\":\"transparent\",border:\"none\",padding:\"4px 10px\",color:colorBy===o[0]?C.acc:C.muted,fontSize:10,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600,letterSpacing:0.5,cursor:\"pointer\"}}>{o[1]}</button>\n            );})}\n          </div>\n          <span style={{color:C.muted,fontSize:11,fontFamily:\"'DM Mono',monospace\"}}>{leads.length}</span>\n        </div>\n        <div style={{padding:'8px 12px',flex:1,display:'flex',alignItems:'stretch',minHeight:0}}>\n          <svg width=\"100%\" viewBox={\"0 0 \"+W+\" \"+H} style={{display:\"block\",width:\"100%\",height:\"100%\"}}>\n            {[25,50,75].map(function(v){const px=PAD+(v/100)*(W-PAD*2),py=H-PAD-(v/100)*(H-PAD*2);return <g key={v}><line x1={px} y1={PAD} x2={px} y2={H-PAD} stroke={C.line2} strokeWidth={0.5}/><line x1={PAD} y1={py} x2={W-PAD} y2={py} stroke={C.line2} strokeWidth={0.5}/></g>;})}\n            <line x1={W/2} y1={PAD} x2={W/2} y2={H-PAD} stroke={C.line} strokeWidth={1}/>\n            <line x1={PAD} y1={H/2} x2={W-PAD} y2={H/2} stroke={C.line} strokeWidth={1}/>\n            <line x1={PAD} y1={H-PAD} x2={W-PAD} y2={H-PAD} stroke={C.dim} strokeWidth={1}/>\n            <line x1={PAD} y1={PAD} x2={PAD} y2={H-PAD} stroke={C.dim} strokeWidth={1}/>\n            <text x={W/2} y={H-6} textAnchor=\"middle\" fill={C.muted} fontSize={9} fontFamily=\"Barlow Condensed\" letterSpacing=\"1.5\">EASE OF REACH</text>\n            <text x={10} y={H/2} textAnchor=\"middle\" fill={C.muted} fontSize={9} fontFamily=\"Barlow Condensed\" letterSpacing=\"1.5\" transform={\"rotate(-90,10,\"+H/2+\")\"}>STRATEGIC VALUE</text>\n            {[0,25,50,75,100].map(function(v){const px=PAD+(v/100)*(W-PAD*2),py=H-PAD-(v/100)*(H-PAD*2);return <g key={v}><text x={px} y={H-PAD+12} textAnchor=\"middle\" fill={C.muted} fontSize={8} fontFamily=\"DM Mono\">{v}</text><text x={PAD-5} y={py+3} textAnchor=\"end\" fill={C.muted} fontSize={8} fontFamily=\"DM Mono\">{v}</text></g>;})}\n            {QUADS.map(function(q){return <g key={q.lbl}><text x={(q.x1+q.x2)/2} y={(q.y1+q.y2)/2} textAnchor=\"middle\" fill={q.clr} fontSize={10} fontWeight=\"600\" fontFamily=\"Barlow Condensed\" letterSpacing=\"1.5\" opacity={0.4}>{q.lbl}</text></g>;})}\n            {plotted.map(function(l){\n              const isH=hoverId===l.id,c=l.dotClr,tw=Math.max(((l.company||\"\").length*6)+20,120),pl=(l.ps>=0&&l.ps<PIPE.length)?PIPE[l.ps].code:\"\u2014\";\n              return(\n                <g key={l.id} style={{cursor:\"crosshair\"}} onMouseEnter={function(){setHoverId(l.id);}} onMouseLeave={function(){setHoverId(null);}}>\n                  {l.blocked&&<g><circle cx={l.px} cy={l.py} r={12} fill={C.danger} opacity={0.15}/><circle cx={l.px} cy={l.py} r={12} fill=\"none\" stroke={C.danger} strokeWidth={2} opacity={0.9}/></g>}\n                  {!l.blocked&&l.ps>=0&&<circle cx={l.px} cy={l.py} r={isH?12:8} fill=\"none\" stroke={l.ringClr} strokeWidth={1.5} opacity={0.5}/>}{l.hasDueRem&&<circle cx={l.px} cy={l.py} r={isH?18:13} fill=\"none\" stroke={C.info} strokeWidth={1.5} strokeDasharray=\"4 2\" opacity={0.85}/>}\n                  {isH&&<circle cx={l.px} cy={l.py} r={17} fill=\"none\" stroke={c} strokeWidth={0.5} opacity={0.2}/>}\n                  <circle cx={l.px} cy={l.py} r={l.blocked?(isH?9:7):(isH?6:4)} fill={c} opacity={1}/>\n                  {!isH&&l.blocked&&<text x={l.px} y={l.py-12} textAnchor=\"middle\" fill={C.danger} fontSize={9} fontFamily=\"Barlow Condensed\" fontWeight=\"700\">BLOCKED</text>}\n                  {isH&&<g>\n                    <rect x={l.px+10} y={l.py-36} width={tw} height={l.blocked?60:50} rx={4} fill={C.surf} stroke={C.line} strokeWidth={1}/>\n                    <text x={l.px+18} y={l.py-18} fill={C.text} fontSize={11} fontWeight=\"700\" fontFamily=\"Barlow Condensed\">{l.company||\"\"}</text>\n                    <text x={l.px+18} y={l.py-5} fill={C.muted} fontSize={8} fontFamily=\"DM Mono\">S:{l.totalScore} E:{l.ease} V:{l.value}</text>\n                    <text x={l.px+18} y={l.py+8} fill={l.ringClr} fontSize={9} fontFamily=\"Barlow Condensed\" fontWeight=\"700\">{pl}</text>\n                    {l.blocked&&<text x={l.px+18} y={l.py+21} fill={C.danger} fontSize={9} fontFamily=\"Barlow Condensed\" fontWeight=\"700\">\u26d4 BLOCKED</text>}\n                  </g>}\n                </g>\n              );\n            })}\n          </svg>\n        </div>\n      </div>\n      <div style={{display:\"flex\",flexDirection:\"column\",gap:4,overflowY:\"auto\",height:\"100%\"}}>\n        <ClosedPanel closedLeads={closedLeads} icp={icp}/>\n        {QUADS.map(function(q){\n          const inQ=plotted.filter(function(l){return getQuadrant(l.ease,l.value).clr===q.clr;});\n          return(\n            <div key={q.lbl} style={{background:C.surf,borderRadius:C.radiusSm,padding:\"8px 10px\",borderLeft:\"2px solid \"+q.clr,border:\"1px solid \"+C.line}}>\n              <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                <span style={{color:q.clr,fontSize:9,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.8}}>{q.lbl}</span>\n                <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:16,color:q.clr}}>{inQ.length}</span>\n              </div>\n              {inQ.slice(0,3).map(function(item){return(\n                <div key={item.id} style={{display:\"flex\",justifyContent:\"space-between\",marginTop:2}}>\n                  <span style={{color:C.dim,fontSize:10,overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\",maxWidth:100}}>{isBlocked(item)?\"\u26d4 \":\"\"}{item.company}</span>\n                  <span style={{fontFamily:\"'DM Mono',monospace\",color:q.clr,fontSize:9}}>{item.totalScore}</span>\n                </div>\n              );})}\n            </div>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n/* \u2500\u2500 OUTREACH TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction OutreachTab({leads,icp,apiKey,sequences,onSequencesChange,onAddReminder,onAddLogEntry,onPitchSaved,onPipeAdv,onBlockerAdd,onBlockerResolve,onBlockerRemove}){\n  const [activePanel,setActivePanel]=useState(\"sequence\");\n  const [selectedStep,setSelectedStep]=useState(0);\n  const [selectedLeadId,setSelectedLeadId]=useState(null);\n  const [editingStep,setEditingStep]=useState(null);\n  const [generating,setGenerating]=useState(false);\n  const [generated,setGenerated]=useState(null);\n  const [editSubject,setEditSubject]=useState(\"\");\n  const [editBody,setEditBody]=useState(\"\");\n  const [editInstructions,setEditInstructions]=useState(sequences.aiInstructions||\"\");\n  const [showInstructions,setShowInstructions]=useState(false);\n  const [copied,setCopied]=useState(false);\n  const [sendMode,setSendMode]=useState(\"global\");\n  const [compSubject,setCompSubject]=useState(\"\");\n  const [compBody,setCompBody]=useState(\"\");\n  const [compTo,setCompTo]=useState(\"\");\n  const [compTpl,setCompTpl]=useState(null);\n  const [compCopied,setCompCopied]=useState(false);\n  const [compGenerating,setCompGenerating]=useState(false);\n\n  const COMP_TPLS=[\n    {id:\"cold\",label:\"Short intro\",icon:\"\\u2709\",subject:\"Quick intro \\u2014 {{my_name}}\",body:\"Hi,\\n\\nI wanted to briefly introduce myself \\u2014 I am {{my_name}} and I work with {{product}}.\\n\\nI came across your name and thought there might be a relevant conversation to be had.\\n\\nWould you be open to a quick 15 min call this week?\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"followup\",label:\"Follow-up (no reply)\",icon:\"\\u21a9\",subject:\"Following up\",body:\"Hi,\\n\\nJust following up on my previous message \\u2014 I know things get busy.\\n\\nWould it make sense to connect briefly?\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"meeting\",label:\"Meeting request\",icon:\"\\uD83D\\uDCC5\",subject:\"15 min \\u2014 worth a chat?\",body:\"Hi,\\n\\nI would love to find 15 minutes to connect. I have a few ideas that might be relevant to what you are working on.\\n\\nHappy to work around your schedule \\u2014 what does next week look like?\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"thankyou\",label:\"Thank you / post-meeting\",icon:\"\\uD83D\\uDE4F\",subject:\"Great speaking with you\",body:\"Hi,\\n\\nReally enjoyed our conversation today \\u2014 thanks for the time.\\n\\nAs discussed, I will [next step]. In the meantime, feel free to reach out with any questions.\\n\\nLooking forward to staying in touch.\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"internal\",label:\"Internal team update\",icon:\"\\uD83D\\uDC65\",subject:\"Update \\u2014 [topic]\",body:\"Hi team,\\n\\nQuick update on [topic]:\\n\\n- [Point 1]\\n- [Point 2]\\n- [Next step / action required]\\n\\nLet me know if you have any questions.\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"catchup\",label:\"Catch-up / bi-weekly\",icon:\"\\uD83D\\uDD04\",subject:\"Catch-up \\u2014 {{my_name}}\",body:\"Hi,\\n\\nHope you are well! Wanted to check in and see how things are going on your end.\\n\\nAny updates since we last spoke? Happy to jump on a quick call to sync.\\n\\nLooking forward to hearing from you.\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"custom\",label:\"Custom / blank\",icon:\"\\u270F\",subject:\"\",body:\"\"},\n  ];\n\n  function fillCompVars(txt){\n    if(!txt)return\"\";\n    return txt\n      .replace(/\\{\\{my_name\\}\\}/g,(icp&&icp.bdmName)||\"[Your name]\")\n      .replace(/\\{\\{product\\}\\}/g,(icp&&icp.productDescription)||\"[product]\")\n      .replace(/\\{\\{company\\}\\}/g,(icp&&icp.targetIndustries)||\"[company]\");\n  }\n  function loadCompTpl(tpl){\n    setCompTpl(tpl.id);\n    setCompSubject(tpl.subject);\n    setCompBody(tpl.body);\n    setCompCopied(false);\n  }\n  function compMailto(){\n    return\"mailto:\"+encodeURIComponent(compTo)+\"?subject=\"+encodeURIComponent(fillCompVars(compSubject))+\"&body=\"+encodeURIComponent(fillCompVars(compBody));\n  }\n  function copyComp(){\n    var txt=(compSubject?\"Subject: \"+fillCompVars(compSubject)+\"\\n\\n\":\"\") +fillCompVars(compBody);\n    navigator.clipboard.writeText(txt).then(function(){setCompCopied(true);setTimeout(function(){setCompCopied(false);},2000);});\n  }\n  async function generateComp(){\n    if(!apiKey||!apiKey.trim()){alert(\"Set API key in ICP tab.\");return;}\n    setCompGenerating(true);\n    var tplName=COMP_TPLS.find(function(t){return t.id===compTpl;})||{label:\"email\"};\n    var prompt=\"Write a \"+tplName.label+\" email. Sender: \"+(icp&&icp.bdmName||\"me\")+\". Product: \"+(icp&&icp.productDescription||\"not specified\")+\". Instructions: \"+(sequences.aiInstructions||\"Be professional and concise.\")+(compTo?\"\\nRecipient hint: \"+compTo:\"\")+(compSubject?\"\\nSubject hint: \"+compSubject:\"\")+(compBody?\"\\nExisting draft: \"+compBody:\"\")+\"\\nReturn ONLY: SUBJECT: line, blank line, then body. No preamble.\";\n    try{\n      var res=await fetch(\"https://api.anthropic.com/v1/messages\",{method:\"POST\",headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:400,messages:[{role:\"user\",content:prompt}]})});\n      var data=await res.json();\n      if(data.error){alert(\"API error: \"+data.error.message);setCompGenerating(false);return;}\n      var raw=(data.content||[]).map(function(b){return b.text||\"\";}).join(\"\").trim();\n      var rlines=raw.split(\"\\n\");      if(rlines[0].indexOf(\"SUBJECT:\")===0){setCompSubject(rlines[0].replace(\"SUBJECT:\",\"\").trim());setCompBody(rlines.slice(2).join(\"\\n\").trim());}\n      else{setCompBody(raw);}\n    }catch(e){alert(\"Error: \"+e.message);}\n    setCompGenerating(false);\n  }\n\n  const steps=sequences.steps||[];\n  const progress=sequences.leadProgress||{};\n  const activeLeads=leads.filter(function(l){return pipeStage(l)!==4;});\n  const step=steps[selectedStep]||steps[0];\n  const selectedLead=selectedLeadId?leads.find(function(l){return l.id===selectedLeadId;})||null:null;\n  const cur=(icp&&icp.currency)||\"\u20ac\";\n  const DAY_OFFSETS=[0,3,7,14,30];\n  const CHANNELS=[{id:\"email\",label:\"Email\",icon:\"\u2709\"},\n    {id:\"linkedin\",label:\"LinkedIn\",icon:\"\ud83d\udcbc\"},\n    {id:\"telegram\",label:\"Telegram\",icon:\"\u2708\"}];\n\n  // Which template to show: lead-specific override, or global\n  function getTemplate(stepIdx,leadId){\n    var s=steps[stepIdx];if(!s)return{subject:\"\",body:\"\"};\n    if(leadId&&sendMode===\"lead\"){\n      var lo=progress[leadId];\n      if(lo&&lo.templates&&lo.templates[stepIdx])return lo.templates[stepIdx];\n    }\n    return{subject:s.subject||\"\",body:s.body||\"\"};\n  }\n\n  function fillVars(text,lead){\n    if(!text)return\"\";\n    var pc=(lead&&lead.contacts&&lead.contacts[0])||{};\n    var firstName=pc.name?(pc.name.split(\" \")[0]):\"there\";\n    return text\n      .replace(/\\{\\{first_name\\}\\}/g,firstName)\n      .replace(/\\{\\{company\\}\\}/g,(lead&&lead.company)||\"your company\")\n      .replace(/\\{\\{my_name\\}\\}/g,(icp&&icp.bdmName)||\"[Your name]\")\n      .replace(/\\{\\{industry\\}\\}/g,(lead&&lead.industry)||(icp&&icp.targetIndustries)||\"your industry\")\n      .replace(/\\{\\{value_proposition\\}\\}/g,(icp&&icp.painPoints)||\"[value we bring]\")\n      .replace(/\\{\\{market_insight\\}\\}/g,(step&&step.marketInsight)||\"[market insight]\");\n  }\n\n  function saveGlobalTemplate(stepIdx,subject,body){\n    var newSteps=steps.map(function(s,i){return i===stepIdx?Object.assign({},s,{subject:subject,body:body}):s;});\n    onSequencesChange(Object.assign({},sequences,{steps:newSteps}));\n  }\n\n  function saveLeadTemplate(leadId,stepIdx,subject,body){\n    var lp=Object.assign({},progress);\n    if(!lp[leadId])lp[leadId]={currentStep:0,lastSentAt:null,templates:{}};\n    lp[leadId]=Object.assign({},lp[leadId],{templates:Object.assign({},lp[leadId].templates||{},{[stepIdx]:{subject:subject,body:body}})});\n    onSequencesChange(Object.assign({},sequences,{leadProgress:lp}));\n  }\n\n  function markSent(lead,stepIdx){\n    var lp=Object.assign({},progress);\n    var -risk\";\n    return stored;\n  }\n  function healthClr(h){return h===\"happy\"?C.acc:h===\"at-risk\"?C.danger:C.warn;}\n  function healthLabel(h){return h===\"happy\"?\"\u25cf Happy\":h===\"at-risk\"?\"\u25cf At Risk\":\"\u25cf Neutral\";}\n\n  function handleUpdateAcc(id,data){onUpdate(id,data);}\n  function createUpsell(account){\n    const newLead=makeLead({company:account.company+\" (Upsell)\",industry:account.industry||\"\",website:account.website||\"\",source:\"Upsell\",notes:\"Upsell opportunity from existing account: \"+account.company,status:\"contacted\",contacts:[].concat(account.contacts||[]),scores:{decisionMaker:7,engagement:7,companySize:account.scores&&account.scores.companySize||5,industryFit:account.scores&&account.scores.industryFit||5,budget:5,painPoint:5}},{});\n    onAddLead([newLead]);\n  }\n\n  return(\n    <div style={{display:\"flex\",height:\"100%\",overflow:\"hidden\"}}>\n      {/* Left: account list */}\n      <div style={{width:openAccount?380:undefined,flex:openAccount?undefined:1,borderRight:openAccount?\"1px solid \"+C.line:\"none\",display:\"flex\",flexDirection:\"column\",overflow:\"hidden\"}}>\n        {/* Summary bar */}\n        <div style={{padding:\"12px 20px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,background:C.surf,display:\"flex\",alignItems:\"center\",gap:24}}>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Total ARR</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.acc,lineHeight:1}}>{cur}{totalArr.toLocaleString()}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Accounts</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.text,lineHeight:1}}>{accounts.length}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>At risk</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400, "won\"?C.acc:ad.upsellStatus===\"in-progress\"?C.info:ad.upsellStatus===\"identified\"?C.warn:C.muted;\n              var daysSince=daysSinceUpdate(acc);\n              var coolTag=daysSince>=50&&effHealth!==\"at-risk\"?<Tag label={\"\u26a0 No update \"+daysSince+\"d\"} clr={C.danger} small/>:(daysSince>=25&&effHealth===\"happy\"?<Tag label={\"No update \"+daysSince+\"d\"} clr={C.warn} small/>:null);\n              return(\n                <div key={acc.id} onClick={function(){setOpenId(isOpen?null:acc.id);}} style={{background:isOpen?C.surf3:C.surf,border:\"1px solid \"+(isOpen?C.acc+\"44\":C.line),borderRadius:\"8px\",padding:\"14px 16px\",cursor:\"pointer\",transition:\"all .15s\",borderLeft:\"3px solid \"+hClr}}>\n                  <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",marginBottom:8}}>\n                    <div style={{flex:1,minWidth:0}}>\n                      <div style={{fontSize:15,fontWeight:700,color:isOpen?C.acc:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.3}}>{acc.company}</div>\n                      {pc&&<div style={{color:C.muted,fontSize:11,marginTop:2}}>{pc.name}{pc.title?\" \u00b7 \"+pc.title:\"\"}</div>}\n                    </div>\n                    <div style={{textAlign:\"right\",flexShrink:0,marginLeft:8}}>\n                      <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:14,color:C.acc,fontWeight:400}}>{acc.dealValue?(cur+Math.round(acc.dealValue/1000)+\"k/yr\"):\"\u2014\"}</div>\n                    </div>\n                  </div>\n                  <div style={{display:\"flex\",gap:5,flexWrap:\"wrap\",marginBottom:8}}>\n                    <Tag label={healthLabel(effHealth)} clr={hClr} small/>\n                    {ad.upsellStatus&&ad.upsellStatus!==\"none\"&&<Tag label={\"\u2191 \"+ad.upsellStatus} clr={upsellClr} small/>}\n                    {renewalUrgent&&<Tag label={\"\u26a0 Renews \"+renewal+\"d\"} clr={C.danger} small/>}\n eShort(openAccount.closedAt)} clr={C.muted}/>\n                </div>\n              </div>\n              <button onClick={function(){setOpenId(null);}} style={{...BTN.ghost,fontSize:16}}>\u2715</button>\n            </div>\n          </div>\n\n          <div style={{flex:1,overflowY:\"auto\",padding:\"16px 20px\",display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:16,alignContent:\"start\"}}>\n            {/* Account fields */}\n            <div style={{...card(C.info),gridColumn:\"1/-1\"}}>\n              <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:14}}>\n                <div style={{width:2,height:14,background:C.info,borderRadius:1}}/>\n                <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Account Health</span>\n              </div>\n              <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:10}}>\n                {[\"happy\",\"neutral\",\"at-risk\"].map(function(h){const isActive=(openAccount.accountData||{}).healthScore===h;return(\n                  <button key={h} onClick={function(){handleUpdateAcc(openAccount.id,{healthScore:h});}} style={{background:isActive?healthClr(h)+\"22\":\"transparent\",border:\"1px solid \"+(isActive?healthClr(h)+\"66\":C.line),borderRadius:\"5px\",padding:\"8px\",cursor:\"pointer\",textAlign:\"center\"}}>\n                    <div style={{fontSize:13,marginBottom:2}}>{h===\"happy\"?\"\ud83d\ude0a\":h===\"neutral\"?\"\ud83d\ude10\":\"\ud83d\ude1f\"}</div>\n                    <div style={{fontSize:10,fontWeight:700,color:isActive?healthClr(h):C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",textTransform:\"capitalize\"}}>{h.replace(\"-\",\" \")}</div>\n                  </button>\n                );})}\n              </div>\n            </div>\n\n            <div style={{...card(null)}}>\n              <div style={{...LBL,marginBottom:10}}>Key Dates</div>\n              {[[\"Renewal Date\",\"renewalDate\",\"date\"],[\"Next QBR\",\"qbrDate\",\"date\"]].map(function(f){return(\n                <div key={f[1]} style={{marginBottom:10}}>\n                  <span style={LBL}>{f[0]}</span>\n                  <input type=\"date\" value={(openAccount.accountData||{})[f[1]]||\"\"} onChange={function(e){handleUpdateAcc(openAccount.id,{[f[1]]:e.target.value});}} style={{...INP,fontSize:12}}/>\n                  {f[1]===\"renewalDate\"&&(openAccount.accountData||{}).renewalDate&&RenewalCountdown({days:daysUntil((openAccount.accountData||{}).renewalDate)})}\n                </div>\n              );})}\n            </div>\n\n            <div style={{...card(null)}}>\n              <div style={{...LBL,marginBottom:10}}>Upsell / Expansion</div>\n              <select value={(openAccount.accountData||{}).upsellStatus||\"none\"} onChange={function(e){handleUpdateAcc(openAccount.id,{upsellStatus:e.target.value});}} style={{...INP,fontSize:12,marginBottom:8}}>\n                <option value=\"none\">No opportunity</option>\n                <option value=\"identified\">Opportunity identified</option>\n                <option value=\"in-progress\">In progress</option>\n                <option value=\"won\">Won</option>\n              </select>\n              <textarea value={(openAccount.accountData||{}).upsellNotes||\"\"} onChange={function(e){handleUpdateAcc(openAccount.id,{upsellNotes:e.target.value});}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder=\"Upsell notes, product fit, timeline\u2026\"/>\n              {(openAccount.accountData||{}).upsellStatus!==\"won\"&&<button onClick={function(){createUpsell(openAccount);}} style={{...BTN.sm,color:C.info,borderColor:C.info+\"44\",marginTop:8,fontSize:11}}>+ Create upsell opportunity in Leads</button>}\n            </div>\n\n            <div style={{...card(null),gridColumn:\"1/-1\"}}>\n              <div style={{...LBL,marginBottom:8}}>Support Issues / Escalations</div>\n ate+\".json\",JSON.stringify(data,null,2),\"application/json\");\n    onBackupDone();\n  }\n\n  function toCSV(rows){return rows.map(function(r){return r.map(function(v){return'\"'+String(v||\"\").replace(/\"/g,'\"\"').replace(/\\n/g,\" \")+'\"';}).join(\",\");}).join(\"\\n\");}\n\n  function exportCSV(){\n    var PIPE_NAMES=[\"SIGNAL\",\"ECHO\",\"LOCKED\",\"DEEP DIVE\",\"ON THE WIRE\"];\n    var date=new Date().toISOString().slice(0,10);\n\n    var leadsRows=[[\"Lead ID\",\"Company\",\"Industry\",\"Website\",\"Source\",\"Status\",\"Pipeline Stage\",\"Score\",\"Deal Value\",\"Closed At\",\"Contact Name\",\"Contact Title\",\"Contact Phone\",\"Contact LinkedIn\",\"Blocker Active\",\"Blocker Type\",\"Blocker Description\",\"Notes\",\"Created At\"]];\n    leads.forEach(function(l){\n      var pc=(l.contacts&&l.contacts[0])||{};\n      var ps=pipeStage(l);\n      leadsRows.push([l.id,l.company,l.industry,l.website,l.source,l.status,ps>=0?PIPE_NAMES[ps]:\"Not started\",l.totalScore,l.dealValue||\"\",l.closedAt||\"\",pc.name||\"\",pc.title||\"\",pc.phone||\"\",pc.linkedin||\"\",l.blocker?\"YES\":\"\",l.blocker?l.blocker.type:\"\",l.blocker?l.blocker.description:\"\",l.notes||\"\",l.createdAt]);\n    });\n    download(\"pcrm_1_leads_\"+date+\".csv\",toCSV(leadsRows),\"text/csv\");\n\n    var logRows=[[\"Lead ID\",\"Company\",\"Timestamp\",\"Category\",\"Entry\"]];\n    leads.forEach(function(l){(l.logEntries||[]).forEach(function(e){logRows.push([l.id,l.company,e.timestamp,e.categoryLabel||e.category,e.content]);});});\n    if(logRows.length>1)download(\"pcrm_2_log_history_\"+date+\".csv\",toCSV(logRows),\"text/csv\");\n\n    var pipeRows=[[\"Lead ID\",\"Company\",\"Stage Number\",\"Stage Code\",\"Timestamp\",\"Note\"]];\n    leads.forEach(function(l){(l.pipelineHistory||[]).forEach(function(h){var s=h.stage>=0&&h.stage<PIPE_NAMES.length?PIPE_NAMES[h.stage]:\"?\";pipeRows.push([l.id,l.company,h.stage,s,h.timestamp,h.note||\"\"]);});});\n    if(pipeRows.length>1)download(\"pcrm_3_pipeline_history_\"+date+\".csv\",toCSV(pipeRows),\"text/csv\");\n\n    var remRows=[[\"Reminder ID\",\"Text\",\"Due At\",\"Linked Company\",\"Lead ID\",\"Done\",\"Created At\"]];\n    reminders.forEach(function(r){remRows.push([r.id,r.text,r.dueAt,r.linkedCompany||\"\",r.linkedLeadId||\"\",r.done?\"YES\":\"NO\",r.createdAt]);});\n    if(remRows.length>1)download(\"pcrm_4_reminders_\"+date+\".csv\",toCSV(remRows),\"text/csv\");\n\n    var blockerRows=[[\"Lead ID\",\"Company\",\"Type\",\"Description\",\"Created At\",\"Resolved At\",\"Resolution\",\"Status\"]];\n    leads.forEach(function(l){\n      if(l.blocker)blockerRows.push([l.id,l.company,l.blocker.type,l.blocker.description,l.blocker.createdAt,\"\",\"\",\"ACTIVE\"]);\n      (l.blockerHistory||[]).forEach(function(b){blockerRows.push([l.id,l.company,b.type,b.description,b.createdAt,b.resolvedAt||\"\",b.resolution||\"\",\"RESOLVED\"]);});\n    });\n    if(blockerRows.length>1)download(\"pcrm_5_blockers_\"+date+\".csv\",toCSV(blockerRows),\"text/csv\");\n\n    onBackupDone();\n  }\n\n  function exportSalesforceCSV(){\n    var rows=[[\"FirstName\",\"LastName\",\"Company\",\"Title\",\"Phone\",\"LeadSource\",\"Status\",\"Industry\",\"Website\",\"Description\",\"Annual Revenue\"]];\n    leads.forEach(function(l){\n      var pc=(l.contacts&&l.contacts[0])||{};\n      var nameParts=(pc.name||\"Lead\").split(\" \");\n      rows.push([\n        nameParts[0]||\"\",\n        nameParts.slice(1).join(\" \")||l.company,\n        l.company||\"\",\n        pc.title||\"\",\n        pc.phone||\"\",\n        l.source||\"Other\",\n        l.status===\"qualified\"?\"Qualified\":l.status===\"not_fit\"?\"Unqualified\":\"Open - Not Contacted\",\n        l.industry||\"\",\n        l.website||\"\",\n        (l.notes||\"\").replace(/\"/g,\"'\").replace(/\\n/g,\" \"),\n        l.dealValue||\"\"\n      ]);\n    });\n    var csv=rows.map(function(r){return r.map(function(v){return'\"'+String(v).replace(/\"/g,'\"\"')+'\"';}).join(\",\");}).join(\"\\n\");\n    download(\"pcrm_salesforce_\"+new Date().toISOString().slice(0,10)+\".csv\",csv,\"text/csv\");\n    onBackupDone();\n  }\n\n  function exportHTML(){\n    var PIPE_NAMES=[\"SIGNAL\",\"ECHO\",\"LOCKED\",\"DEEP DIVE\",\"ON THE WIRE\"];\n    var closed=leads.filter(function(l){return pipeStage(l)===4;});\n    var active=leads.filter(function(l){return pipeStage(l)!==4;});\n    var totalARR=closed.reduce(function(a,l){return a+(l.dealValue||0);},0);\n    var html='<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>PCRM Report</title>'\n      +'<style>body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#222;margin:0;padding:32px}'\n      +'h1{font-size:28px;font-weight:700;margin:0 0 4px}h2{font-size:18px;font-weight:600;margin:24px 0 12px;border-bottom:2px solid #C6FF00;padding-bottom:6px}'\n      +'.meta{color:#666;font-size:13px;margin-bottom:32px}'\n      +'.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}'\n      +'.kpi{background:#fff;border-radius:8px;padding:16px;border:1px solid #e0e0e0}'\n      +'.kpi-val{font-size:28px;font-weight:700;color:#111;font-variant-numeric:tabular-nums}'\n      +'.kpi-lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.8px;margin-top:4px}'\n      +'table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08)}'\n      +'th{background:#111;color:#C6FF00;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.8px}'\n      +'td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}'\n      +'tr:last-child td{border-bottom:none}'\n      +'.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}'\n      +'</style></head><body>'\n      +'<h1>PCRM Pipeline Report</h1>'\n      +'<div class=\"meta\">Generated '+new Date().toLocaleDateString(\"en-US\",{weekday:\"long\",year:\"numeric\",month:\"long\ tSize:15}}>\ud83d\udcca</span>\n                <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>KPI TARGETS</span>\n              </div>\n              {[[\"Net New Logos / Year\",\"netNewNames\",\"\"],[\"Avg Deal Size (ACV)\",\"acv\",(icp&&icp.currency)||\"\u20ac\"],[\"Pipeline Value\",\"pipelineValue\",(icp&&icp.currency)||\"\u20ac\"]].map(function(row){\n                var kpi=(strategy&&strategy.kpiTargets)||{};\n                return(\n                  <div key={row[1]} style={{marginBottom:10,display:\"flex\",alignItems:\"center\",gap:10}}>\n                    <span style={{fontSize:11,color:C.dim,flex:1}}>{row[0]}</span>\n                    <input value={kpi[row[1]]||\"\"} onChange={function(e){onStrategyUpdate({kpiTargets:Object.assign({},kpi,{[row[1]]:parseInt(e.target.value)||0})});}} style={{...INP,width:120,fontSize:12,textAlign:\"right\"}} placeholder={\"e.g. \"+(row[2]||\"\")+\"50000\"}/>\n                  </div>\n                );\n              })}\n            </div>\n            <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:10,padding:\"14px 16px\",display:\"flex\",alignItems:\"center\",gap:12}}>\n              <span style={{fontSize:22}}>\ud83d\uddfa</span>\n              <div style={{flex:1}}>\n                <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:2}}>Strategy Mind Map</div>\n                <div style={{fontSize:11,color:C.muted}}>Visual strategy map with AI generation</div>\n              </div>\n              <button onClick={function(){onClose();setShowStrategy(true);}} style={{...BTN.primary,fontSize:12}}>Open Map \u2192</button>\n            </div>\n            <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:10,padding:16}}>\n              <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:14}}>\n                <span style={{fontSize:15}}>\ud83c\udfaf</span>\n                <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>ICP \u2014 IDEAL CUSTOMER PROFILE</span>\n              </div>\n              <div style={{color:C.muted,fontSize:11,marginBottom:14,lineHeight:1.5}}>Injected into every AI pitch and email generation.</div>\n              {[[\"Your Name\",\"bdmName\",\"text\",\"Your full name\"],[\"What you sell\",\"productDescription\",\"textarea\",\"Describe your product or service\u2026\"],[\"Target Industries\",\"targetIndustries\",\"text\",\"e.g. SaaS, Fintech, B2B\"],[\"Ideal Company Size\",\"targetSize\",\"text\",\"e.g. 50\u2013500 employees\"],[\"Budget Range\",\"idealBudget\",\"text\",\"e.g. $30k\u2013$200k ARR\"],[\"Pain Points You Solve\",\"painPoints\",\"textarea\",\"e.g. Manual reporting, poor forecasting\u2026\"],[\"Currency symbol\",\"currency\",\"text\",\"\u20ac\"]].map(function(r){return(\n                <div key={r[1]} style={{marginBottom:12}}>\n                  <span style={{fontSize:9,fontWeight:700,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,textTransform:\"uppercase\",display:\"block\",marginBottom:4}}>{r[0]}</span>\n                  {r[2]===\"textarea\"\n                    ?<textarea value={(icp&&icp[r[1]])||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder={r[3]}/>\n                    :<input value={(icp&&icp[r[1]])||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} style={{...INP,fontSize:12}} placeholder={r[3]}/>\n                  }\n                </div>\n              );})}\n            </div>\n            <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:10,padding:16}}>\n              <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",marginBottom:14}}>\n                <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n                  <span style={{fontSize:15}}>\u2696</span>\n                  <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>SCORING WEIGHTS</span>\n                </div>\n                <Tag label={(Object.values(weights||{}).reduce(function(a,b){return a+b;},0))+\"/100\"} clr={Object.values(weights||{}).reduce(function(a,b){return a+b;},0)===100?C.acc:C.danger}/>\n              </div>\n              {CRITERIA.map(function(cr){return(\n                <div key={cr.id} style={{marginBottom:14}}>\n                  <div style={{display:\"flex\",justifyContent:\"space-between\",marginBottom:4}}>\n                    <span style={{fontSize:11,color:cr.clr,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600}}>{cr.label}</span>\n                    <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:cr.clr}}>{(weights||{})[cr.id]||0}<span style={{fontSize:10,color:C.muted}}>%</span></span>\n                  </div>\n                  <input type=\"range\" min={0} max={40} value={(weights||{})[cr.id]||0} onChange={function(e){onWeightsChange(cr.id,parseInt(e.target.value)||0);}} style={{width:\"100%\",accentColor:cr.clr}}/>\n                </div>\n              );})}\n              <button onClick={function(){onWeightsChange(\"__reset__\",0);}} style={{...BTN.secondary,fontSize:11}}>Reset to defaults</button>\n            </div>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n\n/* \u2500\u2500 GLOBAL MIC PANEL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction GlobalMicPanel({leads,reminders,icp,weights,onClose,onAddLead,onAddLogEntry,onAddReminder,onBlockerAdd,onPipeAdv,onStatusChange,onNavigate}){\n  const [listening,setListening]=useState(false);\n  const [transcript,setTranscript]=useState(\"\");\n  const [result,setResult]=useState(null);\n  const [confirmQ,setConfirmQ]=useState(null);\n  const recRef=React.useRef(null);\n  const cur=(icp&&icp.currency)||\"\u20ac\";\n\n  function startListen(){\n    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;\n    if(!SR){alert(\"Voice input requires Chrome.\");return;}\n    var rec=new SR();\n    rec.continuous=false;rec.interimResults=false;rec.lang=\"en-US\";\n    rec.onresult=function(e){\n      var t=Array.from(e.results).filter(function(r){return r.isFinal;}).map(function(r){return r[0].transcript;}).join(\" \");\n      setTranscript(t);\n      setListening(false);\n      parseCommand(t);\n      // Auto-close after 2s if command was understood (non-error)\n      setTimeout(function(){onClose();},2000);\n    };\n    rec.onerror=function(){setListening(false);setResult({type:\"error\",msg:\"Could not hear you. Try again.\"});};\n    rec.onend=function(){setListening(false);};\n    recRef.current=rec;\n    rec.start();\n    setListening(true);\n    setTranscript(\"\");\n    setResult(null);\n    setConfirmQ(null);\n  }\n\n  function stopListen(){\n    if(recRef.current)recRef.current.stop();\n    setListening(false);\n  }\n\n  function fuzzyMatch(text,companies){\n    var lo=text.toLowerCase();\n    var best=null,bestScore=0;\n    companies.forEach(function(l){\n      var cn=l.company.toLowerCase();\n      if(lo.indexOf(cn)>=0){var s=cn.length;if(s>bestScore){bestScore=s;best=l;}}\n    });\n    if(!best){\n      companies.forEach(function(l){\n        var words=l.company.toLowerCase().split(/\\s+/);\n        words.forEach(function(w){if(w.length>3&&lo.indexOf(w)>=0){if(l!==best){bestScore=w.length;best=l;}}});\n      });\n    }\n    return best;\n  }\n\n  function stageFromText(txt){\n    var lo=txt.toLowerCase();\n    if(lo.indexOf(\"wire\")>=0||lo.indexOf(\"closing\")>=0||lo.indexOf(\"sign\")>=0||lo.indexOf(\"won\")>=0||lo.indexOf(\"closed\")>=0||lo.indexOf(\"deal\")>=0)return 4;\n    if(lo.indexOf(\"deep dive\")>=0||lo.indexOf(\"deep\")>=0||lo.indexOf(\"negotiat\")>=0||lo.indexOf(\"proposal\")>=0)return 3;\n    if(lo.indexOf(\"locked\")>=0||lo.indexOf(\"lock\")>=0||lo.indexOf(\"commit\")>=0||lo.indexOf(\"contract\")>=0)return 2;\n    if(lo.indexOf(\"echo\")>=0||lo.indexOf(\"follow\")>=0||lo.indexOf(\"replied\")>=0||lo.indexOf(\"response\")>=0)return 1;\n    if(lo.indexOf(\"signal\")>=0||lo.indexOf(\"start\")>=0||lo.indexOf(\"begin\")>=0||lo.indexOf(\"contacted\")>=0||lo.indexOf(\"first\")>=0)return 0;\n    return -1;\n  }\n\n  function parseCommand(raw){\n    if(!raw||!raw.trim()){setResult({type:\"error\",msg:\"Didn't catch that. Try again.\"});return;}\n    var lo=raw.toLowerCase().trim();\n    var allLeads=leads.filter(function(l){return pipeStage(l)!==4;});\n    var company=fuzzyMatch(lo,leads);\n\n    // \u2500\u2500 QUERY: how many / stats \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(lo.match(/how many|count|total|stats/)){\n      var active=leads.filter(function(l){return pipeStage(l)!==4;}).length;\n      var closed=leads.filter(function(l){return pipeStage(l)===4;}).length;\n      var hot=leads.filter(function(l){return l.totalScore>=75;}).length;\n      setResult({type:\"info\",msg:\"You have \"+leads.length+\" leads total \u2014 \"+active+\" active, \"+closed+\" closed. \"+hot+\" are hot (\u226575).\"});\n      return;\n    }\n\n    // \u2500\u2500 OPEN / NAVIGATE to lead \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(lo.match(/^(open|show|go to|navigate|find|check|view|see|look at|tell me about|what about|how is|status of|score of)\\s/)||lo.match(/(open|show|go to)$/)){\n      if(company){setResult({type:\"action\",msg:\"Opening \"+company.company+\"\u2026\",action:function(){onNavigate(\"leads\",company.id);}});return;}\n      setResult({type:\"error\",msg:\"Which company? I couldn't find a match.\"});return;\n    }\n\n    // \u2500\u2500 ADD LEAD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(lo.match(/new lead|add lead|create lead|add company|new company/)){\n      var nameMatch=raw.match(/(?:new lead|add lead|create lead|add company|new company)\\s+(.+)/i);\n      var companyName=nameMatch?nameMatch[1].trim():\"New Lead\";\n      var newL=makeLead({company:companyName,industry:\"\",status:\"new\",scores:{decisionMaker:5,engagement:5,companySize:5,industryFit:5,budget:5,painPoint:5}},{});\n      onAddLead([newL]);\n      setResult({type:\"success\",msg:\"Lead created: \"+companyName,action:function(){onNavigate(\"leads\",newL.id);}});\n      return;\n    }\n\n    // \u2500\u2500 REMINDER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(lo.match(/remind me|set reminder|add reminder/)){\n      var parsed=parseSmartNotes(raw,company||{contacts:[],company:\"\"});\n      if(parsed.newReminders.length>0){\n        parsed.newReminders.forEach(function(r){if(company){r.linkedLeadId=company.id;r.linkedCompany=company.company;}onAddReminder(r);});\n        setResult({type:\"success\",msg:\"Reminder set: \"+parsed.newReminders[0].text.slice(0,60)+(parsed.newReminders[0].text.length>60?\"\u2026\":\"\")});\n      }else{\n        setResult({type:\"error\",msg:\"Couldn't detect a date/time. Say 'remind me to call Katya tomorrow 9am'.\"});\n      }\n      return;\n    }\n\n    // \u2500\u2500 BLOCKER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(detectBlocker(lo)){\n      if(company){\n        onBlockerAdd(company.id,extractBlockerType(lo),raw);\n        setResult({type:\"success\",msg:\"\u26d4 Blocker set on \"+company.company,action:function(){onNavigate(\"leads\",company.id);}});\n      }else if(leads.length===1){\n        onBlockerAdd(leads[0].id,extractBlockerType(lo),raw);\n        setResult({type:\"success\",msg:\"\u26d4 Blocker set on \"+leads[0].company});\n      }else{\n        setConfirmQ({type:\"blocker\",text:raw,prompt:\"Which company has the blocker?\",options:leads.map(function(l){return{label:l.company,id:l.id};})});\n      }\n      return;\n    }\n\n    // \u2500\u2500 ADVANCE PIPELINE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(lo.match(/advance|move|push|next stage|promote|forward|progress|update stage|change stage|set stage|put.*stage|take.*to|bring.*to|send.*to|escalate/)){\n      var stage=stageFromText(lo);\n      if(company&&stage>=0){\n        onPipeAdv(company.id,stage,\"Via voice command\");\n        setResult({type:\"success\",msg:\"\u2192 \"+company.company+\" moved to \"+PIPE[stage].code});\n        return;\n      }\n      if(company&&stage<0){\n        // Try to advance by 1 step (next stage)\n        var currentStage=pipeStage(company);\n        if(currentStage<PIPE.length-1){\n          var nextStage=currentStage+1;\n          onPipeAdv(company.id,nextStage,\"Via voice command\");\n          setResult({type:\"success\",msg:\"\u2192 \"+company.company+\" moved to \"+PIPE[nextStage].code});\n          return;\n        }\n        setResult({type:\"error\",msg:\"Which stage? Say 'move \"+company.company+\" to Deep Dive'.\"});return;\n      }\n      setResult({type:\"error\",msg:\"Say 'advance [company] to [stage]'.\"});return;\n    }\n\n    // \u2500\u2500 LOG NOTE / OPEN LEAD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(company){\n      var textWithoutCompany=lo.replace(company.company.toLowerCase(),\"\").trim();\n      if(!textWithoutCompany||textWithoutCompany.length<5){\n        onNavigate(\"leads\",company.id);\n        setResult({type:\"action\",msg:\"Opening \"+company.company+\"\u2026\",action:function(){onNavigate(\"leads\",company.id);}});\n        return;\n      }\n      var cat=categorize(raw),catMeta=LOG_CATS[cat]||LOG_CATS.note;\n      var entry={id:uid(\"log\"),timestamp:new Date().toISOString(),category:cat,categoryLabel:catMeta.label,content:raw};\n      onAddLogEntry(company.id,entry);\n      setResult({type:\"success\",msg:\"Note saved to \"+company.company+\": \"+raw.slice(0,60)+(raw.length>60?\"\u2026\":\"\"),action:function(){onNavigate(\"leads\",company.id);}});\n      return;\n    }\n\n    // \u2500\u2500 FALLBACK: ask which company \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(leads.length>0){\n      setConfirmQ({type:\"note\",text:raw,prompt:\"Which company is this for?\",options:leads.slice(0,6).map(function(l){return{label:l.company,id:l.id};}).concat([{label:\"Save as standalone note\",id:null}])});\n      return;\n    }\n\n    setResult({type:\"error\",msg:\"I didn't understand. Try: 'Add lead Acme', 'Note for Banana\u2026', 'Remind me to call Katya tomorrow 9am'.\"});\n  }\n\n  function resolveConfirm(option){\n    var q=confirmQ;setConfirmQ(null);\n    if(q.type===\"blocker\"&&option.id){\n      onBlockerAdd(option.id,extractBlockerType(q.text),q.text);\n      setResult({type:\"success\",msg:\"\u26d4 Blocker set on \"+option.label});\n    }else if(q.type===\"note\"&&option.id){\n      var cat=categorize(q.text),catMeta=LOG_CATS[cat]||LOG_CATS.note;\n      var entry={id:uid(\"log\"),timestamp:new Date().toISOString(),category:cat,categoryLabel:catMeta.label,content:q.text};\n      onAddLogEntry(option.id,entry);\n      setResult({type:\"success\",msg:\"Note saved to \"+option.label,action:function(){onNavigate(\"leads\",option.id);}});\n    }else{\n      setResult({type:\"info\",msg:\"Dismissed.\"});\n    }\n  }\n\n  var clr=listening?C.danger:C.acc;\n  return(\n    <div style={{position:\"fixed\",top:0,left:0,right:0,bottom:0,zIndex:500,background:\"rgba(0,0,0,0.75)\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\"}}\n      onClick={function(e){if(e.target===e.currentTarget)onClose();}}>\n      <div style={{background:C.surf,border:\"1px solid \"+C.line,borderRadius:16,padding:32,minWidth:420,maxWidth:560,width:\"90%\",boxShadow:\"0 24px 64px rgba(0,0,0,0.8)\"}}>\n        {/* Header */}\n        <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",marginBottom:24}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:10}}>\n            <div style={{width:8,height:8,borderRadius:\"50%\",background:C.acc}}/>\n            <span style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:1}}>PCRM VOICE</span>\n          </div>\n          <button onClick={onClose} style={{...BTN.ghost,fontSize:18,color:C.muted}}>\u2715</button>\n        </div>\n\n        {/* Mic button */}\n        <div style={{textAlign:\"center\",marginBottom:24}}>\n          <div onClick={listening?stopListen:startListen}\n            style={{width:80,height:80,borderRadius:\"50%\",background:listening?\"rgba(255,85,85,0.15)\":\"rgba(198,255,0,0.1)\",border:\"2px solid \"+clr,display:\"inline-flex\",alignItems:\"center\",justifyContent:\"center\",cursor:\"pointer\",transition:\"all .2s\",boxShadow:listening?\"0 0 0 8px rgba(255,85,85,0.1)\":\"none\"}}>\n            <span style={{fontSize:32}}>{listening?\"\u23f9\":\"\ud83c\udfa4\"}</span>\n          </div>\n          <div style={{marginTop:12,fontSize:12,color:listening?C.danger:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>\n            {listening?\"\ud83d\udd34 LISTENING \u2014 click to stop\":\"Click mic or type below\"}\n          </div>\n        </div>\n\n        {/* Transcript display */}\n        {transcript&&<div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:8,padding:\"10px 14px\",marginBottom:16,fontSize:13,color:C.dim,fontStyle:\"italic\"}}>\"{transcript}\"</div>}\n\n        {/* Text input fallback */}\n        {!listening&&!result&&!confirmQ&&(\n          <div style={{display:\"flex\",gap:8,marginBottom:16}}>\n            <input value={transcript} onChange={function(e){setTranscript(e.target.value);}} onKeyDown={function(e){if(e.key===\"Enter\"&&transcript.trim()){parseCommand(transcript);setTimeout(function(){onClose();},2000);}}}\n              style={{...INP,flex:1,fontSize:13}} placeholder=\"Or type a command\u2026 (Enter to run)\"/>\n            <button onClick={function(){if(transcript.trim()){parseCommand(transcript);setTimeout(function(){onClose();},2000);}}} style={{...BTN.primary,fontSize:12,padding:\"8px 14px\"}}>Go</button>\n          </div>\n        )}\n\n        {/* Confirm question */}\n        {confirmQ&&(\n          <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:8,padding:16,marginBottom:16}}>\n            <div style={{fontSize:13,color:C.text,marginBottom:12}}>\u2753 {confirmQ.prompt}</div>\n            <div style={{display:\"flex\",flexDirection:\"column\",gap:6}}>\n              {confirmQ.options.map(function(opt){return(\n                <button key={opt.id||\"none\"} onClick={function(){resolveConfirm(opt);}}\n                  style={{...BTN.secondary,textAlign:\"left\",padding:\"8px 14px\",fontSize:13,color:C.text}}>\n                  {opt.label}\n                </button>\n              );})}\n            </div>\n          </div>\n        )}\n\n        {/* Result */}\n        {result&&(\n          <div style={{background:result.type===\"error\"?\"rgba(255,85,85,0.08)\":result.type===\"success\"?\"rgba(198,255,0,0.06)\":\"rgba(96,180,255,0.06)\",border:\"1px solid \"+(result.type===\"error\"?\"rgba(255,85,85,0.3)\":result.type===\"success\"?\"rgba(198,255,0,0.25)\":\"rgba(96,180,255,0.25)\"),borderRadius:8,padding:\"12px 16px\",marginBottom:16}}>\n            <div style={{fontSize:13,color:result.type===\"error\"?C.danger:result.type===\"success\"?C.acc:C.info}}>{result.msg}</div>\n            {result.action&&<button onClick={result.action} style={{...BTN.sm,marginTop:8,color:C.acc,borderColor:C.acc+\"44\",fontSize:11}}>Open \u2192</button>}\n          </div>\n        )}\n\n        {/* Try again / hints */}\n        <div style={{display:\"flex\",gap:6,flexWrap:\"wrap\",justifyContent:\"center\"}}>\n          {result&&<button onClick={function(){setResult(null);setTranscript(\"\");setConfirmQ(null);startListen();}} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:11}}>\ud83c\udfa4 Try again</button>}\n          <button onClick={onClose} style={{...BTN.sm,fontSize:11}}>Close</button>\n        </div>\n\n        {/* Command hints */}\n        <div style={{marginTop:20,borderTop:\"1px solid \"+C.line,paddingTop:14,display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:4}}>\n          {[[\"Add lead Acme Corp\",\"create a new lead\"],[\"Note for [company] \u2026\",\"log activity\"],[\"Remind me to call \u2026 tomorrow 9am\",\"set reminder\"],[\"Blocker for [company] \u2026\",\"mark as blocked\"],[\"Advance [company] to Deep Dive\",\"move pipeline\"],[\"Open [company]\",\"navigate to lead\"],[\"How many leads\",\"quick stats\"],[\"Open [company]\",\"go directly\"]].map(function(h,i){return(\n            <div key={i} style={{display:\"flex\",gap:6,alignItems:\"baseline\"}}>\n              <span style={{fontSize:10,color:C.acc,fontFamily:\"'DM Mono',monospace\",flexShrink:0}}>\"{h[0]}\"</span>\n              <span style={{fontSize:9,color:C.muted}}>{h[1]}</span>\n            </div>\n          );})}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\n\n/* \u2500\u2500 END OF DAY SUMMARY \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction EODSummary({leads,reminders,icp,apiKey,strategy,onClose,onNavigate}){\n  var [aiSummary,setAiSummary]=useState(\"\");\n  var [generating,setGenerating]=useState(false);\n  var now=new Date();\n  var todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());\n  var tomorrow=new Date(todayStart.getTime()+24*3600000);\n  var in48h=new Date(now.getTime()+48*3600000);\n\n  var activeLeads=leads.filter(function(l){return pipeStage(l)!==4;});\n  var closedLeads=leads.filter(function(l){return pipeStage(l)===4;});\n\n  // What happened today\n  var loggedToday=[];\n  leads.forEach(function(l){\n    (l.logEntries||[]).forEach(function(e){\n      if(new Date(e.timestamp)>=todayStart)loggedToday.push({company:l.company,entry:e});\n    });\n  });\n  var movedToday=[];\n  leads.forEach(function(l){\n    (l.pipelineHistory||[]).forEach(function(h){\n      if(new Date(h.timestamp)>=todayStart)movedToday.push({company:l.company,stage:h.stage,note:h.note});\n    });\n  });\n  var closedToday=closedLeads.filter(function(l){return new Date(l.closedAt||l.createdAt)>=todayStart;});\n\n  // Tomorrow's prep\n  var dueTomorrow=reminders.filter(function(r){\n    if(r.done)return false;\n    var d=new Date(r.dueAt);\n    return d>=tomorrow&&d<=in48h;\n  });\n  var overdueNow=reminders.filter(function(r){return !r.done&&new Date(r.dueAt)<now;});\n  var blocked=activeLeads.filter(function(l){return isBlocked(l);});\n  var stuckLeads=activeLeads.filter(function(l){\n    var entries=l.logEntries||[];\n    if(!entries.length)return new Date(l.createdAt)<new Date(now.getTime()-7*24*3600000);\n    var latest=entries.reduce(function(a,e){return e.timestamp>a?e.timestamp:a;},\"\");\n    return new Date(latest)<new Date(now.getTime()-7*24*3600000);\n  });\n  var kpi=(strategy&&strategy.kpiTargets)||{};\n  var yearStart=new Date(now.getFullYear(),0,1);\n  var closedThisYear=closedLeads.filter(function(l){return new Date(l.closedAt||l.createdAt)>=yearStart;});\n  var totalRevYear=closedThisYear.reduce(function(a,l){return a+(l.dealValue||0);},0);\n  var cur=(icp&&icp.currency)||\"\u20ac\";\n  var avcActual=closedThisYear.length>0?Math.round(totalRevYear/closedThisYear.length):0;\n\n  function generateAISummary(){\n    if(!apiKey||!apiKey.trim()){setAiSummary(\"Set your Anthropic API key in Settings.\");return;}\n    setGenerating(true);\n    var prompt=\"I am a BDM. End of day summary request.\"\n      +\"\\n\\nToday's activity:\"\n      +\"\\n- Logged \"+loggedToday.length+\" notes/interactions\"\n      +\"\\n- Pipeline moves: \"+movedToday.map(function(m){return m.company+\" \u2192 stage \"+m.stage;}).join(\", \")\n      +\"\\n- Closed deals today: \"+closedToday.map(function(l){return l.company;}).join(\", \")\n      +\"\\n\\nCurrent pipeline: \"+activeLeads.length+\" active leads\"\n      +\"\\n- Blocked: \"+blocked.map(function(l){return l.company;}).join(\", \")\n      +\"\\n- Overdue tasks: \"+overdueNow.length\n      +\"\\n- Stuck leads (no activity 7d): \"+stuckLeads.map(function(l){return l.company;}).join(\", \")\n      +\"\\n\\nKPI progress: \"+closedThisYear.length+\" new logos (target: \"+kpi.netNewNames+\"), ACV \"+cur+avcActual+\" (target: \"+cur+kpi.acv+\")\"\n      +\"\\n\\nGive me a concise end-of-day summary with: 1) What went well today, 2) Top 3 priorities for tomorrow, 3) One strategic observation about my pipeline. Be specific, practical, max 150 words.\";\n    fetch(\"https://api.anthropic.com/v1/messages\",{method:\"POST\",headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:300,messages:[{role:\"user\",content:prompt}]})})\n    .then(function(r){return r.json();})\n    .then(function(d){\n      setAiSummary(d.error?\"Error: \"+d.error.message:(d.content||[]).map(function(b){return b.text||\"\";}).join(\"\").trim());\n      setGenerating(false);\n    })\n    .catch(function(e){setAiSummary(\"Error: \"+e.message);setGenerating(false);});\n  }\n\n  return(\n    <div style={{position:\"fixed\",top:0,left:0,right:0,bottom:0,zIndex:600,background:\"rgba(0,0,0,0.92)\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",padding:20}}>\n      <div style={{background:C.surf,border:\"1px solid \"+C.line,borderRadius:16,width:\"100%\",maxWidth:560,maxHeight:\"88vh\",overflowY:\"auto\",boxShadow:\"0 32px 80px rgba(0,0,0,0.9)\"}}>\n        <div style={{padding:\"20px 24px 16px\",borderBottom:\"1px solid \"+C.line,background:\"linear-gradient(135deg,rgba(245,158,11,0.08) 0%,transparent 100%)\",display:\"flex\",alignItems:\"flex-start\",justifyContent:\"space-between\"}}>\n          <div>\n            <div style={{fontSize:11,color:C.warn,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.8,marginBottom:4}}>\ud83c\udf19 END OF DAY</div>\n            <div style={{fontSize:20,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\"}}>Daily Wrap-Up</div>\n            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{now.toLocaleDateString(\"en-US\",{weekday:\"long\",month:\"long\",day:\"numeric\"})}</div>\n          </div>\n          <button onClick={onClose} style={{...BTN.ghost,fontSize:18,color:C.muted}}>\u2715</button>\n        </div>\n\n        <div style={{padding:\"16px 24px\",display:\"flex\",flexDirection:\"column\",gap:14}}>\n          {/* Today's stats */}\n          <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:8}}>\n            {[\n              {label:\"Interactions logged\",val:loggedToday.length,clr:loggedToday.length>0?C.acc:C.muted},\n              {label:\"Pipeline moves\",val:movedToday.length,clr:movedToday.length>0?C.info:C.muted},\n              {label:\"Deals closed\",val:closedToday.length,clr:closedToday.length>0?C.acc:C.muted},\n            ].map(function(s,i){return(\n              <div key={i} style={{background:C.surf2,borderRadius:8,padding:\"10px 12px\",textAlign:\"center\"}}>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,color:s.clr,lineHeight:1}}>{s.val}</div>\n                <div style={{fontSize:9,color:C.muted,marginTop:3,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.3,textTransform:\"uppercase\"}}>{s.label}</div>\n              </div>\n            );})}\n          </div>\n\n          {/* What happened today */}\n          {loggedToday.length>0&&(\n            <div>\n              <div style={{fontSize:10,fontWeight:700,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>TODAY'S ACTIVITY</div>\n              {loggedToday.slice(0,4).map(function(item,i){\n                var cat=LOG_CATS[item.entry.category]||LOG_CATS.note;\n                return(\n                  <div key={i} style={{display:\"flex\",gap:8,padding:\"6px 0\",borderBottom:\"1px solid \"+C.line2,alignItems:\"flex-start\"}}>\n                    <span style={{fontSize:11,flexShrink:0}}>{cat.icon}</span>\n                    <span style={{fontSize:11,fontWeight:600,color:C.info,flexShrink:0,minWidth:80}}>{item.company}</span>\n                    <span style={{fontSize:11,color:C.dim,overflow:\"hidden\",maxHeight:32,flex:1}}>{item.entry.content.slice(0,60)}{item.entry.content.length>60?\"\u2026\":\"\"}</span>\n                  </div>\n                );\n              })}\n            </div>\n          )}\n\n          {loggedToday.length===0&&(\n            <div style={{padding:\"12px\",background:\"rgba(245,158,11,0.06)\",border:\"1px solid rgba(245,158,11,0.2)\",borderRadius:8,fontSize:11,color:C.warn}}>\n              \ud83d\udca1 No activity logged today. Before you close, add a quick note on any calls or emails you had.\n            </div>\n          )}\n\n          {/* Tomorrow's prep */}\n          <div>\n            <div style={{fontSize:11,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>\ud83d\udcc5 TOMORROW'S AGENDA</div>\n            {dueTomorrow.length===0&&overdueNow.length===0\n              ?<div style={{fontSize:11,color:C.muted,fontStyle:\"italic\"}}>No tasks scheduled for tomorrow yet.</div>\n              :<div style={{display:\"flex\",flexDirection:\"column\",gap:4}}>\n                {overdueNow.slice(0,2).map(function(r){return(\n                  <div key={r.id} style={{padding:\"7px 12px\",background:\"rgba(255,85,85,0.06)\",border:\"1px solid rgba(255,85,85,0.2)\",borderRadius:6,fontSize:11,display:\"flex\",gap:8}}>\n                    <span style={{color:C.danger,flexShrink:0}}>\u26a0 OVERDUE</span>\n                    <span style={{color:C.text,flex:1}}>{r.text.slice(0,50)}</span>\n                    {r.linkedCompany&&<span style={{color:C.muted,fontSize:10}}>{r.linkedCompany}</span>}\n                  </div>\n                );})}\n                {dueTomorrow.map(function(r){return(\n                  <div key={r.id} style={{padding:\"7px 12px\",background:\"rgba(198,255,0,0.04)\",border:\"1px solid rgba(198,255,0,0.15)\",borderRadius:6,fontSize:11,display:\"flex\",gap:8}}>\n                    <span style={{color:C.acc,flexShrink:0}}>\ud83d\udccc</span>\n                    <span style={{color:C.text,flex:1}}>{r.text.slice(0,55)}</span>\n                    {r.linkedCompany&&<span style={{color:C.muted,fontSize:10}}>{r.linkedCompany}</span>}\n                  </div>\n                );})}\n              </div>\n            }\n          </div>\n\n          {/* Pipeline health */}\n          {(blocked.length>0||stuckLeads.length>0)&&(\n            <div>\n              <div style={{fontSize:10,fontWeight:700,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>PIPELINE HEALTH</div>\n              {blocked.length>0&&<div style={{fontSize:11,color:C.danger,marginBottom:4}}>\u26d4 {blocked.length} blocked: {blocked.map(function(l){return l.company;}).join(\", \")}</div>}\n              {stuckLeads.length>0&&<div style={{fontSize:11,color:C.warn}}>\ud83d\udca4 {stuckLeads.length} stuck (7d+): {stuckLeads.slice(0,3).map(function(l){return l.company;}).join(\", \")}</div>}\n            </div>\n          )}\n\n          {/* KPI progress */}\n          <div style={{background:C.surf2,borderRadius:8,padding:\"12px 14px\"}}>\n            <div style={{fontSize:10,fontWeight:700,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>KPI PROGRESS</div>\n            <div style={{display:\"flex\",gap:16,flexWrap:\"wrap\"}}>\n              {[\n                {label:\"New logos\",actual:closedThisYear.length,target:kpi.netNewNames,unit:\"\"},\n                {label:\"Avg deal\",actual:avcActual,target:kpi.acv,unit:cur},\n              ].map(function(k,i){\n                var pct=k.target>0?Math.min(Math.round((k.actual/k.target)*100),100):0;\n                var clr=pct>=100?C.acc:pct>=70?C.warn:C.danger;\n                return(\n                  <div key={i} style={{flex:1,minWidth:100}}>\n                    <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{k.label}</div>\n                    <div style={{fontSize:14,fontWeight:700,color:clr,fontFamily:\"'DM Mono',monospace\"}}>{k.unit}{typeof k.actual===\"number\"?k.actual.toLocaleString():k.actual}</div>\n                    {k.target>0&&<div style={{fontSize:9,color:C.muted}}>of {k.unit}{k.target.toLocaleString()} \u00b7 {pct}%</div>}\n                  </div>\n                );\n              })}\n            </div>\n          </div>\n\n          {/* AI Summary */}\n          <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:8,padding:\"12px 14px\"}}>\n            <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",marginBottom:aiSummary?10:0}}>\n              <div style={{fontSize:10,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8}}>\u2726 AI DEBRIEF</div>\n              <button onClick={generateAISummary} disabled={generating} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:10,opacity:generating?0.5:1}}>{generating?\"Generating\u2026\":\"Generate summary\"}</button>\n            </div>\n            {aiSummary&&<div style={{fontSize:11,color:C.dim,lineHeight:1.7,whiteSpace:\"pre-wrap\"}}>{aiSummary}</div>}\n            {!aiSummary&&<div style={{fontSize:10,color:C.muted,marginTop:6}}>Get an AI-written debrief: what went well, top 3 priorities for tomorrow, pipeline observation</div>}\n          </div>\n        </div>\n\n        <div style={{padding:\"14px 24px\",borderTop:\"1px solid \"+C.line,display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n          <button onClick={function(){onNavigate(\"activity\");onClose();}} style={{...BTN.secondary,fontSize:12}}>Log activity</button>\n          <button onClick={onClose} style={{...BTN.primary,fontSize:12}}>Done for today \u2713</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\n/* \u2500\u2500 SMART NEXT ACTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction SmartNextAction({lead,noteContent,icp,apiKey,strategy,onClose,onAddReminder,onNavigate}){\n  var [suggestion,setSuggestion]=useState(\"\");\n  var [loading,setLoading]=useState(true);\n  var ps=pipeStage(lead);\n  var PIPE_NAMES=[\"SIGNAL\",\"ECHO\",\"LOCKED\",\"DEEP DIVE\",\"ON THE WIRE\"];\n  var kpi=(strategy&&strategy.kpiTargets)||{};\n\n  useEffect(function(){\n    if(!apiKey||!apiKey.trim()){setSuggestion(\"Set your Anthropic API key in Settings to get smart suggestions.\");setLoading(false);return;}\n    var prompt=\"I just logged this note for \"+lead.company+\" (pipeline stage: \"+(ps>=0?PIPE_NAMES[ps]:\"Not started\")+\", score: \"+lead.totalScore+\"/100\"+(lead.blocker?\", BLOCKED: \"+lead.blocker.description:\"\")+\")\"\n      +\"\\n\\nNote: \"+noteContent\n      +\"\\n\\nMy ICP: \"+(icp&&icp.productDescription||\"not set\")\n      +\"\\nKPI targets: \"+kpi.netNewNames+\" new logos, ACV \"+((icp&&icp.currency)||\"\u20ac\")+(kpi.acv||0)\n      +\"\\n\\nBased on this note and the pipeline stage, what is the single best next action I should take? Give me ONE specific, concrete action with a suggested timeframe (e.g. 'Send a follow-up email within 24h proposing a demo'). Max 2 sentences. No preamble.\";\n    fetch(\"https://api.anthropic.com/v1/messages\",{method:\"POST\",headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:120,messages:[{role:\"user\",content:prompt}]})})\n    .then(function(r){return r.json();})\n    .then(function(d){\n      setSuggestion(d.error?\"Error: \"+d.error.message:(d.content||[]).map(function(b){return b.text||\"\";}).join(\"\").trim());\n      setLoading(false);\n    })\n    .catch(function(e){setSuggestion(\"Error: \"+e.message);setLoading(false);});\n  },[]);\n\n  function addAsReminder(){\n    if(!suggestion||loading)return;\n    var rem={id:uid(\"rem\"),text:suggestion.slice(0,120),dueAt:new Date(Date.now()+24*3600000).toISOString(),linkedLeadId:lead.id,linkedCompany:lead.company,done:false,createdAt:new Date().toISOString()};\n    onAddReminder(rem);\n    onClose();\n  }\n\n  return(\n    <div style={{position:\"fixed\",bottom:24,right:24,zIndex:400,width:320,background:C.surf,border:\"1px solid \"+C.acc+\"44\",borderRadius:12,boxShadow:\"0 8px 32px rgba(0,0,0,0.6)\",overflow:\"hidden\"}}>\n      <div style={{padding:\"10px 14px\",background:\"rgba(198,255,0,0.06)\",borderBottom:\"1px solid \"+C.line,display:\"flex\",alignItems:\"center\",gap:8}}>\n        <span style={{fontSize:13}}>\u2726</span>\n        <span style={{fontSize:11,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>SMART NEXT ACTION</span>\n        <span style={{fontSize:11,color:C.info,marginLeft:4}}>{lead.company}</span>\n        <button onClick={onClose} style={{...BTN.ghost,fontSize:14,color:C.muted,marginLeft:\"auto\",padding:\"0 4px\"}}>\u2715</button>\n      </div>\n      <div style={{padding:\"12px 14px\"}}>\n        {loading\n          ?<div style={{fontSize:11,color:C.muted,fontStyle:\"italic\"}}>Analysing your note\u2026</div>\n          :<div style={{fontSize:12,color:C.dim,lineHeight:1.6}}>{suggestion}</div>\n        }\n      </div>\n      {!loading&&suggestion&&!suggestion.startsWith(\"Error\")&&(\n        <div style={{padding:\"8px 14px\",borderTop:\"1px solid \"+C.line,display:\"flex\",gap:6}}>\n          <button onClick={addAsReminder} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:11,flex:1}}>+ Add as reminder</button>\n          <button onClick={function(){onNavigate(\"leads\",lead.id);onClose();}} style={{...BTN.sm,fontSize:11}}>Open lead \u2192</button>\n        </div>\n      )}\n    </div>\n  );\n}\n\n\n/* \u2500\u2500 DAILY BRIEFING \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction DailyBriefing({leads,reminders,icp,onClose,onNavigate,onOpenPrepCard}){\n  var now=new Date();\n  var todayStr=now.toISOString().slice(0,10);\n  var hour=now.getHours();\n  var greeting=hour<12?\"Good morning\":(hour<17?\"Good afternoon\":\"Good evening\");\n  var name=(icp&&icp.bdmName)?\", \"+icp.bdmName.split(\" \")[0]:\"\";\n\n  var activeLeads=leads.filter(function(l){return pipeStage(l)!==4;});\n  var closedLeads=leads.filter(function(l){return pipeStage(l)===4;});\n\n  // Overdue reminders\n  var overdue=reminders.filter(function(r){return !r.done&&new Date(r.dueAt)<now;});\n  // Due today\n  var dueToday=reminders.filter(function(r){\n    if(r.done)return false;\n    var d=new Date(r.dueAt);\n    return d>=now&&d<=new Date(now.getTime()+24*3600000);\n  });\n  // Blocked leads\n  var blocked=activeLeads.filter(function(l){return isBlocked(l);});\n  // Stuck leads - no activity in 7+ days\n  var stuck=activeLeads.filter(function(l){\n    var entries=l.logEntries||[];\n    if(!entries.length)return new Date(l.createdAt)<new Date(now.getTime()-7*24*3600000);\n    var latest=entries.reduce(function(a,e){return e.timestamp>a?e.timestamp:a;},\"\");\n    return new Date(latest)<new Date(now.getTime()-7*24*3600000);\n  });\n  // Hot leads (score >= 75) not yet contacted\n  var hotNew=activeLeads.filter(function(l){return l.totalScore>=75&&pipeStage(l)<=0;});\n  // Recent wins this week\n  var weekAgo=new Date(now.getTime()-7*24*3600000);\n  var recentWins=closedLeads.filter(function(l){return new Date(l.closedAt||l.createdAt)>=weekAgo;});\n\n  var totalTasks=overdue.length+dueToday.length;\n  var hasUrgent=overdue.length>0||blocked.length>0;\n\n  function dismiss(){\n    localStorage.setItem(\"pcrm_last_briefing\",todayStr);\n    onClose();\n  }\n\n  return(\n    <div style={{position:\"fixed\",top:0,left:0,right:0,bottom:0,zIndex:600,background:\"rgba(0,0,0,0.92)\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",padding:20}}>\n      <div style={{background:C.surf,border:\"1px solid \"+C.line,borderRadius:16,width:\"100%\",maxWidth:580,maxHeight:\"85vh\",overflowY:\"auto\",boxShadow:\"0 32px 80px rgba(0,0,0,0.9)\"}}>\n        {/* Header */}\n        <div style={{padding:\"20px 24px 16px\",borderBottom:\"1px solid \"+C.line,background:\"linear-gradient(135deg,rgba(198,255,0,0.06) 0%,transparent 100%)\"}}>\n          <div style={{fontSize:22,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,marginBottom:2}}>{greeting}{name} \ud83d\udc4b</div>\n          <div style={{fontSize:12,color:C.muted}}>{now.toLocaleDateString(\"en-US\",{weekday:\"long\",month:\"long\",day:\"numeric\",year:\"numeric\"})}</div>\n          {hasUrgent&&<div style={{marginTop:10,padding:\"6px 12px\",background:\"rgba(255,85,85,0.1)\",bor
