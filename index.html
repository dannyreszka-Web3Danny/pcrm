(function(){
  var code = "\nconst { useState, useEffect, useCallback, useMemo, Fragment, useRef } = React;\n\n/* \u2500\u2500 DESIGN TOKENS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nconst C = {\n  acc:\"#C6FF00\", info:\"#60B4FF\", warn:\"#F59E0B\", danger:\"#FF5555\",\n  bg:\"#0F0F0F\", surf:\"#1A1A1A\", surf2:\"#222222\", surf3:\"#2A2A2A\",\n  line:\"#333333\", line2:\"#2A2A2A\",\n  text:\"#E8E8E8\", muted:\"#666666\", dim:\"#999999\",\n  shadow:\"0 2px 12px rgba(0,0,0,0.5)\",\n  shadowLg:\"0 8px 32px rgba(0,0,0,0.7)\",\n  radius:\"8px\", radiusSm:\"5px\", radiusLg:\"12px\",\n};\n\n/* \u2500\u2500 CONSTANTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nconst PIPE = [\n  {id:0,code:\"SIGNAL\",    label:\"Signal Sent\",     sub:\"First outreach made\",          clr:\"#60B4FF\"},\n  {id:1,code:\"ECHO\",      label:\"Echo Received\",   sub:\"Response or feedback obtained\", clr:\"#A78BFA\"},\n  {id:2,code:\"LOCKED\",    label:\"Interest Locked\", sub:\"Genuine interest confirmed\",    clr:\"#F59E0B\"},\n  {id:3,code:\"DEEP DIVE\", label:\"Deep Dive\",       sub:\"In evaluation / discovery\",     clr:\"#FB923C\"},\n  {id:4,code:\"ON THE WIRE\",label:\"On the Wire\",    sub:\"Signing process initiated\",     clr:\"#C6FF00\"},\n];\nconst PIPE_NONE = -1;\nconst CRITERIA = [\n  {id:\"decisionMaker\",label:\"Decision-Maker Access\",short:\"DM ACCESS\",clr:\"#F59E0B\"},\n  {id:\"engagement\",   label:\"Engagement / Intent\",  short:\"INTENT\",   clr:\"#34D399\"},\n  {id:\"companySize\",  label:\"Company Size / Revenue\",short:\"SIZE/REV\", clr:\"#60B4FF\"},\n  {id:\"industryFit\",  label:\"Industry Fit\",          short:\"IND FIT\",  clr:\"#C084FC\"},\n  {id:\"budget\",       label:\"Budget Signals\",        short:\"BUDGET\",   clr:\"#F87171\"},\n  {id:\"painPoint\",    label:\"Pain Point Match\",      short:\"PAIN FIT\", clr:\"#C6FF00\"},\n];\nconst DEF_WEIGHTS = {decisionMaker:20,engagement:15,companySize:15,industryFit:20,budget:15,painPoint:15};\nconst DEF_ICP = {productDescription:\"\",targetIndustries:\"\",targetSize:\"\",idealBudget:\"\",painPoints:\"\",bdmName:\"\",currency:\"\u20ac\"};\nconst STATUSES = [\"new\",\"contacted\",\"qualified\",\"not_fit\"];\nconst ST_META = {\n  new:      {label:\"New\",       clr:\"#60B4FF\", bg:\"rgba(96,180,255,0.12)\"},\n  contacted:{label:\"Contacted\", clr:\"#F59E0B\", bg:\"rgba(245,158,11,0.12)\"},\n  qualified:{label:\"Qualified\", clr:\"#C6FF00\", bg:\"rgba(198,255,0,0.12)\"},\n  not_fit:  {label:\"Not a fit\", clr:\"#666666\", bg:\"rgba(100,100,100,0.12)\"},\n};\nconst LOG_CATS = {\n  call_transcript:{label:\"Call Transcript\",   icon:\"\ud83d\udcde\",clr:\"#60B4FF\"},\n  call_summary:   {label:\"Call Summary\",      icon:\"\ud83d\udcde\",clr:\"#A78BFA\"},\n  email:          {label:\"Email\",             icon:\"\ud83d\udce7\",clr:\"#34D399\"},\n  meeting_notes:  {label:\"Meeting Notes\",     icon:\"\ud83d\udccb\",clr:\"#F59E0B\"},\n  news:           {label:\"Company News\",      icon:\"\ud83d\udcf0\",clr:\"#FB923C\"},\n  strategy:       {label:\"Strategy Note\",     icon:\"\ud83d\udca1\",clr:\"#C084FC\"},\n  message:        {label:\"Telegram/LinkedIn\", icon:\"\ud83d\udcac\",clr:\"#C6FF00\"},\n  note:           {label:\"Note\",              icon:\"\ud83d\udcdd\",clr:\"#999999\"},\n};\nconst OUTPUT_TYPES = [\n  {id:\"first_outreach\",label:\"First Outreach\",      icon:\"\u2726\",desc:\"Cold intro\"},\n  {id:\"follow_up_cold\",label:\"Follow-up (No Reply)\",icon:\"\u21a9\",desc:\"After silence\"},\n  {id:\"post_call\",     label:\"Post-Call Email\",     icon:\"\ud83d\udcde\",desc:\"After conversation\"},\n  {id:\"re_engagement\", label:\"Re-engagement\",       icon:\"\ud83d\udd04\",desc:\"Gone cold\"},\n  {id:\"proposal\",      label:\"Proposal\",            icon:\"\ud83d\udccb\",desc:\"Next step\"},\n  {id:\"linkedin\",      label:\"LinkedIn\",            icon:\"\ud83d\udcbc\",desc:\"Short & direct\"},\n];\nconst TONES = [{id:\"formal\",label:\"Formal\"},{id:\"casual\",label:\"Casual\"},{id:\"short\",label:\"Short\"}];\nconst BLOCKER_TYPES = [\"internal\",\"external\"];\nconst SK = {leads:\"pcrm_v9_leads\",icp:\"pcrm_v9_icp\",weights:\"pcrm_v9_weights\",statsHistory:\"pcrm_v9_stats\",reminders:\"pcrm_v9_reminders\",apiKey:\"pcrm_v9_apikey\",strategy:\"pcrm_v9_strategy\",lastBackup:\"pcrm_v9_lastbackup\",sequences:\"pcrm_v9_sequences\"};\nconst DAYS_SHORT = [\"Sun\",\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"];\nconst MONTHS_NLP = [\"january\",\"february\",\"march\",\"april\",\"may\",\"june\",\"july\",\"august\",\"september\",\"october\",\"november\",\"december\"];\nconst DAY_NAMES  = [\"sunday\",\"monday\",\"tuesday\",\"wednesday\",\"thursday\",\"friday\",\"saturday\"];\n\n/* \u2500\u2500 HELPERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nconst DEF_SEQUENCES = {\n  aiInstructions:\"Write professional but warm emails. Be concise (under 120 words for cold, under 80 for follow-ups). Focus on value and market context, not features. Never be pushy. Use the prospect's name and company naturally.\",\n  steps:[\n    {id:\"s1\",name:\"Cold Intro\",    channel:\"email\",  dayOffset:0,  subject:\"{{company}} \u2014 a thought on {{industry}}\",  body:\"Hi {{first_name}},\\n\\nI\u2019ve been working with companies like {{company}} in the {{industry}} space, and a common challenge I\u2019m hearing is {{market_insight}}.\\n\\nAt [Company], we help {{industry}} teams {{value_proposition}}.\\n\\nWould it be worth a quick 20 min to explore if this is relevant for you?\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"s2\",name:\"Follow-up 1\",   channel:\"email\",  dayOffset:3,  subject:\"Re: {{company}} \u2014 quick follow-up\",         body:\"Hi {{first_name}},\\n\\nJust wanted to follow up on my note from a few days ago.\\n\\nGiven what\u2019s happening in {{industry}} with {{market_insight}}, I thought the timing might be right.\\n\\nHappy to share a quick case study if useful.\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"s3\",name:\"Value Touch\",   channel:\"linkedin\",dayOffset:7, subject:\"Connecting on LinkedIn\",                        body:\"Hi {{first_name}}, I\u2019ve been following {{company}}\u2019s work in {{industry}}. I\u2019d love to connect \u2014 we\u2019ve been helping similar teams with {{value_proposition}}. Happy to share some thoughts if relevant.\"},\n    {id:\"s4\",name:\"Demo Ask\",      channel:\"email\",  dayOffset:14, subject:\"15 min for {{company}}?\",                      body:\"Hi {{first_name}},\\n\\nI\u2019ve reached out a couple of times but haven\u2019t heard back \u2014 totally understand, things get busy.\\n\\nWould a 15-min call next week make sense? I\u2019ll share one specific idea relevant to {{company}}.\\n\\nBest,\\n{{my_name}}\"},\n    {id:\"s5\",name:\"Breakup\",       channel:\"email\",  dayOffset:30, subject:\"Closing the loop \u2014 {{company}}\",            body:\"Hi {{first_name}},\\n\\nI\u2019ll keep this short \u2014 I won\u2019t reach out again unless it makes sense.\\n\\nIf the timing ever changes or {{market_insight}} becomes more pressing, I\u2019m here.\\n\\nWishing you and the team at {{company}} all the best.\\n\\n{{my_name}}\"}\n  ],\n  leadProgress:{}\n};\n\nconst DEF_STRATEGY = {\n  kpiTargets:{acv:0,netNewNames:0,pipelineValue:0,retention:90},\n  mindMap:{nodes:[{id:\"root\",text:\"My Annual Goal\",x:400,y:250,parentId:null,color:\"#C6FF00\"}]}\n};\n\nfunction calcScore(scores,weights){\n  const t=CRITERIA.reduce(function(a,cr){return a+(scores[cr.id]||5)*(weights[cr.id]||15);},0);\n  const w=CRITERIA.reduce(function(a,cr){return a+(weights[cr.id]||15);},0);\n  return w>0?Math.round((t/(w*10))*100):0;\n}\nfunction calcAxes(scores){\n  return {\n    ease:Math.round(((scores.decisionMaker||5)+(scores.engagement||5))/2*10),\n    value:Math.round(((scores.industryFit||5)+(scores.companySize||5)+(scores.budget||5)+(scores.painPoint||5))/4*10),\n  };\n}\nfunction getQuadrant(ease,value){\n  if(ease>=50&&value>=50)return{label:\"QUICK WINS\",  clr:C.acc};\n  if(ease<50 &&value>=50)return{label:\"STRATEGIC\",   clr:C.info};\n  if(ease>=50&&value<50) return{label:\"LOW-HANGING\",  clr:C.warn};\n  return                        {label:\"DEPRIORITIZE\",clr:C.muted};\n}\nfunction scoreClr(v){return v>=75?C.acc:v>=50?C.warn:v>=25?\"#E07040\":C.muted;}\nfunction scoreTier(v){return v>=75?\"HOT\":v>=50?\"WARM\":v>=25?\"COLD\":\"SKIP\";}\nfunction pipeClr(idx){return(idx>=0&&idx<PIPE.length)?PIPE[idx].clr:C.muted;}\nfunction pipeStage(l){return(l&&typeof l.pipeline===\"number\"&&l.pipeline>=0)?l.pipeline:PIPE_NONE;}\nfunction isBlocked(l){return !!(l&&l.blocker);}\nfunction fmtDate(iso){\n  try{const d=new Date(iso);return d.toLocaleDateString(\"en-US\",{month:\"short\",day:\"numeric\"})+\" \"+d.toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});}\n  catch(_){return \"\";}\n}\nfunction fmtDateShort(iso){\n  if(!iso)return\"\";\n  try{return new Date(iso).toLocaleDateString(\"en-US\",{month:\"short\",day:\"numeric\",year:\"numeric\"});}\n  catch(_){return iso;}\n}\nfunction uid(p){return p+\"_\"+Date.now()+\"_\"+Math.random().toString(36).slice(2,6);}\nfunction makeContact(o){return Object.assign({id:uid(\"c\"),name:\"\",title:\"\",phone:\"\",linkedin:\"\",notes:\"\",lastContacted:\"\"},o||{});}\nfunction makeLead(data,weights){\n  return {id:uid(\"lead\"),aiPitch:\"\",createdAt:new Date().toISOString(),\n    pipeline:PIPE_NONE,pipelineHistory:[],contacts:[],blocker:null,blockerHistory:[],\n    logEntries:[],summary:{currentStatus:\"\",latestUpdate:\"\",goal:\"\",generatedAt:null},\n    dealValue:0,closedAt:null,\n    accountData:{renewalDate:\"\",healthScore:\"happy\",upsellStatus:\"none\",upsellNotes:\"\",qbrDate:\"\",supportIssues:\"\",accountNotes:\"\"},\n    ...data,totalScore:calcScore(data.scores||{},weights)};\n}\nfunction computeSnapshot(leads){\n  return {total:leads.length,\n    hot:leads.filter(function(l){return l.totalScore>=75;}).length,\n    qualified:leads.filter(function(l){return l.status===\"qualified\";}).length,\n    blocked:leads.filter(function(l){return isBlocked(l);}).length,\n    avg:leads.length?Math.round(leads.reduce(function(a,l){return a+l.totalScore;},0)/leads.length):0};\n}\nfunction primaryContact(l){return(l.contacts&&l.contacts.length>0)?l.contacts[0]:null;}\nfunction categorize(text){\n  const lo=text.toLowerCase(),w=text.split(/\\s+/).length;\n  if(w>150&&(lo.indexOf(\" said \")>=0||lo.indexOf(\" mentioned \")>=0||lo.indexOf(\" asked \")>=0))return\"call_transcript\";\n  if(lo.indexOf(\"subject:\")>=0||lo.indexOf(\"from:\")>=0||lo.indexOf(\"best regards\")>=0||lo.indexOf(\"dear \")>=0)return\"email\";\n  if(lo.indexOf(\"telegram\")>=0||lo.indexOf(\"linkedin message\")>=0)return\"message\";\n  if(lo.indexOf(\"funding\")>=0||lo.indexOf(\" raised \")>=0||lo.indexOf(\"announced\")>=0||lo.indexOf(\"launched\")>=0)return\"news\";\n  if(w<150&&(lo.indexOf(\"spoke\")>=0||lo.indexOf(\"called\")>=0||lo.indexOf(\"summary\")>=0||lo.indexOf(\"recap\")>=0))return\"call_summary\";\n  if(lo.indexOf(\"action item\")>=0||lo.indexOf(\"next step\")>=0||lo.indexOf(\"agreed to\")>=0)return\"meeting_notes\";\n  if(lo.indexOf(\"i think\")>=0||lo.indexOf(\"we should\")>=0||lo.indexOf(\"strategy\")>=0)return\"strategy\";\n  return\"note\";\n}\n\n/* \u2500\u2500 NLP DATE PARSER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction parseNaturalDate(text){\n  if(!text)return null;\n  const now=new Date(),lo=text.toLowerCase();\n  function setT(d,h,m){d.setHours(h,m||0,0,0);return d;}\n  function nextWD(di){const d=new Date(now),diff=(di-d.getDay()+7)%7||7;d.setDate(d.getDate()+diff);return d;}\n  let hour=9,min=0,hasTime=false;\n  const ampm=lo.match(/\\b(\\d{1,2})(?::(\\d{2}))?\\s*(am|pm)\\b/);\n  if(ampm){hasTime=true;hour=parseInt(ampm[1]);min=parseInt(ampm[2]||\"0\");if(ampm[3]===\"pm\"&&hour!==12)hour+=12;if(ampm[3]===\"am\"&&hour===12)hour=0;}\n  const t24=lo.match(/\\b(\\d{1,2}):(\\d{2})\\b/);\n  if(!hasTime&&t24){hasTime=true;hour=parseInt(t24[1]);min=parseInt(t24[2]);}\n  const dbm=lo.match(/(?:day before|eve of|evening before|night before)\\s+(\\w+)/);\n  if(dbm){\n    const ref=dbm[1];let refDate=null;\n    if(ref.indexOf(\"tomorrow\")>=0){refDate=new Date(now);refDate.setDate(refDate.getDate()+1);}\n    else{for(let i=0;i<DAY_NAMES.length;i++){if(ref.indexOf(DAY_NAMES[i].slice(0,3))===0||ref===DAY_NAMES[i]){refDate=nextWD(i);break;}}}\n    if(refDate){refDate.setDate(refDate.getDate()-1);return setT(refDate,hasTime?hour:17,min);}\n  }\n  const inM=lo.match(/\\bin (\\d+) (day|hour|week)s?\\b/);\n  if(inM){const d=new Date(now),n=parseInt(inM[1]);\n    if(inM[2]===\"day\")d.setDate(d.getDate()+n);\n    else if(inM[2]===\"week\")d.setDate(d.getDate()+n*7);\n    else d.setTime(d.getTime()+n*3600000);\n    return setT(d,inM[2]===\"hour\"?d.getHours():(hasTime?hour:9),min);}\n  if(lo.indexOf(\"today\")>=0){const d=new Date(now);return setT(d,hasTime?hour:9,min);}\n  if(lo.indexOf(\"tomorrow\")>=0){const d=new Date(now);d.setDate(d.getDate()+1);return setT(d,hasTime?hour:9,min);}\n  if(lo.indexOf(\"tmw\")>=0||lo.indexOf(\"tom \")>=0||lo.indexOf(\"tonite\")>=0||lo.indexOf(\"tonight\")>=0){const d=new Date(now);d.setDate(d.getDate()+1);return setT(d,hasTime?hour:9,min);}\n  if(lo.indexOf(\"next week\")>=0){const d=new Date(now);d.setDate(d.getDate()+7);return setT(d,hasTime?hour:9,min);}\n  for(let i=0;i<DAY_NAMES.length;i++){if(lo.indexOf(DAY_NAMES[i])>=0){const d=nextWD(i);return setT(d,hasTime?hour:9,min);}}\n  for(let i=0;i<MONTHS_NLP.length;i++){\n    if(lo.indexOf(MONTHS_NLP[i])>=0){\n      const am=lo.slice(lo.indexOf(MONTHS_NLP[i])+MONTHS_NLP[i].length).match(/\\s*(\\d{1,2})/);\n      const bm=lo.slice(0,lo.indexOf(MONTHS_NLP[i])).match(/(\\d{1,2})\\s*$/);\n      const day=parseInt((am||bm||[\"\",\"1\"])[1]);\n      const d=new Date(now.getFullYear(),i,day);\n      if(d<now)d.setFullYear(d.getFullYear()+1);\n      return setT(d,hasTime?hour:9,min);}}\n  const sl=lo.match(/\\b(\\d{1,2})\\/(\\d{1,2})\\b/);\n  if(sl){const a=parseInt(sl[1]),b=parseInt(sl[2]);\n    const d1=new Date(now.getFullYear(),a-1,b),d2=new Date(now.getFullYear(),b-1,a);\n    const cand=d1>=now?d1:(d2>=now?d2:d1);return setT(cand,hasTime?hour:9,min);}\n  return null;\n}\nfunction fmtReminder(iso){\n  if(!iso)return\"\";\n  const d=new Date(iso),now=new Date(),ms=d-now;\n  const mi=Math.round(ms/60000),hr=Math.round(ms/3600000),dy=Math.round(ms/86400000);\n  if(ms<0){const am=Math.abs(mi),ah=Math.abs(hr),ad=Math.abs(dy);\n    if(am<60)return\"overdue \"+am+\"m\";if(ah<24)return\"overdue \"+ah+\"h\";return\"overdue \"+ad+\"d\";}\n  if(mi<60)return\"in \"+mi+\"m\";if(hr<24)return\"in \"+hr+\"h\";\n  if(dy===1)return\"tomorrow \"+d.toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n  if(dy<7)return DAYS_SHORT[d.getDay()]+\" \"+d.toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n  return d.toLocaleDateString(\"en-US\",{month:\"short\",day:\"numeric\"})+\" \"+d.toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n}\nfunction parseSmartNotes(notesText,lead){\n  if(!notesText||!notesText.trim())return{cleanNotes:notesText,newReminders:[]};\n  const lo=notesText.toLowerCase();\n  const TRIGGERS=[\"please set reminder\",\"please remind me\",\"set a reminder\",\"set reminder\",\"remind me\",\"add reminder\",\"create reminder\"];\n  const hasTrigger=TRIGGERS.some(function(t){return lo.indexOf(t)>=0;});\n  if(!hasTrigger)return{cleanNotes:notesText,newReminders:[]};\n  const eventDate=parseNaturalDate(notesText);\n  if(!eventDate)return{cleanNotes:notesText,newReminders:[],needsDate:true};\n  function getOffset(t){\n    if(t.indexOf(\"24h before\")>=0||t.indexOf(\"day before\")>=0||t.indexOf(\"the day before\")>=0)return 0;\n    if(t.indexOf(\"48h before\")>=0||t.indexOf(\"2 days before\")>=0)return 48*60;\n    if(t.indexOf(\"2 hours before\")>=0||t.indexOf(\"2h before\")>=0)return 120;\n    if(t.indexOf(\"1 hour before\")>=0||t.indexOf(\"an hour before\")>=0)return 60;\n    if(t.indexOf(\"30 min before\")>=0)return 30;\n    return 0;\n  }\n  const offsetMinutes=getOffset(lo);\n  const reminderDate=new Date(eventDate);\n  if(offsetMinutes===-1)reminderDate.setHours(8,0,0,0);\n  else if(offsetMinutes>0)reminderDate.setTime(reminderDate.getTime()-offsetMinutes*60000);\n  const contacts=(lead&&lead.contacts)||[];\n  let mentionedContact=null;\n  for(let ci=0;ci<contacts.length;ci++){\n    const ct=contacts[ci];\n    if(ct.name){const fn=ct.name.split(\" \")[0].toLowerCase();if(fn.length>1&&lo.indexOf(fn)>=0){mentionedContact=ct;break;}}\n  }\n  function buildClean(t){\n    // Remove trigger phrases and time/date qualifiers inline (handles voice input with no punctuation)\n    var clean=t;\n    TRIGGERS.forEach(function(tr){\n      var lo=clean.to top:52,right:0,background:C.surf,border:\"1px solid \"+C.line,borderRadius:C.radius,padding:16,zIndex:200,minWidth:170,boxShadow:C.shadowLg}}>\n          <div style={{...LBL,marginBottom:10}}>Timer Settings</div>\n          {[[\"Work (min)\",workMin,setWorkMin],[\"Break (min)\",breakMin,setBreakMin]].map(function(row){return(\n            <div key={row[0]} style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:8}}>\n              <span style={{color:C.dim,fontSize:12}}>{row[0]}</span>\n              <div style={{display:\"flex\",alignItems:\"center\",gap:6}}>\n                <button onClick={function(){row[2](function(v){return Math.max(1,v-5);});}} style={{...BTN.icon,fontSize:16}}>\u2212</button>\n                <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:14,fontWeight:400,color:C.text,minWidth:22,textAlign:\"center\"}}>{row[1]}</span>\n                <button onClick={function(){row[2](function(v){return Math.min(90,v+5);});}} style={{...BTN.icon,fontSize:16}}>+</button>\n              </div>\n            </div>\n          );})}\n          <button onClick={function(){reset();setExpanded(false);}} style={{...BTN.secondary,marginTop:8,width:\"100%\",textAlign:\"center\",fontSize:11}}>Apply &amp; Reset</button>\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* \u2500\u2500 REMINDER BANNER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction ReminderBanner({reminders,dueCount,onGo}){\n  if(!dueCount)return null;\n  const now=new Date(),cutoff=new Date(now.getTime()+24*3600000);\n  const list=reminders.filter(function(r){return !r.done&&new Date(r.dueAt)<=cutoff;}).sort(function(a,b){return new Date(a.dueAt)-new Date(b.dueAt);});\n  if(!list.length)return null;\n  const next=list[0],isOD=new Date(next.dueAt)<now;\n  const dueDate=new Date(next.dueAt);\n  const msUntil=dueDate-now;\n  const hrUntil=Math.round(msUntil/3600000);\n  const minUntil=Math.round(msUntil/60000);\n\n  // Time label: overdue \u2192 \"X min/h ago\", within 24h \u2192 \"in Xh\" or \"in Xm\", else date+time\n  var timeLabel;\n  if(isOD){\n    const ago=Math.abs(minUntil);\n    timeLabel=ago<60?ago+\"min ago\":Math.abs(hrUntil)+\"h ago\";\n  }else if(msUntil<3600000){\n    timeLabel=\"in \"+minUntil+\"m\";\n  }else if(msUntil<86400000){\n    timeLabel=\"in \"+hrUntil+\"h\";\n  }else{\n    timeLabel=dueDate.toLocaleDateString(\"en-US\",{month:\"short\",day:\"numeric\"})+\" \"+dueDate.toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n  }\n\n  // Extract buzzword from text\n  const txt=(next.text||\"\").toLowerCase();\n  var buzz=\"reminder\";\n  if(txt.indexOf(\"blocker\")>=0)buzz=\"Blocker\";\n  else if(txt.indexOf(\"alignment\")>=0||txt.indexOf(\"align\")>=0)buzz=\"Alignment\";\n  else if(txt.indexOf(\"action plan\")>=0||txt.indexOf(\"action\")>=0)buzz=\"Action plan\";\n  else if(txt.indexOf(\"catch up\")>=0||txt.indexOf(\"catchup\")>=0)buzz=\"Catch-up\";\n  else if(txt.indexOf(\"demo\")>=0)buzz=\"Demo\";\n  else if(txt.indexOf(\"proposal\")>=0)buzz=\"Proposal\";\n  else if(txt.indexOf(\"call\")>=0)buzz=\"Call\";\n  else if(txt.indexOf(\"meeting\")>=0||txt.indexOf(\"meet\")>=0)buzz=\"Meeting\";\n  else if(txt.indexOf(\"follow\")>=0)buzz=\"Follow-up\";\n  else if(txt.indexOf(\"contract\")>=0||txt.indexOf(\"sign\")>=0)buzz=\"Contract\";\n  else if(txt.indexOf(\"review\")>=0)buzz=\"Review\";\n  else buzz=\"Reminder\";\n\n  // Person name from linkedContactName or extract first capitalised word after \"with\"\n  var person=next.linkedContactName||\"\";\n  if(!person){\n    var m=(next.text||\"\").match(/\bwith\\s+([A-Z][a-z]+)/);\n    if(m)person=m[1];\n  }\n\n  // Short reason: text stripped of buzz/person/date noise, max 40 chars\n  var reason=(next.text||\"\")\n    .replace(/remind me|set reminder|please remind/gi,\"\")\n    .replace(/tomorrow|today|monday|tuesday|wednesday|thursday|friday|saturday|sunday/gi,\"\")\n    .replace(/\\d{1,2}:\\d{2}|\\d{1,2}\\s*(am|pm)/gi,\"\")\n    .replace(/with\\s+[A-Z][a-z]+/g,\"\")\n    .replace(/blocker|alignment|action plan|catch.?up|demo|proposal|follow.?up|meeting|call|review|contract/gi,\"\")\n    .replace(/\\s+/g,\" \").replace(/^[\\s,.-]+|[\\s,.-]+$/g,\"\").trim();\n  if(reason.length>40)reason=reason.slice(0,38)+\"\u2026\";\n\n  const isBlockerBuzz=buzz===\"Blocker\";\n  const clr=isOD?C.danger:C.info;\n  const buzzClr=isBlockerBuzz?C.danger:C.info;\n  return(\n    <div onClick={onGo} style={{background:isOD?\"rgba(255,85,85,0.07)\":\"rgba(96,180,255,0.05)\",borderBottom:\"1px solid \"+(isOD?\"rgba(255,85,85,0.25)\":C.info+\"33\"),padding:\"5px 24px\",display:\"flex\",alignItems:\"center\",gap:10,cursor:\"pointer\"}}>\n      <span style={{fontSize:12}}>\u23f0</span>\n      <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:11,fontWeight:700,color:clr,minWidth:60}}>{timeLabel}</span>\n      <span style={{background:buzzClr+\"1A\",color:buzzClr,borderRadius:3,padding:\"1px 7px\",fontSize:10,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.5}}>{buzz}</span>\n      {person&&<span style={{fontSize:11,fontWeight:600,color:C.text}}>{person}</span>}\n      {reason&&<span style={{fontSize:11,color:C.dim}}>\u2014 {reason}</span>}\n      {next.linkedCompany&&<span style={{background:C.info+\"18\",color:C.info,borderRadius:3,padding:\"1px 6px\",fontSize:9,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,marginLeft:\"auto\"}}>{next.linkedCompany}</span>}\n      <span style={{color:C.muted,fontSize:11}}>\u2192</span>\n    </div>\n  );\n}\n\n/* \u2500\u2500 REMINDER CARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction ReminderCard({r,onDone,onDelete,onEdit}){\n  const [editing,setEditing]=useState(false);\n  const [editText,setEditText]=useState(r.text);\n  const [editDt,setEditDt]=useState(r.dueAt?new Date(r.dueAt).toISOString().slice(0,10):\"\");\n  const [editTm,setEditTm]=useState(r.dueAt?new Date(r.dueAt).toLocaleTimeString(\"en-GB\",{hour:\"2-digit\",minute:\"2-digit\"}):\"09:00\");\n  const isOD=!r.done&&new Date(r.dueAt)<new Date(),clr=r.done?C.muted:(isOD?C.danger:C.info);\n  function saveEdit(){\n    if(!editText.trim()||!editDt)return;\n    const newDue=new Date(editDt+\"T\"+editTm);\n    if(onEdit)onEdit(r.id,{text:editText.trim(),dueAt:newDue.toISOString()});\n    setEditing(false);\n  }\n  return(\n    <div style={{padding:\"11px 14px\",borderBottom:\"1px solid \"+C.line2,background:r.done?C.surf2:(isOD?\"rgba(255,85,85,0.05)\":\"rgba(96,180,255,0.04)\"),borderLeft:\"3px solid \"+(r.done?C.line2:isOD?C.danger:C.info),opacity:r.done?0.5:1}}>\n      {editing?(\n        <div>\n          <input value={editText} onChange={function(e){setEditText(e.target.value);}} style={{...INP,fontSize:12,marginBottom:6}}/>\n          <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:6,marginBottom:6}}>\n            <div><span style={LBL}>Date</span><input type=\"date\" value={editDt} onChange={function(e){setEditDt(e.target.value);}} style={{...INP,fontSize:11}}/></div>\n            <div><span style={LBL}>Time</span><input type=\"time\" value={editTm} onChange={function(e){setEditTm(e.target.value);}} style={{...INP,fontSize:11}}/></div>\n          </div>\n          <div style={{display:\"flex\",gap:5}}>\n            <button onClick={saveEdit} style={{...BTN.smGreen,fontSize:11}}>Save</button>\n            <button onClick={function(){setEditing(false);setEditText(r.text);}} style={{...BTN.secondary,fontSize:11}}>Cancel</button>\n          </div>\n        </div>\n      ):(\n        <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",gap:8}}>\n          <div style={{flex:1}}>\n            <div style={{color:clr,fontSize:13,lineHeight:1.5,textDecoration:r.done?\"line-through\":\"none\"}}>{r.text}</div>\n            <div style={{display:\"flex\",gap:6,marginTop:4,alignItems:\"center\",flexWrap:\"wrap\"}}>\n              <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:10,color:isOD?C.danger:C.info}}>{fmtReminder(r.dueAt)}</span>\n              {r.linkedCompany&&<Tag label={r.linkedCompany} clr={C.info} small/>}\n              {r.linkedContactName&&<Tag label={\"\ud83d\udc64 \"+r.linkedContactName} clr={C.acc} small/>}\n            </div>\n          </div>\n          <div style={{display:\"flex\",gap:3,flexShrink:0}}>\n            {!r.done&&<button onClick={function(){onDone(r.id);}} title=\"Mark done\" style={{...BTN.smGreen,padding:\"3px 7px\"}}>\u2713</button>}\n            <button onClick={function(){setEditing(true);}} title=\"Edit\" style={{...BTN.sm,padding:\"3px 7px\",fontSize:11}}>\u270f</button>\n            <button onClick={function(){onDelete(r.id);}} title=\"Delete\" style={{...BTN.danger,padding:\"3px 7px\",fontSize:11}}>\u2715</button>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* \u2500\u2500 MILESTONE PANEL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction MilestonePanel({leadPipeline,onAdvance,onClose,currency}){\n  const [note,setNote]=useState(\"\");\n  const [dealVal,setDealVal]=useState(\"\");\n  const nextIdx=(typeof leadPipeline===\"number\"&&leadPipeline>=0)?leadPipeline+1:0;\n  const isFinish=nextIdx>=PIPE.length,target=isFinish?null:PIPE[nextIdx],isFirst=nextIdx===0;\n  const isClosing=nextIdx===4;\n  if(isFinish)return(\n    <div style={{background:\"rgba(198,255,0,0.05)\",border:\"1px solid rgba(198,255,0,0.2)\",borderRadius:C.radius,padding:14,marginTop:8}}>\n      <div style={{color:C.acc,fontSize:12,fontWeight:700,marginBottom:4}}>All milestones complete \u2014 deal is On The Wire</div>\n      <button onClick={onClose} style={{...BTN.sm,marginTop:6}}>Close</button>\n    </div>\n  );\n  return(\n    <div style={{background:C.surf2,border:\"1px solid \"+(isClosing?C.acc+\"44\":C.line),borderRadius:C.radius,padding:14,marginTop:8}}>\n      <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:10}}>\n        <div style={{width:2,height:14,background:target.clr,borderRadius:1}}/>\n        <div>\n          <div style={{fontSize:12,fontWeight:700,color:target.clr,textTransform:\"uppercase\",letterSpacing:0.5}}>{isFirst?\"Start: \":\"Advance to: \"}{target.code}</div>\n          <div style={{color:C.muted,fontSize:11,marginTop:1}}>{target.sub}</div>\n        </div>\n      </div>\n      {isClosing&&(\n        <div style={{background:\"rgba(198,255,0,0.06)\",border:\"1px solid rgba(198,255,0,0.2)\",borderRadius:C.radiusSm,padding:\"10px 12px\",marginBottom:10}}>\n          <div style={{fontSize:11,fontWeight:700,color:C.acc,marginBottom:6}}>Deal value (annual contract)</div>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n            <span style={{color:C.acc,fontSize:14,fontWeight:700}}>{currency||\"\u20ac\"}</span>\n            <input type=\"number\" min=\"0\" step=\"1000\" value={dealVal} onChange={function(e){setDealVal(e.target.value);}}\n              style={{...INP,fontSize:14,fontWeight:700,color:C.acc,flex:1}} placeholder=\"e.g. 48000\"/>\n            <span style={{color:C.muted,fontSize:11}}>/year</span>\n          </div>\n          {dealVal&&<div style={{color:C.muted,fontSize:10,marginTop:4}}>{currency||\"\u20ac\"}{Math.round(parseFloat(dealVal)/4).toLocaleString()} per quarter</div>}\n        </div>\n      )}\n      <span style={{...LBL,display:\"block\",marginBottom:4}}>Note {isClosing?\"(closing notes)\":\"(optional)\"}</span>\n      <textarea value={note} onChange={function(e){setNote(e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",marginBottom:8}} placeholder={isClosing?\"Any closing notes, conditions, next steps\u2026\":(isFirst?\"How did you initiate contact?\":\"What happened here?\")}/>\n      <div style={{display:\"flex\",gap:6}}>\n        <button onClick={function(){onAdvance(nextIdx,note.trim(),isClosing?parseFloat(dealVal)||0:undefined);setNote(\"\");setDealVal(\"\");}} style={{...BTN.primary,background:target.clr,fontSize:12,padding:\"7px 16px\"}}>{isClosing?\"Close Deal \u2713\":\"Confirm\"}</button>\n        {isFirst&&<button onClick={function(){onAdvance(nextIdx,\"\",undefined);}} style={{...BTN.sm,color:target.clr,borderColor:target.clr+\"44\"}}>Quick start</button>}\n        <button onClick={onClose} style={BTN.secondary}>Cancel</button>\n      </div>\n    </div>\n  );\n}\n\nfunction PipelineHistory({history}){\n  if(!Array.isArray(history)||history.length===0)return <div style={{color:C.muted,fontSize:12,padding:\"4px 0\"}}>No milestone history yet.</div>;\n  return(\n    <div style={{display:\"flex\",flexDirection:\"column\",gap:5}}>\n      {[].concat(history).reverse().map(function(h,i){\n        const s=(h.stage>=0&&h.stage<PIPE.length)?PIPE[h.stage]:null,c=s?s.clr:C.muted;\n        return(\n          <div key={i} style={{display:\"flex\",gap:8,alignItems:\"flex-start\"}}>\n            <div style={{width:2,background:c,alignSelf:\"stretch\",borderRadius:1,flexShrink:0,minHeight:14,marginTop:2}}/>\n            <div>\n              <div style={{display:\"flex\",gap:8,alignItems:\"center\"}}>\n                <span style={{fontSize:11,fontWeight:700,color:c,letterSpacing:0.5,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{s?s.code:\"?\"}</span>\n                <span style={{color:C.muted,fontSize:10,fontFamily:\"'DM Mono',monospace\"}}>{fmtDate(h.timestamp)}</span>\n              </div>\n              {h.note&&<div style={{color:C.dim,fontSize:12,marginTop:1,lineHeight:1.5}}>{h.note}</div>}\n            </div>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\nfunction ContactsEditor({contacts,onChange}){\n  function add(){onChange([].concat(contacts,[makeContact()]));}\n  function remove(id){onChange(contacts.filter(function(c){return c.id!==id;}));}\n  function update(id,field,val){onChange(contacts.map(function(c){return c.id===id?Object.assign({},c,{[field]:val}):c;}));}\n  return(\n    <div>\n      <div style={{display:\"flex\",alignItems:\"center\",marginBottom:10}}>\n        <span style={{...LBL,margin:0}}>Contacts</span>\n        <button onClick={add} style={{...BTN.sm,marginLeft:\"auto\",color:C.info,borderColor:C.info+\"44\"}}>+ Add</button>\n      </div>\n      {contacts.length===0&&<div style={{color:C.muted,fontSize:12,padding:\"8px 0\",fontStyle:\"italic\"}}>No contacts yet.</div>}\n      {contacts.map(function(ct,idx){return(\n        <div key={ct.id} style={{background:C.surf2,borderRadius:C.radiusSm,padding:\"12px 14px\",marginBottom:8,borderLeft:\"2px solid \"+(idx===0?C.info:C.line)}}>\n          <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:8}}>\n            <span style={{fontSize:10,fontWeight:700,color:idx===0?C.info:C.muted,letterSpacing:0.8,fontFamily:\"'Barlow Condensed',sans-serif\",textTransform:\"uppercase\"}}>{idx===0?\"Primary\":\"Contact \"+(idx+1)}</span>\n            <button onClick={function(){remove(ct.id);}} style={{...BTN.icon,color:C.danger,fontSize:12}}>\u00d7 Remove</button>\n          </div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:8,marginBottom:8}}>\n            {[[\"Name\",\"name\"],[\"Title\",\"title\"],[\"Email\",\"email\"],[\"Phone\",\"phone\"],[\"LinkedIn\",\"linkedin\"]].map(function(p){return(\n              <div key={p[1]}><span style={LBL}>{p[0]}</span>\n                <input value={ct[p[1]]||\"\"} onChange={function(e){update(ct.id,p[1],e.target.value);}} style={{...INP,fontSize:12}} placeholder=\"\u2014\"/>\n              </div>\n            );})}\n          </div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:8}}>\n            <div><span style={LBL}>Last Contacted</span><input type=\"date\" value={ct.lastContacted||\"\"} onChange={function(e){update(ct.id,\"lastContacted\",e.target.value);}} style={{...INP,fontSize:12}}/></div>\n            <div><span style={LBL}>Notes</span><input value={ct.notes||\"\"} onChange={function(e){update(ct.id,\"notes\",e.target.value);}} style={{...INP,fontSize:12}} placeholder=\"Quick note\u2026\"/></div>\n          </div>\n        </div>\n      );})}\n    </div>\n  );\n}\n\nfunction BlockerPanel({blocker,blockerHistory,onAdd,onResolve,onRemove,onClose}){\n  const [mode,setMode]=useState(\"view\");\n  const [bType,setBType]=useState(\"internal\");\n  const [bDesc,setBDesc]=useState(\"\");\n  const [res,setRes]=useState(\"\");\n  const hist=Array.isArray(blockerHistory)?blockerHistory:[];\n  function handleAdd(){if(!bDesc.trim())return;onAdd(bType,bDesc.trim());setBDesc(\"\");setMode(\"view\");}\n  function handleResolve(){onResolve(res.trim());setRes(\"\");setMode(\"view\");}\n  return(\n    <div style={{background:C.surf2,border:\"1px solid rgba(255,85,85,0.2)\",borderRadius:C.radius,padding:14}}>\n      <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:12}}>\n        <div style={{width:2,height:14,background:C.danger,borderRadius:1}}/>\n        <span style={{fontSize:12,fontWeight:700,color:C.danger,letterSpacing:0.5,fontFamily:\"'Barlow Condensed',sans-serif\",textTransform:\"uppercase\"}}>Blocker</span>\n        <div style={{flex:1}}/><button onClick={onClose} style={BTN.icon}>\u00d7</button>\n      </div>\n      {blocker?(\n        <div>\n          <div style={{background:\"rgba(255,85,85,0.06)\",border:\"1px solid rgba(255,85,85,0.2)\",borderRadius:C.radiusSm,padding:\"10px 12px\",marginBottom:10}}>\n            <div style={{display:\"flex\",alignItems:\"center\",gap:6,marginBottom:4}}>\n              <Tag label={(blocker.type||\"internal\")+\" blocker\"} clr={C.danger}/>\n              <span style={{color:C.muted,fontSize:10,fontFamily:\"'DM Mono',monospace\"}}>{fmtDate(blocker.createdAt)}</span>\n            </div>\n            <div style={{color:C.dim,fontSize:13,lineHeight:1.5}}>{blocker.description}</div>\n          </div>\n          {mode===\"resolve\"?(\n            <div>\n              <span style={{...LBL,marginBottom:5}}>Resolution note</span>\n              <textarea value={res} onChange={function(e){setRes(e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",marginBottom:8}} placeholder=\"How was this resolved?\"/>\n              <div style={{display:\"flex\",gap:6}}>\n                <button onClick={handleResolve} style={BTN.smGreen}>\u2713 Confirm</button>\n                <button onClick={function(){setMode(\"view\");}} style={BTN.secondary}>Cancel</button>\n              </div>\n            </div>\n          ):(\n            <div style={{display:\"flex\",gap:6}}>\n              <button onClick={function(){setMode(\"resolve\");}} style={BTN.smGreen}>\u2713 Mark resolved</button>\n              <button onClick={onRemove} style={BTN.smRed}>\u00d7 Remove</button>\n            </div>\n          )}\n        </div>\n      ):mode===\"add\"?(\n        <div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"120px 1fr\",gap:8,marginBottom:8}}>\n            <div><span style={LBL}>Type</span>\n              <select value={bType} onChange={function(e){setBType(e.target.value);}} style={{...INP,fontSize:12}}>\n                {BLOCKER_TYPES.map(function(t){return <option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>;})}\n              </select>\n            </div>\n            <div><span style={LBL}>What's blocking this?</span>\n              <input value={bDesc} onChange={function(e){setBDesc(e.target.value);}} style={{...INP,fontSize:12}} placeholder=\"e.g. Waiting for legal sign-off\u2026\"/>\n            </div>\n          </div>\n          <div style={{display:\"flex\",gap:6}}>\n            <button onClick={handleAdd} style={BTN.smRed}>\u26d4 Add blocker</button>\n            <button onClick={function(){setMode(\"view\");}} style={BTN.secondary}>Cancel</button>\n          </div>\n        </div>\n      ):(\n        <button onClick={function(){setMode(\"add\");}} style={BTN.smRed}>\u26d4 Add blocker</button>\n      )}\n      {hist.length>0&&(\n        <div style={{borderTop:\"1px solid \"+C.line,marginTop:12,paddingTop:10}}>\n          <span style={{...LBL,marginBottom:6}}>Resolved</span>\n          {hist.map(function(h,i){return(\n            <div key={i} style={{marginBottom:6,paddingLeft:8,borderLeft:\"2px solid \"+C.line}}>\n              <div style={{display:\"flex\",gap:6,alignItems:\"center\",marginBottom:1}}>\n                <span style={{color:C.muted,fontSize:10,textTransform:\"uppercase\",letterSpacing:0.5,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{h.type}</span>\n                <span style={{color:C.muted,fontSize:9,fontFamily:\"'DM Mono',monospace\"}}>{fmtDateShort(h.resolvedAt)}</span>\n              </div>\n              <div style={{color:C.muted,fontSize:12}}>{h.description}</div>\n              {h.resolution&&<div style={{color:C.dim,fontSize:11,marginTop:1}}>\u21b3 {h.resolution}</div>}\n            </div>\n          );})}\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* \u2500\u2500 COMPANY PANEL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction CompanyPanel({lead,reminders,icp,apiKey,onClose,onUpdate,onUpdateLead,onAddLogEntry,onAddReminder,onPipeAdv,onBlockerAdd,onBlockerResolve,onBlockerRemove}){\n  const [quickNote,setQuickNote]=useState(\"\");\n  const [generatingSummary,setGeneratingSummary]=useState(false);\n  const [isListening,setIsListening]=useState(false);\n  const recognitionRef=useRef(null);\n  function toggleListening(){\n    if(isListening){\n      if(recognitionRef.current)recognitionRef.current.stop();\n      setIsListening(false);return;\n    }\n    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;\n    if(!SR){alert(\"Voice input not supported in this browser. Use Chrome.\");return;}\n    var rec=new SR();\n    rec.continuous=true;rec.interimResults=false;rec.lang=\"en-US\";\n    rec.onresult=function(e){\n      var newResults=Array.from(e.results).slice(e.resultIndex);\n      var t=newResults.filter(function(r){return r.isFinal;}).map(function(r){return r[0].transcript;}).join(\" \");\n      if(t)setQuickNote(function(p){return p+(p?\" \":\"\")+t;});\n    };\n    rec.onerror=function(){setIsListening(false);};\n    rec.onend=function(){setIsListening(false);};\n    recognitionRef.current=rec;rec.start();setIsListening(true);\n  }\n  const [editingSummary,setEditingSummary]=useState(false);\n  const [summaryDraft,setSummaryDraft]=useState(lead.summary||{currentStatus:\"\",latestUpdate:\"\",goal:\"\",generatedAt:null});\n  const [showMile,setShowMile]=useState(false);\n  const [showBlocker,setShowBlocker]=useState(false);\n  const [filterType,setFilterType]=useState(\"all\");\n  const noteRef=useRef(null);\n  const [ctxMenu,setCtxMenu]=useState(null);\n  const [blockerConfirmPanel,setBlockerConfirmPanel]=useState(null);\n  const [calEvents,setCalEvents]=useState([]);\n  useEffect(function(){\n    if(fetchLeadCalendarEvents&&gToken){\n      fetchLeadCalendarEvents(lead.id,lead.company,function(evs){setCalEvents(evs);});\n    }\n  },[lead.id,gToken]);\n  const [editItem,setEditItem]=useState(null);\n  const [editItemText,setEditItemText]=useState(\"\");\n  const longPressRef=useRef(null);\n  function startLongPress(item,e){\n    if(item.type!==\"log\")return;\n    longPressRef.current=setTimeout(function(){openCtxMenu(item,e);},500);\n  }\n  function cancelLongPress(){clearTimeout(longPressRef.current);}\n  function openCtxMenu(item,e){\n    if(item.type!==\"log\")return;\n    var x=e.clientX||e.touches&&e.touches[0]&&e.touches[0].clientX||0;\n    var y=e.clientY||e.touches&&e.touches[0]&&e.touches[0].clientY||0;\n    setCtxMenu({item:item,x:x,y:y});\n  }\n  function closeCtxMenu(){setCtxMenu(null);}\n  function deleteLogItem(item){\n    onUpdateLead(lead.id,\"logEntries\",(lead.logEntries||[]).filter(function(e){return e.id!==item.entryId;}));\n    closeCtxMenu();\n  }\n  function startEditItem(item){\n    setEditItem(item);\n    setEditItemText(item.text);\n    closeCtxMenu();\n  }\n  function saveEditItem(){\n    if(!editItem)return;\n    var updated=(lead.logEntries||[]).map(function(e){return e.id===editItem.entryId?Object.assign({},e,{content:editItemText}):e;});\n    onUpdateLead(lead.id,\"logEntries\",updated);\n    setEditItem(null);\n  }\n\n  useEffect(function(){\n    setSummaryDraft(lead.summary||{currentStatus:\"\",latestUpdate:\"\",goal:\"\",generatedAt:null});\n  },[lead.id]);\n\n  // Build unified timeline\n  const timeline=useMemo(function(){\n    const items=[];\n    // Log entries\n    (lead.logEntries||[]).forEach(function(e){\n      items.push({type:\"log\",date:e.timestamp,cat:e.category,label:(LOG_CATS[e.category]||LOG_CATS.note).label,icon:(LOG_CATS[e.category]||LOG_CATS.note).icon,clr:(LOG_CATS[e.category]||LOG_CATS.note).clr,text:e.content,id:e.id||uid(\"tl\"),entryId:e.id});\n    });\n    // Pipeline moves\n    (lead.pipelineHistory||[]).forEach(function(h){\n      const s=(h.stage>=0&&h.stage<PIPE.length)?PIPE[h.stage]:null;\n      items.push({type:\"pipeline\",date:h.timestamp,icon:\"\u25b6\",clr:s?s.clr:C.muted,label:\"Pipeline: \"+(s?s.code:\"?\"),text:h.note||\"\",id:\"pipe_\"+h.timestamp});\n    });\n    // Blocker history\n    (lead.blockerHistory||[]).forEach(function(h){\n      items.push({type:\"blocker_resolved\",date:h.resolvedAt||h.createdAt,icon:\"\u2713\",clr:\"#34D399\",label:\"Blocker resolved (\"+h.type+\")\",text:h.description+(h.resolution?\" \u2192 \"+h.resolution:\"\"),id:\"bloc_\"+h.createdAt});\n    });\n    // Active blocker\n    if(lead.blocker){\n      items.push({type:\"blocker\",date:lead.blocker.createdAt,icon:\"\u26d4\",clr:C.danger,label:\"Blocker added (\"+lead.blocker.type+\")\",text:lead.blocker.description,id:\"active_bloc\"});\n    }\n    // Linked reminders\n    reminders.filter(function(r){return r.linkedLeadId===lead.id;}).forEach(function(r){\n      items.push({type:\"reminder\",date:r.createdAt,icon:\"\u23f0\",clr:r.done?C.muted:C.warn,label:\"Reminder\"+(r.done?\" (done)\":\"\"),text:r.text+\" \u2014 \"+fmtReminder(r.dueAt),id:\"rem_\"+r.id});\n    });\n    items.sort(function(a,b){return new Date(b.date)-new Date(a.date);});\n    if(filterType===\"all\")return items;\n    return items.filter(function(it){return it.type===filterType;});\n  },[lead,reminders,filterType]);\n\n  async function generateSummary(){\n    if(!apiKey||!apiKey.trim()){alert(\"Set your API key in the ICP tab first.\");return;}\n    setGeneratingSummary(true);\n    const logText=(lead.logEntries||[]).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);}).slice(0,20).map(function(e){return \"[\"+fmtDate(e.timestamp)+\"] \"+e.categoryLabel+\": \"+e.content;}).join(\"\\n\\n---\\n\\n\")||\"No log entries yet.\";\n    const ps=pipeStage(lead),si=(ps>=0&&ps<PIPE.length)?PIPE[ps]:null;\n    const prompt=\"You are a BDM assistant. Based on the following information about a lead, generate a concise summary in JSON format.\\n\\nCOMPANY: \"+lead.company+\"\\nINDUSTRY: \"+(lead.industry||\"Unknown\")+\"\\nPIPELINE STAGE: \"+(si?si.label:\"Not started\")+\"\\nNOTES: \"+(lead.notes||\"None\")+\"\\nBLOCKER: \"+(lead.blocker?lead.blocker.description:\"None\")+\"\\n\\nLOG HISTORY (most recent first):\\n\"+logText+\"\\n\\nGenerate a JSON object with exactly these 3 fields:\\n- currentStatus: 1-2 sentences on where this deal stands right now\\n- latestUpdate: 1 sentence on the most recent meaningful development\\n- goal: 1 sentence on what we are trying to achieve or what was agreed\\n\\nReturn ONLY valid JSON, no explanation, no markdown.\";\n    try{\n      const res=await fetch(\"https://api.anthropic.com/v1/messages\",{\n        method:\"POST\",\n        headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},\n        body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:400,messages:[{role:\"user\",content:prompt}]}),\n      });\n      const data=await res.json();\n      if(data.error){alert(\"API error: \"+data.error.message);setGeneratingSummary(false);return;}\n      const raw=(data.content||[]).map(function(b){return b.text||\"\";}).join(\"\");\n      let parsed;\n      try{\n        const clean=raw.replace(new RegExp(\"\\\\u0060{3}json|\\\\u0060{3}\",\"g\"),\"\").trim();\n        parsed=JSON.parse(clean);\n      }catch(_){parsed={currentStatus:raw,latestUpdate:\"\",goal:\"\"};}\n      const newSummary=Object.assign({},parsed,{generatedAt:new Date().toISOString()});\n      setSummaryDraft(newSummary);\n      onUpdate(lead.id,\"summary\",newSummary);\n    }catch(e){alert(\"Request failed: \"+e.message);}\n    setGeneratingSummary(false);\n  }\n\n  function saveSummary(){\n    onUpdate(lead.id,\"summary\",summaryDraft);\n    setEditingSummary(false);\n  }\n\n  function handleQuickSave(){\n    const txt=quickNote.trim();if(!txt)return;\n    // Blocker detection \u2014 FIRST, before anything else\n    if(detectBlocker(txt)){\n      setBlockerConfirmPanel({type:extractBlockerType(txt),description:txt.slice(0,300),pendingNote:txt});\n      return;\n    }\n    const cat=categorize(txt);\n    const catMeta=LOG_CATS[cat]||LOG_CATS.note;\n    const entry={id:uid(\"log\"),timestamp:new Date().toISOString(),category:cat,categoryLabel:catMeta.label,content:txt};\n    onAddLogEntry(lead.id,entry);\n    const parsed=parseSmartNotes(txt,lead);\n    if(parsed.newReminders.length>0&&onAddReminder){\n      parsed.newReminders.forEach(function(r){r.linkedLeadId=lead.id;r.linkedCompany=lead.company;onAddReminder(r);});\n    }\n    setQuickNote(\"\");\n    if(noteRef.current)noteRef.current.focus();\n    if(onNoteLogged)onNoteLogged(lead.id,txt);\n  }\n\n  const pc=primaryContact(lead);\n  const ps=pipeStage(lead);\n  const blocked=isBlocked(lead);\n  const hasSummary=summaryDraft&&(summaryDraft.goal||summaryDraft.currentStatus||summaryDraft.latestUpdate||summaryDraft.blockerStatus||(lead.blocker&&lead.blocker.description));\n\n  return(\n    <div className=\"panel-slide\" style={{width:\"100%\",borderTop:\"none\",display:\"flex\",flexDirection:\"column\",background:C.surf,overflowY:\"auto\",height:\"100%\"}}>\n      {/* Panel header */}\n      <div style={{padding:\"14px 18px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,background:C.surf}}>\n        <div style={{display:\"flex\",alignItems:\"flex-start\",justifyContent:\"space-between\",gap:8,marginBottom:8}}>\n          <div style={{flex:1,minWidth:0}}>\n            <div style={{fontSize:18,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.3,lineHeight:1.2,marginBottom:5}}>{lead.company}</div>\n            {ps===4?(\n              <div style={{display:\"flex\",flexWrap:\"wrap\",gap:5,alignItems:\"center\"}}>\n                <Tag label=\"\u2713 CLIENT\" clr={C.acc}/>\n                {lead.dealValue>0&&<span style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.acc}}>{(icp&&icp.currency)||\"\u20ac\"}{Math.round(lead.dealValue/1000)}k/yr</span>}\n                {lead.closedAt&&<span style={{color:C.muted,fontSize:11}}>Closed {fmtDateShort(lead.closedAt)}</span>}\n                {blocked&&<Tag label=\"\u26d4 BLOCKED\" clr={C.danger}/>}\n              </div>\n            ):(\n              <div style={{display:\"flex\",flexWrap:\"wrap\",gap:5,alignItems:\"center\"}}>\n                <PipeBadge idx={ps}/>\n                {blocked&&<Tag label=\"\u26d4 BLOCKED\" clr={C.danger}/>}\n              </div>\n            )}\n            {pc&&<div style={{color:C.muted,fontSize:11,marginTop:4}}>{pc.name}{pc.title?\" \u00b7 \"+pc.title:\"\"}{lead.industry?\" \u00b7 \"+lead.industry:\"\"}</div>}\n          </div>\n          <button onClick={onClose} style={{...BTN.icon,fontSize:16,color:C.muted,flexShrink:0}}>\u2715</button>\n        </div>\n        {ps!==4&&(\n          <div style={{display:\"flex\",gap:6,flexWrap:\"wrap\"}}>\n            {ps<PIPE.length-1&&<button onClick={function(){setShowMile(function(m){return !m;});setShowBlocker(false);}} style={{...BTN.sm,color:pipeClr(ps+1),borderColor:pipeClr(ps+1)+\"44\",fontSize:11}}>{ps===PIPE_NONE?\"\u25b6 Start pipeline\":\"\u2192 Advance\"}</button>}\n            <button onClick={function(){setShowBlocker(function(b){return !b;});setShowMile(false);}} style={{...BTN.sm,color:blocked?C.danger:C.muted,borderColor:blocked?\"rgba(255,85,85,0.4)\":C.line,fontSize:11}}>\u26d4 {blocked?\"Blocker\":\"Add blocker\"}</button>\n            <button onClick={function(){window.open(\"https://calendar.google.com/calendar/render?action=TEMPLATE&text=\"+encodeURIComponent(\"Meeting: \"+lead.company)+\"&details=\"+encodeURIComponent(\"Lead: \"+lead.company),\"_blank\");}} style={{...BTN.sm,color:\"#4285F4\",borderColor:\"#4285F444\",fontSize:11}}>\ud83d\udcc5 Calendar</button>\n            {onOpenPrepCard&&<button onClick={function(){onOpenPrepCard(lead.id);}} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:11}}>\ud83d\udccb Prep card</button>}\n          </div>\n        )}\n        {showMile&&<div style={{marginTop:8}}><MilestonePanel leadPipeline={lead.pipeline} currency={icp&&icp.currency} onAdvance={function(ni,n,dv){onPipeAdv(lead.id,ni,n,dv);setShowMile(false);}} onClose={function(){setShowMile(false);}}/></div>}\n        {showBlocker&&<div style={{marginTop:8}}><BlockerPanel blocker={lead.blocker} blockerHistory={lead.blockerHistory||[]} onAdd={function(t,d){onBlockerAdd(lead.id,t,d);}} onResolve={function(r){onBlockerResolve(lead.id,r);}} onRemove={function(){onBlockerRemove(lead.id);}} onClose={function(){setShowBlocker(false);}}/></div>}\n      </div>\n\n      {/* Pinned summary */}\n      <div style={{padding:\"14px 18px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,background:C.surf2}}>\n        <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",marginBottom:10}}>\n          <span style={{...LBL,margin:0}}>Pinned Summary</span>\n          <div style={{display:\"flex\",gap:5}}>\n            {hasSummary&&!editingSummary&&<button onClick={function(){setEditingSummary(true);}} style={{...BTN.icon,fontSize:11,color:C.muted}}>Edit</button>}\n            <button onClick={generateSummary} disabled={generatingSummary} style={{...BTN.sm,color:C.acc,borderColor:\"rgba(198,255,0,0.3)\",fontSize:10,opacity:generatingSummary?0.5:1}}>\n              {generatingSummary?\"Generating\u2026\":\"\u2726 AI Generate\"}\n            </button>\n          </div>\n        </div>\n        {editingSummary?(\n          <div>\n            {[[\"\ud83c\udfaf Goal / What we're doing\",\"goal\"],[\"\ud83d\udccd Current Status\",\"currentStatus\"],[\"\u26d4 Blocker / Issue (leave blank if none)\",\"blockerStatus\"]].map(function(f){return(\n              <div key={f[1]} style={{marginBottom:8}}>\n                <span style={{...LBL,color:f[1]===\"blockerStatus\"?C.danger:C.muted}}>{f[0]}</span>\n                <textarea value={summaryDraft[f[1]]||\"\"} onChange={function(e){setSummaryDraft(function(s){return Object.assign({},s,{[f[1]]:e.target.value});});}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12,borderColor:f[1]===\"blockerStatus\"&&summaryDraft[f[1]]?\"rgba(255,85,85,0.5)\":C.line}} placeholder={f[0]}/>\n              </div>\n            );})}\n            <div style={{display:\"flex\",gap:6,marginTop:4}}>\n              <button onClick={saveSummary} style={{...BTN.primary,fontSize:11,padding:\"6px 14px\"}}>Save</button>\n              <button onClick={function(){setEditingSummary(false);setSummaryDraft(lead.summary||{currentStatus:\"\",latestUpdate:\"\",goal:\"\",generatedAt:null});}} style={BTN.secondary}>Cancel</button>\n            </div>\n          </div>\n        ):hasSummary?(\n          <div style={{display:\"flex\",flexDirection:\"column\",gap:8}}>\n            {[[\"\ud83c\udfaf Goal / Agreement\",summaryDraft.goal,C.acc],[\"\ud83d\udccd Current Status\",summaryDraft.currentStatus,C.info],[\"\u26d4 Blocker / Issue\",summaryDraft.blockerStatus||(lead.blocker?lead.blocker.description:\"\"),C.danger]].map(function(row){\n              if(!row[1])return null;\n              return(\n                <div key={row[0]} style={{borderLeft:\"2px solid \"+row[2],paddingLeft:10}}>\n                  <div style={{fontSize:10,fontWeight:700,color:row[2],letterSpacing:0.8,fontFamily:\"'Barlow Condensed',sans-serif\",marginBottom:2}}>{row[0]}</div>\n                  <div style={{fontSize:12,color:row[2]===C.danger?C.danger:C.dim,lineHeight:1.5}}>{row[1]}</div>\n                </div>\n              );\n            })}\n            {summaryDraft.generatedAt&&<div style={{color:C.muted,fontSize:9,fontFamily:\"'DM Mono',monospace\",marginTop:2}}>Generated {fmtDateShort(summaryDraft.generatedAt)}</div>}\n          </div>\n        ):(\n          <div style={{color:C.muted,fontSize:12,fontStyle:\"italic\",textAlign:\"center\",padding:\"8px 0\"}}>\n            No summary yet \u2014 click \"\u2726 AI Generate\" to auto-create from log history, or add entries below.\n          </div>\n        )}\n      </div>\n\n      {/* Quick note input */}\n      <div style={{padding:\"12px 18px\",borderBottom:\"1px solid \"+C.line,flexShrink:0}}>\n        <div style={{display:\"flex\",gap:8,alignItems:\"flex-start\"}}>\n          <textarea\n            ref={noteRef}\n            value={quickNote}\n            onChange={function(e){setQuickNote(e.target.value);}}\n            onKeyDown={function(e){if(e.key===\"Enter\"&&e.metaKey){e.preventDefault();handleQuickSave();}}}\n            rows={2}\n            style={{...INP,fontSize:12,resize:\"none\",flex:1,borderColor:isListening?\"rgba(96,180,255,0.6)\":C.line}}\n            placeholder={\"Add a note, update, or transcript\u2026 (\u2318\u21b5 to save)\\nWrite 'remind me' to auto-create a reminder.\"}\n          />\n          <div style={{display:\"flex\",flexDirection:\"column\",gap:5,flexShrink:0}}>\n            <button onClick={handleQuickSave} disabled={!quickNote.trim()} style={{...BTN.primary,fontSize:11,padding:\"7px 12px\",opacity:quickNote.trim()?1:0.4}}>Save</button>\n            <button onClick={toggleListening} title={isListening?\"Stop recording\":\"Start voice input\"}\n              style={{...BTN.sm,padding:\"7px 12px\",color:isListening?C.danger:C.info,borderColor:isListening?\"rgba(255,85,85,0.5)\":C.info+\"44\",background:isListening?\"rgba(255,85,85,0.1)\":\"rgba(96,180,255,0.08)\",fontSize:13}}>\n              {isListening?\"\u23f9\":\"\ud83c\udfa4\"}\n            </button>\n          </div>\n        </div>\n        {isListening&&<div style={{fontSize:10,color:C.info,marginTop:4,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>\ud83d\udd34 Listening\u2026 click \u23f9 to stop</div>}\n      </div>\n\n      {/* Blocker confirm banner */}\n      {blockerConfirmPanel&&(\n        <div style={{padding:\"10px 18px\",flexShrink:0,background:\"rgba( dingNote,lead);\n                  if(parsed.newReminders.length>0&&onAddReminder){parsed.newReminders.forEach(function(r){r.linkedLeadId=lead.id;r.linkedCompany=lead.company;onAddReminder(r);});}\n                }\n                setBlockerConfirmPanel(null);setQuickNote(\"\");\n              })()}} style={{...BTN.sm,fontSize:11}}>Save without blocker</button>\n          </div>\n        </div>\n      )}\n      {/* Calendar events */}\n      {calEvents.length>0&&(\n        <div style={{padding:\"8px 16px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,background:\"rgba(66,133,244,0.03)\"}}>\n          <div style={{fontSize:9,fontWeight:700,color:\"#4285F4\",fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:6}}>\ud83d\udcc5 UPCOMING CALENDAR EVENTS</div>\n          {calEvents.map(function(ev){\n            var d=ev.start?new Date(ev.start):null;\n            return(\n              <div key={ev.id} style={{display:\"flex\",alignItems:\"center\",gap:8,padding:\"4px 0\",borderBottom:\"1px solid \"+C.line2}}>\n                <span style={{fontSize:10,color:\"#4285F4\",fontFamily:\"'DM Mono',monospace\",flexShrink:0,minWidth:70}}>{d?d.toLocaleDateString(\"en-US\",{month:\"short\",day:\"numeric\"}):\"\"}</span>\n                <a href={ev.link} target=\"_blank\" rel=\"noreferrer\" style={{fontSize:11,color:C.text,flex:1,textDecoration:\"none\",overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\"}}>{ev.title}</a>\n              </div>\n            );\n          })}\n        </div>\n      )}\n      {/* Timeline */}\n      <div style={{overflow:\"hidden\",display:\"flex\",flexDirection:\"column\",height:\"100%\",minHeight:0}}>\n        <div style={{padding:\"10px 18px 6px\",display:\"flex\",alignItems:\"center\",gap:6,flexShrink:0}}>\n          <span style={{...LBL,margin:0}}>History</span>\n          <div style={{flex:1}}/>\n          <select value={filterType} onChange={function(e){setFilterType(e.target.value);}} style={{...IN            <div style={{display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n              <button onClick={function(){setEditItem(null);}} style={BTN.secondary}>Cancel</button>\n              <button onClick={saveEditItem} style={BTN.primary}>Save</button>\n            </div>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* \u2500\u2500 LEAD FORM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction LeadForm({lead,weights,onSave,onCancel}){\n  const bs={decisionMaker:5,engagement:5,companySize:5,industryFit:5,budget:5,painPoint:5};\n  const blank={company:\"\",industry:\"\",website:\"\",source:\"\",notes:\"\",status:\"new\",contacts:[],scores:bs};\n  const init=lead?Object.assign({},blank,lead,{scores:Object.assign({},bs,lead.scores||{}),contacts:[].concat(lead.contacts||[])}):blank;\n  const [form,setForm]=useState(init);\n  const [err,setErr]=useState(false);\n  function sf(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}\n  function ss(k,v){setForm(function(f){return Object.assign({},f,{scores:Object.assign({},f.scores,{[k]:parseInt(v)||5})});});}\n  function handleSave(){if(!form.company.trim()){setErr(true);return;}setErr(false);onSave(form);}\n  return(\n    <div style={{...card(C.acc),marginBottom:20,borderLeft:\"2px solid \"+C.acc}}>\n      <div style={{display:\"flex\",alignItems:\"center\",gap:10,marginBottom:20}}>\n        <div style={{width:2,height:18,background:C.acc,borderRadius:1}}/>\n        <h3 style={{margin:0,fontSize:15,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>{lead?\"Edit Lead\":\"New Lead\"}</h3>\n      </div>\n      <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:10,marginBottom:18}}>\n        {[[\"Company *\",\"company\"],[\"Industry\",\"industry\"],[\"Website\",\"website\"]].map(function(p){return(\n          <div key={p[1]}>\n            <span style={LBL}>{p[0]}</span>\n            <input value={form[p[1]]||\"\"} onChange={function(e){sf(p[1],e.target.value);if(p[1]===\"company\")setErr(false);}} style={{...INP,borderColor:p[1]===\"company\"&&err?C.danger:C.line}} placeholder=\"\u2014\"/>\n            {p[1]===\"company\"&&err&&<div style={{color:C.danger,fontSize:10,marginTop:3}}>Required</div>}\n          </div>\n        );})}\n        <div><span style={LBL}>Source</span>\n          <select value={form.source||\"\"} onChange={function(e){sf(\"source\",e.target.value);}} style={INP}>\n            <option value=\"\">\u2014</option>\n            {[\"Manual\",\"CSV Import\",\"LinkedIn\",\"CRM\",\"Notion\",\"Referral\",\"Other\"].map(function(s){return <option key={s} value={s}>{s}</option>;})}\n          </select>\n        </div>\n        <div><span style={LBL}>Status</span>\n          <select value={form.status} onChange={function(e){sf(\"status\",e.target.value);}} style={INP}>\n            {STATUSES.map(function(s){return <option key={s} value={s}>{ST_META[s].label}</option>;})}\n          </select>\n        </div>\n        <div style={{gridColumn:\"1/-1\"}}>\n          <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:5}}>\n            <span style={LBL}>Notes / Signals</span>\n            <span style={{color:C.acc,fontSize:9,opacity:0.7}}>\u2726 Include \"remind me\" to auto-create a reminder</span>\n          </div>\n          <textarea value={form.notes||\"\"} onChange={function(e){sf(\"notes\",e.target.value);}} rows={2} style={{...INP,resize:\"vertical\"}} placeholder={\"Quick status, signals, context\u2026\"}/>\n        </div>\n      </div>\n      <div style={{borderTop:\"1px solid \"+C.line,paddingTop:16,marginBottom:18}}>\n        <ContactsEditor contacts={form.contacts||[]} onChange={function(v){sf(\"contacts\",v);}}/>\n      </div>\n      <div style={{borderTop:\"1px solid \"+C.line,paddingTop:16,marginBottom:16}}>\n        <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:14}}>\n          <div style={{width:2,height:12,background:C.acc,borderRadius:1}}/>\n          <span style={{...LBL,margin:0}}>Scores \u2014 1 to 10</span>\n        </div>\n        <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:8}}>\n          {CRITERIA.map(function(cr){const val=form.scores[cr.id]||5;return(\n            <div key={cr.id} style={{background:C.surf2,borderRadius:C.radiusSm,padding:\"10px 12px\",borderLeft:\"2px solid \"+cr.clr}}>\n              <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:6}}>\n                <span style={{fontSize:10,letterSpacing:0.8,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600}}>{cr.short}</span>\n                <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:16,color:cr.clr}}>{val}</span>\n              </div>\n              <input type=\"range\" min={1} max={10} value={val} onChange={function(e){ss(cr.id,e.target.value);}} style={{width:\"100%\",accentColor:cr.clr}}/>\n            </div>\n          );})}\n        </div>\n      </div>\n      <div style={{display:\"flex\",gap:8,justifyContent:\"flex-end\",borderTop:\"1px solid \"+C.line,paddingTop:14}}>\n        <button onClick={onCancel} style={BTN.secondary}>Cancel</button>\n        <button onClick={handleSave} style={BTN.primary}>{lead?\"Update\":\"Add Lead\"}</button>\n      </div>\n    </div>\n  );\n}\n\n/* \u2500\u2500 LEADS TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction LeadsTab({leads,weights,statsHistory,reminders,icp,apiKey,openLeadId,onAdd,onEdit,onDelete,onStatusChange,onPipeAdv,onBlockerAdd,onBlockerResolve,onBlockerRemove,onAddReminder,onAddLogEntry,onUpdateLead,onOpenLead,onOpenPrepCard,onNoteLogged,fetchLeadCalendarEvents,gToken}){\n  const [showForm,setShowForm]=useState(false);\n  const [editLead,setEditLead]=useState(null);\n  const [filterSt,setFilterSt]=useState(\"all\");\n  const [filterPipe,setFilterPipe]=useState(\"all\");\n  const [filterBlock,setFilterBlock]=useState(false);\n  const [search,setSearch]=useState(\"\");\n  const [sortField,setSortField]=useState(\"totalScore\");\n  const [sortDir,setSortDir]=useState(\"desc\");\n  const [deleteId,setDeleteId]=useState(null);\n  const [hoverRow,setHoverRow]=useState(null);\n  const [csvText,setCsvText]=useState(\"\");\n  const [showCsv,setShowCsv]=useState(false);\n  const [reminderFlash,setReminderFlash]=useState(null);\n\n  const openLead=openLeadId?leads.find(function(l){return l.id===openLeadId;})||null:null;\n\n  function toggleSort(f){if(f===sortField)setSortDir(function(d){return d===\"desc\"?\"asc\":\"desc\";});else{setSortField(f);setSortDir(\"desc\");}}\n\n  const filtered=useMemo(function(){\n    return leads\n      .filter(function(l){return filterSt===\"all\"||l.status===filterSt;})\n      .filter(function(l){if(filterPipe===\"all\")return true;if(filterPipe===\"none\")return pipeStage(l)===PIPE_NONE;return pipeStage(l)===parseInt(filterPipe,10);})\n      .filter(function(l){return !filterBlock||isBlocked(l);})\n      .filter(function(l){\n        if(!search)return true;\n        const q=search.toLowerCase(),pc=primaryContact(l);\n        return[l.company,l.industry,pc?pc.name:\"\",pc?pc.title:\"\"].some(function(v){return(v||\"\").toLowerCase().indexOf(q)>=0;});\n      })\n      .sort(function(a,b){\n        if(!filterBlock){if(isBlocked(a)&&!isBlocked(b))return -1;if(!isBlocked(a)&&isBlocked(b))return 1;}\n        let av=a[sortField]!==undefined?a[sortField]:\"\",bv=b[sortField]!==undefined?b[sortField]:\"\";\n        if(typeof av===\"number\"||typeof bv===\"number\"){av=Number(av)||0;bv=Number(bv)||0;}else{av=String(av||\"\").toLowerCase();bv=String(bv||\"\").toLowerCase();}\n        return sortDir===\"desc\"?(bv>av?1:-1):(av>bv?1:-1);\n      });\n  },[leads,filterSt,filterPipe,filterBlock,search,sortField,sortDir]);\n\n  function importCSV(){\n    const lines=csvText.trim().split(\"\\n\").filter(Boolean);if(lines.length<2)return;\n    const headers=lines[0].split(\",\").map(function(h){return h.trim().toLowerCase().replace(/\\s+/g,\"\");});\n    function get(row){for(let ki=1;ki<arguments.length;ki++){const idx=headers.indexOf(arguments[ki]);if(idx!==-1&&row[idx]!==undefined)return row[idx];}return\"\";}\n    const nl=lines.slice(1).map(function(line,i){\n      const v=line.split(\",\").map(function(x){return x.trim().replace(/^\"|\"$/g,\"\");});\n      const scores={decisionMaker:parseInt(get(v,\"decisionmaker\",\"dm\"))||5,engagement:parseInt(get(v,\"engagement\",\"intent\"))||5,companySize:parseInt(get(v,\"companysize\",\"size\",\"revenue\"))||5,industryFit:parseInt(get(v,\"industryfit\"))||5,budget:parseInt(get(v,\"budget\"))||5,painPoint:parseInt(get(v,\"painpoint\",\"pain\"))||5};\n      const cn=get(v,\"contact\",\"contactname\",\"name\");\n      return makeLead({company:get(v,\"company\",\"companyname\")||(\"Lead \"+(i+1)),industry:get(v,\"industry\"),website:get(v,\"website\",\"url\"),notes:get(v,\"notes\",\"description\"),source:\"CSV Import\",status:\"new\",contacts:cn?[makeContact({name:cn,title:get(v,\"title\",\"role\"),linkedin:get(v,\"linkedin\"),phone:get(v,\"phone\")})]:[],scores:scores},weights);\n    });\n    onAdd(nl);setCsvText(\"\");setShowCsv(false);\n  }\n\n  function handleSave(data){\n    const leadRef=editLead||{id:null,company:data.company
