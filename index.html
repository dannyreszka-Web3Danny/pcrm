lexDirection:\"column\",overflow:\"hidden\"}}>\n        {/* Summary bar */}\n        <div style={{padding:\"12px 20px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,background:C.surf,display:\"flex\",alignItems:\"center\",gap:24}}>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Total ARR</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.acc,lineHeight:1}}>{cur}{totalArr.toLocaleString()}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Accounts</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.text,lineHeight:1}}>{accounts.length}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>At risk</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.danger,lineHeight:1}}>{accounts.filter(function(a){return (a.accountData||{}).healthScore===\"at-risk\";}).length}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Renewals 90d</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.warn,lineHeight:1}}>{accounts.filter(function(a){const d=daysUntil((a.accountData||{}).renewalDate);return d!==null&&d>=0&&d<=90;}).length}</div>\n          </div>\n        </div>\n\n        {accounts.length===0?(\n          <div style={{flex:1,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",flexDirection:\"column\",color:C.muted}}>\n            <div style={{fontSize:36,marginBottom:12,opacity:0.3}}>\ud83c\udfe2</div>\n            <div style={{fontSize:14,fontWeight:700,color:C.surf3,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:1,textTransform:\"uppercase\",marginBottom:6}}>No accounts yet</div>\n            <div style={{fontSize:12,textAlign:\"center\",maxWidth:240}}>When you close a deal (ON THE WIRE), it appears here as an account.</div>\n          </div>\n        ):(\n          <div style={{flex:1,overflowY:\"auto\",padding:\"12px 16px\",display:\"grid\",gridTemplateColumns:openAccount?\"1fr\":\"repeat(auto-fill,minmax(280px,1fr))\",gap:10,alignContent:\"start\"}}>\n            {accounts.map(function(acc){\n              const ad=acc.accountData||{};\n              const pc=primaryContact(acc);\n              const renewal=daysUntil(ad.renewalDate);\n              const renewalUrgent=renewal!==null&&renewal>=0&&renewal<=30;\n              const renewalSoon=renewal!==null&&renewal>=0&&renewal<=90;\n              const effHealth=effectiveHealth(acc);\n              const hClr=healthClr(effHealth);\n              const isOpen=openId===acc.id;\n              const lastLog=(acc.logEntries||[]).sort(function(a,b){return b.timestamp.localeCompare(a.timestamp);})[0];\n              const upsellClr=ad.upsellStatus===\"won\"?C.acc:ad.upsellStatus===\"in-progress\"?C.info:ad.upsellStatus===\"identified\"?C.warn:C.muted;\n              var daysSince=daysSinceUpdate(acc);\n              var coolTag=daysSince>=50&&effHealth!==\"at-risk\"?<Tag label={\"\u26a0 No update \"+daysSince+\"d\"} clr={C.danger} small/>:(daysSince>=25&&effHealth===\"happy\"?<Tag label={\"No update \"+daysSince+\"d\"} clr={C.warn} small/>:null);\n              return(\n                <div key={acc.id} onClick={function(){setOpenId(isOpen?null:acc.id);}} style={{background:isOpen?C.surf3:C.surf,border:\"1px solid \"+(isOpen?C.acc+\"44\":C.line),borderRadius:\"8px\",padding:\"14px 16px\",cursor:\"pointer\",transition:\"all .15s\",borderLeft:\"3px solid \"+hClr}}>\n                  <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",marginBottom:8}}>\n                    <div style={{flex:1,minWidth:0}}>\n                      <div style={{fontSize:15,fontWeight:700,color:isOpen?C.acc:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.3}}>{acc.company}</div>\n                      {pc&&<div style={{color:C.muted,fontSize:11,marginTop:2}}>{pc.name}{pc.title?\" \u00b7 \"+pc.title:\"\"}</div>}\n                    </div>\n                    <div style={{textAlign:\"right\",flexShrink:0,marginLeft:8}}>\n                      <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:14,color:C.acc,fontWeight:400}}>{acc.dealValue?(cur+Math.round(acc.dealValue/1000)+\"k/yr\"):\"\u2014\"}</div>\n                    </div>\n                  </div>\n                  <div style={{display:\"flex\",gap:5,flexWrap:\"wrap\",marginBottom:8}}>\n                    <Tag label={healthLabel(effHealth)} clr={hClr} small/>\n                    {ad.upsellStatus&&ad.upsellStatus!==\"none\"&&<Tag label={\"\u2191 \"+ad.upsellStatus} clr={upsellClr} small/>}\n                    {renewalUrgent&&<Tag label={\"\u26a0 Renews \"+renewal+\"d\"} clr={C.danger} small/>}\n                    {renewalSoon&&!renewalUrgent&&<Tag label={\"Renews \"+renewal+\"d\"} clr={C.warn} small/>}\n                    {coolTag}\n                    {ad.supportIssues&&<Tag label=\"\u2691 Support\" clr={C.danger} small/>}\n                  </div>\n                  <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                    <div style={{color:C.muted,fontSize:10}}>{ad.qbrDate?\"QBR: \"+fmtDateShort(ad.qbrDate):(lastLog?\"Last: \"+fmtDate(lastLog.timestamp).split(\" \")[0]:fmtDateShort(acc.closedAt))}</div>\n                    {ad.upsellStatus===\"none\"||!ad.upsellStatus?<button onClick={function(e){e.stopPropagation();createUpsell(acc);}} style={{...BTN.sm,color:C.info,borderColor:C.info+\"44\",fontSize:9}}>+ Upsell</button>:null}\n                  </div>\n                </div>\n              );\n            })}\n          </div>\n        )}\n      </div>\n\n      {/* Right: account detail panel */}\n      {openAccount&&(\n        <div style={{flex:1,display:\"flex\",flexDirection:\"column\",overflow:\"hidden\"}}>\n          <div style={{padding:\"14px 20px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,background:C.surf}}>\n            <div style={{display:\"flex\",alignItems:\"flex-start\",justifyContent:\"space-between\"}}>\n              <div>\n                <div style={{fontSize:20,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.3,marginBottom:4}}>{openAccount.company}</div>\n                <div style={{display:\"flex\",gap:6,flexWrap:\"wrap\",alignItems:\"center\"}}>\n                  <Tag label={\"\u2713 CLIENT\"} clr={C.acc}/>\n                  <Tag label={healthLabel((openAccount.accountData||{}).healthScore||\"happy\")} clr={healthClr((openAccount.accountData||{}).healthScore||\"happy\")}/>\n                  {openAccount.dealValue&&<Tag label={cur+Math.round(openAccount.dealValue/1000)+\"k/yr\"} clr={C.acc}/>}\n                  <Tag label={\"Closed \"+fmtDateShort(openAccount.closedAt)} clr={C.muted}/>\n                </div>\n              </div>\n              <button onClick={function(){setOpenId(null);}} style={{...BTN.ghost,fontSize:16}}>\u2715</button>\n            </div>\n          </div>\n\n          <div style={{flex:1,overflowY:\"auto\",padding:\"16px 20px\",display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:16,alignContent:\"start\"}}>\n            {/* Account fields */}\n            <div style={{...card(C.info),gridColumn:\"1/-1\"}}>\n              <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:14}}>\n                <div style={{width:2,height:14,background:C.info,borderRadius:1}}/>\n                <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Account Health</span>\n              </div>\n              <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:10}}>\n                {[\"happy\",\"neutral\",\"at-risk\"].map(function(h){const isActive=(openAccount.accountData||{}).healthScore===h;return(\n                  <button key={h} onClick={function(){handleUpdateAcc(openAccount.id,{healthScore:h});}} style={{background:isActive?healthClr(h)+\"22\":\"transparent\",border:\"1px solid \"+(isActive?healthClr(h)+\"66\":C.line),borderRadius:\"5px\",padding:\"8px\",cursor:\"pointer\",textAlign:\"center\"}}>\n                    <div style={{fontSize:13,marginBottom:2}}>{h===\"happy\"?\"\ud83d\ude0a\":h===\"neutral\"?\"\ud83d\ude10\":\"\ud83d\ude1f\"}</div>\n                    <div style={{fontSize:10,fontWeight:700,color:isActive?healthClr(h):C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",textTransform:\"capitalize\"}}>{h.replace(\"-\",\" \")}</div>\n                  </button>\n                );})}\n              </div>\n            </div>\n\n            <div style={{...card(null)}}>\n              <div style={{...LBL,marginBottom:10}}>Key Dates</div>\n              {[[\"Renewal Date\",\"renewalDate\",\"date\"],[\"Next QBR\",\"qbrDate\",\"date\"]].map(function(f){return(\n                <div key={f[1]} style={{marginBottom:10}}>\n                  <span style={LBL}>{f[0]}</span>\n                  <input type=\"date\" value={(openAccount.accountData||{})[f[1]]||\"\"} onChange={function(e){handleUpdateAcc(openAccount.id,{[f[1]]:e.target.value});}} style={{...INP,fontSize:12}}/>\n                  {f[1]===\"renewalDate\"&&(openAccount.accountData||{}).renewalDate&&RenewalCountdown({days:daysUntil((openAccount.accountData||{}).renewalDate)})}\n                </div>\n              );})}\n            </div>\n\n            <div style={{...card(null)}}>\n              <div style={{...LBL,marginBottom:10}}>Upsell / Expansion</div>\n              <select value={(openAccount.accountData||{}).upsellStatus||\"none\"} onChange={function(e){handleUpdateAcc(openAccount.id,{upsellStatus:e.target.value});}} style={{...INP,fontSize:12,marginBottom:8}}>\n                <option value=\"none\">No opportunity</option>\n                <option value=\"identified\">Opportunity identified</option>\n                <option value=\"in-progress\">In progress</option>\n                <option value=\"won\">Won</option>\n              </select>\n              <textarea value={(openAccount.accountData||{}).upsellNotes||\"\"} onChange={function(e){handleUpdateAcc(openAccount.id,{upsellNotes:e.target.value});}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder=\"Upsell notes, product fit, timeline\u2026\"/>\n              {(openAccount.accountData||{}).upsellStatus!==\"won\"&&<button onClick={function(){createUpsell(openAccount);}} style={{...BTN.sm,color:C.info,borderColor:C.info+\"44\",marginTop:8,fontSize:11}}>+ Create upsell opportunity in Leads</button>}\n            </div>\n\n            <div style={{...card(null),gridColumn:\"1/-1\"}}>\n              <div style={{...LBL,marginBottom:8}}>Support Issues / Escalations</div>\n              <textarea value={(openAccount.accountData||{}).supportIssues||\"\"} onChange={function(e){handleUpdateAcc(openAccount.id,{supportIssues:e.target.value});}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder=\"Any open support issues, escalations, complaints\u2026\"/>\n            </div>\n\n            <div style={{...card(null),gridColumn:\"1/-1\"}}>\n              <div style={{...LBL,marginBottom:8}}>Account Notes</div>\n              <textarea value={(openAccount.accountData||{}).accountNotes||\"\"} onChange={function(e){handleUpdateAcc(openAccount.id,{accountNotes:e.target.value});}} rows={3} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder=\"General notes on the relationship, key context\u2026\"/>\n            </div>\n\n            {/* Recent activity */}\n            <div style={{gridColumn:\"1/-1\"}}>\n              <div style={{...LBL,marginBottom:8}}>Recent Activity</div>\n              <div style={{border:\"1px solid \"+C.line,borderRadius:\"8px\",overflow:\"hidden\"}}>\n                {(openAccount.logEntries||[]).length===0?(\n                  <div style={{padding:\"20px\",textAlign:\"center\",color:C.muted,fontSize:12}}>No activity logged yet.</div>\n                ):(\n                  [].concat(openAccount.logEntries||[]).reverse().slice(0,8).map(function(e,i){\n                    const cat=LOG_CATS[e.category]||LOG_CATS.note;\n                    return <div key={e.id||i} style={{padding:\"10px 14px\",borderBottom:\"1px solid \"+C.line2,background:i%2===0?C.surf:C.surf2,display:\"flex\",gap:8,alignItems:\"flex-start\"}}>\n                      <span style={{fontSize:12,flexShrink:0}}>{cat.icon}</span>\n                      <div style={{flex:1,minWidth:0}}>\n                        <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:2}}>\n                          <span style={{fontSize:9,fontWeight:700,color:cat.clr,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{cat.label}</span>\n                          <span style={{fontSize:9,color:C.muted,fontFamily:\"'DM Mono',monospace\"}}>{fmtDate(e.timestamp)}</span>\n                        </div>\n                        <div style={{fontSize:11,color:C.dim,lineHeight:1.5,overflow:\"hidden\",maxHeight:36}}>{e.content}</div>\n                      </div>\n                    </div>;\n                  })\n                )}\n              </div>\n            </div>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n\n/* \u2500\u2500 DEAL ROOM TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction DealRoomTab({leads,icp,apiKey,onUpdateLead}){\n  const [selectedId,setSelectedId]=useState(null);\n  const [filterCat,setFilterCat]=useState(\"all\");\n  const active=leads.filter(function(l){return pipeStage(l)>=0&&pipeStage(l)<5;}).sort(function(a,b){return b.totalScore-a.totalScore;});\n\n  function handleDealRoomUpdate(leadId,updates){\n    if(updates.dealRoom!==undefined)onUpdateLead(leadId,\"dealRoom\",updates.dealRoom);\n  }\n\n  var allDocs=[];\n  active.forEach(function(l){(l.dealRoom||[]).forEach(function(d){allDocs.push(Object.assign({},d,{leadId:l.id,company:l.company}));});});\n  var overdueDocs=allDocs.filter(function(d){return d.dueDate&&d.status!==\"approved\"&&new Date(d.dueDate)<new Date();});\n  var waitingDocs=allDocs.filter(function(d){return d.status===\"sent\";});\n  var neededDocs=allDocs.filter(function(d){return d.status===\"needed\";});\n  var totalDocs=allDocs.length;\n  var approvedDocs=allDocs.filter(function(d){return d.status===\"approved\";}).length;\n\n  var selected=selectedId?leads.find(function(l){return l.id===selectedId;}):null;\n\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"280px 1fr\",gap:0,height:\"100%\"}}>\n      {/* LEFT: Deal overview */}\n      <div style={{borderRight:\"1px solid \"+C.line,display:\"flex\",flexDirection:\"column\",overflow:\"hidden\"}}>\n        <div style={{padding:\"12px 14px\",borderBottom:\"1px solid \"+C.line}}>\n          <span style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Active Deals</span>\n          <div style={{display:\"flex\",gap:8,marginTop:8}}>\n            {[{l:\"All\",v:\"all\",c:C.text},{l:\"Overdue\",v:\"overdue\",c:overdueDocs.length>0?C.danger:C.muted},{l:\"Waiting\",v:\"waiting\",c:waitingDocs.length>0?\"#60B4FF\":C.muted},{l:\"Needed\",v:\"needed\",c:neededDocs.length>0?\"#F59E0B\":C.muted}].map(function(f){return(\n              <button key={f.v} onClick={function(){setFilterCat(f.v);}} style={{...BTN.sm,fontSize:9,padding:\"2px 6px\",color:filterCat===f.v?f.c:C.muted,borderColor:filterCat===f.v?f.c+\"44\":C.line}}>{f.l}</button>\n            );})}\n          </div>\n        </div>\n\n        {/* Summary cards */}\n        <div style={{padding:\"8px 14px\",borderBottom:\"1px solid \"+C.line,display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:6}}>\n          <div style={{background:C.surf2,borderRadius:C.radiusSm,padding:\"8px 10px\",textAlign:\"center\"}}>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:18,color:totalDocs>0?\"#4CAF50\":C.muted}}>{approvedDocs}/{totalDocs}</div>\n            <div style={{fontSize:8,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginTop:2}}>Docs Done</div>\n          </div>\n          <div style={{background:overdueDocs.length>0?\"rgba(255,85,85,0.06)\":C.surf2,borderRadius:C.radiusSm,padding:\"8px 10px\",textAlign:\"center\"}}>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:18,color:overdueDocs.length>0?C.danger:C.muted}}>{overdueDocs.length}</div>\n            <div style={{fontSize:8,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginTop:2}}>Overdue</div>\n          </div>\n        </div>\n\n        {/* Lead list */}\n        <div style={{flex:1,overflowY:\"auto\"}}>\n          {active.map(function(lead,i){\n            var room=lead.dealRoom||[];\n            var docCount=room.length;\n            var doneCount=room.filter(function(d){return d.status===\"approved\";}).length;\n            var hasOverdue=room.some(function(d){return d.dueDate&&d.status!==\"approved\"&&new Date(d.dueDate)<new Date();});\n            var hasWaiting=room.some(function(d){return d.status===\"sent\";});\n            var hasNeeded=room.some(function(d){return d.status===\"needed\";});\n            if(filterCat===\"overdue\"&&!hasOverdue)return null;\n            if(filterCat===\"waiting\"&&!hasWaiting)return null;\n            if(filterCat===\"needed\"&&!hasNeeded)return null;\n            var isSel=selectedId===lead.id;\n            var ps=pipeStage(lead);\n            var pct2=docCount>0?Math.round(doneCount/docCount*100):0;\n            return(\n              <div key={lead.id} onClick={function(){setSelectedId(lead.id);}}\n                style={{padding:\"10px 14px\",borderBottom:\"1px solid \"+C.line2,cursor:\"pointer\",background:isSel?\"rgba(96,180,255,0.08)\":(i%2===0?C.surf:C.surf2),borderLeft:isSel?\"2px solid \"+C.info:\"2px solid transparent\"}}>\n                <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                  <span style={{fontSize:12,fontWeight:700,color:isSel?C.info:C.text}}>{lead.company}</span>\n                  {docCount>0&&<span style={{fontSize:9,color:pct2>=100?\"#4CAF50\":pct2>=50?\"#F59E0B\":\"#78909C\",fontFamily:\"'DM Mono',monospace\"}}>{doneCount}/{docCount}</span>}\n                </div>\n                <div style={{display:\"flex\",gap:4,marginTop:3,alignItems:\"center\"}}>\n                  <PipeBadge idx={ps}/>\n                  {hasOverdue&&<span style={{fontSize:8,color:C.danger,fontWeight:700}}>OVERDUE</span>}\n                  {hasWaiting&&<span style={{fontSize:8,color:\"#60B4FF\"}}>WAITING</span>}\n                </div>\n                {docCount>0&&(\n                  <div style={{background:C.surf3,height:3,borderRadius:2,overflow:\"hidden\",marginTop:4}}>\n                    <div style={{width:pct2+\"%\",height:3,background:pct2>=100?\"#4CAF50\":pct2>=50?\"#F59E0B\":\"#60B4FF\",borderRadius:2}}/>\n                  </div>\n                )}\n              </div>\n            );\n          })}\n        </div>\n      </div>\n\n      {/* RIGHT: Deal Room detail */}\n      <div style={{overflowY:\"auto\",padding:\"16px 20px\"}}>\n        {selected?(\n          <div>\n            <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",marginBottom:12}}>\n              <div>\n                <div style={{fontSize:20,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{selected.company}</div>\n                {selected.industry&&<div style={{color:C.muted,fontSize:11,marginTop:2}}>{selected.industry}</div>}\n                <div style={{display:\"flex\",gap:6,marginTop:4}}><PipeBadge idx={pipeStage(selected)}/><ScoreBadge v={selected.totalScore}/></div>\n              </div>\n            </div>\n            <DealRoom lead={selected} onUpdate={function(updates){handleDealRoomUpdate(selected.id,updates);}} icp={icp} apiKey={apiKey}/>\n          </div>\n        ):(\n          <div style={{textAlign:\"center\",padding:\"80px 20px\",color:C.muted}}>\n            <svg width=\"48\" height=\"48\" viewBox=\"0 0 24 24\" fill=\"none\" stroke={C.line} strokeWidth=\"1\" strokeLinecap=\"round\" style={{marginBottom:12,opacity:0.5}}><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/></svg>\n            <div style={{fontSize:14,fontWeight:700,color:C.surf3,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Select a deal</div>\n            <div style={{fontSize:11,color:C.muted,marginTop:4}}>Pick a lead from the left to manage documents</div>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n/* \u2500\u2500 STRATEGY TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction StrategyTab({leads,icp,apiKey,strategy,onUpdate}){\n  const cur=(icp&&icp.currency)||\"\u20ac\";\n  const kpi=strategy.kpiTargets||DEF_STRATEGY.kpiTargets;\n  const mindMap=strategy.mindMap||DEF_STRATEGY.mindMap;\n  const nodes=mindMap.nodes||[];\n\n  /* \u2500\u2500 KPI auto-calculations \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  const now=new Date();\n  const yearStart=new Date(now.getFullYear(),0,1);\n  const qStart=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1);\n  const closed=leads.filter(function(l){return pipeStage(l)===4;});\n  const closedThisYear=closed.filter(function(l){var d=new Date(l.closedAt||l.createdAt);return d>=yearStart;});\n  const closedThisQ=closed.filter(function(l){var d=new Date(l.closedAt||l.createdAt);return d>=qStart;});\n  const totalRevYear=closedThisYear.reduce(function(a,l){return a+(l.dealValue||0);},0);\n  const netNewNames=closedThisYear.length;\n  const acvActual=netNewNames>0?Math.round(totalRevYear/netNewNames):0;\n  const newAccountsQ=closedThisQ.length;\n  const totalAccounts=closed.length;\n\n\n  function pct(actual,target){if(!target)return 0;return Math.min(Math.round((actual/target)*100),150);}\n  function ragClr(p){return p>=100?C.acc:p>=70?C.warn:C.danger;}\n\n  const pipelineValue=leads.filter(function(l){return pipeStage(l)!==4;}).reduce(function(a,l){return a+(l.dealValue||l.scores?(l.dealValue||Math.round(calcScore(l.scores||{},{})/100*(kpi.acv||50000))):0);},0);\n  const KPI_ROWS=[\n    {key:\"netNewNames\",   label:\"Net New Logos / Year\",  unit:\"\",  actual:netNewNames,    fmt:function(v){return v.toString();},           auto:true,  desc:\"New clients closed this year\"},\n    {key:\"acv\",           label:\"Avg Deal Size (ACV)\",   unit:cur, actual:acvActual,      fmt:function(v){return fmtK(v,cur);},            auto:true,  desc:\"Average annual contract value\"},\n    {key:\"pipelineValue\", label:\"Pipeline Value\",        unit:cur, actual:pipelineValue,  fmt:function(v){return fmtK(v,cur);},            auto:true,  desc:\"Total value of active opportunities\"},\n\n  ];\n\n  /* \u2500\u2500 Pipeline Coverage & Stage Conversion \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  var STAGE_WEIGHTS=[0.10,0.25,0.50,0.75,0.90];\n  var activeLeadsP=leads.filter(function(l){return pipeStage(l)>=0&&pipeStage(l)<PIPE.length-1;});\n  var wonLeads=leads.filter(function(l){return pipeStage(l)===PIPE.length-1;});\n  var estAcv=kpi.acv||50000;\n  var weightedPipeline=activeLeadsP.reduce(function(a,l){var ps2=pipeStage(l),dv=l.dealValue||estAcv;return a+dv*(STAGE_WEIGHTS[ps2]||0.10);},0)+wonLeads.reduce(function(a,l){return a+(l.dealValue||estAcv)*0.90;},0);\n  var remainingTarget=Math.max(0,(kpi.netNewNames||0)*estAcv-totalRevYear);\n  var coverageRatio=remainingTarget>0?weightedPipeline/remainingTarget:weightedPipeline>0?9.99:0;\n  var coverageClr=coverageRatio>=3?C.acc:coverageRatio>=2?C.warn:C.danger;\n  var stageCounts=PIPE.map(function(p,i){return leads.filter(function(l){return pipeStage(l)===i;}).length;});\n  var unstartedCount=leads.filter(function(l){return pipeStage(l)===PIPE_NONE;}).length;\n  var stageConversions=[];\n  var stageAvgDays=[];\n  PIPE.forEach(function(p,i){\n    var enteredStage=0,advancedFrom=0,totalDaysInStage=0,countWithDays=0;\n    leads.forEach(function(l){\n      var hist=(l.pipelineHistory||[]).slice().sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});\n      var enteredAt=null;\n      hist.forEach(function(h){\n        if(h.stage===i){enteredStage++;enteredAt=new Date(h.timestamp);}\n        if(h.stage===i+1&&enteredAt){var leftAt=new Date(h.timestamp);advancedFrom++;totalDaysInStage+=Math.round((leftAt-enteredAt)/86400000);countWithDays++;enteredAt=null;}\n      });\n      if(enteredAt&&pipeStage(l)===i){totalDaysInStage+=Math.round((Date.now()-enteredAt.getTime())/86400000);countWithDays++;}\n    });\n    stageConversions.push(enteredStage>0?Math.round(advancedFrom/enteredStage*100):0);\n    stageAvgDays.push(countWithDays>0?Math.round(totalDaysInStage/countWithDays):0);\n  });\n  var totalCycleLeads=wonLeads.filter(function(l){return(l.pipelineHistory||[]).length>=2;});\n  var avgCycleDays=totalCycleLeads.length>0?Math.round(totalCycleLeads.reduce(function(a,l){var h=l.pipelineHistory||[];var ts=h.map(function(x){return new Date(x.timestamp).getTime();});return a+(Math.max.apply(null,ts)-Math.min.apply(null,ts))/86400000;},0)/totalCycleLeads.length):0;\n  var retentionActual=totalAccounts>0?Math.round((totalAccounts-leads.filter(function(l){return l.accountData&&l.accountData.healthScore===\"churned\";}).length)/totalAccounts*100):100;\n\n  /* \u2500\u2500 Mind map state \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  const [selectedId,setSelectedId]=useState(null);\n  const [editingId,setEditingId]=useState(null);\n  const [editText,setEditText]=useState(\"\");\n  const [dragging,setDragging]=useState(null);\n  const [dragOffset,setDragOffset]=useState({x:0,y:0});\n  const [generatingMap,setGeneratingMap]=useState(false);\n  const [editKpi,setEditKpi]=useState(null);\n  const [kpiDraft,setKpiDraft]=useState(\"\");\n  const svgRef=React.useRef(null);\n\n  function saveNodes(newNodes){\n    onUpdate({mindMap:Object.assign({},mindMap,{nodes:newNodes})});\n  }\n  function parseK(val){\n    var s=String(val).trim().toLowerCase().replace(/,/g,\"\").replace(/[\u20ac$\u00a3]/g,\"\");\n    if(s.indexOf(\"m\")>=0)return Math.round(parseFloat(s)*1000000);\n    if(s.indexOf(\"k\")>=0)return Math.round(parseFloat(s)*1000);\n    return parseFloat(s)||0;\n  }\n  function saveKpi(key,val){\n    onUpdate({kpiTargets:Object.assign({},kpi,{[key]:parseK(val)})});\n  }\n\n  function addNode(){\n    if(!selectedId)return;\n    const parent=nodes.find(function(n){return n.id===selectedId;});\n    if(!parent)return;\n    const siblings=nodes.filter(function(n){return n.parentId===selectedId;});\n    const angle=(siblings.length*60-60)*(Math.PI/180);\n    const dist=140;\n    const newNode={\n      id:\"n\"+Date.now(),\n      text:\"New idea\",\n      x:Math.round(parent.x+Math.cos(angle)*dist),\n      y:Math.round(parent.y+Math.sin(angle)*dist),\n      parentId:selectedId,\n      color:PIPE[siblings.length%PIPE.length].clr\n    };\n    saveNodes([].concat(nodes,[newNode]));\n    setSelectedId(newNode.id);\n    setEditingId(newNode.id);\n    setEditText(\"New idea\");\n  }\n\n  function deleteNode(){\n    if(!selectedId||selectedId===\"root\")return;\n    function getAllDescendants(id){\n      var result=[id];\n      nodes.forEach(function(n){if(n.parentId===id)result=result.concat(getAllDescendants(n.id));});\n      return result;\n    }\n    var toRemove=getAllDescendants(selectedId);\n    saveNodes(nodes.filter(function(n){return toRemove.indexOf(n.id)<0;}));\n    setSelectedId(null);\n  }\n\n  function startEdit(node){\n    setEditingId(node.id);\n    setEditText(node.text);\n  }\n\n  function commitEdit(){\n    if(!editingId)return;\n    saveNodes(nodes.map(function(n){return n.id===editingId?Object.assign({},n,{text:editText}):n;}));\n    setEditingId(null);\n  }\n\n  function handleSvgMouseDown(e,nodeId){\n    e.stopPropagation();\n    setSelectedId(nodeId);\n    const svg=svgRef.current;\n    if(!svg)return;\n    const rect=svg.getBoundingClientRect();\n    const node=nodes.find(function(n){return n.id===nodeId;});\n    if(!node)return;\n    setDragging(nodeId);\n    setDragOffset({x:e.clientX-rect.left-node.x,y:e.clientY-rect.top-node.y});\n  }\n\n  function handleSvgMouseMove(e){\n    if(!dragging)return;\n    const svg=svgRef.current;\n    if(!svg)return;\n    const rect=svg.getBoundingClientRect();\n    const nx=Math.round(e.clientX-rect.left-dragOffset.x);\n    const ny=Math.round(e.clientY-rect.top-dragOffset.y);\n    saveNodes(nodes.map(function(n){return n.id===dragging?Object.assign({},n,{x:nx,y:ny}):n;}));\n  }\n\n  function handleSvgMouseUp(){setDragging(null);}\n\n  async function aiSuggest(){\n    if(!apiKey||!apiKey.trim()){alert(\"Set your API key in ICP tab.\");return;}\n    setGeneratingMap(true);\n    var context=[\n      \"I am a BDM Manager. Here is my current situation:\",\n      \"KPI Targets: Net New Names=\"+kpi.netNewNames+\", ACV=\"+cur+kpi.acv+\", New Accounts/Q=\"+kpi.newAccountsPerQ+\", Retention=\"+kpi.retention+\"%\",\n      \"KPI Actuals: Net New Names=\"+netNewNames+\", ACV=\"+cur+acvActual+\", New Accounts/Q=\"+newAccountsQ+\", Retention=\"+retentionActual+\"%\",\n      \"Active pipeline: \"+leads.filter(function(l){return pipeStage(l)!==4;}).length+\" leads\",\n      \"ICP: \"+(icp&&icp.productDescription||\"Not set\"),\n      \"Current mind map center: \"+(nodes[0]?nodes[0].text:\"My Annual Goal\"),\n      \"\",\n      \"Suggest a strategic mind map for me. Return JSON only:\",\n      '{\"nodes\":[{\"id\":\"root\",\"text\":\"Annual Goal\",\"x\":400,\"y\":250,\"parentId\":null,\"color\":\"#C6FF00\"},{\"id\":\"1\",\"text\":\"Strategy 1\",\"x\":200,\"y\":150,\"parentId\":\"root\",\"color\":\"#60B4FF\"},...]}'\n      ,\"Up to 12 nodes total. 3-4 main branches from root, each with 1-2 tactics. Colors: use #60B4FF, #A78BFA, #F59E0B, #FB923C, #C6FF00, #34D399. Return ONLY valid JSON.\"\n    ].join(\"\\n\");\n    try{\n      var res=await fetch(\"https://api.anthropic.com/v1/messages\",{\n        method:\"POST\",\n        headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},\n        body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:1000,messages:[{role:\"user\",content:context}]})\n      });\n      var data=await res.json();\n      if(data.error){alert(\"API error: \"+data.error.message);setGeneratingMap(false);return;}\n      var raw=(data.content||[]).map(function(b){return b.text||\"\";}).join(\"\");\n      var clean=raw.replace(/\\u0060{3}json|\\u0060{3}/g,\"\").trim();\n      var parsed=JSON.parse(clean);\n      if(parsed.nodes&&parsed.nodes.length>0){\n        onUpdate({mindMap:{nodes:parsed.nodes}});\n      }\n    }catch(e){alert(\"Could not generate: \"+e.message);}\n    setGeneratingMap(false);\n  }\n\n  var selectedNode=nodes.find(function(n){return n.id===selectedId;})||null;\n  var currentQ=Math.floor(now.getMonth()/3);\n  var qLabels=[\"Q1\",\"Q2\",\"Q3\",\"Q4\"];\n\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"320px 1fr\",height:\"100%\",overflow:\"hidden\"}}>\n      {/* \u2500\u2500 LEFT: KPI Panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */}\n      <div style={{borderRight:\"1px solid \"+C.line,display:\"flex\",flexDirection:\"column\",overflowY:\"auto\",background:C.surf}}>\n        <div style={{padding:\"14px 16px\",borderBottom:\"1px solid \"+C.line,flexShrink:0}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:4}}>\n            <div style={{width:2,height:16,background:C.acc,borderRadius:1}}/>\n            <span style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>KPI Tracker</span>\n          </div>\n          <div style={{display:\"flex\",gap:4,marginTop:8}}>\n            {qLabels.map(function(q,qi){return(\n              <div key={qi} style={{flex:1,textAlign:\"center\",padding:\"4px 2px\",borderRadius:4,background:qi===currentQ?\"rgba(198,255,0,0.12)\":\"transparent\",border:\"1px solid \"+(qi===currentQ?C.acc+\"44\":C.line)}}>\n                <div style={{fontSize:9,fontWeight:700,color:qi===currentQ?C.acc:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{q}</div>\n                {qi===currentQ&&<div style={{fontSize:7,color:C.acc,marginTop:1}}>NOW</div>}\n              </div>\n            );})}\n          </div>\n          <div style={{color:C.muted,fontSize:10,marginTop:6}}>Annual targets \u00b7 auto-calculated actuals</div>\n        </div>\n\n        <div style={{padding:\"12px 16px\",flex:1}}>\n          {KPI_ROWS.map(function(row){\n            var p=pct(row.actual,kpi[row.key]);\n            var clr=ragClr(p);\n            var isEditing=editKpi===row.key;\n            return(\n              <div key={row.key} style={{marginBottom:16,background:C.surf2,borderRadius:\"8px\",padding:\"12px 14px\",borderLeft:\"2px solid \"+clr}}>\n                <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",marginBottom:8}}>\n                  <div style={{flex:1}}>\n                    <div style={{fontSize:11,fontWeight:700,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginBottom:1}}>{row.label}</div>\n                    <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{row.desc}</div>\n                    <div style={{display:\"flex\",alignItems:\"baseline\",gap:8}}>\n                      <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,color:clr,lineHeight:1}}>{row.fmt(row.actual)}</span>\n                      <span style={{color:C.muted,fontSize:11}}>of</span>\n                      {isEditing?(\n                        <input type=\"number\" value={kpiDraft} onChange={function(e){setKpiDraft(e.target.value);}}\n                          onBlur={function(){saveKpi(row.key,kpiDraft);setEditKpi(null);}}\n                          onKeyDown={function(e){if(e.key===\"Enter\"){saveKpi(row.key,kpiDraft);setEditKpi(null);}if(e.key===\"Escape\")setEditKpi(null);}}\n                          style={{...INP,width:100,fontSize:13,padding:\"2px 6px\",display:\"inline-block\"}} placeholder=\"e.g. 100k\"/>\n                      ):(\n                        <span onClick={function(){setEditKpi(row.key);setKpiDraft(String(kpi[row.key]));}}\n                          style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.muted,cursor:\"pointer\",borderBottom:\"1px dashed \"+C.line,paddingBottom:1}}\n                          title=\"Click to set target\">\n                          {kpi[row.key]>0?(row.unit===\"%\" ? kpi[row.key]+\"%\" : row.unit===cur ? fmtK(kpi[row.key],cur) : kpi[row.key].toString()):\"Set target \u2192\"}\n                        </span>\n                      )}\n                    </div>\n                  </div>\n                  <div style={{textAlign:\"right\",flexShrink:0,marginLeft:8}}>\n                    <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:18,color:clr,fontWeight:400}}>{kpi[row.key]>0?p+\"%\":\"\u2014\"}</div>\n                    <div style={{fontSize:9,color:C.muted}}>of target</div>\n                  </div>\n                </div>\n                {kpi[row.key]>0&&(\n                  <div>\n                    <div style={{background:C.surf3,height:4,borderRadius:2,overflow:\"hidden\"}}>\n                      <div style={{width:Math.min(p,100)+\"%\",height:4,background:clr,borderRadius:2,transition:\"width .4s\"}}/>\n                    </div>\n                    <div style={{display:\"flex\",justifyContent:\"space-between\",marginTop:4}}>\n                      <span style={{fontSize:9,color:C.muted}}>\n                        {p>=100?\"Target reached!\":p>=70?\"On track\":(\"Gap: \"+(row.unit===\"%\"?Math.max(0,kpi[row.key]-row.actual)+\"%\":row.unit===cur?fmtK(Math.max(0,kpi[row.key]-row.actual),cur):Math.max(0,kpi[row.key]-row.actual).toString()))}\n                      </span>\n                      <span style={{fontSize:9,color:C.muted}}>{row.auto&&<span style={{color:C.info}}>auto \u2713</span>}</span>\n                    </div>\n                  </div>\n                )}\n                {!kpi[row.key]&&<div style={{fontSize:9,color:C.muted,marginTop:4}}>Click \"Set target\" to add your management target</div>}\n              </div>\n            );\n          })}\n\n          {/* \u2500\u2500 Pipeline Coverage \u2500\u2500 */}\n          <div style={{background:C.surf2,borderRadius:\"8px\",padding:\"12px 14px\",borderLeft:\"2px solid \"+coverageClr,marginBottom:16}}>\n            <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",marginBottom:8}}>\n              <div>\n                <div style={{fontSize:11,fontWeight:700,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginBottom:1}}>Pipeline Coverage</div>\n                <div style={{fontSize:9,color:C.muted}}>Weighted pipeline vs remaining target</div>\n              </div>\n              <div style={{textAlign:\"right\"}}>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,color:coverageClr,lineHeight:1}}>{coverageRatio>=9.99?\"9.9+x\":coverageRatio.toFixed(1)+\"x\"}</div>\n                <div style={{fontSize:9,color:C.muted}}>{coverageRatio>=3?\"Healthy\":coverageRatio>=2?\"Thin\":\"At risk\"}</div>\n              </div>\n            </div>\n            <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:8,marginTop:6}}>\n              <div style={{background:C.surf3,borderRadius:5,padding:\"6px 8px\"}}>\n                <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Weighted Pipeline</div>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.text}}>{fmtK(Math.round(weightedPipeline),cur)}</div>\n              </div>\n              <div style={{background:C.surf3,borderRadius:5,padding:\"6px 8px\"}}>\n                <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Remaining Target</div>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.text}}>{remainingTarget>0?fmtK(remainingTarget,cur):\"Target met\"}</div>\n              </div>\n            </div>\n            <div style={{marginTop:8}}>\n              <div style={{fontSize:9,color:C.muted,marginBottom:4}}>Stage weights applied</div>\n              <div style={{display:\"flex\",gap:2}}>\n                {PIPE.map(function(p,i){var cnt=stageCounts[i];return(\n                  <div key={i} style={{flex:1,textAlign:\"center\"}}>\n                    <div style={{background:p.clr+\"22\",border:\"1px solid \"+p.clr+\"33\",borderRadius:4,padding:\"3px 2px\",marginBottom:2}}>\n                      <div style={{fontSize:11,fontWeight:700,color:p.clr,fontFamily:\"'DM Mono',monospace\"}}>{cnt}</div>\n                    </div>\n                    <div style={{fontSize:7,color:p.clr,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.3}}>{STAGE_WEIGHTS[i]*100}%</div>\n                    <div style={{fontSize:7,color:C.muted,lineHeight:1.1}}>{p.code.length>6?p.code.slice(0,6):p.code}</div>\n                  </div>\n                );})}\n              </div>\n            </div>\n          </div>\n\n          {/* \u2500\u2500 Stage Conversion Funnel \u2500\u2500 */}\n          <div style={{background:C.surf2,borderRadius:\"8px\",padding:\"12px 14px\",borderLeft:\"2px solid \"+C.info,marginBottom:16}}>\n            <div style={{fontSize:11,fontWeight:700,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginBottom:1}}>Stage Conversion</div>\n            <div style={{fontSize:9,color:C.muted,marginBottom:10}}>Conversion rates between pipeline stages</div>\n            {PIPE.map(function(p,i){\n              var cnt=stageCounts[i],conv=stageConversions[i],avgD=stageAvgDays[i];\n              var convClr=conv>=70?C.acc:conv>=40?C.warn:conv>0?C.danger:C.muted;\n              var barW=Math.max(0,Math.min(100,conv));\n              var maxCnt=Math.max.apply(null,stageCounts.concat([1]));\n              var cntW=Math.round(cnt/maxCnt*100);\n              return(\n                <div key={i} style={{marginBottom:i<PIPE.length-1?8:0}}>\n                  <div style={{display:\"flex\",alignItems:\"center\",gap:6,marginBottom:3}}>\n                    <div style={{width:6,height:6,borderRadius:3,background:p.clr,flexShrink:0}}/>\n                    <span style={{fontSize:10,fontWeight:700,color:p.clr,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,flex:1}}>{p.code}</span>\n                    <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:12,color:C.text,fontWeight:500}}>{cnt}</span>\n                    {avgD>0&&<span style={{fontSize:9,color:C.muted,fontFamily:\"'DM Mono',monospace\"}}>{avgD}d avg</span>}\n                  </div>\n                  <div style={{display:\"flex\",gap:4,alignItems:\"center\"}}>\n                    <div style={{flex:1,background:C.surf3,height:6,borderRadius:3,overflow:\"hidden\"}}>\n                      <div style={{width:cntW+\"%\",height:6,background:p.clr+\"66\",borderRadius:3,transition:\"width .4s\"}}/>\n                    </div>\n                  </div>\n                  {i<PIPE.length-1&&(\n                    <div style={{display:\"flex\",alignItems:\"center\",gap:4,margin:\"4px 0 0 10px\"}}>\n                      <svg width=\"10\" height=\"10\" viewBox=\"0 0 10 10\"><path d=\"M5 2 L5 8 M3 6 L5 8 L7 6\" stroke={C.muted} strokeWidth=\"1.2\" fill=\"none\"/></svg>\n                      <div style={{flex:1,background:C.surf3,height:4,borderRadius:2,overflow:\"hidden\"}}>\n                        <div style={{width:barW+\"%\",height:4,background:convClr,borderRadius:2,transition:\"width .4s\"}}/>\n                      </div>\n                      <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:10,color:convClr,fontWeight:500,minWidth:30,textAlign:\"right\"}}>{conv>0?conv+\"%\":\"--\"}</span>\n                    </div>\n                  )}\n                </div>\n              );\n            })}\n            {avgCycleDays>0&&(\n              <div style={{marginTop:10,paddingTop:8,borderTop:\"1px solid \"+C.line,display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                <span style={{fontSize:10,color:C.muted}}>Avg deal cycle (closed won)</span>\n                <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.info,fontWeight:500}}>{avgCycleDays} days</span>\n              </div>\n            )}\n            {unstartedCount>0&&(\n              <div style={{marginTop:6,display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                <span style={{fontSize:10,color:C.muted}}>Leads not yet in pipeline</span>\n                <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.warn,fontWeight:500}}>{unstartedCount}</span>\n              </div>\n            )}\n          </div>\n\n        </div>\n      </div>\n\n      {/* \u2500\u2500 RIGHT: Mind Map \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */}\n      <div style={{display:\"flex\",flexDirection:\"column\",overflow:\"hidden\"}}>\n        <div style={{padding:\"10px 16px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,display:\"flex\",alignItems:\"center\",gap:8}}>\n          <div style={{width:2,height:14,background:C.acc,borderRadius:1}}/>\n          <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Strategy Map</span>\n          <span style={{color:C.muted,fontSize:11}}>\n    {selectedId\n      ?<span style={{color:C.acc}}>\"{(nodes.find(function(n){return n.id===selectedId;})||{text:\"node\"}).text}\" selected</span>\n      :\"\u2190 Click a node to select, then add children\"}\n    </span>\n          <div style={{flex:1}}/>\n          <button onClick={function(){if(selectedId)addNode();}} disabled={!selectedId}\n    style={{...BTN.sm,color:selectedId?C.info:C.muted,borderColor:selectedId?C.info+\"44\":C.line,opacity:1,fontSize:11,background:selectedId?\"rgba(96,180,255,0.1)\":\"transparent\"}}\n    title={selectedId?\"Add a child node to the selected node\":\"First click a node on the map\"}>\n    {selectedId?\"+ Add child\":\"\u2190 Select a node first\"}\n  </button>\n          <button onClick={function(){if(selectedId&&selectedId!==\"root\")startEdit(selectedNode);}} disabled={!selectedId||selectedId===\"root\"} style={{...BTN.sm,opacity:(selectedId&&selectedId!==\"root\")?1:0.4,fontSize:11}}>\u270f Edit</button>\n          <button onClick={deleteNode} disabled={!selectedId||selectedId===\"root\"} style={{...BTN.smRed,opacity:(selectedId&&selectedId!==\"root\")?1:0.4,fontSize:11}}>\u00d7 Delete</button>\n          <button onClick={aiSuggest} disabled={generatingMap} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:11,opacity:generatingMap?0.5:1}}>{generatingMap?\"Generating\u2026\":\"\u2726 AI: Generate my plan\"}</button>\n        </div>\n\n        <div style={{flex:1,overflow:\"hidden\",position:\"relative\",background:C.bg}}>\n          {editingId&&(\n            <div style={{position:\"absolute\",top:0,left:0,right:0,bottom:0,zIndex:10,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",background:\"rgba(0,0,0,0.5)\"}}>\n              <div style={{background:C.surf,border:\"1px solid \"+C.line,borderRadius:\"8px\",padding:20,minWidth:300}}>\n                <div style={{...LBL,marginBottom:8}}>Edit node text</div>\n                <input value={editText} onChange={function(e){setEditText(e.target.value);}}\n                  onKeyDown={function(e){if(e.key===\"Enter\")commitEdit();if(e.key===\"Escape\")setEditingId(null);}}\n                  style={{...INP,fontSize:14,marginBottom:12}}/>\n                <div style={{display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n                  <button onClick={function(){setEditingId(null);}} style={BTN.secondary}>Cancel</button>\n                  <button onClick={commitEdit} style={BTN.primary}>Save</button>\n                </div>\n              </div>\n            </div>\n          )}\n          <svg ref={svgRef} width=\"100%\" height=\"100%\"\n            onMouseMove={handleSvgMouseMove}\n            onMouseUp={handleSvgMouseUp}\n            onMouseLeave={handleSvgMouseUp}\n            onClick={function(){setSelectedId(null);}}>\n            <defs>\n              <filter id=\"glow\">\n                <feGaussianBlur stdDeviation=\"2\" result=\"coloredBlur\"/>\n                <feMerge><feMergeNode in=\"coloredBlur\"/><feMergeNode in=\"SourceGraphic\"/></feMerge>\n              </filter>\n            </defs>\n            {/* Draw edges first */}\n            {nodes.map(function(node){\n              if(!node.parentId)return null;\n              var parent=nodes.find(function(n){return n.id===node.parentId;});\n              if(!parent)return null;\n              return <line key={\"e\"+node.id} x1={parent.x} y1={parent.y} x2={node.x} y2={node.y}\n                stroke={node.color} strokeWidth={1.5} strokeOpacity={0.4} strokeDasharray={node.parentId===\"root\"?\"\":\"4 3\"}/>;\n            })}\n            {/* Draw nodes */}\n            {nodes.map(function(node){\n              var isRoot=node.id===\"root\";\n              var isSel=selectedId===node.id;\n              var r=isRoot?36:28;\n              var textLen=node.text.length;\n              var boxW=Math.max(r*2+8, textLen*7+16);\n              var boxH=isRoot?44:32;\n              return(\n                <g key={node.id}\n                  style={{cursor:dragging===node.id?\"grabbing\":\"grab\"}}\n                  onMouseDown={function(e){handleSvgMouseDown(e,node.id);}}\n                  onDoubleClick={function(e){e.stopPropagation();startEdit(node);}}>\n                  <rect x={node.x-boxW/2} y={node.y-boxH/2} width={boxW} height={boxH} rx={isRoot?22:16}\n                    fill={node.color+(isSel?\"33\":\"18\")}\n                    stroke={node.color}\n                    strokeWidth={isSel?2:1}\n                    filter={isRoot?\"url(#glow)\":undefined}/>\n                  {isSel&&<rect x={node.x-boxW/2-3} y={node.y-boxH/2-3} width={boxW+6} height={boxH+6} rx={isRoot?25:19}\n                    fill=\"none\" stroke={node.color} strokeWidth={1} strokeOpacity={0.4} strokeDasharray=\"4 2\"/>}\n                  <text x={node.x} y={node.y+(isRoot?1:0)} textAnchor=\"middle\" dominantBaseline=\"middle\"\n                    fill={node.color} fontSize={isRoot?13:11} fontWeight=\"700\"\n                    fontFamily=\"Barlow Condensed\" letterSpacing=\"0.5\"\n                    style={{pointerEvents:\"none\",userSelect:\"none\"}}>\n                    {node.text.length>22?node.text.slice(0,20)+\"\u2026\":node.text}\n                  </text>\n                </g>\n              );\n            })}\n          </svg>\n          {nodes.length<=1&&(\n            <div style={{position:\"absolute\",top:\"50%\",left:\"50%\",transform:\"translate(-50%,-50%)\",textAlign:\"center\",pointerEvents:\"none\",marginTop:60}}>\n              <div style={{color:C.muted,fontSize:12}}>Click the root node then \"+ Add child\" to build your map</div>\n              <div style={{color:C.muted,fontSize:11,marginTop:4}}>Or click \"\u2726 AI Suggest\" to auto-generate a strategic map</div>\n            </div>\n          )}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\nfunction IcpTab({icp,weights,apiKey,onApiKeyChange,onIcpChange,onWeightsChange}){\n  const totalW=Object.values(weights).reduce(function(a,b){return a+b;},0),wOk=totalW===100;\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:16,padding:\"20px 24px\",height:\"100%\",overflowY:\"auto\",boxSizing:\"border-box\",alignContent:\"start\"}}>\n      <div style={{...card(C.info)}}>\n        <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:16}}>\n          <div style={{width:2,height:16,background:C.info,borderRadius:1}}/>\n          <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>ICP Configuration</h3>\n        </div>\n        <p style={{color:C.muted,fontSize:12,margin:\"0 0 16px\",lineHeight:1.6}}>Define your Ideal Customer Profile. Injected into every AI pitch.</p>\n        {[[\"Your Name\",\"bdmName\",\"text\",\"\u2014\"],[\"What you sell\",\"productDescription\",\"textarea\",\"Describe your product or service\u2026\"],[\"Target Industries\",\"targetIndustries\",\"text\",\"e.g. SaaS, Fintech, B2B\"],[\"Ideal Company Size\",\"targetSize\",\"text\",\"e.g. 50\u2013500 employees\"],[\"Budget Range\",\"idealBudget\",\"text\",\"e.g. $30k\u2013$200k ARR\"],[\"Pain Points You Solve\",\"painPoints\",\"textarea\",\"e.g. Manual reporting, poor forecasting\u2026\"],[\"Currency symbol\",\"currency\",\"text\",\"\u20ac\"]].map(function(r){return(\n          <div key={r[1]} style={{marginBottom:12}}>\n            <span style={LBL}>{r[0]}</span>\n            {r[2]===\"textarea\"?<textarea value={icp[r[1]]||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder={r[3]}/>:<input value={icp[r[1]]||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} style={{...INP,fontSize:12}} placeholder={r[3]}/>}\n          </div>\n        );})}\n        <div style={{borderTop:\"1px solid \"+C.line,paddingTop:14,marginTop:4}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:8}}>\n            <span style={{...LBL,margin:0,color:C.acc}}>Anthropic API Key</span>\n            <Tag label={apiKey?\"\u2713 Set\":\"Not set\"} clr={apiKey?C.acc:C.danger} small/>\n          </div>\n          <input type=\"password\" value={apiKey||\"\"} onChange={function(e){onApiKeyChange(e.target.value);}} style={{...INP,fontFamily:\"'DM Mono',monospace\",fontSize:12}} placeholder=\"sk-ant-api03-\u2026\"/>\n          <div style={{color:C.muted,fontSize:10,marginTop:5,lineHeight:1.5}}>Required for AI generation. Get your key at <a href=\"https://console.anthropic.com\" target=\"_blank\" rel=\"noreferrer\">console.anthropic.com</a> \u2192 API Keys. Stored only in your browser.</div>\n        </div>\n      </div>\n      <div style={{...card(wOk?C.acc:C.danger)}}>\n        <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:16}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n            <div style={{width:2,height:16,background:wOk?C.acc:C.danger,borderRadius:1}}/>\n            <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Scoring Weights</h3>\n          </div>\n          <Tag label={totalW+\"/100\"} clr={wOk?C.acc:C.danger}/>\n        </div>\n        {CRITERIA.map(function(cr){return(\n          <div key={cr.id} style={{marginBottom:16}}>\n            <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:5}}>\n              <span style={{fontSize:11,color:cr.clr,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600,letterSpacing:0.5}}>{cr.label}</span>\n              <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:14,color:cr.clr}}>{weights[cr.id]}<span style={{fontSize:10,color:C.muted}}>%</span></span>\n            </div>\n            <input type=\"range\" min={0} max={40} value={weights[cr.id]} onChange={function(e){onWeightsChange(cr.id,parseInt(e.target.val );})}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* \u2500\u2500 APP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n\n\n/* \u2500\u2500 EXPORT PANEL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction ExportPanel({leads,reminders,icp,weights,strategy,apiKey,onApiKeyChange,onIcpChange,onWeightsChange,onStrategyUpdate,gClientId,setGClientId,gUser,gToken,startGoogleAuth,onClose,onBackupDone,onImport,setShowStrategy}){\n  const [importText,setImportText]=useState(\"\");\n  const [importErr,setImportErr]=useState(\"\");\n  const [importSuccess,setImportSuccess]=useState(false);\n  const [activeSection,setActiveSection]=useState(\"export\");\n  const cur=(icp&&icp.currency)||\"\u20ac\";\n\n  function download(filename,content,mime){\n    var blob=new Blob([content],{type:mime});\n    var url=URL.createObjectURL(blob);\n    var a=document.createElement(\"a\");\n    a.href=url;a.download=filename;\n    document.body.appendChild(a);a.click();\n    document.body.removeChild(a);URL.revokeObjectURL(url);\n  }\n\n  function exportJSON(){\n    var data={leads:leads,reminders:reminders,icp:icp,weights:weights,strategy:strategy,exportedAt:new Date().toISOString(),version:\"pcrm_v9\"};\n    download(\"pcrm_backup_\"+new Date().toISOString().slice(0,10)+\".json\",JSON.stringify(data,null,2),\"application/json\");\n    onBackupD
