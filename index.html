<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>PCRM — Personal CRM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

<body>

<div id="pw-gate" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0F0F0F;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Barlow',system-ui,sans-serif">
  <div style="text-align:center;max-width:320px;padding:24px">
    <div style="font-size:24px;font-weight:700;color:#F0F0F0;letter-spacing:2px;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif">PCRM</div>
    <div style="font-size:12px;color:#888;margin-bottom:24px">Enter password to continue</div>
    <input id="pw-input" type="password" placeholder="Password..." style="width:100%;padding:10px 14px;background:#1A1A1A;border:1px solid #333;border-radius:5px;color:#F0F0F0;font-size:14px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:12px" autofocus/>
    <button id="pw-btn" style="width:100%;padding:10px;background:#E8E8E8;border:none;border-radius:5px;color:#0F0F0F;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.8px;cursor:pointer;text-transform:uppercase">Enter</button>
    <div id="pw-err" style="color:#FF6B6B;font-size:11px;margin-top:10px;display:none">Incorrect password</div>
    <div style="font-size:9px;color:#555;margin-top:20px">Change password in Settings after login</div>
  </div>
</div>
<script>
(function(){
  var HASH="8f6360fafdc48eb199caf501f237dcf2e4e1d01a6ff4b64db222645617814a97";
  var stored=localStorage.getItem("pcrm_pw_hash");
  if(stored&&stored===HASH){document.getElementById("pw-gate").style.display="none";}
  else{
    var custom=localStorage.getItem("pcrm_custom_pw");
    if(custom){HASH=custom;}
    if(localStorage.getItem("pcrm_auth")==="1"&&Date.now()-parseInt(localStorage.getItem("pcrm_auth_time")||"0")<86400000){
      document.getElementById("pw-gate").style.display="none";
    }
  }
  async function sha256(msg){var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");}
  async function check(){
    var inp=document.getElementById("pw-input").value;
    var hash=await sha256(inp);
    var customHash=localStorage.getItem("pcrm_custom_pw");
    if(hash===HASH||hash===customHash){
      document.getElementById("pw-gate").style.display="none";
      localStorage.setItem("pcrm_auth","1");
      localStorage.setItem("pcrm_auth_time",String(Date.now()));
    }else{document.getElementById("pw-err").style.display="block";}
  }
  document.getElementById("pw-btn").onclick=check;
  document.getElementById("pw-input").onkeydown=function(e){if(e.key==="Enter")check();};

  /* Biometric auth (Face ID / Touch ID / Fingerprint) */
  var bioAvail=window.PublicKeyCredential&&window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable;
  if(bioAvail){
    bioAvail.call(window.PublicKeyCredential).then(function(avail){
      if(!avail)return;
      var bioReg=localStorage.getItem("pcrm_bio_registered");
      if(bioReg==="1"){
        /* Auto-trigger biometric on load */
        document.getElementById("pw-err").style.display="none";
        tryBiometric();
      }
    });
  }
  async function tryBiometric(){
    try{
      var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
      var credId=localStorage.getItem("pcrm_bio_cred");
      if(!credId)return;
      var idBytes=Uint8Array.from(atob(credId),function(c){return c.charCodeAt(0);});
      var assertion=await navigator.credentials.get({publicKey:{
        challenge:challenge,
        rpId:location.hostname,
        allowCredentials:[{id:idBytes,type:"public-key",transports:["internal"]}],
        userVerification:"required",
        timeout:60000
      }});
      if(assertion){
        document.getElementById("pw-gate").style.display="none";
        localStorage.setItem("pcrm_auth","1");
        localStorage.setItem("pcrm_auth_time",String(Date.now()));
      }
    }catch(e){console.log("Bio auth cancelled or failed:",e.message);}
  }
  /* Add biometric button if supported */
  if(bioAvail){
    bioAvail.call(window.PublicKeyCredential).then(function(avail){
      if(!avail)return;
      var bioBtn=document.createElement("button");
      bioBtn.id="bio-btn";
      bioBtn.innerHTML=localStorage.getItem("pcrm_bio_registered")==="1"?"&#128275; Use Face ID / Fingerprint":"&#128275; Set up biometric after login";
      bioBtn.style.cssText="width:100%;padding:10px;background:transparent;border:1px solid #333;border-radius:5px;color:#FECA57;font-size:12px;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:0.8px;cursor:pointer;margin-top:8px";
      if(localStorage.getItem("pcrm_bio_registered")==="1"){bioBtn.onclick=tryBiometric;}
      else{bioBtn.onclick=function(){document.getElementById("pw-err").textContent="Enter password first, then biometric will be set up";document.getElementById("pw-err").style.display="block";document.getElementById("pw-err").style.color="#FECA57";};}
      document.getElementById("pw-btn").parentNode.insertBefore(bioBtn,document.getElementById("pw-btn").nextSibling);
    });
  }
  /* After successful password login, offer to register biometric */
  var origCheck=check;
  check=async function(){
    var inp=document.getElementById("pw-input").value;
    var hash=await sha256(inp);
    var customHash=localStorage.getItem("pcrm_custom_pw");
    var HASH2="8f6360fafdc48eb199caf501f237dcf2e4e1d01a6ff4b64db222645617814a97";
    if(hash===HASH2||hash===customHash){
      /* Password correct — register biometric if available and not yet registered */
      document.getElementById("pw-gate").style.display="none";
      localStorage.setItem("pcrm_auth","1");
      localStorage.setItem("pcrm_auth_time",String(Date.now()));
      if(bioAvail&&localStorage.getItem("pcrm_bio_registered")!=="1"){
        bioAvail.call(window.PublicKeyCredential).then(function(avail){
          if(!avail)return;
          if(confirm("Enable Face ID / Fingerprint for future logins?")){registerBiometric();}
        });
      }
    }else{document.getElementById("pw-err").style.display="block";document.getElementById("pw-err").style.color="#FF6B6B";document.getElementById("pw-err").textContent="Incorrect password";}
  };
  async function registerBiometric(){
    try{
      var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
      var userId=new Uint8Array(16);crypto.getRandomValues(userId);
      var cred=await navigator.credentials.create({publicKey:{
        challenge:challenge,
        rp:{name:"PCRM",id:location.hostname},
        user:{id:userId,name:"pcrm-user",displayName:"PCRM User"},
        pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],
        authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},
        timeout:60000
      }});
      if(cred){
        var credId=btoa(String.fromCharCode.apply(null,new Uint8Array(cred.rawId)));
        localStorage.setItem("pcrm_bio_cred",credId);
        localStorage.setItem("pcrm_bio_registered","1");
      }
    }catch(e){console.log("Bio registration failed:",e.message);}
  }
  document.getElementById("pw-btn").onclick=check;
  document.getElementById("pw-input").onkeydown=function(e){if(e.key==="Enter")check();};
})();
</script>
<div id="root"></div>
<script>
(function(){
  var mainCode = "const { useState, useEffect, useCallback, useMemo, Fragment, useRef } = React;\n\n/* \\u2500\\u2500 SMALL UI COMPONENTS \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\nfunction LeadsTab({isMobile,leads,weights,statsHistory,reminders,icp,apiKey,openLeadId,onAdd,onEdit,onDelete,onStatusChange,onPipeAdv,onBlockerAdd,onBlockerResolve,onBlockerRemove,onAddReminder,onAddLogEntry,onUpdateLead,onOpenLead,onNavigate}){\n  const [showForm,setShowForm]=useState(false);\n  const [editLead,setEditLead]=useState(null);\n  const [filterSt,setFilterSt]=useState(\"all\");\n  const [filterPipe,setFilterPipe]=useState(\"all\");\n  const [filterBlock,setFilterBlock]=useState(false);\n  const [pipeView,setPipeView]=useState(localStorage.getItem(\"pcrm_pipeView\")||\"pills\");\n  const [search,setSearch]=useState(\"\");\n  const [sortField,setSortField]=useState(\"totalScore\");\n  const [sortDir,setSortDir]=useState(\"desc\");\n  const [deleteId,setDeleteId]=useState(null);\n  const [hoverRow,setHoverRow]=useState(null);\n  const [csvText,setCsvText]=useState(\"\");\n  const [showCsv,setShowCsv]=useState(false);\n  const [reminderFlash,setReminderFlash]=useState(null);\n\n  const openLead=openLeadId?leads.find(function(l){return l.id===openLeadId;})||null:null;\n\n  function toggleSort(f){if(f===sortField)setSortDir(function(d){return d===\"desc\"?\"asc\":\"desc\";});else{setSortField(f);setSortDir(\"desc\");}}\n\n  const filtered=useMemo(function(){\n    return leads\n      .filter(function(l){return filterSt===\"all\"||l.status===filterSt;})\n      .filter(function(l){if(filterPipe===\"all\")return true;if(filterPipe===\"none\")return pipeStage(l)===PIPE_NONE;return pipeStage(l)===parseInt(filterPipe,10);})\n      .filter(function(l){return !filterBlock||isBlocked(l);})\n      .filter(function(l){if(!search)return true;var q=search.toLowerCase(),contactMatch=(l.contacts||[]).some(function(c){return(c.name||\"\").toLowerCase().indexOf(q)>=0||(c.email||\"\").toLowerCase().indexOf(q)>=0||(c.title||\"\").toLowerCase().indexOf(q)>=0;});return(l.company||\"\").toLowerCase().indexOf(q)>=0||contactMatch||(l.industry||\"\").toLowerCase().indexOf(q)>=0||(l.notes||\"\").toLowerCase().indexOf(q)>=0||(l.logEntries||[]).some(function(e){return(e.content||\"\").toLowerCase().indexOf(q)>=0;});})\n      .sort(function(a,b){\n        if(!filterBlock){if(isBlocked(a)&&!isBlocked(b))return -1;if(!isBlocked(a)&&isBlocked(b))return 1;}\n        let av=a[sortField]!==undefined?a[sortField]:\"\",bv=b[sortField]!==undefined?b[sortField]:\"\";\n        if(typeof av===\"string\"){av=av.toLowerCase();bv=(bv||\"\").toLowerCase();}\n        return sortDir===\"desc\"?(bv>av?1:-1):(av>bv?1:-1);\n      });\n  },[leads,filterSt,filterPipe,filterBlock,search,sortField,sortDir]);\n\n  function importCSV(){\n    const lines=csvText.trim().split(\"\\\n\").filter(Boolean);if(lines.length<2)return;\n    const headers=lines[0].split(\",\").map(function(h){return h.trim().toLowerCase().replace(/\\s+/g,\"\");});\n    function get(row){for(let ki=1;ki<arguments.length;ki++){const idx=headers.indexOf(arguments[ki]);if(idx!==-1&&row[idx]!==undefined)return row[idx];}return\"\";}\n    const nl=lines.slice(1).map(function(line,i){\n      const v=line.split(\",\").map(function(x){return x.trim().replace(/^\"|\"$/g,\"\");});\n      const scores={decisionMaker:parseInt(get(v,\"decisionmaker\",\"dm\"))||5,engagement:parseInt(get(v,\"engagement\",\"intent\"))||5,companySize:parseInt(get(v,\"companysize\",\"size\",\"revenue\"))||5,industryFit:parseInt(get(v,\"industryfit\"))||5,budget:parseInt(get(v,\"budget\"))||5,painPoint:parseInt(get(v,\"painpoint\",\"pain\"))||5};\n      const cn=get(v,\"contact\",\"contactname\",\"name\");\n      return makeLead({company:get(v,\"company\",\"companyname\")||(\"Lead \"+(i+1)),industry:get(v,\"industry\"),website:get(v,\"website\",\"url\"),notes:get(v,\"notes\",\"description\"),source:\"CSV Import\",status:\"new\",contacts:cn?[makeContact({name:cn,title:get(v,\"title\",\"role\"),linkedin:get(v,\"linkedin\"),phone:get(v,\"phone\")})]:[],scores:scores},weights);\n    });\n    onAdd(nl);setCsvText(\"\");setShowCsv(false);\n  }\n\n  function handleSave(data){\n    const leadRef=editLead||{id:null,company:data.company,contacts:data.contacts||[]};\n    const parsed=parseSmartNotes(data.notes||\"\",leadRef);\n    const cleanData=Object.assign({},data,{notes:parsed.cleanNotes});\n    if(editLead){\n      onEdit(Object.assign({},editLead,cleanData,{id:editLead.id,aiPitch:editLead.aiPitch||\"\",createdAt:editLead.createdAt,pipeline:editLead.pipeline!==undefined?editLead.pipeline:PIPE_NONE,pipelineHistory:editLead.pipelineHistory||[],blocker:editLead.blocker||null,blockerHistory:editLead.blockerHistory||[],logEntries:editLead.logEntries||[],summary:editLead.summary||{},totalScore:calcScore(cleanData.scores||{},weights)}));\n    }else{\n      const newLead=makeLead(cleanData,weights);\n      parsed.newReminders.forEach(function(r){r.linkedLeadId=newLead.id;});\n      onAdd([newLead]);\n    }\n    if(parsed.newReminders.length>0&&onAddReminder){\n      parsed.newReminders.forEach(function(r){onAddReminder(r);});\n      setReminderFlash(parsed.newReminders[0]);\n      setTimeout(function(){setReminderFlash(null);},5000);\n    }\n    setShowForm(false);setEditLead(null);\n  }\n\n  const snap=useMemo(function(){return computeSnapshot(leads);},[leads]);\n  const PIPE_STRIP=[{label:\"Unstarted\",clr:C.muted,key:\"none\"}].concat(PIPE.map(function(p){return{label:p.code,clr:p.clr,key:String(p.id)};}));\n\n  return(\n    <div style={{display:\"flex\",gap:0,height:\"100%\",overflow:\"hidden\"}}>\n      {/* Main content */}\n      <div style={{flex:1,overflow:\"auto\",padding:\"20px 24px 40px\",minWidth:0}}>\n        {/* Pipeline view toggle */}\n        <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"flex-end\",marginBottom:4}}>\n          <div style={{display:\"flex\",gap:2}}>\n            <button onClick={function(){setPipeView(\"pills\");localStorage.setItem(\"pcrm_pipeView\",\"pills\");}} style={{background:\"transparent\",border:\"none\",padding:\"2px 6px\",cursor:\"pointer\",color:pipeView===\"pills\"?\"#FECA57\":\"#555\",fontSize:10,fontFamily:\"'Barlow Condensed',sans-serif\"}}>pills</button>\n            <button onClick={function(){setPipeView(\"bars\");localStorage.setItem(\"pcrm_pipeView\",\"bars\");}} style={{background:\"transparent\",border:\"none\",padding:\"2px 6px\",cursor:\"pointer\",color:pipeView===\"bars\"?\"#FECA57\":\"#555\",fontSize:10,fontFamily:\"'Barlow Condensed',sans-serif\"}}>bars</button>\n          </div>\n        </div>\n\n        {pipeView===\"pills\"&&(\n        <div style={{display:\"flex\",gap:5,flexWrap:\"wrap\",marginBottom:16}}>\n          {PIPE_STRIP.map(function(ps,idx){\n            var si=ps.key===\"none\"?PIPE_NONE:parseInt(ps.key,10);\n            var cnt=leads.filter(function(l){return pipeStage(l)===si;}).length;\n            var active=filterPipe===ps.key;\n            var stageClrs=[\"#1B5E3B\",\"#2E8B57\",\"#3CB371\",\"#555\",\"#50E88A\",\"#0BE881\",\"#0BE881\"];\n            var clr=cnt>0?(stageClrs[idx]||\"#888\"):\"#333\";\n            var dark=idx<=1||idx===3;\n            var txtClr=cnt>0?(dark?\"#E8E8E8\":\"#0F0F0F\"):\"#555\";\n            var lblClr=cnt>0?(dark?\"#BBB\":\"#1A1A1A\"):\"#555\";\n            return(\n              <div key={ps.key} onClick={function(){setFilterPipe(filterPipe===ps.key?\"all\":ps.key);}}\n                style={{background:clr,borderRadius:20,padding:isMobile?\"5px 10px\":\"7px 16px\",cursor:\"pointer\",display:\"flex\",alignItems:\"center\",gap:5,border:active?\"1px solid #FECA57\":\"1px solid transparent\",transition:\"all .15s\"}}>\n                <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:isMobile?14:20,fontWeight:700,color:txtClr}}>{cnt}</span>\n                <svg width=\"10\" height=\"10\" viewBox=\"0 0 10 10\" style={{flexShrink:0}}>{idx<=0?<circle cx=\"5\" cy=\"5\" r=\"3.5\" fill=\"none\" stroke={lblClr} strokeWidth=\"1.5\"/>:idx===1?<circle cx=\"5\" cy=\"5\" r=\"3.5\" fill={lblClr}/>:idx===2?<rect x=\"1.5\" y=\"1.5\" width=\"7\" height=\"7\" rx=\"1\" fill={lblClr}/>:idx===3?<rect x=\"1.5\" y=\"1.5\" width=\"7\" height=\"7\" rx=\"1\" fill=\"none\" stroke={lblClr} strokeWidth=\"1.5\"/>:idx===4?<polygon points=\"5,1 9,5 5,9 1,5\" fill={lblClr}/>:idx===5?<polygon points=\"5,0.5 6.5,3.5 10,3.5 7.5,5.5 8.5,9 5,7 1.5,9 2.5,5.5 0,3.5 3.5,3.5\" fill={lblClr}/>:<circle cx=\"5\" cy=\"5\" r=\"3.5\" fill={lblClr}/>}</svg>\n                <span style={{fontSize:isMobile?9:11,color:lblClr,letterSpacing:0.5,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600}}>{ps.label}</span>\n              </div>\n            );\n          })}\n        </div>\n        )}\n\n        {pipeView===\"bars\"&&(\n        <div style={{display:\"flex\",flexDirection:\"column\",gap:3,marginBottom:16}}>\n          {PIPE_STRIP.map(function(ps,idx){\n            var si=ps.key===\"none\"?PIPE_NONE:parseInt(ps.key,10);\n            var cnt=leads.filter(function(l){return pipeStage(l)===si;}).length;\n            var active=filterPipe===ps.key;\n            var stageClrs=[\"#1B5E3B\",\"#2E8B57\",\"#3CB371\",\"#555\",\"#50E88A\",\"#0BE881\",\"#0BE881\"];\n            var clr=cnt>0?(stageClrs[idx]||\"#888\"):\"#333\";\n            var pct=leads.length>0?Math.round(cnt/leads.length*100):0;\n            return(\n              <div key={ps.key} onClick={function(){setFilterPipe(filterPipe===ps.key?\"all\":ps.key);}}\n                style={{display:\"flex\",alignItems:\"center\",gap:8,cursor:\"pointer\",opacity:active?1:0.85,padding:\"1px 0\"}}>\n \n  const yearStart=new Date(now.getFullYear(),0,1);\n  const qStart=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1);\n  const closed=leads.filter(function(l){return pipeStage(l)===4;});\n  const closedThisYear=closed.filter(function(l){var d=new Date(l.closedAt||l.createdAt);return d>=yearStart;});\n  const closedThisQ=closed.filter(function(l){var d=new Date(l.closedAt||l.createdAt);return d>=qStart;});\n  const totalRevYear=closedThisYear.reduce(function(a,l){return a+(l.dealValue||0);},0);\n  const netNewNames=closedThisYear.length;\n  const acvActual=netNewNames>0?Math.round(totalRevYear/netNewNames):0;\n  const newAccountsQ=closedThisQ.length;\n  const totalAccounts=closed.length;\n\n\n  function pct(actual,target){if(!target)return 0;return Math.min(Math.round((actual/target)*100),150);}\n  function ragClr(p){return p>=100?C.acc:p>=70?C.warn:C.danger;}\n\n  const pipelineValue=leads.filter(function(l){return pipeStage(l)!==4;}).reduce(function(a,l){return a+(l.dealValue||l.scores?(l.dealValue||Math.round(calcScore(l.scores||{},{})/100*(kpi.acv||50000))):0);},0);\n  const KPI_ROWS=[\n    {key:\"netNewNames\",   label:\"Net New Logos / Year\",  unit:\"\",  actual:netNewNames,    fmt:function(v){return v.toString();},           auto:true,  desc:\"New clients closed this year\"},\n    {key:\"acv\",           label:\"Avg Deal Size (ACV)\",   unit:cur, actual:acvActual,      fmt:function(v){return fmtK(v,cur);},            auto:true,  desc:\"Average annual contract value\"},\n    {key:\"pipelineValue\", label:\"Pipeline Value\",        unit:cur, actual:pipelineValue,  fmt:function(v){return fmtK(v,cur);},            auto:true,  desc:\"Total value of active opportunities\"},\n\n  ];\n\n  /* \\u2500\\u2500 Pipeline Coverage & Stage Conversion \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\n  var STAGE_WE
