<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
#root{zoom:0.82}
body{background:#0F0F0F;color:#E8E8E8;font-family:'Barlow',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
input[type=range]{cursor:pointer}
input[type=date],input[type=time]{color-scheme:dark}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
select option{background:#1A1A1A;color:#E8E8E8}
textarea{font-family:'Barlow',sans-serif}
a{color:#60B4FF;text-decoration:none}

.panel-slide{animation:slideIn 0.2s ease-out}

button{transition:opacity 0.12s,background 0.12s}
@media(max-width:767px){
  #root{zoom:1 !important}
  .panel-slide{animation:slideUp 0.2s ease-out}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
  input,textarea,select{font-size:16px !important}
}
@media(min-width:768px) and (max-width:1023px){
  #root{zoom:0.88 !important}
}

<div id="pw-gate" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0F0F0F;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Barlow',system-ui,sans-serif">
  <div style="text-align:center;max-width:320px;padding:24px">
    <div style="font-size:24px;font-weight:700;color:#F0F0F0;letter-spacing:2px;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif">PCRM</div>
    <div style="font-size:12px;color:#888;margin-bottom:24px">Enter password to continue</div>
    <input id="pw-input" type="password" placeholder="Password..." style="width:100%;padding:10px 14px;background:#1A1A1A;border:1px solid #333;border-radius:5px;color:#F0F0F0;font-size:14px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:12px" autofocus/>
    <button id="pw-btn" style="width:100%;padding:10px;background:#E8E8E8;border:none;border-radius:5px;color:#0F0F0F;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.8px;cursor:pointer;text-transform:uppercase">Enter</button>
    <div id="pw-err" style="color:#FF6B6B;font-size:11px;margin-top:10px;display:none">Incorrect password</div>
    <div style="font-size:9px;color:#555;margin-top:20px">Change password in Settings after login</div>
  </div>
</div>
<script>
(function(){
  var HASH="8f6360fafdc48eb199caf501f237dcf2e4e1d01a6ff4b64db222645617814a97";
  var stored=localStorage.getItem("pcrm_pw_hash");
  if(stored&&stored===HASH){document.getElementById("pw-gate").style.display="none";}
  else{
    var custom=localStorage.getItem("pcrm_custom_pw");
    if(custom){HASH=custom;}
    if(localStorage.getItem("pcrm_auth")==="1"&&Date.now()-parseInt(localStorage.getItem("pcrm_auth_time")||"0")<86400000){
      document.getElementById("pw-gate").style.display="none";
    }
  }
  async function sha256(msg){var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");}
  async function check(){
    var inp=document.getElementById("pw-input").value;
    var hash=await sha256(inp);
    var customHash=localStorage.getItem("pcrm_custom_pw");
    if(hash===HASH||hash===customHash){
      document.getElementById("pw-gate").style.display="none";
      localStorage.setItem("pcrm_auth","1");
      localStorage.setItem("pcrm_auth_time",String(Date.now()));
    }else{document.getElementById("pw-err").style.display="block";}
  }
  document.getElementById("pw-btn").onclick=check;
  document.getElementById("pw-input").onkeydown=function(e){if(e.key==="Enter")check();};

  /* Biometric auth (Face ID / Touch ID / Fingerprint) */
  var bioAvail=window.PublicKeyCredential&&window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable;
  if(bioAvail){
    bioAvail.call(window.PublicKeyCredential).then(function(avail){
      if(!avail)return;
      var bioReg=localStorage.getItem("pcrm_bio_registered");
      if(bioReg==="1"){
        /* Auto-trigger biometric on load */
        document.getElementById("pw-err").style.display="none";
        tryBiometric();
      }
    });
  }
  async function tryBiometric(){
    try{
      var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
      var credId=localStorage.getItem("pcrm_bio_cred");
      if(!credId)return;
      var idBytes=Uint8Array.from(atob(credId),function(c){return c.charCodeAt(0);});
      var assertion=await navigator.credentials.get({publicKey:{
        challenge:challenge,
        rpId:location.hostname,
        allowCredentials:[{id:idBytes,type:"public-key",transports:["internal"]}],
        userVerification:"required",
        timeout:60000
      }});
      if(assertion){
        document.getElementById("pw-gate").style.display="none";
        localStorage.setItem("pcrm_auth","1");
        localStorage.setItem("pcrm_auth_time",String(Date.now()));
      }
    }catch(e){console.log("Bio auth cancelled or failed:",e.message);}
  }
  /* Add biometric button if supported */
  if(bioAvail){
    bioAvail.call(window.PublicKeyCredential).then(function(avail){
      if(!avail)return;
      var bioBtn=document.createElement("button");
      bioBtn.id="bio-btn";
      bioBtn.innerHTML=localStorage.getItem("pcrm_bio_registered")==="1"?"&#128275; Use Face ID / Fingerprint":"&#128275; Set up biometric after login";
      bioBtn.style.cssText="width:100%;padding:10px;background:transparent;border:1px solid #333;border-radius:5px;color:#FECA57;font-size:12px;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:0.8px;cursor:pointer;margin-top:8px";
      if(localStorage.getItem("pcrm_bio_registered")==="1"){bioBtn.onclick=tryBiometric;}
      else{bioBtn.onclick=function(){document.getElementById("pw-err").textContent="Enter password first, then biometric will be set up";document.getElementById("pw-err").style.display="block";document.getElementById("pw-err").style.color="#FECA57";};}
      document.getElementById("pw-btn").parentNode.insertBefore(bioBtn,document.getElementById("pw-btn").nextSibling);
    });
  }
  /* After successful password login, offer to register biometric */
  var origCheck=check;
  check=async function(){
    var inp=document.getElementById("pw-input").value;
    var hash=await sha256(inp);
    var customHash=localStorage.getItem("pcrm_custom_pw");
    var HASH2="8f6360fafdc48eb199caf501f237dcf2e4e1d01a6ff4b64db222645617814a97";
    if(hash===HASH2||hash===customHash){
      /* Password correct — register biometric if available and not yet registered */
      document.getElementById("pw-gate").style.display="none";
      localStorage.setItem("pcrm_auth","1");
      localStorage.setItem("pcrm_auth_time",String(Date.now()));
      if(bioAvail&&localStorage.getItem("pcrm_bio_registered")!=="1"){
        bioAvail.call(window.PublicKeyCredential).then(function(avail){
          if(!avail)return;
          if(confirm("Enable Face ID / Fingerprint for future logins?")){registerBiometric();}
        });
      }
    }else{document.getElementById("pw-err").style.display="block";document.getElementById("pw-err").style.color="#FF6B6B";document.getElementById("pw-err").textContent="Incorrect password";}
  };
  async function registerBiometric(){
    try{
      var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
      var userId=new Uint8Array(16);crypto.getRandomValues(userId);
      var cred=await navigator.credentials.create({publicKey:{
        challenge:challenge,
        rp:{name:"PCRM",id:location.hostname},
        user:{id:userId,name:"pcrm-user",displayName:"PCRM User"},
        pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],
        authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},
        timeout:60000
      }});
      if(cred){
        var credId=btoa(String.fromCharCode.apply(null,new Uint8Array(cred.rawId)));
        localStorage.setItem("pcrm_bio_cred",credId);
        localStorage.setItem("pcrm_bio_registered","1");
      }
    }catch(e){console.log("Bio registration failed:",e.message);}
  }
  document.getElementById("pw-btn").onclick=check;
  document.getElementById("pw-input").onkeydown=function(e){if(e.key==="Enter")check();};
})();
</script>

ton onClick={function(){setEditing(true);}} title=\"Edit\" style={{...BTN.sm,padding:\"3px 7px\",fontSize:11}}>\u270f</button>\n            <button onClick={function(){onDelete(r.id);}} title=\"Delete\" style={{...BTN.danger,padding:\"3px 7px\",fontSize:11}}>\u2715</button>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* \\u2500\\u2500 MILESTONE PANEL \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\nfunction MilestonePanel({leadPipeline,onAdvance,onClose,currency}){\n  const [note,setNote]=useState(\"\");\n  const [dealVal,setDealVal]=useState(\"\");\n  const nextIdx=(typeof leadPipeline===\"number\"&&leadPipeline>=0)?leadPipeline+1:0;\n  const isFinish=nextIdx>=PIPE.length,target=isFinish?null:PIPE[nextIdx],isFirst=nextIdx===0;\n  const isClosing=nextIdx===4;\n  if(isFinish)return(\n    <div style={{background:\"rgba(11,232,129,0.05)\",border:\"1px solid rgba(11,232,129,0.2)\",borderRadius:C.radius,padding:14,marginTop:8}}>\n      <div style={{color:C.acc,fontSize:12,fontWeight:700,marginBottom:4}}>All milestones complete \u2014 deal is On The Wire</div>\n      <button onClick={onClose} style={{...BTN.sm,marginTop:6}}>Close</button>\n    </div>\n  );\n  return(\n    <div style={{background:C.surf2,border:\"1px solid \"+(isClosing?C.acc+\"44\":C.line),borderRadius:C.radius,padding:14,marginTop:8}}>\n      <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:10}}>\n        <div style={{width:2,height:14,background:target.clr,borderRadius:1}}/>\n        <div>\n          <div style={{fontSize:12,fontWeight:700,color:target.clr,textTransform:\"uppercase\",letterSpacing:0.5}}>{isFirst?\"Start: \":\"Advance to: \"}{target.code}</div>\n          <div style={{color:C.muted,fontSize:11,marginTop:1}}>{target.sub}</div>\n        </div>\n      </div>\n      {isClosing&&(\n        <div style={{background:\"rgba(11,232,129,0.04)\",border:\"1px solid rgba(11,232,129,0.2)\",borderRadius:C.radiusSm,padding:\"10px 12px\",marginBottom:10}}>\n          <div style={{fontSize:11,fontWeight:700,color:C.acc,marginBottom:6}}>Deal value (annual contract)</div>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n            <span style={{color:C.acc,fontSize:14,fontWeight:700}}>{currency||\"\u20ac\"}</span>\n            <input type=\"number\" min=\"0\" step=\"1000\" value={dealVal} onChange={function(e){setDealVal(e.target.value);}}\n              style={{...INP,fontSize:14,fontWeight:700,color:C.acc,flex:1}} placeholder=\"e.g. 48000\"/>\n            <span style={{color:C.muted,fontSize:11}}>/year</span>\n          </div>\n          {dealVal&&<div style={{color:C.muted,fontSize:10,marginTop:4}}>{currency||\"\u20ac\"}{Math.round(parseFloat(dealVal)/4).toLocaleString()} per quarter</div>}\n        </div>\n      )}\n      <span style={{...LBL,display:\"block\",marginBottom:4}}>Note {isClosing?\"(closing notes)\":\"(optional)\"}</span>\n      <textarea value={note} onChange={function(e){setNote(e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",marginBottom:8}} placeholder={isClosing?\"Any closing notes, conditions, next steps\u2026\":(isFirst?\"How did you initiate contact?\":\"What happened here?\")}/>\n      <div style={{display:\"flex\",gap:6}}>\n        <button onClick={function(){onAdvance(nextIdx,note.trim(),isClosing?parseFloat(dealVal)||0:undefined);setNote(\"\");setDealVal(\"\");}} style={{...BTN.primary,background:target.clr,fontSize:12,padding:\"7px 16px\"}}>{isClosing?\"Close Deal \u2713\":\"Confirm\"}</button>\n        {isFirst&&<button onClick={function(){onAdvance(nextIdx,\"\",undefined);}} style={{...BTN.sm,color:target.clr,borderColor:target.clr+\"44\"}}>Quick start</button>}\n        <button onClick={onClose} style={BTN.secondary}>Cancel</button>\n      </div>\n    </div>\n  );\n}\n\nfunction PipelineHistory({history}){\n  if(!Array.isArray(history)||history.length===0)return <div style={{color:C.muted,fontSize:12,padding:\"4px 0\"}}>No milestone history yet.</div>;\n  return(\n    <div style={{display:\"flex\",flexDirection:\"column\",gap:5}}>\n      {[].concat(history).reverse().map(function(h,i){\n        const s=(h.stage>=0&&h.stage<PIPE.length)?PIPE[h.stage]:null,c=s?s.clr:C.muted;\n        return(\n          <div key={i} style={{display:\"flex\",gap:8,alignItems:\"flex-start\"}}>\n            <div style={{width:2,background:c,alignSelf:\"stretch\",borderRadius:1,flexShrink:0,minHeight:14,marginTop:2}}/>\n            <div>\n              <div style={{display:\"flex\",gap:8,alignItems:\"center\"}}>\n                <span style={{fontSize:11,fontWeight:700,color:c,letterSpacing:0.5,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{s?s.code:\"?\"}</span>\n                <span style={{color:C.muted,fontSize:10,fontFamily:\"'DM Mono',monospace\"}}>{fmtDate(h.timestamp)}</span>\n              </div>\n              {h.note&&<div style={{color:C.dim,fontSize:12,marginTop:1,lineHeight:1.5}}>{h.note}</div>}\n            </div>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\nfunction ContactsEditor({contacts,onChange}){\n  function add(){onChange([].concat(contacts,[makeContact()]));}\n  function remove(id){onChange(contacts.filter(function(c){return c.id!==id;}));}\n  function update(id,field,val){\n    var updated=contacts.map(function(c){return c.id===id?Object.assign({},c,{[field]:val}):c;});\n    if(field===\"name\"){\n      var ct=updated.find(function(c){return c.id===id;});\n      if(ct&&!ct.email){\n        var domain=\"\";contacts.forEach(function(c){if(c.email&&c.email.indexOf(\"@\")>0&&!domain)domain=c.email.split(\"@\")[1];});\n        if(domain&&ct.name&&ct.name.trim()){\n          var parts=ct.name.trim().toLowerCase().split(/\\s+/);\n          if(parts.length>=2){var suggested=parts[0]+\".\"+parts[parts.length-1]+\"@\"+domain;\n            updated=updated.map(function(c){return c.id===id?Object.assign({},c,{emailSuggestion:suggested}):c;});}\n        }\n      }\n    }\n    if(field===\"email\")updated=updated.map(function(c){return c.id===id?Object.assign({},c,{emailSuggestion:\"\"}):c;});\n    onChange(updated);\n  }\n  return(\n    <div>\n      <div style={{display:\"flex\",alignItems:\"center\",marginBottom:10}}>\n        <span style={{...LBL,margin:0}}>Contacts</span>\n        <button onClick={add} style={{...BTN.sm,marginLeft:\"auto\",color:\"#888888\",borderColor:\"#88888844\"}}>+ Add</button>\n      </div>\n      {contacts.length===0&&<div style={{color:C.muted,fontSize:12,padding:\"8px 0\",fontStyle:\"italic\"}}>No contacts yet.</div>}\n      {contacts.map(function(ct,idx){return(\n        <div key={ct.id} style={{background:ct.optedOut?\"rgba(255,107,107,0.04)\":C.surf2,borderRadius:C.radiusSm,padding:\"12px 14px\",marginBottom:8,borderLeft:\"2px solid \"+(ct.optedOut?C.danger:(idx===0?\"#FECA57\":C.line))}}>\n          <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:8}}>\n            <div style={{display:\"flex\",alignItems:\"center\",gap:6}}>\n              <span style={{fontSize:10,fontWeight:700,color:ct.optedOut?C.danger:(idx===0?\"#FECA57\":C.muted),letterSpacing:0.8,fontFamily:\"'Barlow Condensed',sans-serif\",textTransform:\"uppercase\"}}>{idx===0?\"Primary\":\"Contact \"+(idx+1)}</span>\n              {ct.optedOut&&<span style={{fontSize:8,color:C.danger,fontWeight:700,background:\"rgba(255,107,107,0.12)\",padding:\"1px 5px\",borderRadius:3}}>OPTED OUT</span>}\n            </div>\n            <div style={{display:\"flex\",gap:4,alignItems:\"center\"}}>\n              {!ct.optedOut?<button onClick={function(){var reason=prompt(\"Reason for opt-out:\");if(reason!==null)update(ct.id,\"optedOut\",true);update(ct.id,\"optOutReason\",reason||\"No reason given\");}} style={{...BTN.sm,fontSize:9,padding:\"2px 6px\",color:C.danger,borderColor:C.danger+\"33\"}} title=\"Opt out this contact from all emails\">Opt Out</button>\n              :<span onContextMenu={function(e){e.preventDefault();if(confirm(\"Remove opt-out for \"+ct.name+\"?\")){update(ct.id,\"optedOut\",false);update(ct.id,\"optOutReason\",\"\");}}} style={{fontSize:8,color:C.muted,cursor:\"context-menu\"}} title=\"Right-click to remove opt-out\">{ct.optOutReason||\"Opted out\"}</span>}\n              <button onClick={function(){remove(ct.id);}} style={{...BTN.icon,color:C.danger,fontSize:12}}>x Remove</button>\n            </div>\n          </div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:8,marginBottom:8}}>\n            {[[\"Name\",\"name\"],[\"Title\",\"title\"],[\"Email\",\"email\"],[\"Phone\",\"phone\"]].map(function(p){return(\n              <div key={p[1]}>\n                <span style={LBL}>{p[0]}</span>\n                <input value={ct[p[1]]||\"\"} onChange={function(e){update(ct.id,p[1],e.target.value);}} style={{...INP,fontSize:12}} placeholder={p[1]===\"email\"?\"name@company.com\":\"\u2014\"}/>\n                {p[1]===\"email\"&&!ct.email&&ct.emailSuggestion&&(\n                  <div onClick={function(){update(ct.id,\"email\",ct.emailSuggestion);}} style={{fontSize:9,color:\"#BBBBBB\",marginTop:3,cursor:\"pointer\",fontFamily:\"'DM Mono',monospace\"}}>Suggest: {ct.emailSuggestion}</div>\n                )}\n              </div>\n            );})}\n          </div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:8}}>\n            <div><span style={LBL}>LinkedIn</span><input value={ct.linkedin||\"\"} onChange={function(e){update(ct.id,\"linkedin\",e.target.value);}} style={{...INP,fontSize:12}} placeholder=\"\u2014\"/></div>\n            <div><span style={LBL}>Last Contacted</span><input type=\"date\" value={ct.lastContacted||\"\"} onChange={function(e){update(ct.id,\"lastContacted\",e.target.value);}} style={{...INP,fontSize:12}}/></div>\n          </div>\n        </div>\n      );})}\n    </div>\n  );\n}\n\nfunction BlockerPanel({blocker,blockerHistory,onAdd,onResolve,onRemove,onClose}){\n  const [mode,setMode]=useState(\"view\");\n  const [bType,setBType]=useState(\"internal\");\n  const [bDesc,setBDesc]=useState(\"\");\n  const [res,setRes]=useState(\"\");\n  const hist=Array.isArray(blockerHistory)?blockerHistory:[];\n  function handleAdd(){if(!bDesc.trim())return;onAdd(bType,bDesc.trim());setBDesc(\"\");setMode(\"view\");}\n  function handleResolve(){onResolve(res.trim());setRes(\"\");setMode(\"view\");}\n  return(\n    <div style={{background:C.surf2,border:\"1px solid rgba(255,107,107,0.2)\",borderRadius:C.radius,padding:14}}>\n      <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:12}}>\n        <div style={{width:2,height:14,background:C.danger,borderRadius:1}}/>\n        <span style={{fontSize:12,fontWeight:700,color:C.danger,letterSpacing:0.5,fontFamily:\"'Barlow Condensed',sans-serif\",textTransform:\"uppercase\"}}>Blocker</span>\n        <div style={{flex:1}}/><button onClick={onClose} style={BTN.icon}>\u00d7</button>\n      </div>\n      {blocker?(\n        <div>\n          <div style={{background:\"rgba(255,107,107,0.06)\",border:\"1px solid rgba(255,107,107,0.2)\",borderRadius:C.radiusSm,padding:\"10px 12px\",marginBottom:10}}>\n            <div style={{display:\"flex\",alignItems:\"center\",gap:6,marginBottom:4}}>\n              <Tag label={(blocker.type||\"internal\")+\" blocker\"} clr={C.danger}/>\n              <span style={{color:C.muted,fontSize:10,fontFamily:\"'DM Mono',monospace\"}}>{fmtDate(blocker.createdAt)}</span>\n            </div>\n            <div style={{color:C.dim,fontSize:13,lineHeight:1.5}}>{blocker.description}</div>\n          </div>\n          {mode===\"resolve\"?(\n            <div>\n              <span style={{...LBL,marginBottom:5}}>Resolution note</span>\n              <textarea value={res} onChange={function(e){setRes(e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",marginBottom:8}} placeholder=\"How was this resolved?\"/>\n              <div style={{display:\"flex\",gap:6}}>\n                <button onClick={handleResolve} style={BTN.smGreen}>\u2713 Confirm</button>\n                <button onClick={function(){setMode(\"view\");}} style={BTN.secondary}>Cancel</button>\n              </div>\n            </div>\n          ):(\n            <div style={{display:\"flex\",gap:6}}>\n              <button onClick={function(){setMode(\"resolve\");}} style={BTN.smGreen}>\u2713 Mark resolved</button>\n              <button onClick={onRemove} style={BTN.smRed}>\u00d7 Remove</button>\n            </div>\n          )}\n        </div>\n      ):mode===\"add\"?(\n        <div>\n          <div style={{display:\"grid\",gridTemplateColumns:\"120px 1fr\",gap:8,marginBottom:8}}>\n            <div><span style={LBL}>Type</span>\n              <select value={bType} onChange={function(e){setBType(e.target.value);}} style={{...INP,fontSize:12}}>\n                {BLOCKER_TYPES.map(function(t){return <option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>;})}\n              </select>\n            </div>\n            <div><span style={LBL}>What's blocking this?</span>\n              <input value={bDesc} onChange={function(e){setBDesc(e.target.value);}} style={{...INP,fontSize:12}} placeholder=\"e.g. Waiting for legal sign-off\u2026\"/>\n            </div>\n          </div>\n          <div style={{display:\"flex\",gap:6}}>\n            <button onClick={handleAdd} style={BTN.smRed}>\u26d4 Add blocker</button>\n            <button onClick={function(){setMode(\"view\");}} style={BTN.secondary}>Cancel</button>\n          </div>\n        </div>\n      ):(\n        <button onClick={function(){setMode(\"add\");}} style={BTN.smRed}>\u26d4 Add blocker</button>\n      )}\n      {hist.length>0&&(\n        <div style={{borderTop:\"1px solid \"+C.line,marginTop:12,paddingTop:10}}>\n          <span style={{...LBL,marginBottom:6}}>Resolved</span>\n          {hist.map(function(h,i){return(\n            <div key={i} style={{marginBottom:6,paddingLeft:8,borderLeft:\"2px solid \"+C.line}}>\n              <div style={{display:\"flex\",gap:6,alignItems:\"center\",marginBottom:1}}>\n                <span style={{color:C.muted,fontSize:10,textTransform:\"uppercase\",letterSpacing:0.5,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{h.type}</span>\n                <span style={{color:C.muted,fontSize:9,fontFamily:\"'DM Mono',monospace\"}}>{fmtDateShort(h.resolvedAt)}</span>\n              </div>\n              <div style={{color:C.muted,fontSize:12}}>{h.description}</div>\n              {h.resolution&&<div style={{color:C.dim,fontSize:11,marginTop:1}}>\\u21b3 {h.resolution}</div>}\n            </div>\n          );})}\n        </div>\n      )}\n    </div>\n  );\n}\n\n/* \\u2500\\u2500 COMPANY PANEL \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\nfunction DealRoom({lead,onUpdate,icp,apiKey}){\n  var ps=pipeStage(lead);\n  var room=(lead.dealRoom||[]).slice();\n  var tplLinks=(icp&&icp.docTemplateLinks)||{};\n  const [expandedDoc,setExpandedDoc]=useState(null);\n  const [voiceDocId,setVoiceDocId]=useState(null);\n  const [listening,setListening]=useState(false);\n  const [transcript,setTranscript]=useState(\"\");\n  const recognitionRef=useRef(null);\n\n  function getSuggested(){\n    var existing=room.map(function(d){return d.docType;});\n    var suggested=[];\n    DEAL_DOCS.forEach(function(doc){\n      if(existing.indexOf(doc.id)<0&&doc.stages.some(function(s){return s<=ps;})){\n        suggested.push(doc);\n      }\n    });\n    return suggested;\n  }\n  function addDoc(docDef){\n    var tplLink=tplLinks[docDef.id]||\"\";\n    var newDoc={id:uid(\"dr\"),docType:docDef.id,name:docDef.name,category:docDef.category,status:\"needed\",owner:\"\",dueDate:\"\",notes:\"\",link:\"\",templateLink:tplLink,fileName:\"\",fileData:\"\",addedAt:new Date().toISOString()};\n    onUpdate({dealRoom:[].concat(room,[newDoc])});\n  }\n  function addCustom(){\n    var name=prompt(\"Document name:\");\n    if(!name||!name.trim())return;\n    var newDoc={id:uid(\"dr\"),docType:\"custom_\"+Date.now(),name:name.trim(),category:\"other\",status:\"needed\",owner:\"\",dueDate:\"\",notes:\"\",link:\"\",templateLink:\"\",fileName:\"\",fileData:\"\",addedAt:new Date().toISOString()};\n    onUpdate({dealRoom:[].concat(room,[newDoc])});\n  }\n  function updateDoc(docId,field,val){\n    onUpdate({dealRoom:room.map(function(d){return d.id===docId?Object.assign({},d,{[field]:val}):d;})});\n  }\n  function removeDoc(docId){\n    onUpdate({dealRoom:room.filter(function(d){return d.id!==docId;})});\n  }\n  function advanceStatus(docId){\n    var doc=room.find(function(d){return d.id===docId;});\n    if(!doc)return;\n    var idx=DOC_STATUSES.indexOf(doc.status);\n    if(idx<DOC_STATUSES.length-1){\n      updateDoc(docId,\"status\",DOC_STATUSES[idx+1]);\n    }\n  }\n  function handleFileDrop(e,docId){\n    e.preventDefault();e.stopPropagation();\n    var file=(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0])||(e.target&&e.target.files&&e.target.files[0]);\n    if(!file)return;\n    if(file.size>2*1024*1024){alert(\"File too large (max 2MB). Use a link instead.\");return;}\n    var reader=new FileReader();\n    reader.onload=function(ev){\n      updateDoc(docId,\"fileData\",ev.target.result);\n      updateDoc(docId,\"fileName\",file.name);\n    };\n    reader.readAsDataURL(file);\n  }\n  function startVoice(docId){\n    if(!window.webkitSpeechRecognition&&!window.SpeechRecognition){alert(\"Speech recognition not supported in this browser.\");return;}\n    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;\n    var rec=new SR();\n    rec.continuous=true;rec.interimResults=true;rec.lang=\"en-US\";\n    var finalText=\"\";\n    rec.onresult=function(ev){\n      var interim=\"\";\n      for(var i=ev.resultIndex;i<ev.results.length;i++){\n        if(ev.results[i].isFinal)finalText+=ev.results[i][0].transcript+\" \";\n        else interim+=ev.results[i][0].transcript;\n      }\n      setTranscript(finalText+interim);\n    };\n    rec.onerror=function(){setListening(false);setVoiceDocId(null);};\n    rec.onend=function(){\n      setListening(false);\n      if(finalText.trim()){\n        var doc=room.find(function(d){return d.id===docId;});\n        var existing=doc&&doc.notes||\"\";\n        updateDoc(docId,\"notes\",(existing?existing+\"\\\n\":\"\")+finalText.trim());\n      }\n      setVoiceDocId(null);setTranscript(\"\");\n    };\n    setVoiceDocId(docId);setListening(true);setTranscript(\"\");\n    recognitionRef.current=rec;\n    rec.start();\n  }\n  function stopVoice(){\n    if(recognitionRef.current){recognitionRef.current.stop();}\n  }\n\n  var suggested=getSuggested();\n  var totalDocs=room.length;\n  var approvedDocs=room.filter(function(d){return d.status===\"approved\";}).length;\n  var pct=totalDocs>0?Math.round(approvedDocs/totalDocs*100):0;\n  var categories=[];\n  room.forEach(function(d){if(categories.indexOf(d.category)<0)categories.push(d.category);});\n  var catLabels={legal:\"Legal\",commercial:\"Commercial\",technical:\"Technical\",compliance:\"Compliance\",operations:\"Operations\",other:\"Other\"};\n\n  return(\n    <div style={{marginTop:0}}>\n      {totalDocs>0&&(\n        <div style={{background:C.surf3,height:4,borderRadius:2,overflow:\"hidden\",marginBottom:10}}>\n          <div style={{width:pct+\"%\",height ry||{currentStatus:\"\",latestUpdate:\"\",goal:\"\",generatedAt:null});\n  const [showMile,setShowMile]=useState(false);\n  const [showBlocker,setShowBlocker]=useState(false);\n  const [showHistory,setShowHistory]=useState(false);\n  const [filterType,setFilterType]=useState(\"all\");\n  const noteRef=useRef(null);\n\n  useEffect(function(){\n    setSummaryDraft(lead.summary||{currentStatus:\"\",latestUpdate:\"\",goal:\"\",generatedAt:null});\n  },[lead.id]);\n\n  // Build unified timeline\n  const timeline=useMemo(function(){\n    const items=[];\n    // Log entries\n    (lead.logEntries||[]).forEach(function(e){\n      items.push({type:\"log\",date:e.timestamp||new Date().toISOString(),cat:e.category,label:(LOG_CATS[e.category]||LOG_CATS.note).label,icon:(LOG_CATS[e.category]||LOG_CATS.note).icon,clr:(LOG_CATS[e.category]||LOG_CATS.note).clr,text:e.content,id:e.id||uid(\"tl\")});\n    });\n    // Pipeline moves\n    (lead.pipelineHistory||[]).forEach(function(h){\n      const s=(h.stage>=0&&h.stage<PIPE.length)?PIPE[h.stage]:null;\n      items.push({type:\"pipeline\",date:h.timestamp,icon:\"\u25b6\",clr:s?s.clr:C.muted,label:\"Pipeline: \"+(s?s.code:\"?\"),text:h.note||\"\",id:\"pipe_\"+h.timestamp});\n    });\n    // Blocker history\n    (lead.blockerHistory||[]).forEach(function(h){\n      items.push({type:\"blocker_resolved\",date:h.resolvedAt||h.createdAt,icon:\"\u2713\",clr:\"#0BE881\",label:\"Blocker resolved (\"+h.type+\")\",text:h.description+(h.resolution?\" \u2192 \"+h.resolution:\"\"),id:\"bloc_\"+h.createdAt});\n    });\n    // Active blocker\n    if(lead.blocker){\n      items.push({type:\"blocker\",date:lead.blocker.createdAt,icon:\"\u26d4\",clr:C.danger,label:\"Blocker added (\"+lead.blocker.type+\")\",text:lead.blocker.description,id:\"active_bloc\"});\n    }\n    // Linked reminders\n    reminders.filter(function(r){return r.linkedLeadId===lead.id;}).forEach(function(r){\n      items.push({type:\"reminder\",date:r.createdAt||r.dueAt||new Date().to LowerCase();bv=(bv||\"\").toLowerCase();}\n        return sortDir===\"desc\"?(bv>av?1:-1):(av>bv?1:-1);\n      });\n  },[leads,filterSt,filterPipe,filterBlock,search,sortField,sortDir]);\n\n  function importCSV(){\n    const lines=csvText.trim().split(\"\\\n\").filter(Boolean);if(lines.length<2)return;\n    const headers=lines[0].split(\",\").map(function(h){return h.trim().toLowerCase().replace(/\\s+/g,\"\");});\n    function get(row){for(let ki=1;ki<arguments.length;ki++){const idx=headers.indexOf(arguments[ki]);if(idx!==-1&&row[idx]!==undefined)return row[idx];}return\"\";}\n    const nl=lines.slice(1).map(function(line,i){\n      const v=line.split(\",\").map(function(x){return x.trim().replace(/^\"|\"$/g,\"\");});\n      const scores={decisionMaker:parseInt(get(v,\"decisionmaker\",\"dm\"))||5,engagement:parseInt(get(v,\"engagement\",\"intent\"))||5,companySize:parseInt(get(v,\"companysize\",\"size\",\"revenue\"))||5,industryFit:parseInt(get(v,\"industryfit\"))||5,budget:parseInt(get(v,\"budget\"))||5,painPoint:parseInt(get(v,\"painpoint\",\"pain\"))||5};\n      const cn=get(v,\"contact\",\"contactname\",\"name\");\n      return makeLead({company:get(v,\"company\",\"companyname\")||(\"Lead \"+(i+1)),industry:get(v,\"industry\"),website:get(v,\"website\",\"url\"),notes:get(v,\"notes\",\"description\"),source:\"CSV Import\",status:\"new\",contacts:cn?[makeContact({name:cn,title:get(v,\"title\",\"role\"),linkedin:get(v,\"linkedin\"),phone:get(v,\"phone\")})]:[],scores:scores},weights);\n    });\n    onAdd(nl);setCsvText(\"\");setShowCsv(false);\n  }\n\n  function handleSave(data){\n    const leadRef=editLead||{id:null,company:data.company,contacts:data.contacts||[]};\n    const parsed=parseSmartNotes(data.notes||\"\",leadRef);\n    const cleanData=Object.assign({},data,{notes:parsed.cleanNotes});\n    if(editLead){\n      onEdit(Object.assign({},editLead,cleanData,{id:editLead.id,aiPitch:editLead.aiPitch||\"\",createdAt:editLead.createdAt,pipeline:editLead.pipeline ,color:\"#888888\",fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:1,textTransform:\"uppercase\"}}>Closed Won</span>\n        <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:16,color:C.acc,fontWeight:400}}>{closedLeads.length}</span>\n      </div>\n      {totalAnnual>0&&<div style={{marginBottom:6}}>\n        <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:18,color:C.acc,lineHeight:1}}>{cur}{totalAnnual.toLocaleString()}</div>\n        <div style={{color:C.muted,fontSize:9,marginTop:2}}>{cur}{totalQ.toLocaleString()} per quarter avg</div>\n      </div>}\n      {closedLeads.map(function(l){return(\n        <div key={l.id} style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginTop:4,paddingTop:4,borderTop:\"1px solid rgba(198,255,0,0.12)\"}}>\n          <span style={{color:C.dim,fontSize:11,overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\",maxWidth:100}}>\u2713 {l.company}</span>\n          <span style={{fontFamily:\"'DM Mono',monospace\",color:C.acc,fontSize:10}}>{l.dealValue?(cur+Math.round(l.dealValue/1000)+\"k/yr\"):\"\u2014\"}</span>\n        </div>\n      );})}\n      {closedLeads.length===0&&<div style={{color:C.muted,fontSize:11,fontStyle:\"italic\"}}>No closed deals yet</div>}\n    </div>\n    <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:C.radiusSm,padding:\"8px 10px\",marginBottom:4}}>\n      <div style={{...LBL,marginBottom:5}}>Revenue by quarter</div>\n      {qRevenue.map(function(rev,qi){const isCur=qi===currentQ;return(\n        <div key={qi} style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:3,padding:\"3px 6px\",borderRadius:3,background:isCur?\"rgba(11,232,129,0.04)\":\"transparent\",border:isCur?\"1px solid rgba(11,232,129,0.2)\":\"1px solid transparent\"}}>\n          <span style={{fontSize:9,color:isCur?C.acc:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700}}>{qNames[qi]}{isCur?\" \\u25c0\":\"\"}</span>\n          <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:10,color:rev>0?C.acc:C.muted}}>{rev>0?(cur+rev.toLocaleString()):\"\u2014\"}</span>\n        </div>\n      );})}\n    </div>\n  </div>;\n}\n\nfunction MatrixTab({isMobile,leads,reminders,icp}){\n  const [hoverId,setHoverId]=useState(null);\n  const [colorBy,setColorBy]=useState(\"score\");\n  const W=560,H=380,PAD=44;\n  const closedLeads=leads.filter(function(l){return pipeStage(l)===4;});\n    const plotted=useMemo(function(){\n    const now=new Date(),cutoff=new Date(now.getTime()+24*3600000);\n    const PIPE_EASE_BONUS  = [-1,0,8,15,22,28,35];\n    const PIPE_VALUE_BONUS = [-1,0,0, 0, 8,15,22];\n    const activeLeads=leads.filter(function(l){return pipeStage(l)!==4;});\n    return activeLeads.map(function(l){\n      const a=calcAxes(l.scores||{}),ps=pipeStage(l);\n      const easeBonus  = ps>=0 ? (PIPE_EASE_BONUS[ps+1]||0)  : 0;\n      const valueBonus = ps>=0 ? (PIPE_VALUE_BONUS[ps+1]||0) : 0;\n      const ease  = Math.min(98, a.ease  + easeBonus);\n      const value = Math.min(98, a.value + valueBonus);\n      const hasDue=(reminders||[]).some(function(r){return !r.done&&r.linkedLeadId===l.id&&new Date(r.dueAt)<=cutoff;});\n      return Object.assign({},l,{ease:ease,value:value,ps:ps,\n        dotClr:isBlocked(l)?C.danger:(colorBy===\"pipeline\"?pipeClr(ps):scoreClr(l.totalScore)),\n        ringClr:isBlocked(l)?C.danger:(colorBy===\"score\"?pipeClr(ps):scoreClr(l.totalScore)),\n        px:PAD+(ease/100)*(W-PAD*2),py:H-PAD-(value/100)*(H-PAD*2),\n        blocked:isBlocked(l),hasDueRem:hasDue});\n    });\n  },[leads,colorBy,reminders]);\n  const QUADS=[{x1:W/2,y1:PAD,x2:W-PAD,y2:H/2,lbl:\"QUICK WINS\",clr:\"#0BE881\"},{x1:PAD,y1:PAD,x2:W/2,y2:H/2,lbl:\"STRATEGIC\",clr:\"#FFE066\"},{x1:PAD,y1:H/2,x2:W/2,y2:H-PAD,lbl:\"DEPRIORITIZE\",clr:\"#888888\"},{x1:W/2,y1:H/2,x2:W-PAD,y2:H-PAD,lbl:\"LOW-HANGING\",clr:\"#FF9F43\"}];\n  return(\n    <div style={{display:\"grid\",gridTemp l)\",industry:account.industry||\"\",website:account.website||\"\",source:\"Upsell\",notes:\"Upsell opportunity from existing account: \"+account.company,status:\"contacted\",contacts:[].concat(account.contacts||[]),scores:{decisionMaker:7,engagement:7,companySize:account.scores&&account.scores.companySize||5,industryFit:account.scores&&account.scores.industryFit||5,budget:5,painPoint:5}};\n    onAddLead([newLead]);\n  }\n\n  return(\n    <div style={{display:\"flex\",height:\"100%\",overflow:\"hidden\"}}>\n      {/* Left: account list */}\n      <div style={{width:openAccount?380:undefined,flex:openAccount?undefined:1,borderRight:openAccount?\"1px solid \"+C.line:\"none\",display:\"flex\",flexDirection:\"column\",overflow:\"hidden\"}}>\n        {/* Summary bar */}\n        <div style={{padding:\"12px 20px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,background:C.surf,display:\"flex\",alignItems:\"center\",gap:24}}>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Total ARR</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.acc,lineHeight:1}}>{cur}{totalArr.toLocaleString()}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Accounts</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.text,lineHeight:1}}>{accounts.length}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>At risk</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.danger,lineHeight:1}}>{accounts.filter(function(a){return (a.accountData||{}).healthScore===\"at-risk\";}).length}</div>\n          </div>\n          <div>\n            <div style={{...LBL,marginBottom:2}}>Renewals 90d</div>\n            <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,fontWeight:400,color:C.warn,lineHeight:1}}>{accounts.filter(function(a){const d=daysUntil((a.ac                   })\n                )}\n              </div>\n            </div>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n\n/* \\u2500\\u2500 DEAL ROOM TAB \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\nfunction DealRoomTab({isMobile,leads,icp,apiKey,onUpdateLead,initialSelectedId,initialExpand,internalTeam,onTeamChange,qna,onQnaChange}){\n  const [selectedId,setSelectedId]=useState(initialSelectedId||null);\n  useEffect(function(){if(initialSelectedId)setSelectedId(initialSelectedId);},[initialSelectedId]);\n  const [filterCat,setFilterCat]=useState(\"all\");\n  const [expandedCard,setExpandedCard]=useState(initialExpand||null);\n  useEffect(function(){if(initialExpand)setExpandedCard(initialExpand);},[initialExpand]);\n  const [editingNotes,setEditingNotes]=useState(false);\n  const [notesDraft,setNotesDraft]=useState(\"\");\n  const [docGenType,setDocGenType]=useState(null);\n  const [docGenResult,setDocGenResult]=useState(\"\");\n  const [docGenLoading,setDocGenLoading]=useState(false);\n  const [showTeam,setShowTeam]=useState(false);\n  const [showDocTpls,setShowDocTpls]=useState(false);\n  const [showQna,setShowQna]=useState(false);\n  const [qnaSearch,setQnaSearch]=useState(\"\");\n  const [qnaAdd,setQnaAdd]=useState(false);\n  const [qnaQ,setQnaQ]=useState(\"\");\n  const [qnaA,setQnaA]=useState(\"\");\n  const [qnaCat,setQnaCat]=useState(\"General\");\n  const [qnaEditId,setQnaEditId]=useState(null);\n  const [qnaAiSuggest,setQnaAiSuggest]=useState(\"\");\n  const QNA_CATS=[\"General\",\"Pricing\",\"Technical\",\"Compliance\",\"Integration\",\"Security\",\"SLA\",\"Other\"];\n  function addQnaItem(){\n    if(!qnaQ.trim()||!qnaA.trim())return;\n    if(qnaEditId){onQnaChange(qna.map(function(q){return q.id===qnaEditId?Object.assign({},q,{question:qnaQ.trim(),answer:qnaA.trim(),category:qnaCat,updatedAt:new Date().toISOString()}):q;}));setQnaEditId(null);}\n    else{onQnaChange([].concat(qna,[{id:uid(\"qna\"),question:qnaQ.trim(),answer:qnaA.trim(),category:qnaCat,createdAt:new Date().toISOString(),usedCount:0}]));}\n    setQnaQ(\"\");setQnaA(\"\");setQnaCat(\"General\");setQnaAdd(false);\n  }\n  function deleteQna(qid){onQnaChange(qna.filter(function(q){return q.id!==qid;}));}\n  function copyQnaAnswer(qid){\n    var item=qna.find(function(q){return q.id===qid;});\n    if(item){try{navigator.clipboard.writeText(item.answer);}catch(_){}onQnaChange(qna.map(function(q){return q.id===qid?Object.assign({},q,{usedCount:(q.usedCount||0)+1}):q;}));}\n  }\n  function editQna(qid){\n    var item=qna.find(function(q){return q.id===qid;});\n    if(!item)return;\n    setQnaQ(item.question);setQnaA(item.answer);setQnaCat(item.category||\"General\");setQnaEditId(qid);setQnaAdd(true);\n  }\n  var filteredQna=qna.filter(function(q){\n    if(!qnaSearch)return true;\n    var s=qnaSearch.toLowerCase();\n    return q.question.toLowerCase().indexOf(s)>=0||q.answer.toLowerCase().indexOf(s)>=0||(q.category||\"\").toLowerCase().indexOf(s)>=0;\n  });\n  async function aiSuggestAnswer(){\n    if(!qnaQ.trim()||!apiKey)return;\n    setQnaAiSuggest(\"Generating...\");\n    var companyCtx=\"\";\n    if(icp){\n      if(icp.productDescription)companyCtx+=\"Product: \"+icp.productDescription+\"\\\n\";\n      if(icp.companyProducts)companyCtx+=\"Products & Services: \"+icp.companyProducts+\"\\\n\";\n      if(icp.companyPricing)companyCtx+=\"Pricing: \"+icp.companyPricing+\"\\\n\";\n      if(icp.companyTech)companyCtx+=\"Technical: \"+icp.companyTech+\"\\\n\";\n      if(icp.companyUSP)companyCtx+=\"USPs: \"+icp.companyUSP+\"\\\n\";\n      if(icp.companyCompliance)companyCtx+=\"Complia var newContact=makeContact({name:name.trim(),title:title.trim(),email:email.trim()});onUpdateLead(selected.id,\"contacts\",[].concat(selected.contacts||[],[newContact]));}} style={{...BTN.sm,fontSize:9,padding:\"2px 8px\",color:C.info,borderColor:C.info+\"44\"}}>+ Add Contact</button>\n              </div>\n              {(selected.contacts||[]).length===0?<div style={{color:C.muted,fontSize:11,fontStyle:\"italic\"}}>No contacts</div>:\n              (selected.contacts||[]).map(function(ct,idx){return(\n                <div key={ct.id} style={{background:C.surf2,borderRadius:C.radiusSm,padding:\"10px 12px\",marginBottom:6,borderLeft:\"2px solid \"+(ct.optedOut?C.danger:(idx===0?\"#FECA57\":C.line))}}>\n                  <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                    <div style={{fontSize:12,fontWeight:600,color:ct.optedOut?C.danger:C.text}}>{ct.name||\"Unnamed\"}{ct.title?\" \u2014 \"+ct.title:\"\"}</div>\n                    {ct.optedOut&&<span style={{fontSize:8,color:C.danger,fontWeight:700}}>OPTED OUT</span>}\n                  </div>\n                  <div style={{display:\"flex\",gap:8,marginTop:3,flexWrap:\"wrap\"}}>\n                    {ct.email&&<span style={{fontSize:10,color:\"#BBBBBB\"}}>{ct.email}</span>}\n                    {ct.phone&&<span style={{fontSize:10,color:C.muted}}>{ct.phone}</span>}\n                    {ct.linkedin&&<a href={ct.linkedin.indexOf(\"http\")===0?ct.linkedin:\"https://\"+ct.linkedin} target=\"_blank\" rel=\"noopener\" style={{fontSize:10,color:\"#BBBBBB\"}}>LinkedIn</a>}\n                    {ct.lastContacted&&<span style={{fontSize:9,color:C.muted}}>Last: {fmtDateShort(ct.lastContacted)}</span>}\n                  </div>\n                  {ct.notes&&<div style={{fontSize:10,color:C.dim,marginTop:3,lineHeight:1.4}}>{ct.notes}</div>}\n                </div>\n              );})}\n            </div>\n\n            {/* Deal Room Docs */}\n            {/* Deal Team - Family:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>RESOLVED BLOCKERS</div>\n                {(selected.blockerHistory||[]).map(function(h,i){return(\n                  <div key={i} style={{fontSize:11,color:C.dim,padding:\"6px 10px\",background:C.surf2,borderRadius:C.radiusSm,marginBottom:4,borderLeft:\"2px solid #0BE881\"}}>\n                    <span style={{color:\"#0BE881\",fontSize:10,fontWeight:700}}>{h.type}</span> {h.description}{h.resolution?\" \u2192 \"+h.resolution:\"\"}\n                    <div style={{fontSize:9,color:C.muted,marginTop:2}}>{fmtDateShort(h.resolvedAt)}</div>\n                  </div>\n                );})}\n              </div>\n            )}\n\n            {/* Scores */}\n            <div style={{marginTop:14}}>\n              <div style={{fontSize:10,fontWeight:700,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>SCORES</div>\n              <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:6}}>\n                {CRITERIA.map(function(cr){var val=selected.scores&&selected.scores[cr.id]||5;return(\n                  <div key={cr.id} style={{background:C.surf2,borderRadius:C.radiusSm,padding:\"6px 8px\",borderLeft:\"2px solid \"+cr.clr}}>\n                    <div style={{fontSize:8,color:cr.clr,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.3}}>{cr.short}</div>\n                    <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:14,color:cr.clr}}>{val}<span style={{fontSize:9,color:C.muted}}>/10</span></div>\n                  </div>\n                );})}\n              </div>\n            </div>\n\n            {/* Document Generator */}\n            <div style={{marginTop:14}}>\n              <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:10}}>\n                <div style={{width:2,height:14,background:C.acc,borderRadius:1}}/>\n                <span style={{fontSize:10,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,textTransform:\"uppercase\"}}>Generate Document</span>\n              </div>\n              <div style={{display:\"grid\",gridTemplateColumns:\"repeat(2,1fr)\",gap:6,marginBottom:10}}>\n                {DOC_GEN_TYPES.map(function(dt){var isSel=docGenType===dt.id;return(\n                  <button key={dt.id} onClick={function(){if(isSel&&docGenResult){setDocGenType(null);setDocGenResult(\"\");}else{generateDoc(dt.id);}}}\n                    style={{background:isSel?dt.clr+\"15\":\"transparent\",border:\"1px solid \"+(isSel?dt.clr+\"50\":C.line),borderRadius:C.radiusSm,padding:\"10px 12px\",cursor:\"pointer\",textAlign:\"left\",transition:\"all .15s\",opacity:docGenLoading&&docGenType!==dt.id?0.4:1}}>\n                    <div style={{display:\"flex\",alignItems:\"center\",gap:6,marginBottom:3}}>\n                      <span style={{fontSize:10,fontWeight:700,color:dt.clr,fontFamily:\"'Barlow Condensed',sans-serif\",background:dt.clr+\"22\",padding:\"2px 6px\",borderRadius:3}}>{dt.icon}</span>\n                      <span style={{fontSize:11,fontWeight:700,color:isSel?dt.clr:C.text,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{dt.label}</span>\n                    </div>\n                    <div style={{fontSize:9,color:C.muted}}>{dt.desc}</div>\n                  </button>\n                );})}\n              </div>\n\n              {docGenLoading&&(\n                <div style={{background:C.surf2,borderRadius:C.radius,padding:\"16px 18px\",textAlign:\"center\"}}>\n                  <div style={{fontSize:11,color:\"#888888\",fontStyle:\"italic\"}}>Generating {(DOC_GEN_TYPES.find(function(d){return d.id===docGenType;})||{}).label||\"document\"}...</div>\n                </div>\n              )}\n\n              {docGenResult&&!docGenLoading&&(\n                <div style={{background:C.surf2,borderRadius:C.radius,border:\"1px solid \"+((DOC_GEN_TYPES.find(function(d){return d.id===docGenType;})||{}).clr||C.info)+\"33\",overflow:\"hidden\"}}>\n                  <div style={{padding:\"10px 14px\",borderBottom:\"1px solid \"+C.line,display:\"flex\",alignItems:\"center\",gap:6}}>\n                    <span style={{fontSize:11,fontWeight:700,color:(DOC_GEN_TYPES.find(function(d){return d.id===docGenType;})||{}).clr||C.info,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>{(DOC_GEN_TYPES.find(function(d){return d.id===docGenType;})||{}).label||\"Document\"}</span>\n                    <div style={{flex:1}}/>\n                    <button onClick={function(){try{navigator.clipboard.writeText(docGenResult);}catch(_){}}} style={{...BTN.sm,fontSize:9,padding:\"2px 8px\"}}>Copy</button>\n                    <button onClick={function(){generateDoc(docGenType);}} style={{...BTN.sm,fontSize:9,padding:\"2px 8px\",color:C.info,borderColor:C.info+\"44\"}}>Regenerate</button>\n                    <button onClick={function(){setDocGenType(null);setDocGenResult(\"\");}} style={{...BTN.sm,fontSize:9,padding:\"2px 8px\"}}>Close</button>\n                  </div>\n                  <div style={{padding:\"14px 16px\",fontSize:12,color:C.dim,lineHeight:1.7,whiteSpace:\"pre-wrap\",maxHeight:400,overflowY:\"auto\"}}>{docGenResult}</div>\n                </div>\n              )}\n            </div>\n\n          </div>\n        ):(\n          <div style={{textAlign:\"center\",padding:\"80px 20px\",color:C.muted}}>\n            <svg width=\"48\" height=\"48\" viewBox=\"0 0 24 24\" fill=\"none\" stroke={C.line} strokeWidth=\"1\" strokeLinecap=\"round\" style={{marginBottom:12,opacity:0.5}}><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/></svg>\n            <div style={{fontSize:14,fontWeight:700,color:C.surf3,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Select a deal</div>\n            <div style={{fontSize:11,color:C.muted,marginTop:4}}>Pick a lead to see all business info and documents</div>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n\n\n/* \\u2500\\u2500 STRATEGY TAB \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\nfunction StrategyTab({leads,icp,apiKey,strategy,onUpdate}){\n  const cur=(icp&&icp.currency)||\"\u20ac\";\n  const kpi=strategy.kpiTargets||DEF_STRATEGY.kpiTargets;\n  const mindMap=strategy.mindMap||DEF_STRATEGY.mindMap;\n  const nodes=mindMap.nodes||[];\n\n  /* \\u2500\\u2500 KPI auto-calculations \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\n  const now=new Date();\n  const yearStart=new Date(now.getFullYear(),0,1);\n  const qStart=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1);\n  const closed=leads.filter(function(l){return pipeStage(l)===4;});\n  const closedThisYear=closed.filter(function(l){var d=new Date(l.closedAt||l.createdAt);return d>=yearStart;});\n  const closedThisQ=closed.filter(function(l){var d=new Date(l.closedAt||l.createdAt);return d>=qStart;});\n  const totalRevYear=closedThisYear.reduce(function(a,l){return a+(l.dealValue||0);},0);\n  const netNewNames=closedThisYear.length;\n  const acvActual=netNewNames>0?Math.round(totalRevYear/netNewNames):0;\n  const newAccountsQ=closedThisQ.length;\n  const totalAccounts=closed.length;\n\n\n  function pct(actual,target){if(!target)return 0;return Math.min(Math.round((actual/target)*100),150);}\n  function ragClr(p){return p>=100?C.acc:p>=70?C.warn:C.danger;}\n\n  const pipelineValue=leads.filter(function(l){return pipeStage(l)!==4;}).reduce(function(a,l){return a+(l.dealValue||l.scores?(l.dealValue||Math.round(calcScore(l.scores||{},{})/100*(kpi.acv||50000))):0);},0);\n  const KPI_ROWS=[\n    {key:\"netNewNames\",   label:\"Net New Logos / Year\",  unit:\"\",  actual:netNewNames,    fmt:function(v){return v.toString();},           auto:true,  desc:\"New clients closed this year\"},\n    {key:\"acv\",           label:\"Avg Deal Size (ACV)\",   unit:cur, actual:acvActual,      fmt:function(v){return fmtK(v,cur);},            auto:true,  desc:\"Average annual contract value\"},\n    {key:\"pipelineValue\", label:\"Pipeline Value\",        unit:cur, actual:pipelineValue,  fmt:function(v){return fmtK(v,cur);},            auto:true,  desc:\"Total value of active opportunities\"},\n\n  ];\n\n  /* \\u2500\\u2500 Pipeline Coverage & Stage Conversion \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\n  var STAGE_WEIGHTS=[0.10,0.25,0.50,0.75,0.90];\n  var activeLeadsP=leads.filter(function(l){return pipeStage(l)>=0&&pipeStage(l)<PIPE.length-1;});\n  var wonLeads=leads.filter(function(l){return pipeStage(l)===PIPE.length-1;});\n  var estAcv=kpi.acv||50000;\n  var weightedPipeline=activeLeadsP.reduce(function(a,l){var ps2=pipeStage(l),dv=l.dealValue||estAcv;return a+dv*(STAGE_WEIGHTS[ps2]||0.10);},0)+wonLeads.reduce(function(a,l){return a+(l.dealValue||estAcv)*0.90;},0);\n  var remainingTarget=Math.max(0,(kpi.netNewNames||0)*estAcv-totalRevYear);\n  var coverageRatio=remainingTarget>0?weightedPipeline/remainingTarget:weightedPipeline>0?9.99:0;\n  var coverageClr=coverageRatio>=3?C.acc:coverageRatio>=2?C.warn:C.danger;\n  var stageCounts=PIPE.map(function(p,i){return leads.filter(function(l){return pipeStage(l)===i;}).length;});\n  var unstartedCount=leads.filter(function(l){return pipeStage(l)===PIPE_NONE;}).length;\n  var stageConversions=[];\n  var stageAvgDays=[];\n  PIPE.forEach(function(p,i){\n    var enteredStage=0,advancedFrom=0,totalDaysInStage=0,countWithDays=0;\n    leads.forEach(function(l){\n      var hist=(l.pipelineHistory||[]).slice().sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});\n      var enteredAt=null;\n      hist.forEach(function(h){\n        if(h.stage===i){enteredStage++;enteredAt=new Date(h.timestamp);}\n        if(h.stage===i+1&&enteredAt){var leftAt=new Date(h.timestamp);advancedFrom++;totalDaysInStage+=Math.round((leftAt-enteredAt)/86400000);countWithDays++;enteredAt=null;}\n      });\n      if(enteredAt&&pipeStage(l)===i){totalDaysInStage+=Math.round((Date.now()-enteredAt.getTime())/86400000);countWithDays++;}\n    });\n    stageConversions.push(enteredStage>0?Math.round(advancedFrom/enteredStage*100):0);\n    stageAvgDays.push(countWithDays>0?Math.round(totalDaysInStage/countWithDays):0);\n  });\n  var totalCycleLeads=wonLeads.filter(function(l){return(l.pipelineHistory||[]).length>=2;});\n  var avgCycleDays=totalCycleLeads.length>0?Math.round(totalCycleLeads.reduce(function(a,l){var h=l.pipelineHistory||[];var ts=h.map(function(x){return new Date(x.timestamp).getTime();});return a+(Math.max.apply(null,ts)-Math.min.apply(null,ts))/86400000;},0)/totalCycleLeads.length):0;\n  var retentionActual=totalAccounts>0?Math.round((totalAccounts-leads.filter(function(l){return l.accountData&&l.accountData.healthScore===\"churned\";}).length)/totalAccounts*100):100;\n\n  /* \\u2500\\u2500 Mind map state \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */\n  const [selectedId,setSelectedId]=useState(null);\n  const [editingId,setEditingId]=useState(null);\n  const [editText,setEditText]=useState(\"\");\n  const [dragging,setDragging]=useState(null);\n  const [dragOffset,setDragOffset]=useState({x:0,y:0});\n  const [generatingMap,setGeneratingMap]=useState(false);\n  const [editKpi,setEditKpi]=useState(null);\n  const [kpiDraft,setKpiDraft]=useState(\"\");\n  const svgRef=React.useRef(null);\n\n  function saveNodes(newNodes){\n    onUpdate({mindMap:Object.assign({},mindMap,{nodes:newNodes})});\n  }\n  function parseK(val){\n    var s=String(val).trim().toLowerCase().replace(/,/g,\"\").replace(/[\u20ac$\\u00a3]/g,\"\");\n    if(s.indexOf(\"m\")>=0)return Math.round(parseFloat(s)*1000000);\n    if(s.indexOf(\"k\")>=0)return Math.round(parseFloat(s)*1000);\n    return parseFloat(s)||0;\n  }\n  function saveKpi(key,val){\n    onUpdate({kpiTargets:Object.assign({},kpi,{[key]:parseK(val)})});\n  }\n\n  function addNode(){\n    if(!selectedId)return;\n    const parent=nodes.find(function(n){return n.id===selectedId;});\n    if(!parent)return;\n    const siblings=nodes.filter(function(n){return n.parentId===selectedId;});\n    const angle=(siblings.length*60-60)*(Math.PI/180);\n    const dist=140;\n    const newNode={\n      id:\"n\"+Date.now(),\n      text:\"New idea\",\n      x:Math.round(parent.x+Math.cos(angle)*dist),\n      y:Math.round(parent.y+Math.sin(angle)*dist),\n      parentId:selectedId,\n      color:PIPE[siblings.length%PIPE.length].clr\n    };\n    saveNodes([].concat(nodes,[newNode]));\n    setSelectedId(newNode.id);\n    setEditingId(newNode.id);\n    setEditText(\"New idea\");\n  }\n\n  function deleteNode(){\n    if(!selectedId||selectedId===\"root\")return;\n    function getAllDescendants(id){\n      var result=[id];\n      nodes.forEach(function(n){if(n.parentId===id)result=result.concat(getAllDescendants(n.id));});\n      return result;\n    }\n    var toRemove=getAllDescendants(selectedId);\n    saveNodes(nodes.filter(function(n){return toRemove.indexOf(n.id)<0;}));\n    setSelectedId(null);\n  }\n\n  function startEdit(node){\n    setEditingId(node.id);\n    setEditText(node.text);\n  }\n\n  function commitEdit(){\n    if(!editingId)return;\n    saveNodes(nodes.map(function(n){return n.id===editingId?Object.assign({},n,{text:editText}):n;}));\n    setEditingId(null);\n  }\n\n  function handleSvgMouseDown(e,nodeId){\n    e.stopPropagation();\n    setSelectedId(nodeId);\n    const svg=svgRef.current;\n    if(!svg)return;\n    const rect=svg.getBoundingClientRect();\n    const node=nodes.find(function(n){return n.id===nodeId;});\n    if(!node)return;\n    setDragging(nodeId);\n    setDragOffset({x:e.clientX-rect.left-node.x,y:e.clientY-rect.top-node.y});\n  }\n\n  function handleSvgMouseMove(e){\n    if(!dragging)return;\n    const svg=svgRef.current;\n    if(!svg)return;\n    const rect=svg.getBoundingClientRect();\n    const nx=Math.round(e.clientX-rect.left-dragOffset.x);\n    const ny=Math.round(e.clientY-rect.top-dragOffset.y);\n    saveNodes(nodes.map(function(n){return n.id===dragging?Object.assign({},n,{x:nx,y:ny}):n;}));\n  }\n\n  function handleSvgMouseUp(){setDragging(null);}\n\n  async function aiSuggest(){\n    if(!apiKey||!apiKey.trim()){alert(\"Set your API key in ICP tab.\");return;}\n    setGeneratingMap(true);\n    var context=[\n      \"I am a BDM Manager. Here is my current situation:\",\n      \"KPI Targets: Net New Names=\"+kpi.netNewNames+\", ACV=\"+cur+kpi.acv+\", New Accounts/Q=\"+kpi.newAccountsPerQ+\", Retention=\"+kpi.retention+\"%\",\n      \"KPI Actuals: Net New Names=\"+netNewNames+\", ACV=\"+cur+acvActual+\", New Accounts/Q=\"+newAccountsQ+\", Retention=\"+retentionActual+\"%\",\n      \"Active pipeline: \"+leads.filter(function(l){return pipeStage(l)!==4;}).length+\" leads\",\n      \"ICP: \"+(icp&&icp.productDescription||\"Not set\"),\n      \"Current mind map center: \"+(nodes[0]?nodes[0].text:\"My Annual Goal\"),\n      \"\",\n      \"Suggest a strategic mind map for me. Return JSON only:\",\n      '{\"nodes\":[{\"id\":\"root\",\"text\":\"Annual Goal\",\"x\":400,\"y\":250,\"parentId\":null,\"color\":\"#0BE881\"},{\"id\":\"1\",\"text\":\"Strategy 1\",\"x\":200,\"y\":150,\"parentId\":\"root\",\"color\":\"#888888\"},...]}'\n      ,\"Up to 12 nodes total. 3-4 main branches from root, each with 1-2 tactics. Colors: use #48DBFB, #A29BFE, #FECA57, #FF9F43, #0BE881, #FF6B6B. Return ONLY valid JSON.\"\n    ].join(\"\\\n\");\n    try{\n      var res=await fetch(\"https://api.anthropic.com/v1/messages\",{\n        method:\"POST\",\n        headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},\n        body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:1000,messages:[{role:\"user\",content:context}]})\n      });\n      var data=await res.json();\n      if(data.error){alert(\"API error: \"+data.error.message);setGeneratingMap(false);return;}\n      var raw=(data.content||[]).map(function(b){return b.text||\"\";}).join(\"\");\n      var clean=raw.replace(/\\u0060{3}json|\\u0060{3}/g,\"\").trim();\n      var parsed=JSON.parse(clean);\n      if(parsed.nodes&&parsed.nodes.length>0){\n        onUpdate({mindMap:{nodes:parsed.nodes}});\n      }\n    }catch(e){alert(\"Could not generate: \"+e.message);}\n    setGeneratingMap(false);\n  }\n\n  var selectedNode=nodes.find(function(n){return n.id===selectedId;})||null;\n  var currentQ=Math.floor(now.getMonth()/3);\n  var qLabels=[\"Q1\",\"Q2\",\"Q3\",\"Q4\"];\n\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"320px 1fr\",height:\"100%\",overflow:\"hidden\"}}>\n      {/* \\u2500\\u2500 LEFT: KPI Panel \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */}\n      <div style={{borderRight:\"1px solid \"+C.line,display:\"flex\",flexDirection:\"column\",overflowY:\"auto\",background:C.surf}}>\n        <div style={{padding:\"14px 16px\",borderBottom:\"1px solid \"+C.line,flexShrink:0}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:4}}>\n            <div style={{width:2,height:16,background:C.acc,borderRadius:1}}/>\n            <span style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>KPI Tracker</span>\n          </div>\n          <div style={{display:\"flex\",gap:4,marginTop:8}}>\n            {qLabels.map(function(q,qi){return(\n              <div key={qi} style={{flex:1,textAlign:\"center\",padding:\"4px 2px\",borderRadius:4,background:qi===currentQ?\"rgba(198,255,0,0.12)\":\"transparent\",border:\"1px solid \"+(qi===currentQ?C.acc+\"44\":C.line)}}>\n                <div style={{fontSize:9,fontWeight:700,color:qi===currentQ?C.acc:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{q}</div>\n                {qi===currentQ&&<div style={{fontSize:7,color:C.acc,marginTop:1}}>NOW</div>}\n              </div>\n            );})}\n          </div>\n          <div style={{color:C.muted,fontSize:10,marginTop:6}}>Annual targets \u00b7 auto-calculated actuals</div>\n        </div>\n\n        <div style={{padding:\"12px 16px\",flex:1}}>\n          {KPI_ROWS.map(function(row){\n            var p=pct(row.actual,kpi[row.key]);\n            var clr=ragClr(p);\n            var isEditing=editKpi===row.key;\n            return(\n              <div key={row.key} style={{marginBottom:16,background:C.surf2,borderRadius:\"8px\",padding:\"12px 14px\",borderLeft:\"2px solid \"+clr}}>\n                <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",marginBottom:8}}>\n                  <div style={{flex:1}}>\n                    <div style={{fontSize:11,fontWeight:700,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginBottom:1}}>{row.label}</div>\n                    <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{row.desc}</div>\n                    <div style={{display:\"flex\",alignItems:\"baseline\",gap:8}}>\n                      <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,color:clr,lineHeight:1}}>{row.fmt(row.actual)}</span>\n                      <span style={{color:C.muted,fontSize:11}}>of</span>\n                      {isEditing?(\n                        <input type=\"number\" value={kpiDraft} onChange={function(e){setKpiDraft(e.target.value);}}\n                          onBlur={function(){saveKpi(row.key,kpiDraft);setEditKpi(null);}}\n                          onKeyDown={function(e){if(e.key===\"Enter\"){saveKpi(row.key,kpiDraft);setEditKpi(null);}if(e.key===\"Escape\")setEditKpi(null);}}\n                          style={{...INP,width:100,fontSize:13,padding:\"2px 6px\",display:\"inline-block\"}} placeholder=\"e.g. 100k\"/>\n                      ):(\n                        <span onClick={function(){setEditKpi(row.key);setKpiDraft(String(kpi[row.key]));}}\n                          style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.muted,cursor:\"pointer\",borderBottom:\"1px dashed \"+C.line,paddingBottom:1}}\n                          title=\"Click to set target\">\n                          {kpi[row.key]>0?(row.unit===\"%\" ? kpi[row.key]+\"%\" : row.unit===cur ? fmtK(kpi[row.key],cur) : kpi[row.key].toString()):\"Set target \u2192\"}\n                        </span>\n                      )}\n                    </div>\n                  </div>\n                  <div style={{textAlign:\"right\",flexShrink:0,marginLeft:8}}>\n                    <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:18,color:clr,fontWeight:400}}>{kpi[row.key]>0?p+\"%\":\"\u2014\"}</div>\n                    <div style={{fontSize:9,color:C.muted}}>of target</div>\n                  </div>\n                </div>\n                {kpi[row.key]>0&&(\n                  <div>\n                    <div style={{background:C.surf3,height:4,borderRadius:2,overflow:\"hidden\"}}>\n                      <div style={{width:Math.min(p,100)+\"%\",height:4,background:clr,borderRadius:2,transition:\"width .4s\"}}/>\n                    </div>\n                    <div style={{display:\"flex\",justifyContent:\"space-between\",marginTop:4}}>\n                      <span style={{fontSize:9,color:C.muted}}>\n                        {p>=100?\"Target reached!\":p>=70?\"On track\":(\"Gap: \"+(row.unit===\"%\"?Math.max(0,kpi[row.key]-row.actual)+\"%\":row.unit===cur?fmtK(Math.max(0,kpi[row.key]-row.actual),cur):Math.max(0,kpi[row.key]-row.actual).toString()))}\n                      </span>\n                      <span style={{fontSize:9,color:C.muted}}>{row.auto&&<span style={{color:C.info}}>auto \u2713</span>}</span>\n                    </div>\n                  </div>\n                )}\n                {!kpi[row.key]&&<div style={{fontSize:9,color:C.muted,marginTop:4}}>Click \"Set target\" to add your management target</div>}\n              </div>\n            );\n          })}\n\n          {/* \\u2500\\u2500 Pipeline Coverage \\u2500\\u2500 */}\n          <div style={{background:C.surf2,borderRadius:\"8px\",padding:\"12px 14px\",borderLeft:\"2px solid \"+coverageClr,marginBottom:16}}>\n            <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\",marginBottom:8}}>\n              <div>\n                <div style={{fontSize:11,fontWeight:700,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginBottom:1}}>Pipeline Coverage</div>\n                <div style={{fontSize:9,color:C.muted}}>Weighted pipeline vs remaining target</div>\n              </div>\n              <div style={{textAlign:\"right\"}}>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,color:coverageClr,lineHeight:1}}>{coverageRatio>=9.99?\"9.9+x\":coverageRatio.toFixed(1)+\"x\"}</div>\n                <div style={{fontSize:9,color:C.muted}}>{coverageRatio>=3?\"Healthy\":coverageRatio>=2?\"Thin\":\"At risk\"}</div>\n              </div>\n            </div>\n            <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:8,marginTop:6}}>\n              <div style={{background:C.surf3,borderRadius:5,padding:\"6px 8px\"}}>\n                <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Weighted Pipeline</div>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.text}}>{fmtK(Math.round(weightedPipeline),cur)}</div>\n              </div>\n              <div style={{background:C.surf3,borderRadius:5,padding:\"6px 8px\"}}>\n                <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Remaining Target</div>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:13,color:C.text}}>{remainingTarget>0?fmtK(remainingTarget,cur):\"Target met\"}</div>\n              </div>\n            </div>\n            <div style={{marginTop:8}}>\n              <div style={{fontSize:9,color:C.muted,marginBottom:4}}>Stage weights applied</div>\n              <div style={{display:\"flex\",gap:2}}>\n                {PIPE.map(function(p,i){var cnt=stageCounts[i];return(\n                  <div key={i} style={{flex:1,textAlign:\"center\"}}>\n                    <div style={{background:p.clr+\"22\",border:\"1px solid \"+p.clr+\"33\",borderRadius:4,padding:\"3px 2px\",marginBottom:2}}>\n                      <div style={{fontSize:11,fontWeight:700,color:p.clr,fontFamily:\"'DM Mono',monospace\"}}>{cnt}</div>\n                    </div>\n                    <div style={{fontSize:7,color:p.clr,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.3}}>{STAGE_WEIGHTS[i]*100}%</div>\n                    <div style={{fontSize:7,color:C.muted,lineHeight:1.1}}>{p.code.length>6?p.code.slice(0,6):p.code}</div>\n                  </div>\n                );})}\n              </div>\n            </div>\n          </div>\n\n          {/* \\u2500\\u2500 Stage Conversion Funnel \\u2500\\u2500 */}\n          <div style={{background:C.surf2,borderRadius:\"8px\",padding:\"12px 14px\",borderLeft:\"2px solid #0BE881\",marginBottom:16}}>\n            <div style={{fontSize:11,fontWeight:700,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginBottom:1}}>Stage Conversion</div>\n            <div style={{fontSize:9,color:C.muted,marginBottom:10}}>Conversion rates between pipeline stages</div>\n            {PIPE.map(function(p,i){\n              var cnt=stageCounts[i],conv=stageConversions[i],avgD=stageAvgDays[i];\n              var convClr=conv>=70?C.acc:conv>=40?C.warn:conv>0?C.danger:C.muted;\n              var barW=Math.max(0,Math.min(100,conv));\n              var maxCnt=Math.max.apply(null,stageCounts.concat([1]));\n              var cntW=Math.round(cnt/maxCnt*100);\n              return(\n                <div key={i} style={{marginBottom:i<PIPE.length-1?8:0}}>\n                  <div style={{display:\"flex\",alignItems:\"center\",gap:6,marginBottom:3}}>\n                    <div style={{width:6,height:6,borderRadius:3,background:p.clr,flexShrink:0}}/>\n                    <span style={{fontSize:10,fontWeight:700,color:p.clr,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,flex:1}}>{p.code}</span>\n                    <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:12,color:C.text,fontWeight:500}}>{cnt}</span>\n                    {avgD>0&&<span style={{fontSize:9,color:C.muted,fontFamily:\"'DM Mono',monospace\"}}>{avgD}d avg</span>}\n
