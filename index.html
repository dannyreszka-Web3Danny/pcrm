der,onAddLogEntry,onUpdateLead,onOpenLead,onNavigate}){\n  const [showForm,setShowForm]=useState(false);\n  const [editLead,setEditLead]=useState(null);\n  const [filterSt,setFilterSt]=useState(\"all\");\n  const [filterPipe,setFilterPipe]=useState(\"all\");\n  const [filterBlock,setFilterBlock]=useState(false);\n  const [search,setSearch]=useState(\"\");\n  const [sortField,setSortField]=useState(\"totalScore\");\n  const [sortDir,setSortDir]=useState(\"desc\");\n  const [deleteId,setDeleteId]=useState(null);\n  const [hoverRow,setHoverRow]=useState(null);\n  const [csvText,setCsvText]=useState(\"\");\n  const [showCsv,setShowCsv]=useState(false);\n  const [reminderFlash,setReminderFlash]=useState(null);\n\n  const openLead=openLeadId?leads.find(function(l){return l.id===openLeadId;})||null:null;\n\n  function toggleSort(f){if(f===sortField)setSortDir(function(d){return d===\"desc\"?\"asc\":\"desc\";});else{setSortField(f);setSortDir(\"desc\");}}\n\n  const filtered=useMemo(function(){\n    return leads\n      .filter(function(l){return filterSt===\"all\"||l.status===filterSt;})\n      .filter(function(l){if(filterPipe===\"all\")return true;if(filterPipe===\"none\")return pipeStage(l)===PIPE_NONE;return pipeStage(l)===parseInt(filterPipe,10);})\n      .filter(function(l){return !filterBlock||isBlocked(l);})\n      .filter(function(l){\n        if(!search)return true;\n        const q=search.toLowerCase(),pc=primaryContact(l);\n        return[l.company,l.industry,pc?pc.name:\"\",pc?pc.title:\"\"].some(function(v){return(v||\"\").toLowerCase().indexOf(q)>=0;});\n      })\n      .sort(function(a,b){\n        if(!filterBlock){if(isBlocked(a)&&!isBlocked(b))return -1;if(!isBlocked(a)&&isBlocked(b))return 1;}\n        let av=a[sortField]!==undefined?a[sortField]:\"\",bv=b[sortField]!==undefined?b[sortField]:\"\";\n        if(typeof av===\"string\"){av=av.toLowerCase();bv=(bv||\"\").toLowerCase();}\n        return sortDir===\"desc\"?(bv>av?1:-1):(av>bv?1:-1);\n      });\n  },[leads,filterSt,filterPipe,filterBlock,search,sortField,sortDir]);\n\n  function importCSV(){\n    const lines=csvText.trim().split(\"\\n\").filter(Boolean);if(lines.length<2)return;\n    const headers=lines[0].split(\",\").map(function(h){return h.trim().toLowerCase().replace(/\\s+/g,\"\");});\n    function get(row){for(let ki=1;ki<arguments.length;ki++){const idx=headers.indexOf(arguments[ki]);if(idx!==-1&&row[idx]!==undefined)return row[idx];}return\"\";}\n    const nl=lines.slice(1).map(function(line,i){\n      const v=line.split(\",\").map(function(x){return x.trim().replace(/^\"|\"$/g,\"\");});\n      const scores={decisionMaker:parseInt(get(v,\"decisionmaker\",\"dm\"))||5,engagement:parseInt(get(v,\"engagement\",\"intent\"))||5,companySize:parseInt(get(v,\"companysize\",\"size\",\"revenue\"))||5,industryFit:parseInt(get(v,\"industryfit\"))||5,budget:parseInt(get(v,\"budget\"))||5,painPoint:parseInt(get(v,\"painpoint\",\"pain\"))||5};\n      const cn=get(v,\"contact\",\"contactname\",\"name\");\n      return makeLead({company:get(v,\"company\",\"companyname\")||(\"Lead \"+(i+1)),industry:get(v,\"industry\"),website:get(v,\"website\",\"url\"),notes:get(v,\"notes\",\"description\"),source:\"CSV Import\",status:\"new\",contacts:cn?[makeContact({name:cn,title:get(v,\"title\",\"role\"),linkedin:get(v,\"linkedin\"),phone:get(v,\"phone\")})]:[],scores:scores},weights);\n    });\n    onAdd(nl);setCsvText(\"\");setShowCsv(false);\n  }\n\n  function handleSave(data){\n    const leadRef=editLead||{id:null,company:data.company,contacts:data.contacts||[]};\n    const parsed=parseSmartNotes(data.notes||\"\",leadRef);\n    const cleanData=Object.assign({},data,{notes:parsed.cleanNotes});\n    if(editLead){\n      onEdit(Object.assign({},editLead,cleanData,{id:editLead.id,aiPitch:editLead.aiPitch||\"\",createdAt:editLead.createdAt,pipeline:editLead.pipeline!==undefined?editLead.pipeline:PIPE_NONE,pipelineHistory:editLead.pipelineHistory||[],blocker:editLead.blocker||null,blockerHistory:editLead.blockerHistory||[],logEntries:editLead.logEntries||[],summary:editLead.summary||{},totalScore:calcScore(cleanData.scores||{},weights)}));\n    }else{\n      const newLead=makeLead(cleanData,weights);\n      parsed.newReminders.forEach(function(r){r.linkedLeadId=newLead.id;});\n      onAdd([newLead]);\n    }\n    if(parsed.newReminders.length>0&&onAddReminder){\n      parsed.newReminders.forEach(function(r){onAddReminder(r);});\n      setReminderFlash(parsed.newReminders[0]);\n      setTimeout(function(){setReminderFlash(null);},5000);\n    }\n    setShowForm(false);setEditLead(null);\n  }\n\n  const snap=useMemo(function(){return computeSnapshot(leads);},[leads]);\n  const PIPE_STRIP=[{label:\"Unstarted\",clr:C.muted,key:\"none\"}].concat(PIPE.map(function(p){return{label:p.code,clr:p.clr,key:String(p.id)};}));\n\n  return(\n    <div style={{display:\"flex\",gap:0,height:\"100%\",overflow:\"hidden\"}}>\n      {/* Main content */}\n      <div style={{flex:1,overflow:\"auto\",padding:\"20px 24px\",minWidth:0}}>\n        {/* Pipeline funnel \u2014 volume bars */}\n        <div style={{display:\"flex\",alignItems:\"flex-end\",marginBottom:16,gap:0,height:64}}>\n          {PIPE_STRIP.map(function(ps,idx){\n            const si=ps.key===\"none\"?PIPE_NONE:parseInt(ps.key,10);\n            const cnt=leads.filter(function(l){return pipeStage(l)===si;}).length;\n            const active=filterPipe===ps.key;\n            const barH=64-idx*7;\n            var emptyClr=\"hsl(0,0%,\"+(16+idx*2)+\"%)\";\n            var fillClr=idx>=6?\"#C6FF00\":\"hsl(\"+(130+idx*3)+\",\"+(45+idx*3)+\"%,\"+(20+idx*4)+\"%)\";\n            var barBg=cnt>0?fillClr:emptyClr;\n            var txtClr=cnt>0?(idx>=6?\"#C6FF00\":\"hsl(\"+(130+idx*3)+\",\"+(55+idx*4)+\"%,\"+(50+idx*4)+\"%)\"):\"hsl(0,0%,\"+(32+idx*3)+\"%)\";\n            return(\n              <div key={ps.key} onClick={function(){setFilterPipe(filterPipe===ps.key?\"all\":ps.key);}}\n                style={{flex:1,cursor:\"pointer\",height:64,display:\"flex\",alignItems:\"flex-end\"}}>\n                <div style={{width:\"100%\",height:barH,background:barBg,borderRight:idx<6?\"1px solid rgba(15,15,15,0.5)\":\"none\",display:\"flex\",flexDirection:\"column\",alignItems:\"center\",justifyContent:\"center\",transition:\"all .25s\",opacity:active?1:0.8,outline:active?\"1px solid \"+txtClr:\"none\",outlineOffset:-1}}>\n                  <div style={{fontSize:barH>30?8:7,fontWeight:700,color:txtClr,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.6,textTransform:\"uppercase\",lineHeight:1}}>{ps.label}</div>\n                  <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:barH>30?17:13,color:txtClr,fontWeight:700,lineHeight:1,marginTop:2}}>{cnt}</div>\n                </div>\n              </div>\n            );\n          })}\n        </div>\n\n        {/* Stats */}\n        <div style={{display:\"grid\",gridTemplateColumns:\"repeat(3,1fr)\",gap:6,marginBottom:16}}>\n          {[{lbl:\"HOT\",val:snap.hot,clr:\"#4CAF50\",hist:statsHistory.map(function(s){return s.hot;}),icon:\"\ud83d\udd25\"},{lbl:\"QUALIFIED\",val:snap.qualified,clr:\"#60B4FF\",hist:statsHistory.map(function(s){return s.qualified;}),icon:\"\\u2713\"},{lbl:\"BLOCKED\",val:snap.blocked,clr:snap.blocked>0?C.danger:C.muted,hist:statsHistory.map(function(s){return s.blocked;}),icon:\"\\u26d4\",alert:snap.blocked>0}].map(function(s,i){return(\n            <div key={i} style={{background:s.alert?\"rgba(255,85,85,0.06)\":C.surf,borderRadius:C.radiusSm,padding:\"12px 14px\",border:\"1px solid \"+(s.alert?\"rgba(255,85,85,0.2)\":C.line)}}>\n              <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:4}}>\n                <span style={{fontSize:9,textTransform:\"uppercase\",letterSpacing:1,color:s.alert?C.danger:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600}}>{s.lbl}</span>\n                <span style={{fontSize:12,opacity:s.val Transform:\"uppercase\"}}>Accounts</button>\n            {snap.blocked>0&&<button onClick={function(){setFilterBlock(function(b){return !b;});}} style={{...BTN.smRed,padding:\"6px 12px\",fontSize:11}}>\u26d4 {filterBlock?\"Show all\":\"Blocked (\"+snap.blocked+\")\"}</button>}\n            <div style={{flex:1}}/>\n            <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder=\"Search\\u2026\" style={{...INP,width:180,fontSize:12}}/>\n            <select value={filterSt} onChange={function(e){setFilterSt(e.target.value);}} style={{...INP,width:130,fontSize:12}}>\n              <option value=\"all\">All statuses</option>\n              {STATUSES.map(function(s){return <option key={s} value={s}>{ST_META[s].label}</option>;})}\n            </select>\n          </div>\n        )}\n\n                {showForm&&<LeadForm lead={editLead} weights={weights} onCancel={function(){setShowForm(false);setEditLead(null);}} onSave={handleSave}/>}\n\n        {showCsv&&(\n          <div style={{...card(C.info),marginBottom:12}}>\n            <p style={{color:C.dim,fontSize:12,margin:\"0 0 8px\"}}>Columns: <span style={{color:C.acc,fontFamily:\"'DM Mono',monospace\",fontSize:11}}>company, contactName, title, phone, industry, website, notes, decisionMaker, engagement, companySize, industryFit, budget, painPoint</span></p>\n            <textarea value={csvText} onChange={function(e){setCsvText(e.target.value);}} rows={3} style={{...INP,marginBottom:8,fontFamily:\"'DM Mono',monospace\",fontSize:11}} placeholder={\"company,contactName,...\\nAcme Corp,John Smith,SaaS,8,7,6,9,5,8\"}/>\n            <div style={{display:\"flex\",gap:6}}><button onClick={importCSV} style={BTN.primary}>Import</button><button onClick={function(){setShowCsv(false);}} style={BTN.secondary}>Cancel</button></div>\n          </div>\n        )}\n\n        {deleteId&&(\n          <div style={{background:\"rgba(255,85,85,0.08)\",border:\"1px solid rgba(255,85,85,0.25)\",borderRadius:C.radiusSm,padding:\"10px 14px\",marginBottom:10,display:\"flex\",alignItems:\"center\",gap:10}}>\n            <span style={{color:C.danger,fontSize:13,flex:1}}>Delete <strong>{(leads.find(function(l){return l.id===deleteId;})||{}).company}</strong>? This cannot be undone.</span>\n            <button onClick={function(){onDelete(deleteId);setDeleteId(null);}} style={BTN.danger}>Delete</button>\n            <button onClick={function(){setDeleteId(null);}} style={BTN.secondary}>Cancel</button>\n          </div>\n        )}\n\n        {filtered.length===0?(\n          <div style={{textAlign:\"center\",padding:\"60px 20px\",color:C.muted}}>\n            <div style={{fontSize:40,marginBottom:12,opacity:0.3}}>\u25c8</div>\n            <div style={{fontSize:16,fontWeight:700,color:C.surf3,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:1,textTransform:\"uppercase\",marginBottom:6}}>No leads</div>\n            <div style={{fontSize:13}}>{leads.length>0?\"No leads match the current filters.\":\"Add your first lead to get started.\"}</div>\n          </div>\n        ):(\n          <div style={{background:C.surf,borderRadius:C.radius,border:\"1px solid \"+C.line,overflow:\"hidden\"}}>\n            <table style={{width:\"100%\",borderCollapse:\"collapse\"}}>\n              <thead>\n                <tr style={{borderBottom:\"1px solid \"+C.line}}>\n                  {[[\"Score\",\"totalScore\"],[\"Company\",\"company\"],[\"Status\",\"status\"],[\"Pipeline\",\"pipeline\"],[\"\",\"_\"]].map(function(col){return(\n                    <th key={col[1]} onClick={col[1]!==\"_\"?function(){toggleSort(col[1]);}:undefined}\n                      style={{padding:\"10px 14px\",textAlign:\"left\",color:C.muted,fontSize:10,letterSpacing:1,fontWeight:600,cursor:col[1]!==\"_\"?\"pointer\":\"default\",whiteSpace:\"nowrap\",fontFamily:\"'Barlow Condensed',sans-serif\",background:C.surf,borderRight:col[1]!==\"_\"?\"1px solid \"+C.line2:\"none\",textTransform:\"uppercase\"}}>\n                      {col[0]}{sortField===col[1]?(sortDir===\"desc\"?\" \u2193\":\" \u2191\"):\"\"}\n                    </th>\n                  );})}\n                </tr>\n              </thead>\n              <tbody>\n                {filtered.map(function(lead,i){\n                  const sm=ST_META[lead.status]||ST_META.new,ps=pipeStage(lead),pc=primaryContact(lead),extra=Math.max(0,(lead.contacts||[]).length-1),blocked=isBlocked(lead),isOpen=openLeadId===lead.id,rowBg=isOpen?\"rgba(198,255,0,0.04)\":(blocked?\"rgba(255,85,85,0.04)\":(hoverRow===lead.id?C.surf3:i%2===0?C.surf:C.surf2));\n                  return(\n                    <Fragment key={lead.id}>\n                      <tr onMouseEnter={function(){setHoverRow(lead.id);}} onMouseLeave={function(){setHoverRow(null);}}\n                        style={{borderBottom:\"1px solid \"+C.line2,background:rowBg,transition:\"background .1s\",borderLeft:isOpen?\"2px solid \"+C.acc:(blocked?\"2px solid \"+C.danger:\"2px solid transparent\")}}>\n                        <td style={{padding:\"11px 14px\",borderRight:\"1px solid \"+C.line2,verticalAlign:\"top\",width:90}}><ScoreBadge v={lead.totalScore}/></td>\n                        <td style={{padding:\"11px 14px\",borderRight:\"1px solid \"+C.line2,verticalAlign:\"top\"}}>\n                          {/* CLICKABLE COMPANY NAME */}\n                          <div onClick={function(){onOpenLead(isOpen?null:lead.id);}} style={{fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,fontSize:15,color:isOpen?C.acc:C.text,letterSpacing:0.3,cursor:\"pointer\",display:\"inline-block\",borderBottom:\"1px solid \"+(isOpen?C.acc:\"transparent\"),transition:\"all .15s\"}}>{lead.company}</div>\n                          {(function(){var dots=activityDots(lead);if(!dots)return <div style={{marginTop:2,fontSize:8,color:C.muted,fontStyle:\"italic\"}}>No recent outreach</div>;return <div style={{display:\"flex\",gap:2,marginTop:3}}>{dots.map(function(d,i){return <div key={i} style={{width:5,height:5,borderRadius:\"50%\",background:\"#4CAF50\",opacity:d.opacity}}/>;})}</div>;})()}\n                          {pc&&<div style={{color:C.muted,fontSize:11,marginTop:2,display:\"flex\",alignItems:\"center\",gap:5}}>\n                            <span>{pc.name}{pc.title?\" \u00b7 \"+pc.title:\"\"}</span>\n                            {extra>0&&<Tag label={\"+\"+extra} clr={C.info} small/>}\n                          </div>}\n                          {pc&&pc.lastContacted&&<div style={{color:C.muted,fontSize:10,marginTop:1}}>Last: {fmtDateShort(pc.lastContacted)}</div>}\n                          {blocked&&<div style={{marginTop:4}}><Tag label=\"\u26d4 BLOCKED\" clr={C.danger}/></div>}\n                          {ps===4&&<div style={{marginTop:3}}><Tag label=\"\u2713 CLIENT\" clr={C.acc} small/></div>}\n                        </td>\n                        <td style={{padding:\"11px 14px\",borderRight:\"1px solid \"+C.line2,verticalAlign:\"top\",width:110}}>\n                          <select value={lead.status} onChange={function(e){onStatusChange(lead.id,e.target.value);}}\n                            style={{background:sm.bg,color:sm.clr,border:\"1px solid \"+sm.clr+\"44\",borderRadius:4,padding:\"3px 8px\",fontSize:11,fontWeight:600,cursor:\"pointer\",outline:\"none\"}}>\n                            {STATUSES.map(function(s){return <option key={s} value={s}>{ST_META[s].label}</option>;})}\n                          </select>\n                        </td>\n                        <td style={{padding:\"10px 14px\",borderRight:\"1px solid \"+C.line2,verticalAlign:\"top\",minWidth:200}}>\n                          <PipeBar idx={ps}/>\n                          <div style={{display:\"flex\",gap:5,marginTop:5,alignItems:\"center\"}}>\n                            {ps<PIPE.length-1&&<button onClick={function(e){e.stopPropagation();onOpenLead(lead.id);}} style={{...BTN.sm,color:ps===PIPE_NONE?\"#42A5F5\":\"hsl(\"+(200+ps*8)+\",70%,\"+(55+ps*5)+\"%)\",borderColor:(ps===PIPE_NONE?\"#42A5F5\":\"hsl(\"+(200+ps*8)+\",70%,\"+(55+ps*5)+\"%)\")+\"44\",fontSize:10}}>{ps===PIPE_NONE?\"\u25b6 Start\":\"\u2192 Advance\"}</button>}\n                            {ps===PIPE.length-1&&<Tag label=\"\u2713 Done\" clr={C.acc} small/>}\n                            {(lead.pipelineHistory||[]).length>0&&<span style={{fontSize:9,color:C.muted,fontFamily:\"'DM Mono',monospace\"}}>{lead.pipelineHistory.length} notes</span>}\n                          </div>\n                        </td>\n                        <td style={{padding:\"10px 14px\",verticalAlign:\"top\",width:80}}>\n                          <div style={{display:\"flex\",gap:3}}>\n                            <button onClick={function(){setEditLead(lead);setShowForm(true);}} style={BTN.icon} title=\"Edit\">\u270f</button>\n                            <button onClick={function(){setDeleteId(lead.id);}} style={{...BTN.icon,color:C.danger}} title=\"Delete\">\u2715</button>\n                          </div>\n                        </td>\n                      </tr>\n                    </Fragment>\n                  );\n                })}\n              </tbody>\n            </table>\n          </div>\n        )}\n      </div>\n\n      {/* Company panel */}\n      {openLead&&(\n        <CompanyPanel\n          lead={openLead}\n          reminders={reminders}\n          icp={icp}\n          apiKey={apiKey}\n          onClose={function(){onOpenLead(null);}}\n          onUpdate={onUpdateLead}\n          onAddLogEntry={onAddLogEntry}\n          onAddReminder={onAddReminder}\n          onPipeAdv={onPipeAdv}\n          onBlockerAdd={onBlockerAdd}\n          onBlockerResolve={onBlockerResolve}\n          onBlockerRemove={onBlockerRemove}\n        />\n      )}\n    </div>\n  );\n}\n\n/* \u2500\u2500 MATRIX TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction ClosedPanel({closedLeads,icp}){\n  const cur=(icp&&icp.currency)||\"\u20ac\";\n  const totalAnnual=closedLeads.reduce(function(a,l){return a+(l.dealValue||0);},0);\n  const totalQ=Math.round(totalAnnual/4);\n  const now=new Date();\n  const qNames=[\"Q1 Jan-Mar\",\"Q2 Apr-Jun\",\"Q3 Jul-Sep\",\"Q4 Oct-Dec\"];\n  const currentQ=Math.floor(now.getMonth()/3);\n  const qRevenue=[0,0,0,0];\n  closedLeads.forEach(function(l){\n    var q=Math.floor(new Date(l.closedAt||l.createdAt).getMonth()/3);\n    qRevenue[q]+=(l.dealValue||0);\n  });\n  return <div>\n    <div style={{background:\"rgba(198,255,0,0.06)\",border:\"1px solid rgba(198,255,0,0.25)\",borderRadius:C.radiusSm,padding:\"10px 12px\",marginBottom:4}}>\n      <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:6}}>\n        <span style={{fontSize:9,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:1,textTransform:\"uppercase\"}}>Closed Won</span>\n        <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:16,color:C.acc,fontWeight:400}}>{closedLeads.length}</span>\n      </div>\n      {totalAnnual>0&&<div style={{marginBottom:6}}>\n        <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:18,color:C.acc,lineHeight:1}}>{cur}{totalAnnual.toLocaleString()}</div>\n        <div style={{color:C.muted,fontSize:9,marginTop:2}}>{cur}{totalQ.toLocaleString()} per quarter avg</div>\n      </div>}\n      {closedLeads.map(function(l){return(\n        <div key={l.id} style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginTop:4,paddingTop:4,borderTop:\"1px solid rgba(198,255,0,0.12)\"}}>\n          <span style={{color:C.dim,fontSize:11,overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\",maxWidth:100}}>\u2713 {l.company}</span>\n          <span style={{fontFamily:\"'DM Mono',monospace\",color:C.acc,fontSize:10}}>{l.dealValue?(cur+Math.round(l.dealValue/1000)+\"k/yr\"):\"\u2014\"}</span>\n        </div>\n      );})}\n      {closedLeads.length===0&&<div style={{color:C.muted,fontSize:11,fontStyle:\"italic\"}}>No closed deals yet</div>}\n    </div>\n    <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:C.radiusSm,padding:\"8px 10px\",marginBottom:4}}>\n      <div style={{...LBL,marginBottom:5}}>Revenue by quarter</div>\n      {qRevenue.map(function(rev,qi){const isCur=qi===currentQ;return(\n        <div key={qi} style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:3,padding:\"3px 6px\",borderRadius:3,background:isCur?\"rgba(198,255,0,0.06)\":\"transparent\",border:isCur?\"1px solid rgba(198,255,0,0.2)\":\"1px solid transparent\"}}>\n          <span style={{fontSize:9,color:isCur?C.acc:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700}}>{qNames[qi]}{isCur?\" \u25c0\":\"\"}</span>\n          <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:10,color:rev>0?C.acc:C.muted}}>{rev>0?(cur+rev.toLocaleString()):\"\u2014\"}</span>\n        </div>\n      );})}\n    </div>\n  </div>;\n}\n\nfunction MatrixTab({leads,reminders,icp}){\n  const [hoverId,setHoverId]=useState(null);\n  const [colorBy,setColorBy]=useState(\"score\");\n  const W=560,H=380,PAD=44;\n  const closedLeads=leads.filter(function(l){return pipeStage(l)===4;});\n    const plotted=useMemo(function(){\n    const now=new Date(),cutoff=new Date(now.getTime()+24*3600000);\n    const PIPE_EASE_BONUS  = [-1,0,8,15,22,28,35];\n    const PIPE_VALUE_BONUS = [-1,0,0, 0, 8,15,22];\n    const activeLeads=leads.filter(function(l){return pipeStage(l)!==4;});\n    return activeLeads.map(function(l){\n      const a=calcAxes(l.scores||{}),ps=pipeStage(l);\n      const easeBonus  = ps>=0 ? (PIPE_EASE_BONUS[ps+1]||0)  : 0;\n      const valueBonus = ps>=0 ? (PIPE_VALUE_BONUS[ps+1]||0) : 0;\n      const ease  = Math.min(98, a.ease  + easeBonus);\n      const value = Math.min(98, a.value + valueBonus);\n      const hasDue=(reminders||[]).some(function(r){return !r.done&&r.linkedLeadId===l.id&&new Date(r.dueAt)<=cutoff;});\n      return Object.assign({},l,{ease:ease,value:value,ps:ps,\n        dotClr:isBlocked(l)?C.danger:(colorBy===\"pipeline\"?pipeClr(ps):scoreClr(l.totalScore)),\n        ringClr:isBlocked(l)?C.danger:(colorBy===\"score\"?pipeClr(ps):scoreClr(l.totalScore)),\n        px:PAD+(ease/100)*(W-PAD*2),py:H-PAD-(value/100)*(H-PAD*2),\n        blocked:isBlocked(l),hasDueRem:hasDue});\n    });\n  },[leads,colorBy,reminders]);\n  const QUADS=[{x1:W/2,y1:PAD,x2:W-PAD,y2:H/2,lbl:\"QUICK WINS\",clr:C.acc},{x1:PAD,y1:PAD,x2:W/2,y2:H/2,lbl:\"STRATEGIC\",clr:C.info},{x1:PAD,y1:H/2,x2:W/2,y2:H-PAD,lbl:\"DEPRIORITIZE\",clr:C.muted},{x1:W/2,y1:H/2,x2:W-PAD,y2:H-PAD,lbl:\"LOW-HANGING\",clr:C.warn}];\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"1fr 200px\",gap:12,padding:\"20px 24px\",height:\"100%\",boxSizing:\"border-box\",overflow:\"hidden\"}}>\n      <div style={{...card(null,true),overflow:\"hidden\",display:\"flex\",flexDirection:\"column\",minHeight:0,height:\"100%\"}}>\n        <div style={{padding:\"12px 18px\",borderBottom:\"1px solid \"+C.line,display:\"flex\",alignItems:\"center\",gap:10,flexShrink:0}}>\n          <span style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5}}>Opportunity Matrix</span>\n          <span style={{color:C.muted,fontSize:11}}>Ease of Reach \u00d7 Strategic Value</span>\n          <div style={{flex:1}}/>\n          <div style={{display:\"flex\",background:C.surf2,border:\"1px solid \"+C.line,borderRadius:C.radiusSm,overflow:\"hidden\"}}>\n            {[[\"score\",\"By Score\"],[\"pipeline\",\"By Stage\"]].map(function(o){return(\n              <button key={o[0]} onClick={function(){setColorBy(o[0]);}} style={{background:colorBy===o[0]?C.acc+\"1A\":\"transparent\",border:\"none\",padding:\"4px 10px\",color:colorBy===o[0]?C.acc:C.muted,fontSize:10,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600,letterSpacing:0.5,cursor:\"pointer\"}}>{o[1]}</button>\n            );})}\n          </div>\n          <span style={{color:C.muted,fontSize:11,fontFamily:\"'DM Mono',monospace\"}}>{leads.length}</span>\n        </div>\n        <div style={{padding:'8px 12px',flex:1,display:'flex',alignItems:'stretch',minHeight:0}}>\n          <svg width=\"100%\" viewBox={\"0 0 \"+W+\" \"+H} style={{display:\"block\",width:\"100%\",height:\"100%\"}}>\n            {[25,50,75].map(function(v){const px=PAD+(v/100)*(W-PAD*2),py=H-PAD-(v/100)*(H-PAD*2);return <g key={v}><line x1={px} y1={PAD} x2={px} y2={H-PAD} stroke={C.line2} strokeWidth={0.5}/><line x1={PAD} y1={py} x2={W-PAD} y2={py} stroke={C.line2} strokeWidth={0.5}/></g>;})}\n            <line x1={W/2} y1={PAD} x2={W/2} y2={H-PAD} stroke={C.line} strokeWidth={1}/>\n            <line x1={PAD} y1={H/2} x2={W-PAD} y2={H/2} stroke={C.line} strokeWidth={1}/>\n            <line x1={PAD} y1={H-PAD} x2={W-PAD} y2={H-PAD} stroke={C.dim} strokeWidth={1}/>\n            <line x1={PAD} y1={PAD} x2={PAD} y2={H-PAD} stroke={C.dim} strokeWidth={1}/>\n            <text x={W/2} y={H-6} textAnchor=\"middle\" fill={C.muted} fontSize={9} fontFamily=\"Barlow Condensed\" letterSpacing=\"1.5\">EASE OF REACH</text>\n            <text x={10} y={H/2} textAnchor=\"middle\" fill={C.muted} fontSize={9} fontFamily=\"Barlow Condensed\" letterSpacing=\"1.5\" transform={\"rotate(-90,10,\"+H/2+\")\"}>STRATEGIC VALUE</text>\n            {[0,25,50,75,100].map(function(v){const px=PAD+(v/100)*(W-PAD*2),py=H-PAD-(v/100)*(H-PAD*2);return <g key={v}><text x={px} y={H-PAD+12} textAnchor=\"middle\" fill={C.muted} fontSize={8} fontFamily=\"DM Mono\">{v}</text><text x={PAD-5} y={py+3} textAnchor=\"end\" fill={C.muted} fontSize={8} fontFamily=\"DM Mono\">{v}</text></g>;})}\n            {QUADS.map(function(q){return <g key={q.lbl}><text x={(q.x1+q.x2)/2} y={(q.y1+q.y2)/2} textAnchor=\"middle\" fill={q.clr} fontSize={10} fontWeight=\"600\" fontFamily=\"Barlow Condensed\" letterSpacing=\"1.5\" opacity={0.4}>{q.lbl}</text></g>;})}\n            {plotted.map(function(l){\n              const isH=hoverId===l.id,c=l.dotClr,tw=Math.max(((l.company||\"\").length*6)+20,120),pl=(l.ps>=0&&l.ps<PIPE.length)?PIPE[l.ps].code:\"\u2014\";\n              return(\n                <g key={l.id} style={{cursor:\"crosshair\"}} onMouseEnter={function(){setHoverId(l.id);}} onMouseLeave={function(){setHoverId(null);}}>\n                  {l.blocked&&<g><circle cx={l.px} cy={l.py} r={12} fill={C.danger} opacity={0.15}/><circle cx={l.px} cy={l.py} r={12} fill=\"none\" stroke={C.danger} strokeWidth={2} opacity={0.9}/></g>}\n                  {!l.blocked&&l.ps>=0&&<circle cx={l.px} cy={l.py} r={isH?12:8} fill=\"none\" stroke={l.ringClr} strokeWidth={1.5} opacity={0.5}/>}{l.hasDueRem&&!l.blocked&&<circle cx={l.px} cy={l.py} r={isH?16:11} fill=\"none\" stroke={C.info} strokeWidth={1.5} strokeDasharray=\"4 2\" opacity={0.85}/>}\n                  {isH&&<circle cx={l.px} cy={l.py} r={17} fill=\"none\" stroke={c} strokeWidth={0.5} opacity={0.2}/>}\n                  <circle cx={l.px} cy={l.py} r={l.blocked?(isH?9:7):(isH?6:4)} fill={c} opacity={1}/>\n                  {!isH&&l.blocked&&<text x={l.px} y={l.py-12} textAnchor=\"middle\" fill={C.danger} fontSize={9} fontFamily=\"Barlow Condensed\" fontWeight=\"700\">BLOCKED</text>}\n                  {isH&&<g>\n                    <rect x={l.px+10} y={l.py-36} width={tw} height={l.blocked?60:50} rx={4} fill={C.surf} stroke={C.line} strokeWidth={1}/>\n                    <text x={l.px+18} y={l.py-18} fill={C.text} fontSize={11} fontWeight=\"700\" fontFamily=\"Barlow Condensed\">{l.company||\"\"}</text>\n                    <text x={l.px+18} y={l.py-5} fill={C.muted} fontSize={8} fontFamily=\"DM Mono\">S:{l.totalScore} E:{l.ease} V:{l.value}</text>\n                    <text x={l.px+18} y={l.py+8} fill={l.ringClr} fontSize={9} fontFamily=\"Barlow Condensed\" fontWeight=\"700\">{pl}</text>\n                    {l.blocked&&<text x={l.px+18} y={l.py+21} fill={C.danger} fontSize={9} fontFamily=\"Barlow Condensed\" fontWeight=\"700\">\u26d4 BLOCKED</text>}\n                  </g>}\n                </g>\n              );\n            })}\n          </svg>\n        </div>\n      </div>\n      <div style={{display:\"flex\",flexDirection:\"column\",gap:4,overflowY:\"auto\",height:\"100%\"}}>\n        <ClosedPanel closedLeads={closedLeads} icp={icp}/>\n        {QUADS.map(function(q){\n          const inQ=plotted.filter(function(l){return getQuadrant(l.ease,l.value).clr===q.clr;});\n          return(\n            <div key={q.lbl} style={{background:C.surf,borderRadius:C.radiusSm,padding:\"8px 10px\",borderLeft:\"2px solid \"+q.clr,border:\"1px solid \"+C.line}}>\n              <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n                <span style={{color:q.clr,fontSize:9,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.8}}>{q.lbl}</span>\n                <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:16,color:q.clr}}>{inQ.length}</span>\n              </div>\n              {inQ.slice(0,3).map(function(item){return(\n                <div key={item.id} style={{display:\"flex\",justifyContent:\"space-between\",marginTop:2}}>\n                  <span style={{color:C.dim,fontSize:10,overflow:\"hidden\",textOverflow:\"ellipsis\",whiteSpace:\"nowrap\",maxWidth:100}}>{isBlocked(item)?\"\u26d4 \":\"\"}{item.company}</span>\n                  <span style={{fontFamily:\"'DM Mono',monospace\",color:q.clr,fontSize:9}}>{item.totalScore}</span>\n                </div>\n              );})}\n            </div>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n/* \u2500\u2500 OUTREACH TAB \u2500\u2500\u2500\u2500\u250 ));setComposeTo(\"\");} \n    else{setSendStatus(null);setComposeTo(pc&&pc.email||\"\");}\n    fillTemplate(outputType,lead);\n  }\n\n  function changeType(typeId){\n    setOutputType(typeId);\n    if(live)fillTemplate(typeId,live);\n  }\n\n  function applySavedTemplate(tpl){\n    var pc=live?primaryContact(live):null;\n    var fn=pc&&pc.name?pc.name.split(\" \")[0]:\"[Name]\";\n    var co=live?live.company:\"[Company]\";\n    var mn=icp&&icp.bdmName||\"[Your Name]\";\n    setComposeSubj(tpl.subject.split(\"{{first_name}}\").join(fn).split(\"{{company}}\").join(co).split(\"{{my_name}}\").join(mn));\n    setComposeBody(tpl.body.split(\"{{first_name}}\").join(fn).split(\"{{company}}\").join(co).split(\"{{my_name}}\").join(mn));\n  }\n\n  async function generate(){\n    if(!live)return;\n    if(!apiKey||!apiKey.trim()){setSendStatus(\"Set API key in Settings first\");setTimeout(function(){setSendStatus(null);},3000);return;}\n    setGenerating(live.id);\n    var pc=primaryContact(live);\n    var contacts=(live.contacts||[]).map(function(c){return c.name+(c.title?\" (\"+c.title+\")\":\"\")+(c.email?\" <\"+c.email+\">\":\"\");}).join(\", \")||\"None\";\n    var ps=pipeStage(live),si=(ps>=0&&ps<PIPE.length)?PIPE[ps]:null;\n    var scoresText=CRITERIA.map(function(cr){return cr.short+\": \"+(live.scores&&live.scores[cr.id]||5)+\"/10\";}).join(\", \");\n    var recentLogs=(live.logEntries||[]).slice(-10).map(function(e){return\"[\"+fmtDate(e.timestamp)+\"] \"+e.content;}).join(\"\\n\")||\"None\";\n    var outType=OUTPUT_TYPES.find(function(o){return o.id===outputType;})||OUTPUT_TYPES[0];\n    var toneInstr={formal:\"Tone: professional, formal.\",casual:\"Tone: conversational, warm.\",short:\"Tone: ultra-brief, max 3 lines.\"};\n    var prompt=[\"You are a senior BDM writing on behalf of: \"+(icp.bdmName||\"a BDM\"),\"Product: \"+(icp.productDescription||\"Not specified\"),\"Lead: \"+live.company+\" | \"+(live.industry||\"Unknown\"),\"Contacts: \"+contacts,\"Pipeline: \"+(si  var raw=encodeRfc822(to,subject,body);\n  return fetch(\"https://www.googleapis.com/gmail/v1/users/me/messages/send\",{method:\"POST\",headers:{\"Authorization\":\"Bearer \"+tok,\"Content-Type\":\"application/json\"},body:JSON.stringify({raw:raw})}).then(function(r){if(!r.ok){return r.json().then(function(err){var msg=err&&err.error&&err.error.message||\"\";if(r.status===403)throw new Error(\"403 Forbidden \u2014 reconnect Google (click G) to grant send permission. \"+msg);if(r.status===401)throw new Error(\"401 Token expired \u2014 reconnect Google (click G). \"+msg);throw new Error(\"Gmail error \"+r.status+\": \"+msg);}).catch(function(e){if(e.message.indexOf(\"403\")>=0||e.message.indexOf(\"401\")>=0)throw e;throw new Error(\"Gmail send failed: \"+r.status+\" \u2014 try reconnecting Google\");});}return r.json();});\n}\nfunction parseEmailFromPitch(pitch){\n  if(!pitch)return{subject:\"\",body:pitch||\"\"};\n  var lines=pitch.split(\"\\n\");\n  var subj=\"\";\n  var bodyStart=0;\n  for(var i=0;i<Math.min(lines.length,5);i++){\n    var m=lines[i].match(/^Subject:\\s*(.+)/i);\n    if(m){subj=m[1].trim();bodyStart=i+1;while(bodyStart<lines.length&&!lines[bodyStart].trim())bodyStart++;break;}\n  }\n  return{subject:subj,body:lines.slice(bodyStart).join(\"\\n\").trim()};\n}\nfunction getWeekStart(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay()+1);if(d.getDay()===0)d.setDate(d.getDate()-6);return d;}\n\nfunction detectBlocker(txt){\n  const lo=txt.toLowerCase();\n  return lo.indexOf(\"blocker\")>=0;\n}\nfunction extractBlockerType(txt){\n  const lo=txt.toLowerCase();\n  if(lo.indexOf(\"external\")>=0||lo.indexOf(\"client\")>=0||lo.indexOf(\"waiting on\")>=0)return\"external\";\n  return\"internal\";\n}\n\nfunction ActivityTab({leads,reminders,onAddLogEntry,onAddReminder,onBlockerAdd,onDoneReminder,onDeleteReminder,onEditReminder}){\n  const [text,setText]=useState(\"\");\n  const [manualCat,setManualCat]=useState(null);\n  const [savedMsg,setSavedMsg]=useState(\"\");\n  const [savedType,setSavedType]=useState(\"ok\");\n  const [askDate,setAskDate]=useState(false);\n  const [pendingRemText,setPendingRemText]=useState(null);\n  const [manualDt,setManualDt]=useState(\"\");\n  const [manualTm,setManualTm]=useState(\"09:00\");\n  const [filterLead,setFilterLead]=useState(\"\");\n  const [filterType,setFilterType]=useState(\"all\");\n  const [blockerConfirm,setBlockerConfirm]=useState(null);\n  const [qt,setQt]=useState(\"\");\n  function addQuick(){\n    const t=qt.trim();if(!t)return;\n    const parsed=parseNaturalDate(t);\n    if(parsed&&parsed>new Date(Date.now()-60000)){\n      const ll=leads.find(function(l){return t.toLowerCase().indexOf(l.company.toLowerCase())>=0;})||null;\n      onAddReminder({id:uid(\"rem\"),text:t,dueAt:parsed.toISOString(),linkedCompany:ll?ll.company:null,linkedLeadId:ll?ll.id:null,done:false,createdAt:new Date().toISOString()});\n      setQt(\"\");\n    }else{setPendingRemText(t);setAskDate(true);setQt(\"\");}\n  }\n\n  const BLOCKER_TRIGGERS=[\"blocker\"];\n  const hasBlocker=detectBlocker(text.toLowerCase());\n  const hasReminder=[\"remind me\",\"set reminder\",\"add reminder\"].some(function(t){return text.toLowerCase().indexOf(t)>=0;});\n\n  const lines=text.trim().split(\"\\n\"),firstLine=lines[0].trim(),body=lines.length>1?lines.slice(1).join(\"\\n\").trim():text.trim();\n\n  const liveMatch=useMemo(function(){\n    if(!firstLine)return null;\n    const q=firstLine.toLowerCase();\n    return leads.find(function(l){return l.company.toLowerCase()===q||l.company.toLowerCase().indexOf(q)===0||q.indexOf(l.company.toLowerCase())>=0;})||null;\n  },[firstLine,leads]);\n\n  const detectedCat=body?manualCat||categorize(body):null;\n  const detectedMeta=detectedCat?LOG_CATS[detectedCat]||LOG_CATS.note:null;\n\n\n\n\n  function handleSave(){\n    const fullLo=text.toLowerCase();\n    const isBlocker=detectBlocker(fullLo);\n    // If blocker detected but no company matched, show picker\
