tFamily:\"'DM Mono',monospace\",fontSize:13,color:C.warn,fontWeight:500}}>{unstartedCount}</span>\n              </div>\n            )}\n          </div>\n\n        </div>\n      </div>\n\n      {/* \\u2500\\u2500 RIGHT: Mind Map \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500 */}\n      <div style={{display:\"flex\",flexDirection:\"column\",overflow:\"hidden\"}}>\n        <div style={{padding:\"10px 16px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,display:\"flex\",alignItems:\"center\",gap:8}}>\n          <div style={{width:2,height:14,background:C.acc,borderRadius:1}}/>\n          <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Strategy Map</span>\n          <span style={{color:C.muted,fontSize:11}}>\n    {selectedId\n      ?<span style={{color:C.acc}}>\"{(nodes.find(function(n){return n.id===selectedId;})||{text:\"node\"}).text}\" selected</span>\n      :\"\u2190 Click a node to select, then add children\"}\n    </span>\n          <div style={{flex:1}}/>\n          <button onClick={function(){if(selectedId)addNode();}} disabled={!selectedId}\n    style={{...BTN.sm,color:selectedId?C.info:C.muted,borderColor:selectedId?C.info+\"44\":C.line,opacity:1,fontSize:11,background:selectedId?\"rgba(96,180,255,0.1)\":\"transparent\"}}\n    title={selectedId?\"Add a child node to the selected node\":\"First click a node on the map\"}>\n    {selectedId?\"+ Add child\":\"\u2190 Select a node first\"}\n  </button>\n          <button onClick={function(){if(selectedId&&selectedId!==\"root\")startEdit(selectedNode);}} disabled={!selectedId||selectedId===\"root\"} style={{...BTN.sm,opacity:(selectedId&&selectedId!==\"root\")?1:0.4,fontSize:11}}>\u270f Edit</button>\n          <button onClick={deleteNode} disabled={!selectedId||selectedId===\"root\"} style={{...BTN.smRed,opacity:(selectedId&&selectedId!==\"root\")?1:0.4,fontSize:11}}>\u00d7 Delete</button>\n          <button onClick={aiSuggest} disabled={generatingMap} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:11,opacity:generatingMap?0.5:1}}>{generatingMap?\"Generating\u2026\":\"\u2726 AI: Generate my plan\"}</button>\n        </div>\n\n        <div style={{flex:1,overflow:\"hidden\",position:\"relative\",background:C.bg}}>\n          {editingId&&(\n            <div style={{position:\"absolute\",top:0,left:0,right:0,bottom:0,zIndex:10,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",background:\"rgba(0,0,0,0.5)\"}}>\n              <div style={{background:C.surf,border:\"1px solid \"+C.line,borderRadius:\"8px\",padding:20,minWidth:300}}>\n                <div style={{...LBL,marginBottom:8}}>Edit node text</div>\n                <input value={editText} onChange={function(e){setEditText(e.target.value);}}\n                  onKeyDown={function(e){if(e.key===\"Enter\")commitEdit();if(e.key===\"Escape\")setEditingId(null);}}\n                  style={{...INP,fontSize:14,marginBottom:12}}/>\n                <div style={{display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n                  <button onClick={function(){setEditingId(null);}} style={BTN.secondary}>Cancel</button>\n                  <button onClick={commitEdit} style={BTN.primary}>Save</button>\n                </div>\n              </div>\n            </div>\n          )}\n          <svg ref={svgRef} width=\"100%\" height=\"100%\"\n            onMouseMove={handleSvgMouseMove}\n            onMouseUp={handleSvgMouseUp}\n            onMouseLeave={handleSvgMouseUp}\n            onClick={function(){setSelectedId(null);}}>\n            <defs>\n              <filter id=\"glow\">\n                <feGaussianBlur stdDeviation=\"2\" result=\"coloredBlur\"/>\n                <feMerge><feMergeNode in=\"coloredBlur\"/><feMergeNode in=\"SourceGraphic\"/></feMerge>\n              </filter>\n            </defs>\n            {/* Draw edges first */}\n            {nodes.map(function(node){\n              if(!node.parentId)return null;\n              var parent=nodes.find(function(n){return n.id===node.parentId;});\n              if(!parent)return null;\n              return <line key={\"e\"+node.id} x1={parent.x} y1={parent.y} x2={node.x} y2={node.y}\n                stroke={node.color} strokeWidth={1.5} strokeOpacity={0.4} strokeDasharray={node.parentId===\"root\"?\"\":\"4 3\"}/>;\n            })}\n            {/* Draw nodes */}\n            {nodes.map(function(node){\n              var isRoot=node.id===\"root\";\n              var isSel=selectedId===node.id;\n              var r=isRoot?36:28;\n              var textLen=node.text.length;\n              var boxW=Math.max(r*2+8, textLen*7+16);\n              var boxH=isRoot?44:32;\n              return(\n                <g key={node.id}\n                  style={{cursor:dragging===node.id?\"grabbing\":\"grab\"}}\n                  onMouseDown={function(e){handleSvgMouseDown(e,node.id);}}\n                  onDoubleClick={function(e){e.stopPropagation();startEdit(node);}}>\n                  <rect x={node.x-boxW/2} y={node.y-boxH/2} width={boxW} height={boxH} rx={isRoot?22:16}\n                    fill={node.color+(isSel?\"33\":\"18\")}\n                    stroke={node.color}\n                    strokeWidth={isSel?2:1}\n                    filter={isRoot?\"url(#glow)\":undefined}/>\n                  {isSel&&<rect x={node.x-boxW/2-3} y={node.y-boxH/2-3} width={boxW+6} height={boxH+6} rx={isRoot?25:19}\n                    fill=\"none\" stroke={node.color} strokeWidth={1} strokeOpacity={0.4} strokeDasharray=\"4 2\"/>}\n                  <text x={node.x} y={node.y+(isRoot?1:0)} textAnchor=\"middle\" dominantBaseline=\"middle\"\n                    fill={node.color} fontSize={isRoot?13:11} fontWeight=\"700\"\n                    fontFamily=\"Barlow Condensed\" letterSpacing=\"0.5\"\n                    style={{pointerEvents:\"none\",userSelect:\"none\"}}>\n                    {node.text.length>22?node.text.slice(0,20)+\"\u2026\":node.text}\n                  </text>\n                </g>\n              );\n            })}\n          </svg>\n          {nodes.length<=1&&(\n            <div style={{position:\"absolute\",top:\"50%\",left:\"50%\",transform:\"translate(-50%,-50%)\",textAlign:\"center\",pointerEvents:\"none\",marginTop:60}}>\n              <div style={{color:C.muted,fontSize:12}}>Click the root node then \"+ Add child\" to build your map</div>\n              <div style={{color:C.muted,fontSize:11,marginTop:4}}>Or click \"\u2726 AI Suggest\" to auto-generate a strategic map</div>\n            </div>\n          )}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\nfunction IcpTab({icp,weights,apiKey,onApiKeyChange,onIcpChange,onWeightsChange}){\n  const totalW=Object.values(weights).reduce(function(a,b){return a+b;},0),wOk=totalW===100;\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:16,padding:\"20px 24px\",height:\"100%\",overflowY:\"auto\",boxSizing:\"border-box\",alignContent:\"start\"}}>\n      <div style={{...card(\"#888888\")}}>\n        <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:16}}>\n          <div style={{width:2,height:16,background:\"#555555\",borderRadius:1}}/>\n          <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>ICP Configuration</h3>\n        </div>\n        <p style={{color:C.muted,fontSize:12,margin:\"0 0 16px\",lineHeight:1.6}}>Define your Ideal Customer Profile. Injected into every AI pitch.</p>\n        {[[\"Your Name\",\"bdmName\",\"text\",\"\u2014\"],[\"What you sell\",\"productDescription\",\"textarea\",\"Describe your product or service\u2026\"],[\"Target Industries\",\"targetIndustries\",\"text\",\"e.g. SaaS, Fintech, B2B\"],[\"Ideal Company Size\",\"targetSize\",\"text\",\"e.g. 50\u2013500 employees\"],[\"Budget Range\",\"idealBudget\",\"text\",\"e.g. $30k\u2013$200k ARR\"],[\"Pain Points You Solve\",\"painPoints\",\"textarea\",\"e.g. Manual reporting, poor forecasting\u2026\"],[\"Currency symbol\",\"currency\",\"text\",\"\u20ac\"]].map(function(r){return(\n          <div key={r[1]} style={{marginBottom:12}}>\n            <span style={LBL}>{r[0]}</span>\n            {r[2]===\"textarea\"?<textarea value={icp[r[1]]||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder={r[3]}/>:<input value={icp[r[1]]||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} style={{...INP,fontSize:12}} placeholder={r[3]}/>}\n          </div>\n        );})}\n        <div style={{borderTop:\"1px solid \"+C.line,paddingTop:14,marginTop:4}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:8}}>\n            <span style={{...LBL,margin:0,color:C.acc}}>Anthropic API Key</span>\n            <Tag label={apiKey?\"\u2713 Set\":\"Not set\"} clr={apiKey?C.acc:C.danger} small/>\n          </div>\n          <input type=\"password\" value={apiKey||\"\"} onChange={function(e){onApiKeyChange(e.target.value);}} style={{...INP,fontFamily:\"'DM Mono',monospace\",fontSize:12}} placeholder=\"sk-ant-api03-\u2026\"/>\n          <div style={{color:C.muted,fontSize:10,marginTop:5,lineHeight:1.5}}>Required for AI generation. Get your key at <a href=\"https://console.anthropic.com\" target=\"_blank\" rel=\"noreferrer\">console.anthropic.com</a> \u2192 API Keys. Stored only in your browser.</div>\n        </div>\n      </div>\n      <div style={{...card(wOk?C.acc:C.danger)}}>\n        <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",margin
