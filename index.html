der:\"1px solid rgba(255,85,85,0.3)\",borderRadius:6,fontSize:11,color:C.danger,fontWeight:600}}>\u26a0 You have urgent items that need attention today</div>}\n        </div>\n\n        <div style={{padding:\"16px 24px\",display:\"flex\",flexDirection:\"column\",gap:14}}>\n          {/* Quick stats */}\n          <div style={{display:\"grid\",gridTemplateColumns:\"repeat(4,1fr)\",gap:8}}>\n            {[\n              {label:\"Active leads\",val:activeLeads.length,clr:C.text},\n              {label:\"Tasks today\",val:totalTasks,clr:totalTasks>0?C.warn:C.muted},\n              {label:\"Blocked\",val:blocked.length,clr:blocked.length>0?C.danger:C.muted},\n              {label:\"Wins this week\",val:recentWins.length,clr:recentWins.length>0?C.acc:C.muted},\n            ].map(function(s,i){return(\n              <div key={i} style={{background:C.surf2,borderRadius:8,padding:\"10px 12px\",textAlign:\"center\"}}>\n                <div style={{fontFamily:\"'DM Mono',monospace\",fontSize:22,color:s.clr,lineHeight:1}}>{s.val}</div>\n                <div style={{fontSize:9,color:C.muted,marginTop:3,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>{s.label}</div>\n              </div>\n            );})}\n          </div>\n\n          {/* Overdue */}\n          {overdue.length>0&&(\n            <div>\n              <div style={{fontSize:11,fontWeight:700,color:C.danger,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,marginBottom:6}}>\u26a0 OVERDUE ({overdue.length})</div>\n              {overdue.slice(0,3).map(function(r){return(\n                <div key={r.id} style={{padding:\"8px 12px\",background:\"rgba(255,85,85,0.06)\",border:\"1px solid rgba(255,85,85,0.2)\",borderRadius:6,marginBottom:4,fontSize:11,color:C.text}}>\n                  {r.text.slice(0,70)}{r.text.length>70?\"\u2026\":\"\"}\n                  {r.linkedCompany&&<span style={{color:C.danger,marginLeft:6,fontSize:10}}>\u00b7 {r.linkedCompany}</span>}\n                </div>\n              );})}\n            </div>\n          )}\n\n          {/* Due today */}\n          {dueToday.length>0&&(\n            <div>\n              <div style={{fontSize:11,fontWeight:700,color:C.warn,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,marginBottom:6}}>\ud83d\udcc5 DUE TODAY ({dueToday.length})</div>\n              {dueToday.slice(0,3).map(function(r){return(\n                <div key={r.id} style={{padding:\"8px 12px\",background:\"rgba(245,158,11,0.06)\",border:\"1px solid rgba(245,158,11,0.2)\",borderRadius:6,marginBottom:4,fontSize:11,color:C.text,display:\"flex\",alignItems:\"center\",gap:8}}>\n                  <span style={{flex:1}}>{r.text.slice(0,60)}{r.text.length>60?\"\u2026\":\"\"}</span>\n                  {r.linkedCompany&&<span style={{color:C.warn,fontSize:10,flexShrink:0}}>{r.linkedCompany}</span>}\n                </div>\n              );})}\n            </div>\n          )}\n\n          {/* Blocked */}\n          {blocked.length>0&&(\n            <div>\n              <div style={{fontSize:11,fontWeight:700,color:C.danger,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,marginBottom:6}}>\u26d4 BLOCKERS TO RESOLVE ({blocked.length})</div>\n              {blocked.map(function(l){return(\n                <div key={l.id} onClick={function(){dismiss();onNavigate(\"leads\",l.id);}} style={{padding:\"8px 12px\",background:\"rgba(255,85,85,0.06)\",border:\"1px solid rgba(255,85,85,0.2)\",borderRadius:6,marginBottom:4,fontSize:11,color:C.text,cursor:\"pointer\",display:\"flex\",alignItems:\"center\",gap:8}}>\n                  <span style={{fontWeight:600,flex:1}}>{l.company}</span>\n                  <span style={{color:C.danger,fontSize:10}}>{l.blocker&&l.blocker.description?l.blocker.description.slice(0,40)+\"\u2026\":\"\"}</span>\n                  <span style={{color:C.muted,fontSize:10}}>\u2192</span>\n                </div>\n              );})}\n            </div>\n          )}\n\n          {/* Stuck leads */}\n          {stuck.length>0&&(\n            <div>\n              <div style={{fontSize:11,fontWeight:700,color:C.info,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,marginBottom:6}}>\ud83d\udca4 NO ACTIVITY 7+ DAYS ({stuck.length})</div>\n              {stuck.slice(0,3).map(function(l){return(\n                <div key={l.id} onClick={function(){dismiss();onNavigate(\"leads\",l.id);}} style={{padding:\"8px 12px\",background:\"rgba(96,180,255,0.06)\",border:\"1px solid rgba(96,180,255,0.2)\",borderRadius:6,marginBottom:4,fontSize:11,color:C.text,cursor:\"pointer\",display:\"flex\",alignItems:\"center\",gap:8}}>\n                  <span style={{fontWeight:600,flex:1}}>{l.company}</span>\n                  <span style={{fontSize:10,color:C.info,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{PIPE[pipeStage(l)]?PIPE[pipeStage(l)].code:\"NOT STARTED\"}</span>\n                  <button onClick={function(e){e.stopPropagation();dismiss();onOpenPrepCard(l.id);}} style={{...BTN.sm,fontSize:9,color:C.acc,borderColor:C.acc+\"44\"}}>Prep \u2192</button>\n                </div>\n              );})}\n            </div>\n          )}\n\n          {/* Hot new leads */}\n          {hotNew.length>0&&(\n            <div>\n              <div style={{fontSize:11,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,marginBottom:6}}>\ud83d\udd25 HOT LEADS TO CONTACT ({hotNew.length})</div>\n              {hotNew.map(function(l){return(\n                <div key={l.id} onClick={function(){dismiss();onNavigate(\"leads\",l.id);}} style={{padding:\"8px 12px\",background:\"rgba(198,255,0,0.06)\",border:\"1px solid rgba(198,255,0,0.2)\",borderRadius:6,marginBottom:4,fontSize:11,color:C.text,cursor:\"pointer\",display:\"flex\",alignItems:\"center\",gap:8}}>\n                  <span style={{fontWeight:600,flex:1}}>{l.company}</span>\n                  <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:12,color:C.acc}}>{l.totalScore}</span>\n                  <span style={{color:C.muted,fontSize:10}}>\u2192</span>\n                </div>\n              );})}\n            </div>\n          )}\n\n          {/* Recent wins */}\n          {recentWins.length>0&&(\n            <div>\n              <div style={{fontSize:11,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,marginBottom:6}}>\ud83c\udfc6 CLOSED THIS WEEK ({recentWins.length})</div>\n              {recentWins.map(function(l){return(\n                <div key={l.id} style={{padding:\"8px 12px\",background:\"rgba(198,255,0,0.06)\",border:\"1px solid rgba(198,255,0,0.2)\",borderRadius:6,marginBottom:4,fontSize:11,display:\"flex\",alignItems:\"center\",gap:8}}>\n                  <span style={{fontWeight:600,color:C.text,flex:1}}>{l.company}</span>\n                  {l.dealValue&&<span style={{fontFamily:\"'DM Mono',monospace\",color:C.acc,fontSize:12}}>{(icp&&icp.currency)||\"\u20ac\"}{l.dealValue.toLocaleString()}</span>}\n                </div>\n              );})}\n            </div>\n          )}\n\n          {totalTasks===0&&blocked.length===0&&stuck.length===0&&(\n            <div style={{textAlign:\"center\",padding:\"20px 0\",color:C.muted}}>\n              <div style={{fontSize:28,marginBottom:8}}>\u2728</div>\n              <div style={{fontSize:13,color:C.dim}}>You are all caught up! Great work.</div>\n            </div>\n          )}\n        </div>\n\n        <div style={{padding:\"14px 24px\",borderTop:\"1px solid \"+C.line,display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n          <button onClick={function(){dismiss();onNavigate(\"activity\");}} style={{...BTN.secondary,fontSize:12}}>Go to Activity</button>\n          <button onClick={dismiss} style={{...BTN.primary,fontSize:12}}>Let's go \u2192</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\n/* \u2500\u2500 MEETING PREP CARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction MeetingPrepCard({lead,icp,apiKey,reminders,onClose}){\n  var [generating,setGenerating]=useState(false);\n  var [aiSuggestion,setAiSuggestion]=useState(\"\");\n\n  if(!lead)return null;\n  var pc=primaryContact(lead);\n  var ps=pipeStage(lead);\n  var blocked=isBlocked(lead);\n  var lastEntries=(lead.logEntries||[]).slice(-5).reverse();\n  var openRems=reminders.filter(function(r){return !r.done&&r.linkedLeadId===lead.id;});\n  var PIPE_NAMES=[\"SIGNAL\",\"ECHO\",\"LOCKED\",\"DEEP DIVE\",\"ON THE WIRE\"];\n\n  function generateSuggestions(){\n    if(!apiKey||!apiKey.trim()){setAiSuggestion(\"Set your Anthropic API key in Settings to get AI suggestions.\");return;}\n    setGenerating(true);\n    var pcName=pc?(pc.name+(pc.title?\", \"+pc.title:\"\")):\"\";\n    var context=\"I have a meeting with \"+lead.company+(pcName?\" (contact: \"+pcName+\")\":\"\")+\". Pipeline stage: \"+(ps>=0?PIPE_NAMES[ps]:\"Not started\")+\". Lead score: \"+lead.totalScore+\"/100. Status: \"+(blocked?\"BLOCKED\":(\"Active\"))\n      +\"\\nRecent activity:\\n\"+(lastEntries.map(function(e){return \"- \"+e.content.slice(0,80);}).join(\"\\n\")||\"No recent activity\")\n      +\"\\nOpen reminders: \"+(openRems.map(function(r){return r.text;}).join(\", \")||\"None\")\n      +\"\\nICP: \"+(icp&&icp.productDescription||\"\")\n      +\"\\n\\nGive me: 1) 3 key talking points for this meeting, 2) The one most important question to ask, 3) Suggested next step after the meeting. Be concise and specific.\";\n    fetch(\"https://api.anthropic.com/v1/messages\",{method:\"POST\",headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:400,messages:[{role:\"user\",content:context}]})})\n    .then(function(r){return r.json();})\n    .then(function(d){\n      if(d.error){setAiSuggestion(\"Error: \"+d.error.message);}\n      else{setAiSuggestion((d.content||[]).map(function(b){return b.text||\"\";}).join(\"\").trim());}\n      setGenerating(false);\n    })\n    .catch(function(e){setAiSuggestion(\"Error: \"+e.message);setGenerating(false);});\n  }\n\n  return(\n    <div style={{position:\"fixed\",top:0,left:0,right:0,bottom:0,zIndex:600,background:\"rgba(0,0,0,0.88)\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",padding:20}}>\n      <div style={{background:C.surf,border:\"1px solid \"+C.line,borderRadius:16,width:\"100%\",maxWidth:540,maxHeight:\"88vh\",overflowY:\"auto\",boxShadow:\"0 32px 80px rgba(0,0,0,0.9)\"}}>\n        <div style={{padding:\"18px 22px 14px\",borderBottom:\"1px solid \"+C.line,background:\"linear-gradient(135deg,rgba(96,180,255,0.06) 0%,transparent 100%)\",display:\"flex\",alignItems:\"flex-start\",justifyContent:\"space-between\"}}>\n          <div>\n            <div style={{fontSize:11,color:C.info,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:700,letterSpacing:0.8,marginBottom:4}}>MEETING PREP</div>\n            <div style={{fontSize:20,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{lead.company}</div>\n            {pc&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{pc.name}{pc.title?\" \u00b7 \"+pc.title:\"\"}{pc.email?\" \u00b7 \"+pc.email:\"\"}</div>}\n          </div>\n          <button onClick={onClose} style={{...BTN.ghost,fontSize:18,color:C.muted}}>\u2715</button>\n        </div>\n\n        <div style={{padding:\"16px 22px\",display:\"flex\",flexDirection:\"column\",gap:14}}>\n          {/* Stage + Score */}\n          <div style={{display:\"flex\",gap:8}}>\n            <div style={{flex:1,background:C.surf2,borderRadius:8,padding:\"10px 14px\"}}>\n              <div style={{fontSize:9,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:4}}>PIPELINE</div>\n              <div style={{fontSize:13,fontWeight:700,color:ps>=0?PIPE[ps].clr:C.muted}}>{ps>=0?PIPE_NAMES[ps]:\"NOT STARTED\"}</div>\n            </div>\n            <div style={{flex:1,background:C.surf2,borderRadius:8,padding:\"10px 14px\"}}>\n              <div style={{fontSize:9,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:4}}>SCORE</div>\n              <div style={{fontSize:13,fontWeight:700,color:scoreClr(lead.totalScore)}}>{lead.totalScore}/100</div>\n            </div>\n            <div style={{flex:1,background:C.surf2,borderRadius:8,padding:\"10px 14px\"}}>\n              <div style={{fontSize:9,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:4}}>STATUS</div>\n              <div style={{fontSize:13,fontWeight:700,color:blocked?C.danger:C.acc}}>{blocked?\"\u26d4 BLOCKED\":\"\u2713 Active\"}</div>\n            </div>\n          </div>\n\n          {/* Blocker warning */}\n          {blocked&&(\n            <div style={{padding:\"10px 14px\",background:\"rgba(255,85,85,0.08)\",border:\"1px solid rgba(255,85,85,0.3)\",borderRadius:8}}>\n              <div style={{fontSize:11,fontWeight:700,color:C.danger,marginBottom:4}}>\u26d4 Active Blocker</div>\n              <div style={{fontSize:11,color:C.dim}}>{lead.blocker.description}</div>\n            </div>\n          )}\n\n          {/* Last 3 interactions */}\n          <div>\n            <div style={{fontSize:10,fontWeight:700,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>LAST INTERACTIONS</div>\n            {lastEntries.length===0\n              ?<div style={{fontSize:11,color:C.muted,fontStyle:\"italic\"}}>No interactions logged yet</div>\n              :lastEntries.slice(0,3).map(function(e,i){\n                var cat=LOG_CATS[e.category]||LOG_CATS.note;\n                return(\n                  <div key={i} style={{display:\"flex\",gap:8,padding:\"6px 0\",borderBottom:\"1px solid \"+C.line2}}>\n                    <span style={{fontSize:12,flexShrink:0}}>{cat.icon}</span>\n                    <div style={{flex:1,minWidth:0}}>\n                      <div style={{fontSize:10,color:C.muted,marginBottom:1}}>{fmtDate(e.timestamp)}</div>\n                      <div style={{fontSize:11,color:C.dim,overflow:\"hidden\",maxHeight:32}}>{e.content}</div>\n                    </div>\n                  </div>\n                );\n              })\n            }\n          </div>\n\n          {/* Open reminders */}\n          {openRems.length>0&&(\n            <div>\n              <div style={{fontSize:10,fontWeight:700,color:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8,marginBottom:8}}>OPEN TASKS</div>\n              {openRems.map(function(r){return(\n                <div key={r.id} style={{fontSize:11,color:new Date(r.dueAt)<new Date()?C.danger:C.dim,padding:\"4px 0\",borderBottom:\"1px solid \"+C.line2}}>\n                  \u23f0 {r.text.slice(0,60)} <span style={{color:C.muted,fontSize:10}}>\u00b7 {fmtReminder(r.dueAt)}</span>\n                </div>\n              );})}\n            </div>\n          )}\n\n          {/* AI Suggestions */}\n          <div style={{background:C.surf2,border:\"1px solid \"+C.line,borderRadius:8,padding:\"12px 14px\"}}>\n            <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",marginBottom:aiSuggestion?10:0}}>\n              <div style={{fontSize:10,fontWeight:700,color:C.acc,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.8}}>\u2726 AI MEETING PREP</div>\n              <button onClick={generateSuggestions} disabled={generating} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:10,opacity:generating?0.5:1}}>{generating?\"Generating\u2026\":\"Generate suggestions\"}</button>\n            </div>\n            {aiSuggestion&&<div style={{fontSize:11,color:C.dim,lineHeight:1.7,whiteSpace:\"pre-wrap\"}}>{aiSuggestion}</div>}\n            {!aiSuggestion&&<div style={{fontSize:10,color:C.muted,marginTop:6}}>Get talking points, the key question to ask, and suggested next step</div>}\n          </div>\n\n          {/* Quick add to calendar */}\n          <button onClick={function(){window.open(\"https://calendar.google.com/calendar/render?action=TEMPLATE&text=\"+encodeURIComponent(\"Meeting: \"+lead.company)+\"&details=\"+encodeURIComponent(\"Prep notes for \"+lead.company+(pc?\" \u00b7 \"+pc.name:\"\")+\"\\nPipeline: \"+(ps>=0?PIPE_NAMES[ps]:\"Not started\")+\"\\nScore: \"+lead.totalScore),\"_blank\");}} style={{...BTN.sm,color:\"#4285F4\",borderColor:\"#4285F444\",fontSize:11,alignSelf:\"flex-start\"}}>\ud83d\udcc5 Add to Google Calendar</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\n/* \u2500\u2500 STRATEGY TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction fmtK(v,cur){\n  if(!v&&v!==0)return\"\u2014\";\n  var c=cur||\"\";\n  if(v>=1000000)return c+Math.round(v/100000)/10+\"M\";\n  if(v>=1000)return c+Math.round(v/1000)+\"k\";\n  return c+String(v);\n}\n\n\nfunction StrategyTab({leads,icp,apiKey,strategy,onUpdate}){\n  var cur=(icp&&icp.currency)||\"\u20ac\";\n  var kpi=(strategy&&strategy.kpiTargets)||{acv:0,netNewNames:0,pipelineValue:0};\n  var mindMap=(strategy&&strategy.mindMap)||{nodes:[{id:\"root\",text:\"My Annual Goal\",x:400,y:250,parentId:null,color:\"#C6FF00\"}]};\n  var nodes=mindMap.nodes||[];\n  var now=new Date();\n  var yearStart=new Date(now.getFullYear(),0,1);\n  var qStart=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1);\n  var closedLeads=leads.filter(function(l){return pipeStage(l)===4;});\n  var closedThisYear=closedLeads.filter(function(l){var d=new Date(l.closedAt||l.createdAt);return d>=yearStart;});\n  var totalRevYear=closedThisYear.reduce(function(a,l){return a+(l.dealValue||0);},0);\n  var netNewNames=closedThisYear.length;\n  var acvActual=netNewNames>0?Math.round(totalRevYear/netNewNames):0;\n  var pipelineValue=leads.filter(function(l){return pipeStage(l)!==4;}).reduce(function(a,l){return a+(l.dealValue||0);},0);\n\n  const [selId,setSelId]=useState(null);\n  const [editId,setEditId]=useState(null);\n  const [editTxt,setEditTxt]=useState(\"\");\n  const [drag,setDrag]=useState(null);\n  const [dragOff,setDragOff]=useState({x:0,y:0});\n  const [genMap,setGenMap]=useState(false);\n  const [editKpi,setEditKpi]=useState(null);\n  const [kpiDraft,setKpiDraft]=useState(\"\");\n  const svgRef=useRef(null);\n  var currentQ=Math.floor(now.getMonth()/3);\n\n  function saveNodes(nn){onUpdate({mindMap:Object.assign({},mindMap,{nodes:nn})});}\n  function parseK(v){var s=String(v||0).trim().toLowerCase().replace(/,/g,\"\").replace(/[\u20ac$\u00a3]/g,\"\");if(s.indexOf(\"m\")>=0)return Math.round(parseFloat(s)*1000000);if(s.indexOf(\"k\")>=0)return Math.round(parseFloat(s)*1000);return parseFloat(s)||0;}\n  function saveKpi(key,val){onUpdate({kpiTargets:Object.assign({},kpi,{[key]:parseK(val)})});}\n  function pct(a,t){if(!t)return 0;return Math.min(Math.round((a/t)*100),150);}\n  function rag(p){return p>=100?C.acc:p>=70?C.warn:C.danger;}\n\n  var KPI_ROWS=[\n    {key:\"netNewNames\",   label:\"Net New Logos / Year\", unit:\"\",  actual:netNewNames,   fmt:function(v){return String(v);},        desc:\"New clients this year\"},\n    {key:\"acv\",           label:\"Avg Deal Size (ACV)\",  unit:cur, actual:acvActual,     fmt:function(v){return fmtK(v,cur);},      desc:\"Avg annual contract value\"},\n    {key:\"pipelineValue\", label:\"Pipeline Value\",       unit:cur, actual:pipelineValue, fmt:function(v){return fmtK(v,cur);},      desc:\"Active opportunities value\"},\n  ];\n\n  function addNode(){\n    if(!selId)return;\n    var par=nodes.find(function(n){return n.id===selId;});\n    if(!par)return;\n    var sibs=nodes.filter(function(n){return n.parentId===selId;});\n    var angle=(sibs.length*60-60)*(Math.PI/180);\n    var nn={id:\"n\"+Date.now(),text:\"New idea\",x:Math.round(par.x+Math.cos(angle)*140),y:Math.round(par.y+Math.sin(angle)*140),parentId:selId,color:PIPE[sibs.length%PIPE.length].clr};\n    saveNodes([].concat(nodes,[nn]));\n    setSelId(nn.id);setEditId(nn.id);setEditTxt(\"New idea\");\n  }\n  function delNode(){\n    if(!selId||selId===\"root\")return;\n    function desc(id){var r=[id];nodes.forEach(function(n){if(n.parentId===id)r=r.concat(desc(n.id));});return r;}\n    saveNodes(nodes.filter(function(n){return desc(selId).indexOf(n.id)<0;}));\n    setSelId(null);\n  }\n  function commitEdit(){\n    if(!editId)return;\n    saveNodes(nodes.map(function(n){return n.id===editId?Object.assign({},n,{text:editTxt}):n;}));\n    setEditId(null);\n  }\n  function onMD(e,nid){\n    e.stopPropagation();setSelId(nid);\n    var svg=svgRef.current;if(!svg)return;\n    var r=svg.getBoundingClientRect();\n    var nd=nodes.find(function(n){return n.id===nid;});if(!nd)return;\n    setDrag(nid);setDragOff({x:e.clientX-r.left-nd.x,y:e.clientY-r.top-nd.y});\n  }\n  function onMM(e){\n    if(!drag)return;\n    var svg=svgRef.current;if(!svg)return;\n    var r=svg.getBoundingClientRect();\n    saveNodes(nodes.map(function(n){return n.id===drag?Object.assign({},n,{x:Math.round(e.clientX-r.left-dragOff.x),y:Math.round(e.clientY-r.top-dragOff.y)}):n;}));\n  }\n\n  function doGenerate(){\n    if(!apiKey||!apiKey.trim()){alert(\"Set your API key in ICP tab.\");return;}\n    setGenMap(true);\n    var prompt=\"I am a BDM. KPI actuals: \"+netNewNames+\" new logos, ACV \"+cur+acvActual+\", pipeline \"+cur+pipelineValue+\". ICP: \"+(icp&&icp.productDescription||\"not set\")+\". Mind map center: \"+((nodes[0]&&nodes[0].text)||\"My Annual Goal\")+\". Return ONLY a JSON object: {\\\"nodes\\\":[{\\\"id\\\":\\\"root\\\",\\\"text\\\":\\\"...\\\",\\\"x\\\":400,\\\"y\\\":250,\\\"parentId\\\":null,\\\"color\\\":\\\"#C6FF00\\\"},{\\\"id\\\":\\\"1\\\",\\\"text\\\":\\\"...\\\",\\\"x\\\":200,\\\"y\\\":150,\\\"parentId\\\":\\\"root\\\",\\\"color\\\":\\\"#60B4FF\\\"},...]} Up to 12 nodes, 3-4 branches. Colors: #60B4FF #A78BFA #F59E0B #FB923C #C6FF00. No markdown.\";\n    fetch(\"https://api.anthropic.com/v1/messages\",{method:\"POST\",headers:{\"Content-Type\":\"application/json\",\"x-api-key\":apiKey.trim(),\"anthropic-version\":\"2023-06-01\",\"anthropic-dangerous-direct-browser-access\":\"true\"},body:JSON.stringify({model:\"claude-sonnet-4-20250514\",max_tokens:1000,messages:[{role:\"user\",content:prompt}]})})\n    .then(function(r){return r.json();})\n    .then(function(data){\n      if(data.error){alert(\"API error: \"+data.error.message);setGenMap(false);return;}\n      var raw=(data.content||[]).map(function(b){return b.text||\"\";}).join(\"\");\n      try{\n        var start=raw.indexOf(\"{\");\n        var end=raw.lastIndexOf(\"}\");\n        if(start>=0&&end>start){\n          var parsed=JSON.parse(raw.slice(start,end+1));\n          if(parsed.nodes&&parsed.nodes.length>0)onUpdate({mindMap:{nodes:parsed.nodes}});\n        }\n      }catch(e){alert(\"Could not parse AI response.\");}\n      setGenMap(false);\n    })\n    .catch(function(e){alert(\"Error: \"+e.message);setGenMap(false);});\n  }\n\n  var selNode=nodes.find(function(n){return n.id===selId;})||null;\n  var selLabel=selId?((selNode&&selNode.text)||\"node\")+\" \u2014 selected\":\"\u2190 Click a node to select\";\n\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"300px 1fr\",height:\"100%\",overflow:\"hidden\"}}>\n      <div style={{borderRight:\"1px solid \"+C.line,display:\"flex\",flexDirection:\"column\",overflowY:\"auto\",background:C.surf}}>\n        <div style={{padding:\"14px 16px\",borderBottom:\"1px solid \"+C.line,flexShrink:0}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:8}}>\n            <div style={{width:2,height:16,background:C.acc,borderRadius:1}}/>\n            <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>KPI Tracker</span>\n          </div>\n          <div style={{display:\"flex\",gap:3}}>\n            {[\"Q1\",\"Q2\",\"Q3\",\"Q4\"].map(function(q,qi){return(\n              <div key={qi} style={{flex:1,textAlign:\"center\",padding:\"3px 2px\",borderRadius:4,background:qi===currentQ?\"rgba(198,255,0,0.12)\":\"transparent\",border:\"1px solid \"+(qi===currentQ?C.acc+\"44\":C.line)}}>\n                <div style={{fontSize:9,fontWeight:700,color:qi===currentQ?C.acc:C.muted,fontFamily:\"'Barlow Condensed',sans-serif\"}}>{q}{qi===currentQ?\" \u25c0\":\"\"}</div>\n              </div>\n            );})}\n          </div>\n        </div>\n        <div style={{padding:\"12px 16px\",flex:1}}>\n          {KPI_ROWS.map(function(row){\n            var p=pct(row.actual,kpi[row.key]||0);\n            var clr=rag(p);\n            var isEd=editKpi===row.key;\n            return(\n              <div key={row.key} style={{marginBottom:14,background:C.surf2,borderRadius:\"8px\",padding:\"12px 14px\",borderLeft:\"2px solid \"+clr}}>\n                <div style={{fontSize:10,fontWeight:700,color:C.dim,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\",marginBottom:1}}>{row.label}</div>\n                <div style={{fontSize:9,color:C.muted,marginBottom:6}}>{row.desc}</div>\n                <div style={{display:\"flex\",alignItems:\"baseline\",gap:8,marginBottom:kpi[row.key]>0?8:0}}>\n                  <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:20,color:clr,lineHeight:1}}>{row.fmt(row.actual)}</span>\n                  <span style={{color:C.muted,fontSize:11}}>of</span>\n                  {isEd\n                    ?<input type=\"number\" value={kpiDraft} onChange={function(e){setKpiDraft(e.target.value);}} onBlur={function(){saveKpi(row.key,kpiDraft);setEditKpi(null);}} onKeyDown={function(e){if(e.key===\"Enter\"){saveKpi(row.key,kpiDraft);setEditKpi(null);}}} style={{...INP,width:90,fontSize:12,padding:\"2px 6px\",display:\"inline-block\"}} placeholder=\"e.g. 100k\" autoFocus/>\n                    :<span onClick={function(){setEditKpi(row.key);setKpiDraft(String(kpi[row.key]||0));}} style={{fontFamily:\"'DM Mono',monospace\",fontSize:12,color:C.muted,cursor:\"pointer\",borderBottom:\"1px dashed \"+C.line}} title=\"Click to set target\">{(kpi[row.key]||0)>0?row.fmt(kpi[row.key]):\"Set target \u2192\"}</span>\n                  }\n                  {(kpi[row.key]||0)>0&&<span style={{fontFamily:\"'DM Mono',monospace\",fontSize:16,color:clr,marginLeft:\"auto\"}}>{p}%</span>}\n                </div>\n                {(kpi[row.key]||0)>0&&(\n                  <div>\n                    <div style={{background:C.surf3,height:4,borderRadius:2,overflow:\"hidden\"}}>\n                      <div style={{width:Math.min(p,100)+\"%\",height:4,background:clr,borderRadius:2}}/>\n                    </div>\n                    <div style={{fontSize:9,color:C.muted,marginTop:3}}>\n                      {p>=100?\"Target reached!\":p>=70?\"On track\":\"Gap: \"+row.fmt(Math.max(0,(kpi[row.key]||0)-row.actual))}\n                      <span style={{color:C.info,marginLeft:6}}>auto \u2713</span>\n                    </div>\n                  </div>\n                )}\n              </div>\n            );\n          })}\n        </div>\n      </div>\n\n      <div style={{display:\"flex\",flexDirection:\"column\",overflow:\"hidden\"}}>\n        <div style={{padding:\"10px 16px\",borderBottom:\"1px solid \"+C.line,flexShrink:0,display:\"flex\",alignItems:\"center\",gap:8,flexWrap:\"wrap\"}}>\n          <div style={{width:2,height:14,background:C.acc,borderRadius:1}}/>\n          <span style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Strategy Map</span>\n          <span style={{fontSize:11,color:selId?C.acc:C.muted}}>{selLabel}</span>\n          <div style={{flex:1}}/>\n          <button onClick={addNode} disabled={!selId} style={{...BTN.sm,color:selId?C.info:C.muted,borderColor:selId?C.info+\"44\":C.line,fontSize:10}}>{selId?\"+ Add child\":\"\u2190 Select node first\"}</button>\n          <button onClick={function(){if(selId&&selId!==\"root\"){setEditId(selId);setEditTxt(selNode?selNode.text:\"\");}}} disabled={!selId||selId===\"root\"} style={{...BTN.sm,fontSize:10,opacity:(selId&&selId!==\"root\")?1:0.4}}>\u270f Edit</button>\n          <button onClick={delNode} disabled={!selId||selId===\"root\"} style={{...BTN.smRed,fontSize:10,opacity:(selId&&selId!==\"root\")?1:0.4}}>\u2715 Del</button>\n          <button onClick={doGenerate} disabled={genMap} style={{...BTN.sm,color:C.acc,borderColor:C.acc+\"44\",fontSize:10,opacity:genMap?0.5:1}}>{genMap?\"Generating\u2026\":\"\u2726 AI Generate\"}</button>\n        </div>\n\n        <div style={{flex:1,position:\"relative\",overflow:\"hidden\",background:C.bg}}>\n          {editId&&(\n            <div style={{position:\"absolute\",top:0,left:0,right:0,bottom:0,zIndex:10,background:\"rgba(0,0,0,0.5)\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\"}}>\n              <div style={{background:C.surf,border:\"1px solid \"+C.line,borderRadius:\"8px\",padding:20,minWidth:280}}>\n                <div style={{...LBL,marginBottom:8}}>Edit node</div>\n                <input value={editTxt} onChange={function(e){setEditTxt(e.target.value);}} onKeyDown={function(e){if(e.key===\"Enter\")commitEdit();if(e.key===\"Escape\")setEditId(null);}} style={{...INP,fontSize:14,marginBottom:12}} autoFocus/>\n                <div style={{display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n                  <button onClick={function(){setEditId(null);}} style={BTN.secondary}>Cancel</button>\n                  <button onClick={commitEdit} style={BTN.primary}>Save</button>\n                </div>\n              </div>\n            </div>\n          )}\n          <svg ref={svgRef} width=\"100%\" height=\"100%\" onMouseMove={onMM} onMouseUp={function(){setDrag(null);}} onMouseLeave={function(){setDrag(null);}} onClick={function(){setSelId(null);}}>\n            {nodes.map(function(node){\n              if(!node.parentId)return null;\n              var par=nodes.find(function(n){return n.id===node.parentId;});\n              if(!par)return null;\n              return <line key={\"e\"+node.id} x1={par.x||0} y1={par.y||0} x2={node.x||0} y2={node.y||0} stroke={node.color||C.acc} strokeWidth={1.5} strokeOpacity={0.4}/>;\n            })}\n            {nodes.map(function(node){\n              var isRoot=node.id===\"root\";\n              var isSel=selId===node.id;\n              var txt=(node.text||\"\");\n              var bw=Math.max((isRoot?72:56), txt.length*7+16);\n              var bh=isRoot?40:28;\n              var clr=node.color||C.acc;\n              return(\n                <g key={node.id} style={{cursor:\"grab\"}} onMouseDown={function(e){onMD(e,node.id);}} onDoubleClick={function(e){e.stopPropagation();setEditId(node.id);setEditTxt(txt);}}>\n                  <rect x={(node.x||0)-bw/2} y={(node.y||0)-bh/2} width={bw} height={bh} rx={isRoot?20:14} fill={clr+(isSel?\"33\":\"18\")} stroke={clr} strokeWidth={isSel?2:1}/>\n                  {isSel&&<rect x={(node.x||0)-bw/2-3} y={(node.y||0)-bh/2-3} width={bw+6} height={bh+6} rx={isRoot?23:17} fill=\"none\" stroke={clr} strokeWidth={1} strokeOpacity={0.4} strokeDasharray=\"4 2\"/>}\n                  <text x={node.x||0} y={node.y||0} textAnchor=\"middle\" dominantBaseline=\"middle\" fill={clr} fontSize={isRoot?12:10} fontWeight=\"700\" fontFamily=\"Barlow Condensed\" style={{pointerEvents:\"none\",userSelect:\"none\"}}>{txt.length>22?txt.slice(0,20)+\"\u2026\":txt}</text>\n                </g>\n              );\n            })}\n          </svg>\n          {nodes.length<=1&&<div style={{position:\"absolute\",top:\"60%\",left:\"50%\",transform:\"translate(-50%,-50%)\",textAlign:\"center\",pointerEvents:\"none\",color:C.muted,fontSize:12}}>Click the node to select it, then \"+ Add child\"<br/>Or click \"\u2726 AI Generate\" for a strategic map</div>}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n\nfunction IcpTab({icp,weights,apiKey,onApiKeyChange,onIcpChange,onWeightsChange,gClientId,setGClientId,gUser,gToken,startGoogleAuth}){\n  const totalW=Object.values(weights).reduce(function(a,b){return a+b;},0),wOk=totalW===100;\n  return(\n    <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:16,padding:\"20px 24px\",height:\"100%\",overflowY:\"auto\",boxSizing:\"border-box\",alignContent:\"start\"}}>\n      <div style={{...card(C.info)}}>\n        <div style={{display:\"flex\",alignItems:\"center\",gap:8,marginBottom:16}}>\n          <div style={{width:2,height:16,background:C.info,borderRadius:1}}/>\n          <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>ICP Configuration</h3>\n        </div>\n        <p style={{color:C.muted,fontSize:12,margin:\"0 0 16px\",lineHeight:1.6}}>Define your Ideal Customer Profile. Injected into every AI pitch.</p>\n        {[[\"Your Name\",\"bdmName\",\"text\",\"\u2014\"],[\"What you sell\",\"productDescription\",\"textarea\",\"Describe your product or service\u2026\"],[\"Target Industries\",\"targetIndustries\",\"text\",\"e.g. SaaS, Fintech, B2B\"],[\"Ideal Company Size\",\"targetSize\",\"text\",\"e.g. 50\u2013500 employees\"],[\"Budget Range\",\"idealBudget\",\"text\",\"e.g. $30k\u2013$200k ARR\"],[\"Pain Points You Solve\",\"painPoints\",\"textarea\",\"e.g. Manual reporting, poor forecasting\u2026\"],[\"Currency symbol\",\"currency\",\"text\",\"\u20ac\"]].map(function(r){return(\n          <div key={r[1]} style={{marginBottom:12}}>\n            <span style={LBL}>{r[0]}</span>\n            {r[2]===\"textarea\"?<textarea value={icp[r[1]]||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} rows={2} style={{...INP,resize:\"vertical\",fontSize:12}} placeholder={r[3]}/>:<input value={icp[r[1]]||\"\"} onChange={function(e){onIcpChange(r[1],e.target.value);}} style={{...INP,fontSize:12}} placeholder={r[3]}/>}\n          </div>\n        );})}\n\n      </div>\n      <div style={{...card(wOk?C.acc:C.danger)}}>\n        <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:16}}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n            <div style={{width:2,height:16,background:wOk?C.acc:C.danger,borderRadius:1}}/>\n            <h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:\"'Barlow Condensed',sans-serif\",letterSpacing:0.5,textTransform:\"uppercase\"}}>Scoring Weights</h3>\n          </div>\n          <Tag label={totalW+\"/100\"} clr={wOk?C.acc:C.danger}/>\n        </div>\n        {CRITERIA.map(function(cr){return(\n          <div key={cr.id} style={{marginBottom:16}}>\n            <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",marginBottom:5}}>\n              <span style={{fontSize:11,color:cr.clr,fontFamily:\"'Barlow Condensed',sans-serif\",fontWeight:600,letterSpacing:0.5}}>{cr.label}</span>\n              <span style={{fontFamily:\"'DM Mono',monospace\",fontSize:14,color:cr.clr}}>{weights[cr.id]}<span style={{fontSize:10,color:C.muted}}>%</span></span>\n            </div>\n            <input type=\"range\" min={0} max={40} value={weights[cr.id]} onChange={function(e){onWeightsChange(cr.id,parseInt(e.target.value)||0);}} style={{width:\"100%\",accentColor:cr.clr}}/>\n            <div style={{background:C.surf3,height:1,marginTop:4,borderRadius:1}}>\n              <div style={{width:((weights[cr.id]/40)*100)+\"%\",height:1,background:cr.clr,borderRadius:1}}/>\n            </div>\n          </div>\n        );})}\n        {!wOk&&<div style={{background:\"rgba(255,85,85,0.08)\",border:\"1px solid rgba(255,85,85,0.2)\",borderRadius:C.radiusSm,padding:\"8px 12px\",marginTop:4}}><span style={{color:C.danger,fontSize:12}}>Sum is {totalW}. Needs to be exactly 100.</span></div>}\n        <button onClick={function(){onWeightsChange(\"__reset__\",0);}} style={{...BTN.secondary,marginTop:12,fontSize:11}}>Reset to defaults</button>\n      </div>\n    </div>\n  );\n}\n\n/* \u2500\u2500 APP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\nfunction App(){\n  const [tab,setTab]=useState(\"leads\");\n  const [leads,setLeads]=useState([]);\n  const [icp,setIcp]=useState(DEF_ICP);\n  const [weights,setWeights]=useState(DEF_WEIGHTS);\n  const [statsHistory,setStatsHistory]=useState([]);\n  const [reminders,setReminders]=useState([]);\n  const [apiKey,setApiKey]=useState(\"\");\n  const [loaded,setLoaded]=useState(false);\n  const [openLeadId,setOpenLeadId]=useState(null);\n  const [strategy,setStrategy]=useState(DEF_STRATEGY);\n  const [sequences,setSequences]=useState(DEF_SEQUENCES);\n  const [gToken,setGToken]=useState(null);\n  const [gUser,setGUser]=useState(null);\n  const [gmailUnread,setGmailUnread]=useState([]);\n  const [gClientId,setGClientId]=useState(localStorage.getItem(\"pcrm_gclient_id\")||\"\");\n  const [globalMic,setGlobalMic]=useState(false);\n  const [showExport,setShowExport]=useState(false);\n  const [showStrategy,setShowStrategy]=useState(false);\n  const [showBriefing,setShowBriefing]=useState(false);\n  const [showPrepCard,setShowPrepCard]=useState(null); // leadId\n  const [briefingDismissed,setBriefingDismissed]=useState(false);\n  const [showEOD,setShowEOD]=useState(false);\n  const [nextAction,setNextAction]=useState(null); // {leadId, noteContent}\n  const [lastBackup,setLastBackup]=useState(null);\n\n  useEffect(function(){\n    (async function(){\n      let ll=[];\n      try{const v=localStorage.getItem(SK.leads);if(v){ll=JSON.parse(v);setLeads(ll);}}catch(_){}\n      try{const v=localStorage.getItem(SK.icp);if(v)setIcp(JSON.parse(v));}catch(_){}\n      try{const v=localStorage.getItem(SK.weights);if(v)setWeights(JSON.parse(v));}catch(_){}\n      try{const v=localStorage.getItem(SK.reminders);if(v)setReminders(JSON.parse(v));}catch(_){}\n      try{const v=localStorage.getItem(SK.apiKey);if(v)setApiKey(v);}catch(_){}\n      try{const v=localStorage.getItem(SK.strategy);if(v)setStrategy(JSON.parse(v));}catch(_){}\n      try{const v=localStorage.getItem(SK.sequences);if(v)setSequences(JSON.parse(v));}catch(_){}\n      try{const v=localStorage.getItem(SK.lastBackup);if(v)setLastBackup(v);}catch(_){}\n      try{\n        const today=new Date().toISOString().slice(0,10);\n        const snap=Object.assign({date:today},computeSnapshot(ll));\n        let existing=[];\n        try{const v=localStorage.getItem(SK.statsHistory);if(v)existing=JSON.parse(v);}catch(_){}\n        let updated=existing.filter(function(s){return s.date!==today;});\n        updated.push(snap);if(updated.length>7)updated=updated.slice(updated.length-7);\n        setStatsHistory(updated);\n        try{localStorage.setItem(SK.statsHistory,JSON.stringify(updated));}catch(_){}\n      }catch(_){}\n      setLoaded(true);\n      var today=new Date().toISOString().slice(0,10);\n      var lastBriefing=localStorage.getItem(\"pcrm_last_briefing\");\n      if(lastBriefing!==today){setShowBriefing(true);}\n    })();\n  },[]);\n\n  useEffect(function(){if(loaded)try{localStorage.setItem(SK.leads,JSON.stringify(leads));}catch(_){}},[leads,loaded]);\n  useEffect(function(){if(loaded)try{localStorage.setItem(SK.icp,JSON.stringify(icp));}catch(_){}},[icp,loaded]);\n  useEffect(function(){if(loaded)try{localStorage.setItem(SK.weights,JSON.stringify(weights));}catch(_){}},[weights,loaded]);\n  useEffect(function(){if(loaded)try{localStorage.setItem(SK.reminders,JSON.stringify(reminders));}catch(_){}},[reminders,loaded]);\n  useEffect(function(){if(loaded)try{localStorage.setItem(SK.apiKey,apiKey);}catch(_){}},[apiKey,loaded]);\n  useEffect(function(){if(loaded)try{localStorage.setItem(SK.strategy,JSON.stringify(strategy));}catch(_){}},[strategy,loaded]);\n  useEffect(function(){if(loaded)try{localStorage.setItem(SK.sequences,JSON.stringify(sequences));}catch(_){}},[sequences,loaded]);\n  useEffect(function(){if(!loaded)return;setLeads(function(prev){return prev.map(function(l){return Object.assign({},l,{totalScore:calcScore(l.scores||{},weights)});});});},[weights,loaded]);\n\n  const handleAddLeads=useCallback(function(nl){setLeads(function(p){return [].concat(p,nl);});},[]);\n  const handleEditLead=useCallback(function(up){setLeads(function(p){return p.map(function(l){return l.id===up.id?up:l;});});},[]);\n  const handleDelLead=useCallback(function(id){setLeads(function(p){return p.filter(function(l){return l.id!==id;});});},[]);\n  const handleStatus=useCallback(function(id,s){setLeads(function(p){return p.map(function(l){return l.id===id?Object.assign({},l,{status:s}):l;});});},[]);\n  const handlePitch=useCallback(function(id,v){setLeads(function(p){return p.map(function(l){return l.id===id?Object.assign({},l,{aiPitch:v}):l;});});},[]);\n  const handleIcp=useCallback(function(k,v){setIcp(function(p){return Object.assign({},p,{[k]:v});});},[]);\n  const handleWeight=useCallback(function(k,v){if(k===\"__reset__\"){setWeights(DEF_WEIGHTS);return;}setWeights(function(p){return Object.assign({},p,{[k]:v});});},[]);\n  const handlePipeAdv=useCallback(function(id,ni,note,dealValue){setLeads(function(p){return p.map(function(l){if(l.id!==id)return l;const e={stage:ni,timestamp:new Date().toISOString(),note:note||\"\"};const updates={pipeline:ni,pipelineHistory:[].concat(l.pipelineHistory||[],[e])};if(ni===4){updates.dealValue=dealValue||0;updates.closedAt=new Date().toISOString();}return Object.assign({},l,updates);});});},[]);\n  const handleBlockerAdd=useCallback(function(id,type,desc){setLeads(function(p){return p.map(function(l){if(l.id!==id)return l;const newBlocker={type:type,description:desc,createdAt:new Date().toISOString()};const existSummary=l.summary||{};const newSummary=Object.assign({},existSummary,{blockerStatus:\"[\"+type.toUpperCase()+\" BLOCKER] \"+desc});return Object.assign({},l,{blocker:newBlocker,summary:newSummary});});});},[]);\n  const handleBlockerResolve=useCallback(function(id,res){setLeads(function(p){return p.map(function(l){if(l.id!==id||!l.blocker)return l;const r=Object.assign({},l.blocker,{resolvedAt:new Date().toISOString(),resolution:res||\"\"});const newSummary=Object.assign({},l.summary||{},{blockerStatus:res?\"Resolved: \"+res:\"\"});return Object.assign({},l,{blocker:null,blockerHistory:[].concat(l.blockerHistory||[],[r]),summary:newSummary});});});},[]);\n  const handleBlockerRemove=useCallback(function(id){setLeads(function(p){return p.map(function(l){return l.id!==id?l:Object.assign({},l,{blocker:null});});});},[]);\n  const handleAddLogEntry=useCallback(function(leadId,entry){setLeads(function(p){return p.map(function(l){return l.id!==leadId?l:Object.assign({},l,{logEntries:[].concat(l.logEntries||[],[entry])});});});},[]);\n  const handleAddReminder=useCallback(function(r){\n    setReminders(function(p){return [].concat(p,[r]);});\n    // Auto-set blocker if reminder text contains \"blocker\" keyword\n    if(r.linkedLeadId&&r.text&&r.t
